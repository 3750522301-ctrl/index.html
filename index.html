<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加密货币启动点捕捉系统 v3.0 - 共振模型</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0e27;
      --sub-bg: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --sub: #9ca3af;
      --cyan: #22d3ee;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --purple: #a855f7;
      --orange: #f97316;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 顶部导航 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
      color: var(--cyan);
    }

    .nav-tabs {
      display: flex;
      gap: 12px;
    }

    .nav-tab {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--sub);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .nav-tab.active {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .nav-tab:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .update-time {
      font-size: 12px;
      color: var(--sub);
    }

    .update-time-val {
      color: var(--cyan);
      font-weight: 700;
      font-size: 14px;
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
      font-size: 12px;
    }

    .btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn.primary {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .btn.primary:hover {
      background: #06b6d4;
    }

    .btn.loading {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* 搜索框 */
    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      position: relative;
    }

    .search-input {
      flex: 1;
      padding: 10px 12px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-size: 12px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--cyan);
    }

    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 80px;
      max-height: 300px;
      overflow-y: auto;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      z-index: 100;
      display: none;
    }

    .search-suggestions.active {
      display: block;
    }

    .suggestion-item {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .suggestion-item:hover {
      background: rgba(34, 211, 238, 0.1);
    }

    .suggestion-asset {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 4px;
    }

    .suggestion-pairs {
      font-size: 11px;
      color: var(--sub);
      line-height: 1.4;
    }

    .pair-badge {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(34, 211, 238, 0.2);
      border-radius: 3px;
      margin-right: 4px;
      margin-bottom: 2px;
      cursor: pointer;
    }

    .pair-badge:hover {
      background: rgba(34, 211, 238, 0.4);
    }

    /* 页面切换 */
    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    /* 监控页面 */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      padding: 12px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 900;
      color: var(--cyan);
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      padding: 8px 12px;
      margin-top: 24px;
      margin-bottom: 12px;
      border-left: 4px solid var(--cyan);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title.buy {
      border-left-color: var(--green);
      color: var(--green);
    }

    .section-title.sell {
      border-left-color: var(--red);
      color: var(--red);
    }

    .section-title.excellent {
      border-left-color: var(--cyan);
      color: var(--cyan);
    }

    .section-title.yao-buy {
      border-left-color: var(--orange);
      color: var(--orange);
    }

    .section-title.yao-sell {
      border-left-color: var(--purple);
      color: var(--purple);
    }

    .section-title.watching {
      border-left-color: var(--yellow);
      color: var(--yellow);
    }

    .section-count {
      font-size: 11px;
      color: var(--sub);
      font-weight: 400;
      margin-left: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    /* 硬币卡 */
    .coin-card {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .coin-card:hover {
      border-color: var(--cyan);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(34, 211, 238, 0.15);
    }

    .coin-card.buy {
      border-color: rgba(34, 197, 94, 0.3);
    }

    .coin-card.buy:hover {
      border-color: var(--green);
      box-shadow: 0 8px 24px rgba(34, 197, 94, 0.2);
    }

    .coin-card.sell {
      border-color: rgba(239, 68, 68, 0.3);
    }

    .coin-card.sell:hover {
      border-color: var(--red);
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.2);
    }

    .coin-card.yao-buy {
      border-color: rgba(249, 115, 22, 0.3);
    }

    .coin-card.yao-buy:hover {
      border-color: var(--orange);
      box-shadow: 0 8px 24px rgba(249, 115, 22, 0.2);
    }

    .coin-card.yao-sell {
      border-color: rgba(168, 85, 247, 0.3);
    }

    .coin-card.yao-sell:hover {
      border-color: var(--purple);
      box-shadow: 0 8px 24px rgba(168, 85, 247, 0.2);
    }

    .trend-protection {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 8px;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.5);
      border-radius: 4px;
      font-size: 11px;
      color: #86efac;
      z-index: 10;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .coin-name {
      font-weight: 700;
      color: var(--cyan);
      font-size: 16px;
    }

    .coin-price {
      font-size: 12px;
      color: var(--sub);
      margin-top: 2px;
    }

    .price-24h {
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }

    .price-24h.up {
      color: var(--green);
    }

    .price-24h.down {
      color: var(--red);
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tag {
      font-size: 10px;
      padding: 4px 8px;
      background: rgba(34, 211, 238, 0.2);
      border: 1px solid rgba(34, 211, 238, 0.4);
      border-radius: 4px;
      color: var(--cyan);
      white-space: nowrap;
    }

    .tag.risk-high {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }

    .tag.risk-mid {
      background: rgba(245, 158, 11, 0.2);
      border-color: rgba(245, 158, 11, 0.4);
      color: #fcd34d;
    }

    .tag.risk-low {
      background: rgba(34, 197, 94, 0.2);
      border-color: rgba(34, 197, 94, 0.4);
      color: #86efac;
    }

    .tag.phase {
      background: rgba(168, 85, 247, 0.2);
      border-color: rgba(168, 85, 247, 0.4);
      color: #e9d5ff;
    }

    .tag.trend {
      background: rgba(59, 130, 246, 0.2);
      border-color: rgba(59, 130, 246, 0.4);
      color: #bfdbfe;
    }

    .tag.signal-count {
      background: rgba(251, 146, 60, 0.2);
      border-color: rgba(251, 146, 60, 0.4);
      color: #fed7aa;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric {
      background: rgba(0, 0, 0, 0.3);
      padding: 6px;
      border-radius: 4px;
      text-align: center;
    }

    .metric-label {
      font-size: 9px;
      color: var(--sub);
      margin-bottom: 2px;
    }

    .metric-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }

    .metric-value.up {
      color: var(--green);
    }

    .metric-value.down {
      color: var(--red);
    }

    .metric-value.star {
      font-size: 12px;
    }

    .analysis-text {
      font-size: 11px;
      line-height: 1.5;
      color: var(--sub);
      margin-bottom: 10px;
    }

    .quick-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .quick-link {
      flex: 1;
      min-width: 45px;
      padding: 6px;
      background: rgba(34, 211, 238, 0.15);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 4px;
      font-size: 9px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .quick-link:hover {
      background: rgba(34, 211, 238, 0.3);
      border-color: var(--cyan);
    }

    /* 详情页面 */
    .detail-page {
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back-btn {
      padding: 8px 16px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 20px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .back-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .detail-metric {
      background: var(--sub-bg);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .detail-metric-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .detail-metric-value {
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
    }

    .detail-metric-value.up {
      color: var(--green);
    }

    .detail-metric-value.down {
      color: var(--red);
    }

    .detail-metric-value.star {
      font-size: 18px;
    }

    .timeframe-analysis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .tf-analysis {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .tf-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 8px;
      font-size: 12px;
    }

    .tf-content {
      font-size: 11px;
      line-height: 1.8;
      color: var(--sub);
    }

    .tf-content strong {
      color: var(--text);
    }

    /* 快捷通道 */
    .quick-channel-section {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .quick-channel-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
      font-size: 13px;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    @media (max-width: 768px) {
      .channel-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .channel-hint {
      margin-top: 12px;
      padding: 8px;
      background: rgba(34, 211, 238, 0.1);
      border-radius: 6px;
      font-size: 11px;
      color: var(--sub);
      line-height: 1.5;
    }

    /* 错误提示 */
    .error-box {
      padding: 30px;
      text-align: center;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      color: #fca5a5;
      margin: 20px 0;
      font-size: 13px;
      line-height: 1.8;
    }

    /* 通知 */
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 16px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      z-index: 1000;
      animation: slideIn 0.3s;
      max-width: 300px;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
      }
      to {
        transform: translateX(0);
      }
    }

    .notification.success {
      border-color: rgba(34, 197, 94, 0.5);
      background: rgba(34, 197, 94, 0.1);
      color: #86efac;
    }

    .notification.error {
      border-color: rgba(239, 68, 68, 0.5);
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
    }

    .notification.info {
      border-color: rgba(34, 211, 238, 0.5);
      background: rgba(34, 211, 238, 0.1);
      color: #22d3ee;
    }

    /* 搜索结果 */
    .search-results-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .result-card {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    .result-card-header {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .result-asset {
      font-weight: 700;
      color: var(--cyan);
      font-size: 14px;
    }

    .result-pairs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-pair-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-pair-type {
      font-size: 11px;
      font-weight: 700;
      color: var(--sub);
    }

    .result-pair-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .result-pair-btn {
      padding: 4px 8px;
      background: rgba(34, 211, 238, 0.15);
      border: 1px solid rgba(34, 211, 238, 0.3);
      color: var(--cyan);
      border-radius: 4px;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .result-pair-btn:hover {
      background: rgba(34, 211, 238, 0.3);
      border-color: var(--cyan);
    }

    /* 衍生品面板 */
    .derivatives-panel {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .panel-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
      font-size: 13px;
    }

    .crowding-risk-high {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .crowding-risk-mid {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .crowding-risk-low {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.3);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .header-left,
      .header-right {
        flex-direction: column;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }

      .detail-metrics {
        grid-template-columns: repeat(2, 1fr);
      }

      .timeframe-analysis {
        grid-template-columns: 1fr;
      }

      .channel-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部导航 -->
    <div class="header">
      <div class="header-left">
        <div class="logo">🚀 启动点捕捉 v3.0</div>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchPage('monitor', this)">📊 监控</button>
          <button class="nav-tab" onclick="switchPage('search', this)">🔍 搜索</button>
        </div>
      </div>
      <div class="header-right">
        <div class="update-time">
          最后更新: <span class="update-time-val" id="update-time">--:--</span>
        </div>
        <button class="btn primary" id="manual-refresh-btn" onclick="manualRefresh()">
          <span id="refresh-icon">🔄</span> 刷新
        </button>
      </div>
    </div>

    <!-- 监控页面 -->
    <div id="monitor" class="page active">
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">做多推荐</div>
          <div class="stat-value" id="buy-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">做空推荐</div>
          <div class="stat-value" id="sell-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">已分析币种</div>
          <div class="stat-value" id="analyzed-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">关注中</div>
          <div class="stat-value" id="watching-count">0</div>
        </div>
      </div>

      <div id="monitor-content">
        <div class="error-box">⏳ 正在加载数据...</div>
      </div>
    </div>

    <!-- 搜索页面 -->
    <div id="search" class="page">
      <div class="search-box">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="输入币种代码或名称（如 PEPE、BTC、SOL）"
          onkeyup="showSearchSuggestions()"
        />
        <button class="btn primary" id="search-btn" onclick="searchCoin()">🔍 搜索</button>
        <div id="search-suggestions" class="search-suggestions"></div>
      </div>
      <div id="search-content">
        <div class="error-box">输入币种名称开始搜索</div>
      </div>
    </div>

    <!-- 详情页面 -->
    <div id="detail" class="page">
      <div id="detail-content">
        <div class="error-box">⏳ 加载中...</div>
      </div>
    </div>
  </div>

  <script>
    // ============ 全局配置 ============
    const CONFIG = {
      symbols: [
        'PEPE', 'WIF', 'BONK', 'FLOKI', 'NOT', 'DOGE', 'SHIB', 'GROK', 'BRETT', 'POPCAT',
        'NEIRO', 'PNUT', 'VANA', 'ZRO', 'MEME', 'AI', 'BLUR', 'SEI', 'JUP', 'SUI',
        'NEAR', 'APT', 'ENA', 'TRB', 'INJ', 'ARB', 'OP', 'STRK', 'MANTA', 'PIXEL',

    function fmt(num, decimals = 2) {
      if (!isFinite(num)) return '--';
      const absNum = Math.abs(num);
      if (absNum >= 1e9) return (num / 1e9).toFixed(decimals) + 'B';
      if (absNum >= 1e6) return (num / 1e6).toFixed(decimals) + 'M';
      if (absNum >= 1e3) return (num / 1e3).toFixed(decimals) + 'K';
      return num.toFixed(decimals);
    }

    function fmtPct(num, decimals = 2) {
      if (!isFinite(num)) return '--';
      const sign = num > 0 ? '+' : '';
      return sign + num.toFixed(decimals) + '%';
    }

    async function loadExchangeInfo() {
      try {
        const res = await axios.get(`${CONFIG.binanceUrl}/exchangeInfo`, { timeout: 10000 });
        const symbols = res.data.symbols || [];

        binanceAssets = {};
        symbols.forEach(sym => {
          const baseAsset = sym.baseAsset;
          const quoteAsset = sym.quoteAsset;
          const symbolStr = sym.symbol;

          if (!binanceAssets[baseAsset]) {
            binanceAssets[baseAsset] = { asset: baseAsset, spot: [], futures: [], delivery: [] };
          }

          if (quoteAsset === 'USDT' && sym.status === 'TRADING') {
            binanceAssets[baseAsset].spot.push({ symbol: symbolStr });
          }
        });

        // 加载合约信息
        try {
          const futuresRes = await axios.get(`${CONFIG.futuresUrl}/exchangeInfo`, { timeout: 10000 });
          const futuresSymbols = futuresRes.data.symbols || [];
          futuresSymbols.forEach(sym => {
            const baseAsset = sym.baseAsset;
            if (sym.quoteAsset === 'USDT' && sym.status === 'TRADING') {
              if (!binanceAssets[baseAsset]) {
                binanceAssets[baseAsset] = { asset: baseAsset, spot: [], futures: [], delivery: [] };
              }
              binanceAssets[baseAsset].futures.push({ symbol: sym.symbol });
            }
          });
        } catch (e) {
          console.warn('合约信息加载失败:', e.message);

    // ============ 衍生品指标计算 ============
    function calcDerivativesMetrics(oiHist = [], longShortHist = [], topLsHist = [], takerRatioHist = [], fundingRate = 0, marketCap = 0) {
      const lastOi = oiHist[oiHist.length - 1] || {};
      const prevOi = oiHist[oiHist.length - 2] || {};

      const oiValue = parseFloat(lastOi.sumOpenInterestValue || 0);
      const prevOiValue = parseFloat(prevOi.sumOpenInterestValue || 0);

      const oi24hPct = prevOiValue > 0 ? ((oiValue - prevOiValue) / prevOiValue) * 100 : 0;
      const oiValueMcap = marketCap > 0 ? (oiValue / marketCap) * 100 : 0;

      const lsLast = longShortHist[longShortHist.length - 1] || {};
      const lsPrev = longShortHist[longShortHist.length - 2] || {};

      const globalLongShortRatio = parseFloat(lsLast.longShortRatio || 1);
      const globalLongAccount = parseFloat(lsLast.longAccount || 0);
      const globalShortAccount = parseFloat(lsLast.shortAccount || 0);

      const prevLsRatio = parseFloat(lsPrev.longShortRatio || 1);
      const lsDelta = prevLsRatio > 0 ? ((globalLongShortRatio - prevLsRatio) / prevLsRatio) * 100 : 0;

      const topLast = topLsHist[topLsHist.length - 1] || {};
      const topLongShortRatio = parseFloat(topLast.longShortRatio || 1);

      const takerLast = takerRatioHist[takerRatioHist.length - 1] || {};
      const takerBuyRatio = parseFloat(takerLast.takerBuyRatio || 0.5);
      const takerBuySellRatioDelta = ((takerBuyRatio - 0.5) * 100);

      return {
        oiValue,
        oi24hPct,
        oiValueMcap,
        fundingRate,
        globalLongShortRatio,
        globalLongAccount,
        globalShortAccount,
        topLongShortRatio,
        lsDelta,
        takerBuyRatio,
        takerBuySellRatioDelta
      };
    }

    // ============ 拥挤风险评估 ============

        side = 'long_crowded';
        reasons.push(`OI ${derivatives.oi24hPct.toFixed(1)}% 上升且多头集中`);

      if (derivatives.takerBuySellRatioDelta > 8) {

      // 空头拥挤

        reasons.push(`多空比 ${derivatives.globalLongShortRatio.toFixed(2)} 极度偏空`);
      } else if (derivatives.globalLongShortRatio < 0.8) {
        score += 15;
        if (side === 'neutral') side = 'short_crowded';
        reasons.push(`多空比 ${derivatives.globalLongShortRatio.toFixed(2)} 偏空`);
      }

      if (derivatives.topLongShortRatio < 0.7) {
        score += 20;
        side = 'short_crowded';
        reasons.push(`大户仓位 ${derivatives.topLongShortRatio.toFixed(2)} 极度偏空`);
      } else if (derivatives.topLongShortRatio < 0.9) {
        score += 10;
        if (side === 'neutral') side = 'short_crowded';
        reasons.push(`大户仓位 ${derivatives.topLongShortRatio.toFixed(2)} 偏空`);
      }

      if (derivatives.fundingRate < -0.03) {
        score += 20;
        side = 'short_crowded';
        reasons.push(`资金费率 ${derivatives.fundingRate.toFixed(4)}% 过低`);
      }

      if (derivatives.oi24hPct > 12 && derivatives.globalLongShortRatio < 0.8) {
        score += 20;
        side = 'short_crowded';
        reasons.push(`OI ${derivatives.oi24hPct.toFixed(1)}% 上升且空头集中`);
      }

      if (derivatives.takerBuySellRatioDelta < -8) {
        score += 15;
        side = 'short_crowded';
        reasons.push(`主动卖盘过强 ${Math.abs(derivatives.takerBuySellRatioDelta).toFixed(1)}%`);
      }

      let level = 'low';
      if (score >= 60) level = 'high';
      else if (score >= 35) level = 'mid';

      return { level, side, score, reasons };
    }

    // ============ 技术指标计算 ============
    function calcRSI(closes, period = 14) {
      if (closes.length < period + 1) return 50;

      let gains = 0;
      let losses = 0;

      for (let i = closes.length - period; i < closes.length; i++) {
        const change = closes[i] - closes[i - 1];
        if (change > 0) gains += change;
        else losses += Math.abs(change);
      }

      const avgGain = gains / period;
      const avgLoss = losses / period;

      if (avgLoss === 0) return 100;
      const rs = avgGain / avgLoss;
      return 100 - 100 / (1 + rs);
    }

    function calcMACD(closes) {
      if (closes.length < 26) return { macd: 0, signal: 0, histogram: 0 };

      const ema12 = calcEMA(closes, 12);
      const ema26 = calcEMA(closes, 26);
      const macd = ema12 - ema26;

      const macdLine = [];
      for (let i = 0; i < closes.length; i++) {
        const e12 = calcEMA(closes.slice(0, i + 1), 12);
        const e26 = calcEMA(closes.slice(0, i + 1), 26);
        macdLine.push(e12 - e26);
      }

      const signal = calcEMA(macdLine, 9);
      const histogram = macd - signal;

      return { macd, signal, histogram };
    }

    function calcEMA(closes, period) {
      if (closes.length === 0) return 0;
      if (closes.length === 1) return closes[0];

      let ema = closes[0];
      const multiplier = 2 / (period + 1);

      for (let i = 1; i < closes.length; i++) {
        ema = (closes[i] - ema) * multiplier + ema;
      }

      return ema;
    }

    function calcCVD(klines) {
      if (!klines || klines.length === 0) {
        return { value: 0, trend: 'neutral' };
      }

      let cvd = 0;
      for (const kline of klines) {
        const close = parseFloat(kline[4]);
        const open = parseFloat(kline[1]);
        const volume = parseFloat(kline[7]);

        if (close > open) {
          cvd += volume;
        } else if (close < open) {
          cvd -= volume;
        }
      }

      const trend = cvd > 0 ? 'up' : cvd < 0 ? 'down' : 'neutral';
      return { value: cvd, trend };
    }

    function analyzePhase(closes, volumes) {
      if (closes.length < 20) return 'unknown';

      const recentClose = closes[closes.length - 1];
      const recent20High = Math.max(...closes.slice(-20));
      const recent20Low = Math.min(...closes.slice(-20));
      const recent20Avg = (recent20High + recent20Low) / 2;

      const volumeRecent = volumes.slice(-5).reduce((a, b) => a + parseFloat(b), 0) / 5;
      const volumeAvg = volumes.reduce((a, b) => a + parseFloat(b), 0) / volumes.length;

      if (recentClose > recent20Avg * 1.02 && volumeRecent > volumeAvg) {
        return 'uptrend';
      } else if (recentClose < recent20Avg * 0.98 && volumeRecent > volumeAvg) {
        return 'downtrend';
      } else if (Math.abs(recentClose - recent20Avg) < recent20Avg * 0.01) {
        return 'consolidation';
      } else if (recentClose > recent20High * 0.98 && volumeRecent > volumeAvg * 1.5) {
        return 'breakout';
      } else if (recentClose > recent20Low && recentClose < recent20Avg) {
        return 'accumulation';
      } else if (recentClose > recent20Avg && recentClose < recent20High) {
        return 'distribution';
      }

      return 'unknown';
    }

    function calcSignalStrength(rsi, macd, cvd, phase, volumeTrend) {
      let strength = 0;

      // RSI信号 (最多25分)
      if (rsi < 30) strength += 20;
      else if (rsi < 40) strength += 15;
      else if (rsi > 70) strength -= 15;
      else if (rsi > 60) strength -= 8;

      // MACD信号 (最多25分)
      if (macd.histogram > 0 && macd.macd > macd.signal) strength += 20;
      else if (macd.histogram > 0) strength += 10;
      else if (macd.histogram < 0) strength -= 15;

      // CVD信号 (最多20分)
      if (cvd.trend === 'up') strength += 15;
      else if (cvd.trend === 'down') strength -= 15;

      // 相位信号 (最多15分)
      if (phase === 'breakout') strength += 15;
      else if (phase === 'uptrend') strength += 10;
      else if (phase === 'downtrend') strength -= 10;

      // 成交量信号 (最多15分)
      if (volumeTrend > 1.3) strength += 12;
      else if (volumeTrend < 0.8) strength -= 10;

      return Math.max(0, Math.min(100, strength));
    }

        longReasons.push(`多空比 ${coinData.globalLongShortRatio.toFixed(2)} 下跌但空头过挤`);
      }

      if (coinData.globalLongShortRatio >= 0.9 && coinData.globalLongShortRatio <= 1.3 && coinData.change_5m > 0) {
        longScore += 10;
        longReasons.push('多空比健康，多头启动信号纯');
      }
      if (coinData.globalLongShortRatio >= 0.75 && coinData.globalLongShortRatio <= 0.95 && coinData.change_5m < 0) {
        shortScore += 10;
        shortReasons.push('多空比健康，空头启动信号纯');
      }

      // ========= Taker Buy Ratio =========
      if (coinData.takerBuySellRatioDelta > 5) {
        longScore += 10;
        longReasons.push(`主动买盘强势 +${coinData.takerBuySellRatioDelta.toFixed(1)}%`);
      }
      if (coinData.takerBuySellRatioDelta < -5) {
        shortScore += 10;
        shortReasons.push(`主动卖盘强势 ${coinData.takerBuySellRatioDelta.toFixed(1)}%`);
      }

      // ========= RSI =========
      if (coinData.rsi_5m < 35 && coinData.change_5m > 0) {
        longScore += 12;
        longReasons.push('5分钟超跌反转');
      }
      if (coinData.rsi_5m < 25) {
        longScore += 8;
        longReasons.push('5分钟极度超跌');
      }
      if (coinData.rsi_5m > 75 && coinData.change_5m < 0) {
        shortScore += 12;
        shortReasons.push('5分钟超买回落');
      }
      if (coinData.rsi_5m > 85) {
        shortScore += 8;
        shortReasons.push('5分钟极度超买');
      }

      // ========= MACD =========
      if (coinData.macd_1h?.histogram > 0) {
        longScore += 8;
        longReasons.push('MACD柱状线转正');
      }
      if (coinData.macd_1h?.histogram < 0) {
        shortScore += 8;
        shortReasons.push('MACD柱状线转负');
      }

      // ========= 拥挤风险扣分 =========
      if (coinData.crowdingRisk?.level === 'high') {
        if (coinData.crowdingRisk.side === 'long_crowded') {
          longScore -= 20;
          longReasons.push('⚠️ 多头风险拥挤 - 降低权重');
        } else if (coinData.crowdingRisk.side === 'short_crowded') {
          shortScore -= 20;
          shortReasons.push('⚠️ 空头风险拥挤 - 降低权重');
        }
      } else if (coinData.crowdingRisk?.level === 'mid') {
        if (coinData.crowdingRisk.side === 'long_crowded') {
          longScore -= 10;
        } else if (coinData.crowdingRisk.side === 'short_crowded') {
          shortScore -= 10;
        }
      }

      // ========= 市值 / OI 比 =========
      if (coinData.oiValueMcap > 30) {
        longScore -= 8;
        shortScore -= 8;
        if (coinData.globalLongShortRatio > 1.5) {
          shortScore -= 5;
          shortReasons.push(`OI/MCAP ${coinData.oiValueMcap.toFixed(1)}% 过高且多头拥挤`);
        } else {
          longScore -= 5;
          longReasons.push(`OI/MCAP ${coinData.oiValueMcap.toFixed(1)}% 过高，杠杆风险大`);
        }
      }

      // ========= 综合评分 =========
      longScore = Math.max(0, Math.min(100, longScore));
      shortScore = Math.max(0, Math.min(100, shortScore));

      return {
        longResonance: longScore,
        shortResonance: shortScore,
        longReasons,
        shortReasons
      };
    }

    // ============ 风险评估 ============
    function assessRisk(coinData) {
      let score = 0;

      // 市值风险
      if (coinData.marketCap < 1e6) score += 40;
      else if (coinData.marketCap < 1e7) score += 25;
      else if (coinData.marketCap < 1e8) score += 15;
      else if (coinData.marketCap < 1e9) score += 5;

      // OI/MCAP风险
      if (coinData.oiValueMcap > 40) score += 30;
      else if (coinData.oiValueMcap > 25) score += 15;
      else if (coinData.oiValueMcap > 15) score += 8;

      // 波动率风险
      if (coinData.change_1h > 5) score += 15;
      if (coinData.change_24h > 20 || coinData.change_24h < -20) score += 10;

      // 拥挤风险
      if (coinData.crowdingRisk?.level === 'high') score += 20;
      else if (coinData.crowdingRisk?.level === 'mid') score += 10;

      let level = 'low';
      if (score >= 60) level = 'high';
      else if (score >= 30) level = 'mid';

      return level;
    }

    // ============ 趋势保护 ============
    let trendProtectionMap = {};

    function startTrendProtection(symbol) {
      trendProtectionMap[symbol] = Date.now();
    }

    function isTrendProtected(symbol) {
      const timestamp = trendProtectionMap[symbol];
      if (!timestamp) return false;

      if (Date.now() - timestamp > CONFIG.watchDurationMs) {
        delete trendProtectionMap[symbol];
        return false;
      }

      return true;
    }

    // ============ 监控推荐等级 ============
    function determineLevel(symbol, coinData) {
      const riskLevel = assessRisk(coinData);
      const isYao = coinData.price < 0.01;

      if (isTrendProtected(symbol)) {
        return allCoins[symbol]?.level || null;
      }

      // 做多推荐
      if (
        coinData.longResonance >= 45 &&
        coinData.change_5m > 0 &&
        coinData.crowdingRisk?.level !== 'high' &&
        coinData.crowdingRisk?.side !== 'long_crowded'
      ) {
        startTrendProtection(symbol);
        return isYao ? 'yao-buy' : 'buy';
      }

      // 做空推荐
      if (
        coinData.shortResonance >= 45 &&
        coinData.change_5m < 0 &&
        coinData.crowdingRisk?.level !== 'high' &&
        coinData.crowdingRisk?.side !== 'short_crowded'
      ) {
        startTrendProtection(symbol);
        return isYao ? 'yao-sell' : 'sell';
      }

      // 优秀币推荐
      if (coinData.longResonance >= 40 && riskLevel === 'low') {
        return 'excellent';
      }

      // 关注中
      if (coinData.longResonance >= 30 || coinData.shortResonance >= 30) {
        startWatching(symbol);
        return 'watching';
      }

      return null;
    }

    let watchingMap = {};

    function startWatching(symbol) {
      if (!watchingMap[symbol]) {
        watchingMap[symbol] = Date.now();
      }
    }

    function isWatching(symbol) {
      const timestamp = watchingMap[symbol];
      if (!timestamp) return false;

      if (Date.now() - timestamp > CONFIG.watchDurationMs) {
        delete watchingMap[symbol];
        return false;
      }

      return true;
    }

    // ============ 核心分析函数 ============
    async function analyzeCoin(symbol) {
      try {
        const [
          ticker,
          klines_5m, klines_15m, klines_1h, klines_4h, klines_1d,
          oiNow, oiHist,
          fundingRate,
          longShortHist, topLsHist, takerRatioHist,
          marketCap
        ] = await Promise.all([
          getTicker(symbol),
          getKlines(symbol, '5m', 100),
          getKlines(symbol, '15m', 100),
          getKlines(symbol, '1h', 100),
          getKlines(symbol, '4h', 100),
          getKlines(symbol, '1d', 100),

          getOpenInterestNow(symbol),
          getOpenInterestHist(symbol, '5m', 2),

          getFundingRate(symbol),

          getLongShortRatio(symbol, '5m', 2),
          getTopLongShortRatio(symbol, '5m', 2),
          getTakerBuySellRatio(symbol, '5m', 2),

          getMarketCap(symbol)
        ]);

        if (!ticker) return null;

        // 计算收盘价数组
        const closes_5m = klines_5m.map(k => parseFloat(k[4]));
        const closes_15m = klines_15m.map(k => parseFloat(k[4]));
        const closes_1h = klines_1h.map(k => parseFloat(k[4]));
        const closes_4h = klines_4h.map(k => parseFloat(k[4]));
        const closes_1d = klines_1d.map(k => parseFloat(k[4]));

        // 计算RSI
        const rsi_5m = calcRSI(closes_5m, 14);
        const rsi_15m = calcRSI(closes_15m, 14);
        const rsi_1h = calcRSI(closes_1h, 14);
        const rsi_4h = calcRSI(closes_4h, 14);
        const rsi_1d = calcRSI(closes_1d, 14);

        // 计算MACD
        const macd_1h = calcMACD(closes_1h);
        const macd_4h = calcMACD(closes_4h);

        // 计算CVD
        const cvd_5m = calcCVD(klines_5m);
        const cvd_1h = calcCVD(klines_1h);

        // 计算相位
        const volumes_5m = klines_5m.map(k => parseFloat(k[7]));
        const phase_5m = analyzePhase(closes_5m, volumes_5m);
        const phase_1h = analyzePhase(closes_1h, klines_1h.map(k => parseFloat(k[7])));
        const phase_4h = analyzePhase(closes_4h, klines_4h.map(k => parseFloat(k[7])));

        // 计算成交量趋势
        const volumeTrend_5m = volumes_5m.slice(-5).reduce((a, b) => a + b, 0) / 5 / 
                               (volumes_5m.slice(-20).reduce((a, b) => a + b, 0) / 20);

        // 计算价格涨幅
        const change_5m = klines_5m.length > 1 
          ? ((closes_5m[closes_5m.length - 1] - closes_5m[closes_5m.length - 2]) / closes_5m[closes_5m.length - 2]) * 100
          : 0;
        const change_15m = klines_15m.length > 1
          ? ((closes_15m[closes_15m.length - 1] - closes_15m[closes_15m.length - 2]) / closes_15m[closes_15m.length - 2]) * 100
          : 0;
        const change_1h = klines_1h.length > 1
          ? ((closes_1h[closes_1h.length - 1] - closes_1h[closes_1h.length - 2]) / closes_1h[closes_1h.length - 2]) * 100
          : 0;
        const change_4h = klines_4h.length > 1
          ? ((closes_4h[closes_4h.length - 1] - closes_4h[closes_4h.length - 2]) / closes_4h[closes_4h.length - 2]) * 100
          : 0;
        const change_1d = klines_1d.length > 1
          ? ((closes_1d[closes_1d.length - 1] - closes_1d[closes_1d.length - 2]) / closes_1d[closes_1d.length - 2]) * 100
          : 0;

        // 计算衍生品指标
        const derivatives = calcDerivativesMetrics(
          oiHist,
          longShortHist,
          topLsHist,
          takerRatioHist,
          fundingRate,
          marketCap
        );

        const crowdingRisk = getCrowdingRisk(derivatives);

        // 计算信号强度
        const signal_5m = calcSignalStrength(rsi_5m, { macd: 0, signal: 0, histogram: 0 }, cvd_5m, phase_5m, volumeTrend_5m);
        const signal_1h = calcSignalStrength(rsi_1h, macd_1h, cvd_1h, phase_1h, 1);
        const signal_4h = calcSignalStrength(rsi_4h, macd_4h, { macd: 0, signal: 0, histogram: 0 }, phase_4h, 1);

        // 权重配置：短期优先
        const totalLongStrength = signal_5m * 0.40 + signal_1h * 0.40 + signal_4h * 0.20;
        const totalShortStrength = 100 - totalLongStrength;
        const mainDirection = totalLongStrength > 50 ? 'up' : 'down';

        // 生成币种数据对象
        const coinData = {
          symbol,
          pair: symbol + 'USDT',
          market: 'spot',
          price: ticker.price,
          change24h: ticker.change24h,
          volume24h: ticker.volume24h,
          high24h: ticker.high24h,
          low24h: ticker.low24h,
          bid: ticker.bid,
          ask: ticker.ask,

          rsi_5m, rsi_15m, rsi_1h, rsi_4h, rsi_1d,
          change_5m, change_15m, change_1h, change_4h, change_1d,

          macd_1h, macd_4h,
          cvd_5m, cvd_1h,

          phase_5m, phase_1h, phase_4h,

          signal_5m, signal_1h, signal_4h,
          longStrength: totalLongStrength,
          shortStrength: totalShortStrength,
          mainDirection,

          // 衍生品数据
          marketCap,
          openInterestNow: oiNow,
          oiValue: derivatives.oiValue,
          oi24hPct: derivatives.oi24hPct,
          oiValueMcap: derivatives.oiValueMcap,
          fundingRate: derivatives.fundingRate,
          globalLongShortRatio: derivatives.globalLongShortRatio,
          globalLongAccount: derivatives.globalLongAccount,
          globalShortAccount: derivatives.globalShortAccount,
          topLongShortRatio: derivatives.topLongShortRatio,
          lsDelta: derivatives.lsDelta,
          takerBuyRatio: derivatives.takerBuyRatio,
          takerBuySellRatioDelta: derivatives.takerBuySellRatioDelta,
          crowdingRisk,

          signalCount: 0
        };

        // 计算共振评分
        const resonance = calcResonanceScore(coinData);
        coinData.longResonance = resonance.longResonance;
        coinData.shortResonance = resonance.shortResonance;
        coinData.longReasons = resonance.longReasons;
        coinData.shortReasons = resonance.shortReasons;

        // 确定推荐等级
        const level = determineLevel(symbol, coinData);
        coinData.level = level;
        coinData.riskLevel = assessRisk(coinData);

        return coinData;
      } catch (e) {
        console.error(`分析 ${symbol} 失败:`, e.message);
        return null;
      }
    }

    }

            <div class="detail-metric">
              <div class="detail-metric-label">1小时CVD</div>
              <div class="detail-metric-value ${c.cvd_1h?.trend === 'up' ? 'up' : 'down'}">
                ${c.cvd_1h?.trend || '--'}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">信号强度</div>
              <div class="detail-metric-value">${c.longStrength.toFixed(0)}</div>
            </div>
          </div>
        </div>

        <!-- 衍生品数据面板 -->
        <div class="derivatives-panel">
          <div class="panel-title">📈 衍生品与拥挤度面板</div>
          <div class="detail-metrics">
            <div class="detail-metric">
              <div class="detail-metric-label">当前价格</div>
              <div class="detail-metric-value">$${fmt(c.price, 8)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">市值 MCAP</div>
              <div class="detail-metric-value">${c.marketCap ? '$' + fmt(c.marketCap, 0) : '--'}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">24h涨跌</div>
              <div class="detail-metric-value ${c.change24h > 0 ? 'up' : 'down'}">${fmtPct(c.change24h)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">OI / MCAP</div>
              <div class="detail-metric-value ${c.oiValueMcap > 20 ? 'up' : ''}">${isFinite(c.oiValueMcap) ? c.oiValueMcap.toFixed(2) + '%' : '--'}</div>
            </div>

            <div class="detail-metric">
              <div class="detail-metric-label">OI现在</div>
              <div class="detail-metric-value">${fmt(c.openInterestNow, 0)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">OI 24h变化</div>
              <div class="detail-metric-value ${c.oi24hPct > 0 ? 'up' : 'down'}">${fmtPct(c.oi24hPct)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">Funding Rate</div>
              <div class="detail-metric-value ${c.fundingRate > 0 ? 'up' : 'down'}">${fmtPct(c.fundingRate, 4)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">多空比变化</div>
              <div class="detail-metric-value ${c.lsDelta > 0 ? 'up' : 'down'}">${fmtPct(c.lsDelta, 2)}</div>
            </div>

            <div class="detail-metric">
              <div class="detail-metric-label">全市场多空比</div>
              <div class="detail-metric-value ${c.globalLongShortRatio > 1.5 ? 'up' : c.globalLongShortRatio < 0.8 ? 'down' : ''}">
                ${fmt(c.globalLongShortRatio, 2)}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">多头账户数</div>
              <div class="detail-metric-value">${fmt(c.globalLongAccount, 0)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">空头账户数</div>
              <div class="detail-metric-value">${fmt(c.globalShortAccount, 0)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">大户多空比</div>
              <div class="detail-metric-value ${c.topLongShortRatio > 1.5 ? 'up' : c.topLongShortRatio < 0.8 ? 'down' : ''}">
                ${fmt(c.topLongShortRatio, 2)}
              </div>
            </div>

            <div class="detail-metric">
              <div class="detail-metric-label">主动买卖比</div>
              <div class="detail-metric-value">${c.takerBuyRatio.toFixed(3)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">主动买盘强度</div>
              <div class="detail-metric-value ${c.takerBuySellRatioDelta > 0 ? 'up' : 'down'}">${fmtPct(c.takerBuySellRatioDelta, 2)}</div>
            </div>
          </div>
        </div>

        <!-- 拥挤风险评估 -->
        <div class="derivatives-panel crowding-risk-${c.crowdingRisk?.level || 'low'}">
          <div class="panel-title">⚠️ 拥挤度风险评估</div>
          <div style="font-size: 12px; line-height: 1.8; color: var(--sub);">
            <div style="margin-bottom: 8px;">
              <strong>风险等级:</strong> <span style="color: var(--text);">${c.crowdingRisk?.level || '--'}</span><br>
              <strong>拥挤方向:</strong> <span style="color: var(--text);">${c.crowdingRisk?.side ? (c.crowdingRisk.side === 'long_crowded' ? '多头拥挤 🟢' : '空头拥挤 🔴') : '--'}</span><br>
              <strong>风险分数:</strong> <span style="color: var(--text); font-weight: 700;">${c.crowdingRisk?.score ?? '--'}/100</span>
            </div>
            <div style="border-top: 1px solid rgba(255,255,255,.1); padding-top: 8px;">
              <strong>风险原因:</strong><br>
              ${(c.crowdingRisk?.reasons || []).map(r => `• ${r}`).join('<br>')}
              ${(c.crowdingRisk?.reasons || []).length === 0 ? '暂无拥挤风险' : ''}
            </div>
          </div>
        </div>

        <!-- 共振原因 -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
          <div class="derivatives-panel">
            <div class="panel-title" style="color: #86efac;">🟢 做多共振 ${Math.round(c.longResonance || 0)}</div>
            <div style="font-size:12px; line-height:1.8; color:var(--sub);">
              ${(c.longReasons || []).length ? c.longReasons.map(x => `• ${x}`).join('<br>') : '暂无做多共振'}
            </div>
          </div>
          <div class="derivatives-panel">
            <div class="panel-title" style="color: #fca5a5;">🔴 做空共振 ${Math.round(c.shortResonance || 0)}</div>
            <div style="font-size:12px; line-height:1.8; color:var(--sub);">
              ${(c.shortReasons || []).length ? c.shortReasons.map(x => `• ${x}`).join('<br>') : '暂无做空共振'}
            </div>
          </div>
        </div>

        <!-- 时间框架分析 -->
        <div style="margin-bottom: 20px;">
          <div style="font-weight: 700; color: var(--cyan); margin-bottom: 12px; font-size: 13px;">⏰ 时间框架分析</div>
          <div class="timeframe-analysis">
            <div class="tf-analysis">
              <div class="tf-title">5分钟</div>
              <div class="tf-content">
                <strong>相位:</strong> ${c.phase_5m}<br>
                <strong>涨幅:</strong> ${fmtPct(c.change_5m)}<br>
                <strong>RSI:</strong> ${c.rsi_5m.toFixed(0)}<br>
                <strong>CVD:</strong> ${c.cvd_5m?.trend}
              </div>
            </div>
            <div class="tf-analysis">
              <div class="tf-title">15分钟</div>
              <div class="tf-content">
                <strong>涨幅:</strong> ${fmtPct(c.change_15m)}<br>
                <strong>RSI:</strong> ${c.rsi_15m.toFixed(0)}<br>
                <strong>方向:</strong> ${c.mainDirection === 'up' ? '📈 上行' : '📉 下行'}
              </div>
            </div>
            <div class="tf-analysis">
              <div class="tf-title">1小时</div>
              <div class="tf-content">
                <strong>相位:</strong> ${c.phase_1h}<br>
                <strong>涨幅:</strong> ${fmtPct(c.change_1h)}<br>
                <strong>RSI:</strong> ${c.rsi_1h.toFixed(0)}<br>
                <strong>MACD:</strong> ${c.macd_1h?.histogram > 0 ? '✅ 正' : '❌ 负'}
              </div>
            </div>
            <div class="tf-analysis">
              <div class="tf-title">4小时</div>
              <div class="tf-content">
                <strong>相位:</strong> ${c.phase_4h}<br>
                <strong>涨幅:</strong> ${fmtPct(c.change_4h)}<br>
                <strong>RSI:</strong> ${c.rsi_4h.toFixed(0)}<br>
                <strong>MACD:</strong> ${c.macd_4h?.histogram > 0 ? '✅ 正' : '❌ 负'}
              </div>
            </div>
          </div>
        </div>

        <!-- 快捷通道 -->
        <div class="quick-channel-section">
          <div class="quick-channel-title">🔗 快捷通道</div>
          <div class="channel-grid">
            <button class="btn primary" onclick="openLink(getChartLink('${c.symbol}'))">📊 TradingView图表</button>
            <button class="btn primary" onclick="openLink('https://www.binance.com/trade/${c.symbol}_USDT')">💱 币安现货交易</button>
            <button class="btn primary" onclick="openLink('https://www.binance.com/futures/${c.symbol}USDT')">🎯 币安永续合约</button>
            <button class="btn primary" onclick="openLink(getCoinGlassLink('${c.symbol}'))">🔍 CoinGlass数据</button>
            <button class="btn primary" onclick="openLink(getLiquidationMapLink('${c.symbol}'))">💥 清算地图</button>
            <button class="btn primary" onclick="openLink(getDexScreenerLink('${c.symbol}'))">🌐 DexScreener</button>
            <button class="btn primary" onclick="openLink(getCoinGeckoLink('${c.symbol}'))">📈 CoinGecko</button>
            <button class="btn primary" onclick="openLink(getWhaleAlertLink('${c.symbol}'))">🐋 鲸鱼警报</button>
          </div>
          <div class="channel-hint">
            💡 提示: 点击任何按钮在新标签页打开相应工具
          </div>
        </div>
      `;

      document.getElementById('detail-content').innerHTML = html;
    }

    // ============ 搜索功能 ============
    async function showSearchSuggestions() {
      const input = document.getElementById('search-input');
      const query = input.value.trim().toUpperCase();

      if (query.length < 1) {
        document.getElementById('search-suggestions').classList.remove('active');
        return;
      }

      const suggestions = document.getElementById('search-suggestions');
      const matching = Object.values(binanceAssets).filter(asset =>
        asset.asset.includes(query)
      ).slice(0, 10);

      if (matching.length === 0) {
        suggestions.innerHTML = '<div class="suggestion-item">未找到匹配的资产</div>';
      } else {
        suggestions.innerHTML = matching.map(asset => `
          <div class="suggestion-item">
            <div class="suggestion-asset">${asset.asset}</div>
            <div class="suggestion-pairs">
              ${asset.spot.length > 0 ? `<span class="pair-badge" onclick="event.stopPropagation(); searchCoinBySymbol('${asset.asset}')">${asset.asset}USDT (现货)</span>` : ''}
              ${asset.futures.length > 0 ? `<span class="pair-badge" onclick="event.stopPropagation(); searchCoinBySymbol('${asset.asset}')">${asset.asset}USDT (合约)</span>` : ''}
            </div>
          </div>
        `).join('');
      }

      suggestions.classList.add('active');
    }

    async function searchCoin() {
      const query = document.getElementById('search-input').value.trim().toUpperCase();
      if (!query) return;

      switchPage('search');
      document.getElementById('search-content').innerHTML = '<div class="error-box">⏳ 搜索中...</div>';

      const coinData = await analyzeCoin(query);

      if (!coinData) {
        document.getElementById('search-content').innerHTML = `
          <div class="error-box">
            ❌ 未找到 ${query} 的数据<br>
            请检查币种代码是否正确
          </div>
        `;
        return;
      }

      document.getElementById('search-content').innerHTML = `
        <div style="margin-bottom: 20px;">
          <button class="back-btn" onclick="switchPage('search'); document.getElementById('search-content').innerHTML = '<div class=\"error-box\">输入币种名称开始搜索</div>'">← 返回搜索</button>
        </div>
        ${renderCoinCard(coinData)}
      `;

      setTimeout(() => showDetail(query), 500);
    }

    async function searchCoinBySymbol(symbol) {
      document.getElementById('search-input').value = symbol;
      document.getElementById('search-suggestions').classList.remove('active');
      await searchCoin();
    }

    // ============ 定期刷新 ============
    async function refreshAllCoins() {
      if (isRefreshing) return;
      isRefreshing = true;

      const refreshBtn = document.getElementById('manual-refresh-btn');
      refreshBtn.disabled = true;
      const icon = document.getElementById('refresh-icon');
      icon.style.animation = 'spin 1s linear infinite';

      try {
        const results = await Promise.allSettled(
          CONFIG.symbols.map(symbol => analyzeCoin(symbol))
        );

        results.forEach((result, index) => {
          if (result.status === 'fulfilled' && result.value) {
            allCoins[CONFIG.symbols[index]] = result.value;
          }
        });

        // 更新UI
        if (currentPage === 'monitor') {
          renderMonitorContent();
        }

        // 更新时间
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        document.getElementById('update-time').textContent = timeStr;

        showNotification(`✅ 已刷新 ${Object.keys(allCoins).length} 个币种`, 'success');
      } catch (e) {
        showNotification(`❌ 刷新失败: ${e.message}`, 'error');
      } finally {
        isRefreshing = false;
        refreshBtn.disabled = false;
        icon.style.animation = 'none';
      }
    }

    async function manualRefresh() {
      await refreshAllCoins();
    }

    // ============ 初始化 ============
    async function init() {
      try {
        showNotification('⏳ 正在加载交易对信息...', 'info');
        await loadExchangeInfo();

        showNotification('⏳ 正在分析币种数据...', 'info');
        await refreshAllCoins();

        // 定期自动刷新
        setInterval(refreshAllCoins, CONFIG.refreshMs);

        showNotification('✅ 系统已就绪', 'success');
      } catch (e) {
        showNotification(`❌ 初始化失败: ${e.message}`, 'error');
        console.error('初始化错误:', e);
      }
    }

    // 页面加载时初始化
    window.addEventListener('load', init);

    // 标签页切换时暂停/恢复
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        console.log('标签页隐藏');
      } else {
        console.log('标签页激活');
      }
    });

    // 添加CSS动画
    const style = document.createElement('style');
    style.textContent = `
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>

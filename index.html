<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>现货合约双市场监控系统</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e27;
      --card: #111829;
      --border: rgba(59,130,246,.2);
      --text: #e2e8f0;
      --sub: #94a3b8;
      --cyan: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --purple: #a78bfa;
    }
    body {
      background: linear-gradient(135deg, var(--bg) 0%, #0f1535 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }
    .container { max-width: 1920px; margin: 0 auto; padding: 12px; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      background: rgba(17,24,41,.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      background: linear-gradient(135deg, var(--cyan), #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
    }
    .header-sub {
      color: var(--sub);
      font-size: 11px;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .tab {
      background: none;
      border: none;
      color: var(--sub);
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: .2s;
      border-bottom: 2px solid transparent;
    }
    .tab:hover {
      color: var(--cyan);
    }
    .tab.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    .status {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill {
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.2);
      color: var(--sub);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .dot.offline {
      background: var(--red);
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      background: rgba(17,24,41,.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .btn {
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.2);
      color: var(--cyan);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: .2s;
    }
    .btn:hover, .btn.active {
      background: rgba(59,130,246,.3);
      border-color: var(--cyan);
    }

    .section-title {
      margin: 20px 0 12px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      border-left: 4px solid;
      display: flex;
      justify-content: space-between;
    }
    .section-title.hot {
      background: rgba(239,68,68,.12);
      border-left-color: #ef4444;
      color: #fca5a5;
    }
    .section-title.medium {
      background: rgba(245,158,11,.12);
      border-left-color: var(--orange);
      color: #fde047;
    }
    .section-title.cold {
      background: rgba(59,130,246,.12);
      border-left-color: #3b82f6;
      color: #bfdbfe;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }

    .coin-card {
      background: linear-gradient(135deg, rgba(17,24,41,.95), rgba(15,23,42,.95));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      transition: .3s;
      cursor: pointer;
    }
    .coin-card:hover {
      transform: translateY(-4px);
      border-color: var(--cyan);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    .coin-card.hot { border-color: rgba(239,68,68,.5); }
    .coin-card.medium { border-color: rgba(245,158,11,.5); }
    .coin-card.cold { border-color: rgba(59,130,246,.3); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--cyan);
      text-transform: uppercase;
    }
    .card-price {
      color: var(--sub);
      font-size: 11px;
    }
    .card-change {
      text-align: right;
      font-size: 14px;
      font-weight: 700;
    }
    .card-change.up { color: var(--green); }
    .card-change.down { color: var(--red); }

    .market-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      margin-right: 4px;
    }
    .market-badge.spot {
      background: rgba(34,197,94,.2);
      border: 1px solid rgba(34,197,94,.4);
      color: #d1fae5;
    }
    .market-badge.futures {
      background: rgba(168,85,247,.2);
      border: 1px solid rgba(168,85,247,.4);
      color: #e9d5ff;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    @media (max-width: 600px) {
      .metrics { grid-template-columns: repeat(3, 1fr); }
    }
    .metric {
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .metric-label {
      color: var(--sub);
      font-size: 9px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .metric-value {
      font-weight: 700;
      font-size: 12px;
    }
    .metric-value.up { color: var(--green); }
    .metric-value.down { color: var(--red); }

    .detail-section {
      background: rgba(59,130,246,.08);
      border: 1px solid rgba(59,130,246,.18);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      margin-bottom: 8px;
    }
    .detail-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 6px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .detail-item {
      display: flex;
      justify-content: space-between;
    }
    .detail-label { color: var(--sub); }
    .detail-value { font-weight: 600; }

    .error-box {
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      padding: 12px;
      color: #fca5a5;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .empty {
      text-align: center;
      color: var(--sub);
      padding: 80px 20px;
    }

    .page { display: none; }
    .page.active { display: block; }

    .star { color: var(--orange); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>💹 现货合约双市场监控</h1>
        <div class="header-sub">实时现货行情 + 合约期货数据 同步分析</div>
      </div>
      <div class="status">
        <span class="pill"><span class="dot" id="api-dot"></span> 数据源</span>
        <span class="pill">更新: <span id="update-time">--:--</span></span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('spot')">📊 现货行情</button>
      <button class="tab" onclick="switchTab('futures')">📈 合约期货</button>
      <button class="tab" onclick="switchTab('combined')">🔄 联动分析</button>
    </div>

    <div id="error-container"></div>

    <div id="spot-page" class="page active">
      <div class="toolbar">
        <button class="btn active" onclick="setSortBy('spot', 'change')">📊 涨跌幅</button>
        <button class="btn" onclick="setSortBy('spot', 'volume')">💰 交易量</button>
        <button class="btn" onclick="setSortBy('spot', 'marketcap')">📈 市值</button>
        <button class="btn" onclick="refreshData()">🔄 刷新</button>
      </div>
      <div id="spot-content"></div>
    </div>

    <div id="futures-page" class="page">
      <div class="toolbar">
        <button class="btn active" onclick="setSortBy('futures', 'oi_change')">📊 OI变化</button>
        <button class="btn" onclick="setSortBy('futures', 'long_ratio')">🐮 多头比</button>
        <button class="btn" onclick="setSortBy('futures', 'funding_rate')">💰 费率</button>
        <button class="btn" onclick="setSortBy('futures', 'liquidation')">💥 清算</button>
        <button class="btn" onclick="refreshData()">🔄 刷新</button>
      </div>
      <div id="futures-content"></div>
    </div>

    <div id="combined-page" class="page">
      <div class="toolbar">
        <button class="btn active" onclick="setSortBy('combined', 'signal')">⚡ 信号强度</button>
        <button class="btn" onclick="setSortBy('combined', 'risk')">⚠️ 风险</button>
        <button class="btn" onclick="refreshData()">🔄 刷新</button>
      </div>
      <div id="combined-content"></div>
    </div>
  </div>

  <script>
const CONFIG = {
  symbols: [
    'PEPE','WIF','BONK','FLOKI','NOT','DOGE','SHIB','INU','GROK','BRETT',
    'POPCAT','NEIRO','PNUT','VANA','ZRO','MEME','AI','BNX','ORDI','SATS',
    'NAKA','BLUR','SEI','JUP','SUI','NEAR','APT','ENA','TRB','INJ'
  ],
  refreshMs: 10000,
  bybitUrl: 'https://api.bybit.com/v5',
  binanceUrl: 'https://api.binance.com/api/v3'
};

let allCoins = {};
let currentTab = 'spot';
let currentSort = { spot: 'change', futures: 'oi_change', combined: 'signal' };

function showError(msg) {
  const container = document.getElementById('error-container');
  const errorBox = document.createElement('div');
  errorBox.className = 'error-box';
  errorBox.innerHTML = `⚠️ ${msg} <button onclick="this.parentElement.remove()" style="float:right; background:none; border:none; color:inherit; cursor:pointer;">✕</button>`;
  container.innerHTML = '';
  container.appendChild(errorBox);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelector(`#${tab}-page`).classList.add('active');
  
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  render();
}

function setSortBy(page, type) {
  currentSort[page] = type;
  document.querySelectorAll(`#${page}-page .btn`).forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function fmt(n, decimals = 2) {
  const num = Number(n);
  if (!isFinite(num)) return '--';
  if (Math.abs(num) >= 1e9) return (num / 1e9).toFixed(decimals) + 'B';
  if (Math.abs(num) >= 1e6) return (num / 1e6).toFixed(decimals) + 'M';
  if (Math.abs(num) >= 1e3) return (num / 1e3).toFixed(decimals) + 'K';
  return num.toFixed(decimals);
}

function fmtPct(n, decimals = 2) {
  const num = Number(n);
  if (!isFinite(num)) return '--';
  return (num > 0 ? '+' : '') + num.toFixed(decimals) + '%';
}

function toast(msg) {
  const div = document.createElement('div');
  div.style.cssText = `
    position: fixed; bottom: 20px; right: 20px;
    background: rgba(17,24,41,.95); border: 1px solid rgba(59,130,246,.2);
    color: #e2e8f0; padding: 12px 16px; border-radius: 8px;
    font-size: 12px; z-index: 2000; animation: slideUp .3s ease;
  `;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

// ============ 现货数据 (Binance) ============

async function getSpotData(symbol) {
  try {
    const response = await axios.get(
      `${CONFIG.binanceUrl}/ticker/24hr?symbol=${symbol}USDT`,
      { timeout: 5000 }
    );
    const data = response.data;
    return {
      price: Number(data.lastPrice),
      change24h: Number(data.priceChangePercent),
      volume24h: Number(data.quoteAssetVolume),
      high24h: Number(data.highPrice),
      low24h: Number(data.lowPrice),
      bid: Number(data.bidPrice),
      ask: Number(data.askPrice)
    };
  } catch (error) {
    console.error(`获取 ${symbol} 现货数据失败:`, error.message);
    return null;
  }
}

// ============ 合约数据 (Bybit) ============

async function getFuturesData(symbol) {
  try {
    const [ticker, oi, ratio, funding, liq] = await Promise.all([
      axios.get(
        `${CONFIG.bybitUrl}/market/tickers?category=linear&symbol=${symbol}USDT`,
        { timeout: 5000 }
      ),
      axios.get(
        `${CONFIG.bybitUrl}/market/open-interest?category=linear&symbol=${symbol}USDT&intervalTime=5min`,
        { timeout: 5000 }
      ),
      axios.get(
        `${CONFIG.bybitUrl}/market/account-ratio?category=linear&symbol=${symbol}USDT&period=5min`,
        { timeout: 5000 }
      ),
      axios.get(
        `${CONFIG.bybitUrl}/market/funding/history?category=linear&symbol=${symbol}USDT&limit=1`,
        { timeout: 5000 }
      ),
      axios.get(
        `${CONFIG.bybitUrl}/market/liquidation?category=linear&symbol=${symbol}USDT&limit=100`,
        { timeout: 5000 }
      )
    ]);

    const tickerData = ticker.data.result.list[0];
    const oiData = oi.data.result;
    const ratioData = ratio.data.result[0] || {};
    const fundingData = funding.data.result.list[0] || {};
    const liqData = liq.data.result.list || [];

    let longLiq = 0, shortLiq = 0;
    liqData.forEach(item => {
      const size = Number(item.quantity || 0) * Number(item.price || 0);
      if (item.side === 'Buy') {
        shortLiq += size;
      } else {
        longLiq += size;
      }
    });

    // 计算 OI 变化
    let oiChange = 0;
    if (allCoins[symbol]?.futures?.lastOI && oiData.openInterest) {
      oiChange = ((Number(oiData.openInterest) - allCoins[symbol].futures.lastOI) / allCoins[symbol].futures.lastOI) * 100;
    }

    return {
      price: Number(tickerData.lastPrice),
      change24h: Number(tickerData.price24hPcnt) * 100,
      volume24h: Number(tickerData.turnover24h),
      
      oi: Number(oiData.openInterest || 0),
      oiChange,
      
      longRatio: Number(ratioData.buyRatio || 0.5) * 100,
      shortRatio: Number(ratioData.sellRatio || 0.5) * 100,
      
      fundingRate: Number(fundingData.fundingRate || 0) * 100,
      
      longLiq,
      shortLiq,
      totalLiq: longLiq + shortLiq,
      
      lastOI: Number(oiData.openInterest || 0)
    };
  } catch (error) {
    console.error(`获取 ${symbol} 合约数据失败:`, error.message);
    return null;
  }
}

// ============ 数据获取 ============

async function fetchAllData(symbol) {
  try {
    const [spot, futures] = await Promise.all([
      getSpotData(symbol),
      getFuturesData(symbol)
    ]);

    if (!spot && !futures) return null;

    if (!allCoins[symbol]) {
      allCoins[symbol] = {};
    }

    allCoins[symbol] = {
      spot: spot || {},
      futures: futures || {}
    };

    return true;
  } catch (error) {
    console.error(`获取 ${symbol} 数据出错:`, error.message);
    return null;
  }
}

// ============ 分析 ============

function analyzeSpot(symbol) {
  const coin = allCoins[symbol];
  if (!coin || !coin.spot) return null;

  const s = coin.spot;

  let level = 'cold';
  if (s.change24h > 5) level = 'hot';
  else if (s.change24h > 2) level = 'medium';

  return {
    symbol,
    market: 'spot',
    price: s.price,
    change24h: s.change24h,
    volume24h: s.volume24h,
    high24h: s.high24h,
    low24h: s.low24h,
    bid: s.bid,
    ask: s.ask,
    level,
    spread: ((s.ask - s.bid) / s.price * 100)
  };
}

function analyzeFutures(symbol) {
  const coin = allCoins[symbol];
  if (!coin || !coin.futures) return null;

  const f = coin.futures;

  let heat = 0;
  if (f.oiChange > 20) heat += 40;
  else if (f.oiChange > 10) heat += 25;
  else if (f.oiChange > 5) heat += 15;

  if (f.fundingRate > 0.01) heat += 30;
  else if (f.fundingRate > 0.005) heat += 15;

  if (f.longRatio > 65) heat += 25;
  else if (f.longRatio > 60) heat += 15;

  if (f.totalLiq > 1e7) heat += 20;

  let level = 'cold';
  if (heat >= 100) level = 'hot';
  else if (heat >= 60) level = 'medium';

  return {
    symbol,
    market: 'futures',
    price: f.price,
    change24h: f.change24h,
    volume24h: f.volume24h,
    oi: f.oi,
    oiChange: f.oiChange,
    longRatio: f.longRatio,
    shortRatio: f.shortRatio,
    fundingRate: f.fundingRate,
    longLiq: f.longLiq,
    shortLiq: f.shortLiq,
    totalLiq: f.totalLiq,
    heat,
    level
  };
}

function analyzeCombined(symbol) {
  const spot = analyzeSpot(symbol);
  const futures = analyzeFutures(symbol);

  if (!spot || !futures) return null;

  // 联动信号
  let signal = 0;
  let direction = null;

  // 现货涨，合约多头拥挤 + 高费率 = 强买信号
  if (spot.change24h > 2 && futures.longRatio > 65 && futures.fundingRate > 0.01) {
    signal = 100;
    direction = '🟢 强势上涨信号';
  }
  // 现货跌，合约空头拥挤 + 负费率 = 强卖信号
  else if (spot.change24h < -2 && futures.shortRatio > 65 && futures.fundingRate < -0.01) {
    signal = 90;
    direction = '🔴 强势下跌信号';
  }
  // 现货涨但合约空头多 = 可能反转
  else if (spot.change24h > 3 && futures.shortRatio > 60) {
    signal = 70;
    direction = '⚠️ 可能反转风险';
  }
  // 现货跌但合约多头多 = 可能反弹
  else if (spot.change24h < -3 && futures.longRatio > 60) {
    signal = 65;
    direction = '📈 可能反弹机会';
  }
  else {
    signal = 40;
    direction = '⚪ 信号不明确';
  }

  return {
    symbol,
    signal,
    direction,
    spot,
    futures,
    priceSpread: Math.abs(spot.price - futures.price),
    priceSpreadPct: Math.abs(spot.price - futures.price) / spot.price * 100
  };
}

// ============ 渲染 ============

function render() {
  const now = new Date();
  document.getElementById('update-time').textContent =
    String(now.getHours()).padStart(2, '0') + ':' +
    String(now.getMinutes()).padStart(2, '0');

  if (currentTab === 'spot') renderSpot();
  else if (currentTab === 'futures') renderFutures();
  else if (currentTab === 'combined') renderCombined();
}

function renderSpot() {
  const results = CONFIG.symbols
    .map(s => analyzeSpot(s))
    .filter(r => r !== null);

  const sortMap = {
    change: (a, b) => b.change24h - a.change24h,
    volume: (a, b) => b.volume24h - a.volume24h,
    marketcap: (a, b) => b.volume24h - a.volume24h
  };

  results.sort(sortMap[currentSort.spot] || sortMap.change);

  const hot = results.filter(r => r.level === 'hot');
  const medium = results.filter(r => r.level === 'medium');
  const cold = results.filter(r => r.level === 'cold');

  let html = '';
  
  if (hot.length) {
    html += `<div class="section-title hot">🔥 爆升币 (${hot.length})</div>`;
    html += `<div class="grid">${hot.map(r => renderSpotCard(r)).join('')}</div>`;
  }

  if (medium.length) {
    html += `<div class="section-title medium">⚡ 中等幅度 (${medium.length})</div>`;
    html += `<div class="grid">${medium.map(r => renderSpotCard(r)).join('')}</div>`;
  }

  if (cold.length) {
    html += `<div class="section-title cold">❄️ 平稳币 (${cold.length})</div>`;
    html += `<div class="grid">${cold.slice(0, 10).map(r => renderSpotCard(r)).join('')}</div>`;
  }

  document.getElementById('spot-content').innerHTML = html || '<div class="empty">加载中...</div>';
}

function renderSpotCard(r) {
  return `
    <div class="coin-card ${r.level}">
      <div class="card-header">
        <div>
          <div class="card-name">${r.symbol}</div>
          <div class="card-price">
            <span class="market-badge spot">现货</span>
            $${fmt(r.price, 6)}
          </div>
        </div>
        <div class="card-change ${r.change24h > 0 ? 'up' : 'down'}">
          ${fmtPct(r.change24h)}
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">24h最高</div>
          <div class="metric-value">$${fmt(r.high24h, 6)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">24h最低</div>

function renderFutures() {

    long_ratio: (a, b) => b.longRatio - a.longRatio,
    funding_rate: (a, b) => b.fundingRate - a.fundingRate,
    liquidation: (a, b) => b.totalLiq - a.totalLiq
  };

  results.sort(sortMap[currentSort.futures] || sortMap.oi_change);

  const hot = results.filter(r => r.level === 'hot');
  const medium = results.filter(r => r.level === 'medium');

  let html = '';

  if (hot.length) {
    html += `<div class="section-title hot">🔥 热门杠杆币 (${hot.length})</div>`;
    html += `<div class="grid">${hot.map(r => renderFuturesCard(r)).join('')}</div>`;
  }

  if (medium.length) {
    html += `<div class="section-title medium">⚡ 中等热度 (${medium.length})</div>`;
    html += `<div class="grid">${medium.map(r => renderFuturesCard(r)).join('')}</div>`;
  }

  document.getElementById('futures-content').innerHTML = html || '<div class="empty">加载中...</div>';
}

function renderCombined() {
  const results = CONFIG.symbols
    .map(s => analyzeCombined(s))
    .filter(r => r !== null);

  const sortMap = {
    signal: (a, b) => b.signal - a.signal,
    risk: (a, b) => Math.abs(b.priceSpreadPct) - Math.abs(a.priceSpreadPct)
  };

  results.sort(sortMap[currentSort.combined] || sortMap.signal);

  const buySignal = results.filter(r => r.signal >= 70);
  const watchSignal = results.filter(r => r.signal >= 40 && r.signal < 70);
  const other = results.filter(r => r.signal < 40);

  let html = '';

  if (buySignal.length) {
    html += `<div class="section-title hot">🟢 强信号 (${buySignal.length})</div>`;
    html += `<div class="grid">${buySignal.map(r => renderCombinedCard(r)).join('')}</div>`;
  }

  if (watchSignal.length) {
    html += `<div class="section-title medium">⚡ 中等信号 (${watchSignal.length})</div>`;
    html += `<div class="grid">${watchSignal.map(r => renderCombinedCard(r)).join('')}</div>`;
  }

  if (other.length) {
    html += `<div class="section-title cold">❄️ 弱信号 (${other.length})</div>`;
    html += `<div class="grid">${other.slice(0, 8).map(r => renderCombinedCard(r)).join('')}</div>`;
  }

  document.getElementById('combined-content').innerHTML = html || '<div class="empty">加载中...</div>';
}

function getSignalExplain(r) {
  const s = r.spot;
  const f = r.futures;

  if (r.signal >= 100) {
    return `现货强势上涨${fmtPct(s.change24h)}，合约多头拥挤(${fmt(f.longRatio, 1)}%)且资金费率高(${fmt(f.fundingRate, 4)}%)，适合做多`;
  }
  if (r.signal >= 90) {
    return `现货下跌${fmtPct(s.change24h)}，空头集中清算，可能反弹`;
  }
  if (r.signal >= 70) {
    return `现货涨${fmtPct(s.change24h)}但合约空头多(${fmt(f.shortRatio, 1)}%)，警惕顶部`;
  }
  if (r.signal >= 65) {
    return `现货跌${fmtPct(s.change24h)}但多头仍多(${fmt(f.longRatio, 1)}%)，可能反弹`;
  }
  return `现货与合约信号不一致，建议观察`;
}

// ============ 初始化 ============

async function initData() {
  toast('⏳ 正在加载现货+合约数据...');
  document.getElementById('api-dot').classList.add('offline');
  
  const results = await Promise.allSettled(
    CONFIG.symbols.map(s => fetchAllData(s))
  );

  const successCount = results.filter(r => r.status === 'fulfilled' && r.value).length;
  
  if (successCount === 0) {
    showError('❌ 无法连接数据源，请检查网络');
    document.getElementById('api-dot').classList.add('offline');
    return;
  }

  document.getElementById('api-dot').classList.remove('offline');
  render();
  toast(`✅ 已加载 ${successCount}/${CONFIG.symbols.length} 个币种数据`);
}

async function refreshData() {
  toast('🔄 刷新中...');
  await Promise.allSettled(
    CONFIG.symbols.map(s => fetchAllData(s))
  );
  render();
  toast('✅ 已更新');
}

document.addEventListener('DOMContentLoaded', () => {
  initData();
  setInterval(refreshData, CONFIG.refreshMs);
});
  </script>

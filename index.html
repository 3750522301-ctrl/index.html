<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ 妖币猎手 Pro - Wyckoff精准阶段分析</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #10c4f5;
      --primary-dark: #0d9ecf;
      --primary-light: #4dd9ff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --purple: #a855f7;
      --bg-main: #061018;
      --bg-card: #0a1628;
      --bg-hover: #0d1f35;
      --text-primary: #e5eefb;
      --text-secondary: #8ca3ba;
      --border: rgba(16, 196, 245, 0.25);
      --border-light: rgba(16, 196, 245, 0.12);
      --long: #22c55e;
      --short: #ef4444;
      --neutral: #8ca3ba;
    }

    body {
      background: linear-gradient(135deg, var(--bg-main) 0%, #0b1730 100%);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      padding: 12px;
      font-size: 13px;
      overflow-x: hidden;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .header {
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.1) 0%, rgba(168, 85, 247, 0.05) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    h1 {
      font-size: 24px;
      background: linear-gradient(135deg, var(--primary) 0%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }

    .nav-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-btn {
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s;
    }

    .nav-btn:hover,
    .nav-btn.active {
      border-color: var(--primary);
      background: rgba(16, 196, 245, 0.15);
      color: var(--primary);
    }

    .sound-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .sound-toggle:hover {
      border-color: var(--warning);
      color: var(--warning);
    }

    .sound-toggle.on {
      border-color: var(--success);
      color: var(--success);
      background: rgba(34, 197, 94, 0.1);
    }

    .status-info {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 11px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(16, 196, 245, 0.08);
      border-radius: 6px;
      border: 1px solid rgba(16, 196, 245, 0.2);
    }

    .stat-label {
      color: var(--text-secondary);
    }

    .stat-value {
      color: var(--primary);
      font-weight: bold;
      font-size: 14px;
    }

    .refresh-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s infinite;
    }

    .refresh-dot.loading {
      background: var(--warning);
      animation: spin-dot 1s linear infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes spin-dot {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .search-page {
      max-width: 900px;
      margin: 0 auto;
    }

    .search-box {
      margin-bottom: 24px;
    }

    .search-input {
      width: 100%;
      padding: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 16px rgba(16, 196, 245, 0.3);
    }

    .search-dropdown {
      position: relative;
      margin-top: 8px;
      max-height: 600px;
      overflow-y: auto;
    }

    .search-item {
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .search-item:hover {
      background: rgba(16, 196, 245, 0.15);
      border-color: var(--primary);
    }

    .search-item-symbol {
      color: var(--primary);
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .search-item-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      font-size: 10px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .search-item-btn {
      padding: 6px 12px;
      background: rgba(16, 196, 245, 0.2);
      color: var(--primary);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }

    .search-item-btn:hover {
      background: rgba(16, 196, 245, 0.35);
    }

    .section-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
      margin-top: 24px;
      padding: 8px 12px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title.yao-buyable {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      border-left: 3px solid var(--danger);
    }

    .section-title.yao-watch {
      color: var(--purple);
      background: rgba(168, 85, 247, 0.1);
      border-left: 3px solid var(--purple);
    }

    .section-title.buy-elite {
      color: var(--success);
      background: rgba(34, 197, 94, 0.1);
      border-left: 3px solid var(--success);
    }

    .section-title.buy-prime {
      color: var(--primary);
      background: rgba(16, 196, 245, 0.1);
      border-left: 3px solid var(--primary);
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 1200px) {
      .coin-grid {
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      }
    }

    @media (max-width: 768px) {
      .coin-grid {
        grid-template-columns: 1fr;
      }
    }

    .coin-card {
      background: linear-gradient(135deg, rgba(10, 22, 40, 0.95) 0%, rgba(13, 31, 53, 0.6) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .coin-card:hover {
      border-color: rgba(16, 196, 245, 0.6);
      box-shadow: 0 8px 24px rgba(16, 196, 245, 0.2);
      transform: translateY(-2px);
    }

    .coin-card.yao-buyable {
      border: 1.5px solid rgba(239, 68, 68, 0.7);
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.05) 100%);
    }

    .coin-card.yao-watch {
      border: 1.5px solid rgba(168, 85, 247, 0.5);
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.08) 0%, rgba(168, 85, 247, 0.03) 100%);
    }

    .coin-card.buy-elite {
      border: 1.5px solid rgba(34, 197, 94, 0.5);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.08) 0%, rgba(34, 197, 94, 0.03) 100%);
    }

    .coin-card.buy-prime {
      border: 1.5px solid rgba(16, 196, 245, 0.4);
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.06) 0%, rgba(16, 196, 245, 0.02) 100%);
    }

    .coin-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .coin-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .coin-symbol {
      font-size: 16px;
      color: var(--primary);
      font-weight: 800;
    }

    .coin-price {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .coin-actions {
      display: flex;
      gap: 4px;
    }

    .action-btn {
      background: none;
      border: 1px solid rgba(16, 196, 245, 0.4);
      color: var(--primary);
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.2s;
    }

    .action-btn:hover {
      border-color: var(--primary);
      background: rgba(16, 196, 245, 0.2);
    }

    .tags-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      border: 1px solid;
      white-space: nowrap;
    }

    .tag-yao-buyable { background: rgba(239, 68, 68, 0.4); color: #fca5a5; border-color: rgba(239, 68, 68, 0.7); }
    .tag-yao-buyable-s { background: rgba(239, 68, 68, 0.5); color: #ffffff; border-color: rgba(239, 68, 68, 0.8); font-weight: 900; }
    .tag-yao-buyable-a { background: rgba(239, 68, 68, 0.35); color: #fecaca; border-color: rgba(239, 68, 68, 0.6); }

    .tag-yao-watch { background: rgba(168, 85, 247, 0.35); color: #d8b4fe; border-color: rgba(168, 85, 247, 0.6); }

    .tag-buy-elite { background: rgba(34, 197, 94, 0.4); color: #4ade80; border-color: rgba(34, 197, 94, 0.7); }
    .tag-buy-elite-a { background: rgba(34, 197, 94, 0.35); color: #86efac; border-color: rgba(34, 197, 94, 0.6); }

    .tag-buy-prime { background: rgba(16, 196, 245, 0.3); color: #60a5fa; border-color: rgba(16, 196, 245, 0.6); }
    .tag-buy-prime-a { background: rgba(16, 196, 245, 0.25); color: #93c5fd; border-color: rgba(16, 196, 245, 0.5); }

    .tag-time { background: rgba(245, 158, 11, 0.25); color: #fbbf24; border-color: rgba(245, 158, 11, 0.5); }
    .tag-new { background: rgba(168, 85, 247, 0.4); color: #e9d5ff; border-color: rgba(168, 85, 247, 0.7); animation: pulse-new 1s infinite; }

    @keyframes pulse-new {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .tag-long {
      background: rgba(34, 197, 94, 0.5);
      color: #4ade80;
      border-color: rgba(34, 197, 94, 0.8);
      font-weight: 900;
    }

    .tag-short {
      background: rgba(239, 68, 68, 0.5);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.8);
      font-weight: 900;
    }

    .tag-neutral {
      background: rgba(140, 163, 186, 0.3);
      color: #cbd5e1;
      border-color: rgba(140, 163, 186, 0.6);
      font-weight: 700;
    }

    .wyckoff-phases {
      background: rgba(16, 196, 245, 0.08);
      border: 1px solid rgba(16, 196, 245, 0.2);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 10px;
    }

    .phase-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 9px;
      margin-right: 4px;
      margin-bottom: 4px;
      border: 1px solid;
    }

    .phase-happening {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.5), rgba(245, 158, 11, 0.5));
      color: #fff;
      border-color: rgba(239, 68, 68, 0.7);
      font-weight: 900;
      animation: pulse-phase 1.5s infinite;
    }

    .phase-likely {
      background: rgba(34, 197, 94, 0.3);
      color: #4ade80;
      border-color: rgba(34, 197, 94, 0.5);
    }

    .phase-possible {
      background: rgba(245, 158, 11, 0.25);
      color: #fbbf24;
      border-color: rgba(245, 158, 11, 0.5);
    }

    @keyframes pulse-phase {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 6px;
      margin-bottom: 8px;
      font-size: 10px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      padding: 4px 6px;
      background: rgba(16, 196, 245, 0.05);
      border-radius: 4px;
      border-left: 2px solid rgba(16, 196, 245, 0.3);
    }

    .stat-val {
      color: var(--text-primary);
      font-weight: bold;
    }

    .green { color: var(--success); }
    .red { color: var(--danger); }
    .yellow { color: var(--warning); }

    .confidence-bar {
      width: 100%;
      height: 4px;
      background: rgba(16, 196, 245, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--danger), var(--warning), var(--success));
      width: 0;
      border-radius: 2px;
      transition: width 0.5s ease-out;
    }

    .advice-box {
      background: rgba(34, 197, 94, 0.12);
      border-left: 3px solid rgba(34, 197, 94, 0.5);
      padding: 7px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: #86efac;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .advice-box.warn {
      background: rgba(245, 158, 11, 0.12);
      border-left-color: rgba(245, 158, 11, 0.5);
      color: #fcd34d;
    }

    .advice-box.danger {
      background: rgba(239, 68, 68, 0.12);
      border-left-color: rgba(239, 68, 68, 0.5);
      color: #fca5a5;
    }

    .advice-box.purple {
      background: rgba(168, 85, 247, 0.12);
      border-left-color: rgba(168, 85, 247, 0.5);
      color: #d8b4fe;
    }

    .operation-guide {
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.12), rgba(168, 85, 247, 0.08));
      border: 1px solid rgba(16, 196, 245, 0.25);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 10px;
      line-height: 1.6;
    }

    .operation-guide-title {
      color: var(--primary);
      font-weight: bold;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .operation-guide-content {
      color: var(--text-secondary);
    }

    .operation-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
      padding: 2px 0;
    }

    .operation-row strong {
      color: var(--text-primary);
      min-width: 60px;
    }

    .phase-analysis {
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.15), rgba(168, 85, 247, 0.08));
      border: 1px solid rgba(16, 196, 245, 0.3);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 10px;
      line-height: 1.6;
    }

    .phase-analysis-title {
      color: var(--primary);
      font-weight: bold;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .phase-analysis-content {
      color: var(--text-secondary);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px;
    }

    .modal.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 20px;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(6, 16, 24, 0.98) 0%, rgba(11, 23, 48, 0.98) 100%);
      border: 1px solid rgba(16, 196, 245, 0.3);
      border-radius: 12px;
      padding: 24px;
      max-width: 1000px;
      width: 100%;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .close-btn:hover {
      color: var(--primary);
      background: rgba(16, 196, 245, 0.1);
      transform: rotate(90deg);
    }

    .detail-title {
      font-size: 24px;
      color: var(--primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .detail-item {
      background: rgba(16, 196, 245, 0.08);
      border: 1px solid rgba(16, 196, 245, 0.2);
      border-radius: 6px;
      padding: 10px;
    }

    .detail-item-label {
      color: var(--text-secondary);
      font-size: 10px;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-item-value {
      color: var(--primary);
      font-size: 14px;
      font-weight: bold;
    }

    .detail-box {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .detail-box h3 {
      color: var(--success);
      margin-bottom: 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-box.warn {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .detail-box.warn h3 {
      color: var(--warning);
    }

    .detail-box.danger {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .detail-box.danger h3 {
      color: var(--danger);
    }

    .detail-box.purple {
      background: rgba(168, 85, 247, 0.12);
      border-color: rgba(168, 85, 247, 0.3);
    }

    .detail-box.purple h3 {
      color: var(--purple);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 11px;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-secondary);
    }

    .detail-value {
      font-weight: bold;
      color: var(--text-primary);
      text-align: right;
      max-width: 60%;
      word-break: break-word;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .channel-item {
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .channel-item:hover {
      border-color: rgba(59, 130, 246, 0.6);
      background: rgba(59, 130, 246, 0.25);
    }

    .channel-icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .channel-name {
      font-size: 11px;
      color: #93c5fd;
      font-weight: bold;
    }

    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.95) 0%, rgba(22, 163, 74, 0.95) 100%);
      color: white;
      padding: 14px 18px;
      border-radius: 8px;
      border-left: 4px solid var(--success);
      font-size: 12px;
      z-index: 2000;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      animation: slideIn 0.3s ease-out, slideOut 0.3s ease-out 4.7s forwards;
      max-width: 300px;
    }

    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }

    @keyframes slideOut {

    .notification.warning {

      background: linear-gradient(135deg, rgba(239, 68, 68, 0.95) 0%, rgba(220, 38, 38, 0.95) 100%);

    .notification.alert {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.95) 0%, rgba(147, 51, 234, 0.95) 100%);
      border-left-color: var(--purple);

    @media (max-width: 640px) {
      h1 { font-size: 18px; }
      .detail-title { font-size: 18px; }

      .coin-grid {

</head>
<body translate="no">
  <div class="container">
    <div class="header">
      <div>
        <h1>⚡ 妖币猎手 Pro - Wyckoff精准分析</h1>
      </div>
      <div class="nav-btns">
        <button class="nav-btn active" onclick="goPage('monitor')">📊 监控</button>
        <button class="nav-btn" onclick="goPage('search')">🔍 搜索</button>
        <button class="sound-toggle on" id="sound-toggle" onclick="toggleSound()">🔔 声音</button>
      </div>
      <div class="status-info">
        <span class="refresh-dot" id="refresh-dot"></span>
        <span id="last-update">⏳ 初始化...</span>
        <span>|</span>
        <span id="refresh-countdown">60s</span>
        <span>|</span>
        <div class="stat-item">
          <span class="stat-label">妖币可买</span>
          <span class="stat-value" id="stat-yao-buy">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">妖币观察</span>
          <span class="stat-value" id="stat-yao-watch">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">建议精选</span>
          <span class="stat-value" id="stat-buy-elite">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">建议优秀</span>
          <span class="stat-value" id="stat-buy-prime">0</span>
        </div>
      </div>
    </div>

    <div id="monitor-page" class="page active">
      <div id="monitor-list">        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <div>加载中...</div>
        </div>
      </div>
    </div>

    <div id="search-page" class="page search-page">
      <div class="search-box">
        <input 
          type="text" 
          id="search-input" 
          class="search-input" 
          placeholder="🔍 输入币种符号搜索（如 BTC, ETH）..."
          oninput="handleSearch(this.value)"
        />
      </div>
      <div id="search-results" class="search-dropdown"></div>
    </div>
  </div>

  <div id="detail-modal" class="modal" onclick="if(event.target.id==='detail-modal') closeDetail()">
    <div class="modal-content">
      <button class="close-btn" onclick="closeDetail()">✕</button>
      <div id="detail-body"></div>
    </div>
  </div>

  <script>
    let allCoinsData = [];
    let yaoBuyableCoins = [];
    let yaoWatchCoins = [];
    let buyEliteCoins = [];
    let buyPrimeCoins = [];
    
    let previousData = JSON.parse(localStorage.getItem('previousData') || '{}');
    let yaoCoinMemory = JSON.parse(localStorage.getItem('yaoCoinMemory') || '{}');
    
    let soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
    
    let isLoading = false;
    let autoRefreshInterval = null;

    function fmtNum(num, decimal = 2) {
      if (!num || isNaN(num)) return '0';
      if (num >= 1e9) return (num / 1e9).toFixed(decimal) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(decimal) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(decimal) + 'K';
      return num.toFixed(decimal);
    }

    function playSound() {
      if (!soundEnabled) return;
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      
      oscillator.frequency.value = 800;
      oscillator.type = 'sine';
      
      gain.gain.setValueAtTime(0.3, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.5);
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      localStorage.setItem('soundEnabled', soundEnabled);
      const btn = document.getElementById('sound-toggle');
      if (soundEnabled) {
        btn.classList.add('on');
        btn.textContent = '🔔 声音';
      } else {
        btn.classList.remove('on');
        btn.textContent = '🔇 静音';
      }
    }

    function showNotification(message, type = 'success') {
      const div = document.createElement('div');
      div.className = `notification ${type}`;
      div.textContent = message;
      document.body.appendChild(div);

      if (Notification.permission === 'granted') {
        new Notification('妖币猎手', { body: message, icon: '⚡' });
      }

      playSound();
      setTimeout(() => div.remove(), 5000);
    }

    function goPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      
      document.getElementById(page + '-page').classList.add('active');
      event.target.classList.add('active');
    }

    class TrendAnalyzer {
      constructor(row, prev) {
        this.row = row;
        this.prev = prev;
        this.trend = 'NEUTRAL';
        this.strength = 0;
      }

      analyzeTrend() {
        const p = this.row;
        const prev = this.prev;

        if (p.priceChange > 15 && p.volMcap > 40 && p.oiMcap > 25 && p.funding > 0.015) {
          this.trend = 'LONG';
          this.strength = 90;
          return;
        }

        if (p.priceChange > 8 && p.volMcap > 25 && p.oiMcap > 15) {
          if (prev && p.priceChange > prev.priceChange) {
            this.trend = 'LONG';
            this.strength = 75;
            return;
          }
        }

        if (p.priceChange > 3 && p.volMcap > 15 && p.funding > 0.008) {
          this.trend = 'LONG';
          this.strength = 55;
          return;
        }

        if (p.priceChange < -15 && p.volMcap > 40 && p.oiMcap > 25 && p.funding < -0.015) {
          this.trend = 'SHORT';
          this.strength = 90;
          return;
        }

        if (p.priceChange < -8 && p.volMcap > 25 && p.oiMcap > 15) {
          if (prev && p.priceChange < prev.priceChange) {
            this.trend = 'SHORT';
            this.strength = 75;
            return;
          }
        }

        if (p.priceChange < -3 && p.volMcap > 15 && p.funding < -0.008) {
          this.trend = 'SHORT';
          this.strength = 55;
          return;
        }

        this.trend = 'NEUTRAL';
        this.strength = 0;
      }

      getTrendTag() {
        this.analyzeTrend();
        
        if (this.trend === 'LONG') {
          return {
            icon: '📈',
            label: `做多 (${this.strength}%)`,
            class: 'tag-long'
          };
        } else if (this.trend === 'SHORT') {
          return {
            icon: '📉',
            label: `做空 (${this.strength}%)`,
            class: 'tag-short'
          };
        } else {
          return {
            icon: '━',
            label: '观望',
            class: 'tag-neutral'
          };
        }
      }
    }

    class WyckoffPhaseAnalyzer {
      constructor(row, prev) {
        this.row = row;
        this.prev = prev;
        this.phaseDetails = {};
        this.likelyNextPhases = [];
      }

      detectPhase() {
        const p = this.row;
        const isHighVol = p.volMcap > 30;
        const isLowVol = p.volMcap < 15;
        const isRising = p.priceChange > 5;
        const isFalling = p.priceChange < -5;

        if (isLowVol && isRising) {
          this.phaseDetails.name = '潜伏启动';
          this.phaseDetails.emoji = '🤫';
          this.phaseDetails.confidence = 65;
          this.likelyNextPhases = ['缓慢抬升', '放量拉升'];
          return;
        }

        if (isHighVol && isRising && p.priceChange > 15) {
          this.phaseDetails.name = '加速拉升';
          this.phaseDetails.emoji = '🚀';
          this.phaseDetails.confidence = 85;
          this.likelyNextPhases = ['继续上涨', '创新高'];
          return;
        }

        if (isHighVol && isFalling) {
          this.phaseDetails.name = '砸盘下跌';
          this.phaseDetails.emoji = '💥';
          this.phaseDetails.confidence = 85;
          this.likelyNextPhases = ['继续下跌', '快速探底'];
          return;
        }

        this.phaseDetails.name = '平台整理';
        this.phaseDetails.emoji = '━';
        this.phaseDetails.confidence = 60;
        this.likelyNextPhases = ['向上突破', '向下跌破'];
      }

      getPhaseHTML() {
        this.detectPhase();
        let html = `<div class="wyckoff-phases">`;
        
        if (this.phaseDetails.name) {
          html += `<div style="margin-bottom: 6px;">
            <span class="phase-badge phase-happening">🔴 ${this.phaseDetails.emoji} ${this.phaseDetails.name}</span>
            <span style="font-size: 9px; color: var(--text-secondary);">${this.phaseDetails.confidence}% 确定</span>
          </div>`;
        }

        if (this.likelyNextPhases.length > 0) {
          html += `<div style="display: flex; gap: 4px; flex-wrap: wrap;">`;
          this.likelyNextPhases.forEach(phase => {
            html += `<span class="phase-badge phase-likely">▶️ ${phase}</span>`;
          });
          html += `</div>`;
        }

        html += `</div>`;
        return html;
      }
    }

    class YaoCoinAnalyzer {
      constructor(row, prev) {
        this.row = row;
        this.prev = prev;
        this.signals = [];
        this.score = 0;
      }

      analyze() {
        const p = this.row;
        
        if (p.volMcap > 30) {
          this.signals.push('OI堆积');
        }
        
        if (p.volMcap > 30 && p.priceChange > 5 && p.priceChange < 25) {
          this.signals.push('CVD强吸');
        }

        if (p.price < 0.01 && p.volMcap > 30) {
          this.signals.push('低价启动');
        }

        if (this.prev && p.volMcap > (this.prev.volMcap || 0) * 1.5 && p.priceChange > 5) {
          this.signals.push('突破启动');
        }

        this.score = Math.min(100, this.signals.length * 25);
        return this.score >= 75 && this.signals.length >= 3;
      }

      getScore() {
        return this.score;
      }

      getConfidence() {
        return Math.min(100, this.signals.length * 25);
      }
    }

    function detectYaoBuyable(row, prev) {
      const analyzer = new YaoCoinAnalyzer(row, prev);
      const isBuyable = analyzer.analyze();

      if (isBuyable) {
        return {
          isBuyable: true,
          score: analyzer.getScore(),
          confidence: analyzer.getConfidence(),
          signals: analyzer.signals
        };
      }

      return { isBuyable: false };
    }

    function detectYaoWatch(row, prev) {
      const analyzer = new YaoCoinAnalyzer(row, prev);
      analyzer.analyze();
      const score = analyzer.getScore();

      if (score >= 50 && analyzer.signals.length >= 2) {
        return {
          isWatchable: true,
          score,
          confidence: analyzer.getConfidence(),
          signals: analyzer.signals
        };
      }

      return { isWatchable: false };
    }

    function updateYaoCoinMemory(symbol, type) {
      const now = Date.now();
      
      if (!yaoCoinMemory[symbol]) {
        yaoCoinMemory[symbol] = {
          firstDetected: now,
          currentType: type,
          lastUpdate: now,
          notified: false
        };
        
        showNotification(`👁 新妖币: ${symbol}`, 'alert');
        return 'new';
      } else {
        const mem = yaoCoinMemory[symbol];
        mem.currentType = type;
        mem.lastUpdate = now;
        return 'update';
      }
    }

    function cleanExpiredMemory() {
      const now = Date.now();
      const h6 = 6 * 60 * 60 * 1000;

      Object.keys(yaoCoinMemory).forEach(symbol => {
        const mem = yaoCoinMemory[symbol];
        
        if (mem.currentType === 'watch' && (now - mem.lastUpdate) > h6) {
          delete yaoCoinMemory[symbol];
        }
      });

      localStorage.setItem('yaoCoinMemory', JSON.stringify(yaoCoinMemory));
    }

    const cache = { exchangeInfo: { data: null, time: 0 }, gecko: { data: null, time: 0 } };
    const CACHE_TIME = { exchangeInfo: 60 * 60 * 1000, gecko: 30 * 60 * 1000 };

    async function getJSON(url) {
      try {
        const response = await fetch(url, { headers: { 'Accept-Encoding': 'gzip, deflate' }, timeout: 10000 });
        if (!response.ok) return null;
        return await response.json();
      } catch (error) {
        console.error('请求失败:', url, error);
        return null;
      }
    }

    async function getCachedData(key, url) {
      const now = Date.now();
      if (cache[key].data && (now - cache[key].time) < CACHE_TIME[key]) {
        return cache[key].data;
      }
      
      const data = await getJSON(url);
      if (data) {
        cache[key].data = data;
        cache[key].time = now;
      }
      return data;
    }

    async function loadData() {
      if (isLoading) return;

      isLoading = true;
      document.getElementById('refresh-dot').classList.add('loading');

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getCachedData('exchangeInfo', 'https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getCachedData('gecko', 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        if (!exchangeInfo || !ticker24h || !premiumIndex) {
          throw new Error('接口请求失败');
        }

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 200);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
        const mcapMap = {};

        if (Array.isArray(gecko)) {
          gecko.forEach(x => {
            if (x.symbol) {
              mcapMap[x.symbol.toUpperCase() + 'USDT'] = x.market_cap || 0;
            }
          });
        }

        yaoBuyableCoins = [];
        yaoWatchCoins = [];
        buyEliteCoins = [];
        buyPrimeCoins = [];
        allCoinsData = [];

        const newPreviousData = {};

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];

          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price || price <= 0) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const mcap = mcapMap[symbol] || 0;

          let volMcap = null;
          let oiMcap = null;

          if (mcap > 0) {
            const estimatedOi = (quoteVol * 0.15) / price;
            const oiValue = estimatedOi * price;
            volMcap = (quoteVol / mcap) * 100;
            oiMcap = (oiValue / mcap) * 100;
          }

          const row = {
            symbol,
            price,
            mcap,
            quoteVol,
            funding,
            priceChange,
            volMcap,
            oiMcap,
            timestamp: Date.now()
          };

          allCoinsData.push(row);
          newPreviousData[symbol] = { ...row };

          const prev = previousData[symbol];

          const wyckoffAnalyzer = new WyckoffPhaseAnalyzer(row, prev);
          wyckoffAnalyzer.detectPhase();

          const trendAnalyzer = new TrendAnalyzer(row, prev);
          const trendTag = trendAnalyzer.getTrendTag();

          const yaoBuyCheck = detectYaoBuyable(row, prev);
          if (yaoBuyCheck.isBuyable) {
            row.type = 'yao-buyable';
            row.score = yaoBuyCheck.score;
            row.confidence = yaoBuyCheck.confidence;
            row.signals = yaoBuyCheck.signals;
            row.trend = trendAnalyzer.trend;
            row.trendStrength = trendAnalyzer.strength;
            row.trendTag = trendTag;
            row.wyckoff = wyckoffAnalyzer;
            
            updateYaoCoinMemory(symbol, 'buyable');
            yaoBuyableCoins.push(row);
          } else {
            const yaoWatchCheck = detectYaoWatch(row, prev);
            if (yaoWatchCheck.isWatchable) {
              row.type = 'yao-watch';
              row.score = yaoWatchCheck.score;
              row.confidence = yaoWatchCheck.confidence;
              row.signals = yaoWatchCheck.signals;
              row.trend = trendAnalyzer.trend;
              row.trendStrength = trendAnalyzer.strength;
              row.trendTag = trendTag;
              row.wyckoff = wyckoffAnalyzer;
              
              updateYaoCoinMemory(symbol, 'watch');
              yaoWatchCoins.push(row);
            }
          }
        }

        yaoBuyableCoins.sort((a, b) => (b.score || 0) - (a.score || 0));
        yaoWatchCoins.sort((a, b) => (b.score || 0) - (a.score || 0));

        previousData = newPreviousData;
        localStorage.setItem('previousData', JSON.stringify(previousData));
        localStorage.setItem('yaoCoinMemory', JSON.stringify(yaoCoinMemory));

        renderMonitorList();
        updateBadges();
        cleanExpiredMemory();

        document.getElementById('last-update').innerText = 
          `✅ ${new Date().toLocaleTimeString()}`;

      } catch (error) {
        console.error('加载失败:', error);
        document.getElementById('last-update').innerText = '❌ 获取失败';
        document.getElementById('monitor-list').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div>加载失败: ${error.message}</div>
          </div>
        `;
      } finally {
        isLoading = false;
        document.getElementById('refresh-dot').classList.remove('loading');
      }
    }

    function renderMonitorList() {
      const container = document.getElementById('monitor-list');
      let html = '';

      if (yaoBuyableCoins.length > 0) {
        html += `<div class="section-title yao-buyable">🔥 妖币-可买入 (${yaoBuyableCoins.length})</div>`;
        html += '<div class="coin-grid">';
        yaoBuyableCoins.forEach(coin => {
          html += renderCoinCard(coin);
        });
        html += '</div>';
      }

      if (yaoWatchCoins.length > 0) {
        html += `<div class="section-title yao-watch">✨ 妖币-观察 (${yaoWatchCoins.length})</div>`;
        html += '<div class="coin-grid">';
        yaoWatchCoins.forEach(coin => {
          html += renderCoinCard(coin);
        });
        html += '</div>';
      }

      if (!yaoBuyableCoins.length && !yaoWatchCoins.length) {
        html = `<div class="empty-state">
          <div class="empty-icon">🔍</div>
          <div>暂未发现符合条件的币种</div>
        </div>`;
      }

      container.innerHTML = html;
    }

    function renderCoinCard(coin) {
      const score = coin.score || 0;
      const confidence = coin.confidence || 0;
      const phaseHTML = coin.wyckoff.getPhaseHTML();

      return `
        <div class="coin-card ${coin.type}" onclick="showDetail('${coin.symbol}')">
          <div class="coin-header">
            <div class="coin-title">
              <span class="coin-symbol">${coin.symbol}</span>
              <span class="coin-price">$${fmtNum(coin.price, 6)}</span>
            </div>
            <div class="coin-actions">
              <button class="action-btn" onclick="copySymbol('${coin.symbol}', event)">📋</button>
              <button class="action-btn" onclick="openChart('${coin.symbol}', event)">📈</button>
            </div>
          </div>

          <div class="tags-row">
            <span class="tag ${coin.type === 'yao-buyable' ? 'tag-yao-buyable' : 'tag-yao-watch'}">
              ${coin.type === 'yao-buyable' ? '🚀 可买入' : '👁️ 观察中'}
            </span>
            <span class="tag ${coin.trendTag.class}">${coin.trendTag.icon} ${coin.trendTag.label}</span>
          </div>

          ${phaseHTML}

          <div class="advice-box ${coin.type === 'yao-buyable' ? 'danger' : 'purple'}">
            ${coin.type === 'yao-buyable' ? '🚀' : '👁️'} ${coin.signals.slice(0, 2).join(' + ')}
          </div>

          <div class="stats-grid">
            <div class="stat">
              <span class="stat-label">评分</span>
              <span class="stat-val">${score.toFixed(0)}</span>
            </div>
            <div class="stat">
              <span class="stat-label">信心</span>
              <span class="stat-val">${confidence.toFixed(0)}%</span>
            </div>
            <div class="stat">
              <span class="stat-label">24h</span>
              <span class="stat-val ${coin.priceChange > 0 ? 'green' : 'red'}">${coin.priceChange.toFixed(2)}%</span>
            </div>
            <div class="stat">
              <span class="stat-label">市值</span>
              <span class="stat-val">${coin.mcap ? fmtNum(coin.mcap, 2) : '-'}</span>
            </div>
          </div>

          <div class="confidence-bar">
            <div class="confidence-fill" style="width: ${confidence}%"></div>
          </div>
        </div>
      `;
    }

    function getMemoryTime(symbol) {
      const mem = yaoCoinMemory[symbol];
      if (!mem) return '新';
      const elapsed = (Date.now() - mem.firstDetected) / (60 * 60 * 1000);
      if (elapsed < 1) return '< 1h';
      if (elapsed < 6) return `${elapsed.toFixed(0)}h`;
      return '6h+';
    }

    function updateBadges() {
      document.getElementById('stat-yao-buy').textContent = yaoBuyableCoins.length;
      document.getElementById('stat-yao-watch').textContent = yaoWatchCoins.length;
      document.getElementById('stat-buy-elite').textContent = buyEliteCoins.length;
      document.getElementById('stat-buy-prime').textContent = buyPrimeCoins.length;
    }

    let searchTimeout = null;

    function handleSearch(query) {
      clearTimeout(searchTimeout);
      const results = document.getElementById('search-results');

      if (!query.trim()) {
        results.innerHTML = '';
        return;
      }

      searchTimeout = setTimeout(() => {
        const q = query.toUpperCase();
        const filtered = allCoinsData
          .filter(coin => coin.symbol.includes(q))
          .slice(0, 50);

        if (filtered.length === 0) {
          results.innerHTML = `<div class="empty-state"><div>未找到相关币种</div></div>`;
          return;
        }

        results.innerHTML = filtered.map(coin => {
          let tag = '';
          let tagClass = '';

          if (coin.type === 'yao-buyable') {
            tag = `🔥 妖币-可买`;
            tagClass = 'tag-yao-buyable';
          } else if (coin.type === 'yao-watch') {
            tag = `✨ 妖币-观察`;
            tagClass = 'tag-yao-watch';
          }

          return `
            <div class="search-item">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                <div class="search-item-symbol">${coin.symbol}</div>
                ${tag ? `<span class="tag ${tagClass}">${tag}</span>` : ''}
              </div>
              <div class="search-item-info">
                <div>价格: $${fmtNum(coin.price, 6)}</div>
                <div>市值: $${fmtNum(coin.mcap, 2)}</div>
                <div>24h: <span class="${coin.priceChange > 0 ? 'green' : 'red'}">${coin.priceChange.toFixed(2)}%</span></div>
              </div>
              <button class="search-item-btn" onclick="showDetail('${coin.symbol}')">查看详情</button>
            </div>
          `;
        }).join('');
      }, 300);
    }

    function showDetail(symbol) {
      const coin = allCoinsData.find(c => c.symbol === symbol);
      if (!coin) return;

      let detailBoxClass = 'danger';
      let icon = '🔥';

      if (coin.type === 'yao-watch') {
        detailBoxClass = 'purple';
        icon = '✨';
      }

      const wyckoffAnalyzer = coin.wyckoff;

      let html = `
        <div class="detail-title">
          <span>${icon} ${coin.symbol}</span>
          <span style="font-size: 12px; color: var(--text-secondary);">$${fmtNum(coin.price, 6)}</span>
          <span class="tag ${coin.trendTag.class}">${coin.trendTag.icon} ${coin.trendTag.label}</span>
        </div>

        <div class="operation-guide">
          <div class="operation-guide-title">📋 交易建议</div>
          <div class="operation-guide-content">
            <div class="operation-row">
              <strong>方向：</strong>
              ${coin.trend === 'LONG' ? '📈 做多 (看涨)' : coin.trend === 'SHORT' ? '📉 做空 (看跌)' : '━ 观望'}
            </div>
            <div class="operation-row">
              <strong>力度：</strong>
              ${coin.trendStrength}%
            </div>
          </div>
        </div>

        <div class="detail-grid">
          <div class="detail-item">
            <div class="detail-item-label">当前价格</div>
            <div class="detail-item-value">$${fmtNum(coin.price, 6)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">市值</div>
            <div class="detail-item-value">${coin.mcap ? fmtNum(coin.mcap, 2) : '-'}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">24h涨幅</div>
            <div class="detail-item-value ${coin.priceChange > 0 ? 'green' : 'red'}">${coin.priceChange.toFixed(2)}%</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">成交量占比</div>
            <div class="detail-item-value">${coin.volMcap ? coin.volMcap.toFixed(2) + '%' : '-'}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">OI占比</div>
            <div class="detail-item-value">${coin.oiMcap ? coin.oiMcap.toFixed(2) + '%' : '-'}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">资金费率</div>
            <div class="detail-item-value ${coin.funding > 0 ? 'green' : 'red'}">${coin.funding.toFixed(4)}%</div>
          </div>
        </div>

        <div class="detail-box ${detailBoxClass}">
          <h3>📊 ${coin.type === 'yao-buyable' ? '妖币可买' : '妖币观察'}分析</h3>
          <div class="detail-row">
            <span class="detail-label">检测信号</span>
            <span class="detail-value">${coin.signals.join(' | ')}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">当前阶段</span>
            <span class="detail-value">${wyckoffAnalyzer.phaseDetails.name}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">下一步可能</span>
            <span class="detail-value">${wyckoffAnalyzer.likelyNextPhases.join(' → ')}</span>
          </div>
        </div>

        <div class="detail-box">
          <h3>🌐 快速查询</h3>
          <div class="channel-grid">
            <div class="channel-item" onclick="openBinance('${coin.symbol}')">
              <div class="channel-icon">📊</div>
              <div class="channel-name">币安交易</div>
            </div>
            <div class="channel-item" onclick="openTradingView('${coin.symbol}')">
              <div class="channel-icon">📈</div>
              <div class="channel-name">交易图表</div>
            </div>
            <div class="channel-item" onclick="copySymbol('${coin.symbol}', null, true)">
              <div class="channel-icon">📋</div>
              <div class="channel-name">复制符号</div>
            </div>
          </div>
        </div>

        <div class="detail-box ${detailBoxClass}">
          <h3>⚠️ 风险提示</h3>
          <div style="font-size: 11px; color: inherit; line-height: 1.6;">
            ${coin.type === 'yao-buyable' ? `
              ✓ 妖币极具潜力，但风险极高<br/>
              ✓ 仅适合高风险承受能力的投资者<br/>
              ✓ 严格执行止损，不贪心<br/>
              ✓ 关键信号: ${coin.signals.slice(0, 2).join(' + ')}
            ` : `
              ✓ 该币种有成为妖币的潜力<br/>
              ✓ 当前处于${wyckoffAnalyzer.phaseDetails.name}阶段<br/>
              ✓ 等待发展到加速阶段时确认<br/>
              ✓ 观察OI和成交量变化
            `}
          </div>
        </div>
      `;

      document.getElementById('detail-body').innerHTML = html;
      document.getElementById('detail-modal').classList.add('active');
    }

    function closeDetail() {
      document.getElementById('detail-modal').classList.remove('active');
    }

    function openBinance(symbol) {
      window.open(`https://www.binance.com/en/trade/${symbol}`, '_blank');
    }

    function openTradingView(symbol) {
      window.open(`https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}`, '_blank');
    }

    function copySymbol(symbol, event, showMsg = false) {
      if (event) event.stopPropagation();
      navigator.clipboard.writeText(symbol);
      if (showMsg) showNotification(`已复制: ${symbol}`, 'success');
    }

    function openChart(symbol, event) {
      event.stopPropagation();
      openTradingView(symbol);
    }

    function startAutoRefresh() {
      let countdown = 60;      loadData();

      autoRefreshInterval = setInterval(() => {
        countdown--;
        document.getElementById('refresh-countdown').innerText = countdown + 's';

        if (countdown <= 0) {
          countdown = 60;
          loadData();
        }
      }, 1000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }

      startAutoRefresh();
      cleanExpiredMemory();

      document.getElementById('detail-modal').addEventListener('click', (e) => {
        if (e.target.id === 'detail-modal') {
          closeDetail();
        }
      });

      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.addEventListener('focus', () => {
          document.getElementById('search-results').style.display = 'block';
        });
        document.addEventListener('click', (e) => {
          if (!searchInput.contains(e.target) && !document.getElementById('search-results').contains(e.target)) {
            document.getElementById('search-results').style.display = 'none';
          }
        });
      }

      window.addEventListener('beforeunload', () => {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        localStorage.setItem('previousData', JSON.stringify(previousData));
        localStorage.setItem('yaoCoinMemory', JSON.stringify(yaoCoinMemory));
      });
    });
  </script>
</body>
</html>

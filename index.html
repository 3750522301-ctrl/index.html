<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>币安交易管理系统 v9</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      color: #e5eefb;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .version-tag {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(16,196,245,.2);
      border: 1px solid rgba(16,196,245,.4);
      color: #10c4f5;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      z-index: 999;
    }
    h1 {
      text-align: center;
      color: #10c4f5;
      margin-bottom: 6px;
      font-size: 32px;
    }
    .subtitle {
      text-align: center;
      color: #8ca3ba;
      font-size: 12px;
      margin-bottom: 20px;
    }
    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(16,196,245,.2);
    }
    .tab-btn {
      background: none;
      border: none;
      color: #8ca3ba;
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 13px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #10c4f5;
      border-bottom-color: #10c4f5;
    }
    .tab-btn:hover { color: #10c4f5; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .time-info {
      color: #8ca3ba;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-status {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .refresh-status.loading {
      background: #f59e0b;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .search-box {
      width: 100%;
      max-width: 400px;
      position: relative;
      margin-bottom: 14px;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.3);
      border-radius: 8px;
      color: #e5eefb;
      font-size: 13px;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: #10c4f5;
      box-shadow: 0 0 10px rgba(16,196,245,.2);
    }
    .search-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(10, 22, 40, .95);
      border: 1px solid rgba(16,196,245,.3);
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .search-dropdown.active { display: block; }
    .search-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid rgba(16,196,245,.1);
      transition: all 0.2s;
      font-size: 12px;
    }
    .search-item:hover {
      background: rgba(16,196,245,.15);
    }
    .search-item-symbol {
      color: #10c4f5;
      font-weight: bold;
    }
    .search-item-mcap {
      color: #8ca3ba;
      font-size: 11px;
      margin-top: 2px;
    }
    .section {
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 14px;
      color: #10c4f5;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(16,196,245,.2);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    .card {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 10px;
      padding: 12px;
      transition: all 0.2s;
    }
    .card:hover { border-color: rgba(16,196,245,.4); }
    .card .label {
      color: #8ca3ba;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .card .value {
      color: #10c4f5;
      font-weight: bold;
      font-size: 20px;
    }
    
    /* 首页卡片列表 */
    .coin-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .coin-card {
      background: rgba(10, 22, 40, .95);
      border: 1px solid rgba(16,196,245,.25);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .coin-card:hover {
      border-color: rgba(16,196,245,.6);
      box-shadow: 0 0 15px rgba(16,196,245,.15);
      transform: translateY(-2px);
    }
    .coin-card-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .coin-symbol {
      font-size: 16px;
      color: #10c4f5;
      font-weight: bold;
    }
    .coin-level {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
    }
    .level-yao {
      background: rgba(168, 85, 247, .3);
      color: #d8b4fe;
      border: 1px solid rgba(168, 85, 247, .5);
    }
    .level-buy {
      background: rgba(34, 197, 94, .3);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, .5);
    }
    .coin-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
    }
    .info-label {
      color: #8ca3ba;
    }
    .info-value {
      color: #e5eefb;
      font-weight: bold;
    }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .coin-footer {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(16,196,245,.1);
    }
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      background: rgba(59, 130, 246, .2);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, .4);
      white-space: nowrap;
    }
    
    /* 详细面板 */
    .detail-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, .8);
      z-index: 1000;
      overflow-y: auto;
      padding: 20px;
    }
    .detail-modal.active { display: block; }
    .detail-content {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      border: 1px solid rgba(16,196,245,.3);
      border-radius: 16px;
      padding: 24px;
      max-width: 900px;
      margin: 20px auto;
      position: relative;
    }
    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: #8ca3ba;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .close-btn:hover {
      color: #10c4f5;
      transform: rotate(90deg);
    }
    .detail-title {
      font-size: 28px;
      color: #10c4f5;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .detail-item {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(16,196,245,.12);
      border-radius: 8px;
      padding: 10px;
    }
    .detail-item-label {
      color: #8ca3ba;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .detail-item-value {
      color: #10c4f5;
      font-size: 16px;
      font-weight: bold;
    }
    .section-box {
      background: rgba(34,197,94,.1);
      border: 2px solid rgba(34,197,94,.4);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .section-box h3 {
      color: #22c55e;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .section-box.warning {
      background: rgba(245, 158, 11, .1);
      border-color: rgba(245, 158, 11, .4);
    }
    .section-box.warning h3 {
      color: #fcd34d;
    }
    .section-box.danger {
      background: rgba(239, 68, 68, .1);
      border-color: rgba(239, 68, 68, .4);
    }
    .section-box.danger h3 {
      color: #fca5a5;
    }
    .decision-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: 12px;
    }
    .decision-row:last-child { border-bottom: none; }
    .decision-label { color: #8ca3ba; }
    .decision-value { font-weight: bold; color: #e5eefb; }
    .empty-state {
      text-align: center;
      color: #8ca3ba;
      padding: 30px 20px;
      font-size: 13px;
    }
    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      border: 1px solid;
      white-space: nowrap;
      font-weight: bold;
      margin-right: 4px;
    }

    @media (max-width: 1024px) {
      .coin-list { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
      .detail-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .coin-list { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
      .detail-title { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="version-tag">v9 紧凑卡片</div>

  <div class="container">
    <h1>⚡ 币安交易系统</h1>
    <p class="subtitle">现货/合约 | 杠杆管理 | 止盈止损</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('monitor', this)">📊 监控</button>
      <button class="tab-btn" onclick="switchTab('search', this)">🔍 搜索</button>
    </div>

    <!-- 监控页 -->
    <div id="monitor" class="tab-content active">
      <div class="toolbar">
        <div class="time-info">
          <span class="refresh-status" id="refresh-dot"></span>
          <span id="last-update">更新中...</span>
          <span style="color: #8ca3ba;">| ⏱️ <span id="refresh-countdown">60</span>s</span>
        </div>
      </div>

      <!-- 妖币 -->
      <div class="section">
        <div class="section-title">💎 妖币 (<span id="stat-yao">0</span>)</div>
        <div class="stats">
          <div class="card">
            <div class="label">推荐合约</div>
            <div class="value green" id="stat-yao-futures">0</div>
          </div>
          <div class="card">
            <div class="label">强动量</div>
            <div class="value" id="stat-yao-momentum">0</div>
          </div>
          <div class="card">
            <div class="label">平均共振分</div>
            <div class="value" id="stat-yao-score">-</div>
          </div>
        </div>
        <div class="coin-list" id="yao-list"></div>
      </div>

      <!-- 建议买入 -->
      <div class="section">
        <div class="section-title">🚀 建议买入 (<span id="stat-buy">0</span>)</div>
        <div class="stats">
          <div class="card">
            <div class="label">现货推荐</div>
            <div class="value green" id="stat-buy-spot">0</div>
          </div>
          <div class="card">
            <div class="label">高质量 >85分</div>
            <div class="value" id="stat-high-quality">0</div>
          </div>
          <div class="card">
            <div class="label">平均共振分</div>
            <div class="value" id="stat-buy-score">-</div>
          </div>
        </div>
        <div class="coin-list" id="buy-list"></div>
      </div>
    </div>

    <!-- 搜索页 -->
    <div id="search" class="tab-content">
      <div class="search-box">
        <input 
          type="text" 
          class="search-input" 
          id="search-input" 
          placeholder="搜索币种 (BTC, ETH, SOL)..."
          oninput="handleSearch(this.value)"
        />
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
      <div id="search-result" class="empty-state">搜索一个币种查看详情</div>
    </div>
  </div>

  <!-- 详细面板 -->
  <div class="detail-modal" id="detail-modal">
    <div class="detail-content">
      <button class="close-btn" onclick="closeDetail()">✕</button>
      <div id="detail-body"></div>
    </div>
  </div>

  <script>
    let allCoinsData = [];
    let allRows = { yao: [], buy: [] };
    let oiMap = {};
    let isLoading = false;
    let previousData = {};
    let autoRefreshInterval = null;

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      if (el) el.classList.add('active');
    }

    function colorClass(v) {
      if (v === null || v === undefined || isNaN(v)) return 'gray';
      return v > 0 ? 'green' : v < 0 ? 'red' : 'gray';
    }

    function fmtNum(n, d = 2) {
      if (n === null || n === undefined || isNaN(n)) return '-';
      if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(2) + 'K';
      return Number(n).toFixed(d);
    }

    async function getJSON(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (e) {
        console.error('Fetch error:', url, e);
        return null;
      }
    }

    async function fetchOpenInterest(symbols) {
      const map = {};
      const topSymbols = symbols.slice(0, 150);
      const chunk = 30;
      
      for (let i = 0; i < topSymbols.length; i += chunk) {
        const batch = topSymbols.slice(i, i + chunk);
        const promises = batch.map(async symbol => {
          const url = `https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`;
          const data = await getJSON(url);
          if (data && data.openInterest) {
            map[symbol] = parseFloat(data.openInterest);
          }
        });
        await Promise.all(promises);
        await new Promise(r => setTimeout(r, 80));
      }
      return map;
    }

    function getTradingRecommendation(row, isYaoCoin = false, score = 0) {
      if (isYaoCoin) {
        const priceChange = row.priceChange;
        
        if (priceChange < -30) {
          return {
            type: 'futures',
            typeName: '合约',
            leverage: 1,
            reason: '高风险下跌，用 1 倍降低风险'
          };
        } else if (priceChange < -15) {
          return {
            type: 'futures',
            typeName: '合约',
            leverage: 2,
            reason: '底部反弹，用 2 倍放大收益'
          };
        } else {
          return {
            type: 'futures',
            typeName: '合约',
            leverage: 3,
            reason: '即将拉盘，用 3 倍最大化收益'
          };
        }
      } else {
        if (score >= 85) {
          return {
            type: 'spot',
            typeName: '现货',
            leverage: 1,
            reason: '高质量信号，现货安全持有'
          };
        } else if (score >= 75) {
          return {
            type: 'futures',
            typeName: '合约 1倍',
            leverage: 1,
            reason: '良好信号，1 倍合约更灵活'
          };
        } else {
          return {
            type: 'futures',
            typeName: '合约 1倍',
            leverage: 1,
            reason: '一般信号，1 倍合约试单'
          };
        }
      }
    }

    function calculateLeveragePnL(entryPrice, takeProfit, stopLoss, leverage, initialCapital = 100) {
      const tp1Change = ((takeProfit.tp1 - entryPrice) / entryPrice) * 100;
      const tp2Change = ((takeProfit.tp2 - entryPrice) / entryPrice) * 100;
      const tp3Change = ((takeProfit.tp3 - entryPrice) / entryPrice) * 100;
      const slChange = ((stopLoss - entryPrice) / entryPrice) * 100;

      const tp1Profit = tp1Change * leverage;
      const tp2Profit = tp2Change * leverage;
      const tp3Profit = tp3Change * leverage;
      const slLoss = slChange * leverage;

      const tp1Amount = initialCapital * (1 + tp1Profit / 100);
      const tp2Amount = initialCapital * (1 + tp2Profit / 100);
      const tp3Amount = initialCapital * (1 + tp3Profit / 100);
      const slAmount = initialCapital * (1 + slLoss / 100);

      return {
        tp1: { change: tp1Profit.toFixed(2), amount: tp1Amount.toFixed(2) },
        tp2: { change: tp2Profit.toFixed(2), amount: tp2Amount.toFixed(2) },
        tp3: { change: tp3Profit.toFixed(2), amount: tp3Amount.toFixed(2) },
        sl: { change: slLoss.toFixed(2), amount: slAmount.toFixed(2) }
      };
    }

    function detectSqueeze(row, previous) {
      if (!previous) return { squeeze: 'unknown', strength: 0 };

      const oiIncrease = (row.oiMcap - previous.oiMcap) / previous.oiMcap;
      const priceIncrease = (row.price - previous.price) / previous.price;
      const fundingIncrease = row.funding - previous.funding;

      if (oiIncrease > 0.03 && priceIncrease > 0.01 && fundingIncrease > 0) {
        return { squeeze: 'up', strength: Math.min(100, oiIncrease * 100 + priceIncrease * 100) };
      }

      if (oiIncrease > 0.05 && priceIncrease < -0.02) {
        return { squeeze: 'down', strength: Math.min(100, oiIncrease * 100) };
      }

      return { squeeze: 'none', strength: 0 };
    }

    function detectMomentum(row, previous) {
      if (!previous) return { momentum: 'unknown', strength: 0 };

      const priceVelocity = (row.price - previous.price) / previous.price * 100;
      const oiVelocity = (row.oiMcap - previous.oiMcap) / previous.oiMcap * 100;

      if (Math.abs(priceVelocity) > 1 && oiVelocity > 2) {
        return { momentum: 'strong', strength: Math.min(100, Math.abs(priceVelocity) * 10) };
      }

      if (Math.abs(priceVelocity) > 0.5) {
        return { momentum: 'medium', strength: Math.abs(priceVelocity) * 5 };
      }

      return { momentum: 'none', strength: 0 };
    }

    function calculateTakeProfit(row, isYaoCoin = false) {
      const entryPrice = row.price;
      
      if (isYaoCoin) {
        return {
          stopLoss: (entryPrice * 0.97).toFixed(6),
          tp1: (entryPrice * 1.05).toFixed(6),
          tp2: (entryPrice * 1.10).toFixed(6),
          tp3: (entryPrice * 1.20).toFixed(6),
          tp1Ratio: '30%',
          tp2Ratio: '40%',
          tp3Ratio: '30%'
        };
      } else {
        return {
          stopLoss: (entryPrice * 0.97).toFixed(6),
          tp1: (entryPrice * 1.03).toFixed(6),
          tp2: (entryPrice * 1.08).toFixed(6),
          tp3: (entryPrice * 1.15).toFixed(6),
          tp1Ratio: '40%',
          tp2Ratio: '40%',
          tp3Ratio: '20%'
        };
      }
    }

    function calculateAdditionalBuy(row, isYaoCoin = false) {
      const entryPrice = row.price;
      
      if (isYaoCoin) {
        return {
          add1: (entryPrice * 0.95).toFixed(6),
          add2: (entryPrice * 0.90).toFixed(6),
          ratio: '-5% 和 -10%'
        };
      } else {
        return {
          add1: (entryPrice * 0.97).toFixed(6),
          add2: (entryPrice * 0.94).toFixed(6),
          ratio: '-3% 和 -6%'
        };
      }
    }

    function calculateResonanceScore(row, previous) {
      let score = 0;
      let signals = [];

      let priceSignal = 0;
      if (row.priceChange < -10 && row.priceChange > -50) {
        priceSignal += 20;
        signals.push('底部');
      }
      if (previous && row.price > previous.price) {
        priceSignal += 20;
        signals.push('反弹');
      }
      score += priceSignal;

      let oiSignal = 0;
      if (row.oiMcap && row.oiMcap > 1 && row.oiMcap < 15) {
        oiSignal += 15;
        signals.push('OI活');
      }
      if (previous && row.oiMcap > previous.oiMcap * 0.95) {
        oiSignal += 15;
        signals.push('OI持');
      }
      score += oiSignal;

      let fundingSignal = 0;
      if (row.funding > -0.03 && row.funding < 0.05) {
        fundingSignal += 15;
        signals.push('资费平');
      }
      if (previous && row.funding > previous.funding) {
        fundingSignal += 10;
        signals.push('资费升');
      }
      score += fundingSignal;

      let volumeSignal = 0;
      if (row.volMcap && row.volMcap > 5 && row.volMcap < 30) {
        volumeSignal += 15;
        signals.push('成交活');
      }
      score += volumeSignal;

      let mcapSignal = 0;
      if (row.mcap && row.mcap > 0 && row.mcap < 1e9) {
        mcapSignal += 10;
        signals.push('市值合');
      }
      score += mcapSignal;

      const resonanceBonus = signals.length * 5;
      score += resonanceBonus;

      return {
        totalScore: Math.min(100, score),
        signals: signals,
      };
    }

    function detectYaoCoinV2(row, previous) {
      const resonance = calculateResonanceScore(row, previous);
      
      const conditions = {
        priceAtBottom: row.priceChange < -10 && row.priceChange > -50,
        oiActive: row.oiMcap && row.oiMcap > 1 && row.oiMcap < 15,
        fundingBalanced: row.funding > -0.03 && row.funding < 0.05,
        volumeActive: row.volMcap && row.volMcap > 5 && row.volMcap < 30,
        mcapSmallButValid: row.mcap && row.mcap > 1e6 && row.mcap < 1e9,
        priceRebounding: previous && row.price > previous.price,
        oiHolding: previous && row.oiMcap > previous.oiMcap * 0.95,
      };

      const conditionsMet = Object.values(conditions).filter(x => x).length;

      if (conditionsMet >= 5 && resonance.totalScore >= 60) {
        let riskLevel = '';
        
        if (row.priceChange < -30) {
          riskLevel = '🔴 高风险';
        } else if (row.priceChange < -15) {
          riskLevel = '🟡 中风险';
        } else {
          riskLevel = '🟢 可入';
        }

        return {
          isYao: true,
          riskLevel,
          yaoScore: resonance.totalScore,
          signals: resonance.signals,
        };
      }

      return { isYao: false };
    }

    function detectBuyCoinV2(row, previous) {
      const resonance = calculateResonanceScore(row, previous);

      const conditions = {
        priceStable: row.priceChange > -3 && row.priceChange < 8,
        oiModerate: row.oiMcap && row.oiMcap > 2.5 && row.oiMcap < 10,
        fundingWarm: row.funding > -0.02 && row.funding < 0.03,
        volumeModerate: row.volMcap && row.volMcap > 6 && row.volMcap < 25,
        mcapGood: row.mcap && row.mcap > 5e7,
        oiHolding: previous && row.oiMcap > previous.oiMcap * 0.95,
        fundingWarmth: row.funding > 0.001 && row.funding < 0.02,
      };

      const conditionsMet = Object.values(conditions).filter(x => x).length;

      if (conditionsMet >= 5 && resonance.totalScore >= 70) {
        let buyScore = resonance.totalScore;
        
        if (conditionsMet >= 6) buyScore += 5;
        if (conditionsMet >= 7) buyScore += 5;

        return {
          isBuy: true,
          buyScore: Math.min(100, buyScore),
          signals: resonance.signals,
        };
      }

      return { isBuy: false };
    }

    // 首页卡片
    function renderCoinCard(row) {
      const isYaoCoin = row.level === '妖币';
      const score = row.yaoScore || row.buyScore || 0;

      return `

          <div class="coin-card-title">
            <span class="coin-symbol">${row.symbol}</span>

    function renderYaoList() {
      const container = document.getElementById('yao-list');
      
      if (allRows.yao.length === 0) {

    function renderBuyList() {

      }

      let html = '';
      allRows.buy.forEach(row => {

      });
      container.innerHTML = html;

    // 详细面板

          </div>

          </div>

            <div class="detail-item-label">Funding Rate</div>

            </div>

          <div class="decision-row">

            <span class="decision-label">杠杆倍数</span>

          </div>
          <div class="decision-row">
            <span class="decision-label">选择原因</span>
            <span class="decision-value" style="font-size: 11px;">${trading.reason}</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">仓位大小</span>
            <span class="decision-value">${isYaoCoin ? '账户的 20-30%' : '账户的 1-2%'}</span>

        <div class="section-box">
          <h3>🎯 止损止盈</h3>
          <div class="decision-row">

          </div>
          <div class="decision-row">

          <div class="decision-row">

            <span class="decision-value" style="color: #22c55e;">$${tp.tp3} (+${isYaoCoin ? '20' : '15'}%) 卖${tp.tp3Ratio}</span>
          </div>
        </div>

        <div class="section-box" style="background: rgba(16,196,245,.1); border-color: rgba(16,196,245,.4);">
          <h3 style="color: #7dd3fc;">💵 盈亏计算 (100 USDT本金, ${trading.leverage}倍杠杆)</h3>
          <div class="decision-row">

            <span class="decision-value" style="color: #22c55e;">${pnl.tp2.change}% → $${pnl.tp2.amount}</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">TP3 (+${isYaoCoin ? '20' : '15'}%)</span>
            <span class="decision-value" style="color: #22c55e;">${pnl.tp3.change}% → $${pnl.tp3.amount}</span>
          </div>
        </div>

        <div class="section-box">
          <h3>📈 加仓时机</h3>
          <div class="decision-row">
            <span class="decision-label">回调加仓1</span>
            <span class="decision-value">$${add.add1}</span>

          <div class="decision-row">
            <span class="decision-label">回调加仓2</span>
            <span class="decision-value">$${add.add2}</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">加仓策略</span>
            <span class="decision-value">在${add.ratio}时各加仓25%</span>
          </div>
        </div>

        <div class="section-box ${squeeze.squeeze === 'up' ? '' : squeeze.squeeze === 'down' ? 'danger' : 'warning'}">
          <h3>🔍 市场信号</h3>
          <div class="decision-row">
            <span class="decision-label">空头挤压</span>
            <span class="decision-value">
              ${squeeze.squeeze === 'up' ? '🔥 挤压中' : squeeze.squeeze === 'down' ? '⚠️ 假挤压' : '➡️ 无挤压'}
            </span>
          </div>
          <div class="decision-row">
            <span class="decision-label">动量</span>
            <span class="decision-value">
              ${momentum.momentum === 'strong' ? '🚀 强动量' : momentum.momentum === 'medium' ? '⚡ 中动量' : '❄️ 无动量'}
            </span>
          </div>
          <div class="decision-row">
            <span class="decision-label">信号标签</span>

          </div>

        <div class="section-box warning" style="border-color: rgba(245,158,11,.4); margin-top: 12px;">
          <h3 style="color: #fcd34d;">⚠️ 重要提示</h3>
          <div class="decision-row">
            <span class="decision-label">必读</span>
            <span class="decision-value" style="font-size: 11px; line-height: 1.6;">
              ${isYaoCoin 
                ? '妖币高风险，必须严格止损。不要抱希望，不要加仓超过止损。按计划执行。' 
                : '建议买入，但也要设置止损。推荐现货长持，但如果用合约必须1倍。'}
            </span>

        </div>

      document.getElementById('detail-body').innerHTML = html;
      document.getElementById('detail-modal').classList.add('active');
    }

    function closeDetail() {
      document.getElementById('detail-modal').classList.remove('active');
    }

    function handleSearch(query) {
      const dropdown = document.getElementById('search-dropdown');
      
      if (!query.trim()) {
        dropdown.classList.remove('active');
        return;
      }

      const filtered = allCoinsData.filter(coin => 
        coin.symbol.toUpperCase().includes(query.toUpperCase())
      ).slice(0, 15);

      if (filtered.length === 0) {
        dropdown.classList.remove('active');
        return;
      }

      dropdown.innerHTML = filtered.map(coin => `
        <div class="search-item" onclick="showSearchResult('${coin.symbol}')">
          <div class="search-item-symbol">${coin.symbol}</div>
          <div class="search-item-mcap">市值: $${fmtNum(coin.mcap, 2)}</div>
        </div>
      `).join('');

      dropdown.classList.add('active');
    }

    function showSearchResult(symbol) {
      document.getElementById('search-input').value = symbol;
      document.getElementById('search-dropdown').classList.remove('active');

      const coin = allCoinsData.find(c => c.symbol === symbol);
      
      if (!coin) {
        document.getElementById('search-result').innerHTML = '<div class="empty-state">未找到该币种</div>';
        return;
      }

      const resonance = calculateResonanceScore(coin, previousData[symbol]);
      coin.signals = resonance.signals;

      const yaoCheck = detectYaoCoinV2(coin, previousData[symbol]);
      const buyCheck = detectBuyCoinV2(coin, previousData[symbol]);

      if (yaoCheck.isYao) {
        coin.level = '妖币';
        coin.riskLevel = yaoCheck.riskLevel;
        coin.yaoScore = yaoCheck.yaoScore;
      } else if (buyCheck.isBuy) {
        coin.level = '建议';
        coin.buyScore = buyCheck.buyScore;
      } else {
        coin.level = '观察';
        coin.resonanceScore = resonance.totalScore;
      }

      if (coin.level === '观察') {
        document.getElementById('search-result').innerHTML = `
          <div class="empty-state">
            💡 这个币种目前不符合推荐标准<br/>
            共振分: ${resonance.totalScore.toFixed(0)}/100
          </div>
        `;
      } else {
        showDetail(symbol);
      }
    }

    async function loadData() {
      if (isLoading) return;

      isLoading = true;
      document.getElementById('refresh-dot').classList.add('loading');

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        if (!exchangeInfo || !ticker24h || !premiumIndex) throw new Error('数据获取失败');

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 250);

        oiMap = await fetchOpenInterest(symbols);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
        const mcapMap = {};
        gecko.forEach(x => {
          mcapMap[(x.symbol || '').toUpperCase() + 'USDT'] = x.market_cap;
        });

        allRows = { yao: [], buy: [] };
        allCoinsData = [];

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];
          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const oi = oiMap[symbol] || 0;
          const oiValue = oi * price;
          const mcap = mcapMap[symbol] || null;

          let volMcap = null;
          let oiMcap = null;
          if (mcap && mcap > 0) {
            volMcap = quoteVol / mcap * 100;
            oiMcap = oiValue / mcap * 100;
          }

          const row = {
            symbol, price, mcap, quoteVol, funding, priceChange,
            oi, oiValue, volMcap, oiMcap
          };

          allCoinsData.push(row);

          const yaoCheck = detectYaoCoinV2(row, previousData[symbol]);
          if (yaoCheck.isYao) {
            row.level = '妖币';
            row.riskLevel = yaoCheck.riskLevel;
            row.yaoScore = yaoCheck.yaoScore;
            row.signals = yaoCheck.signals;
            allRows.yao.push(row);
            continue;
          }

          const buyCheck = detectBuyCoinV2(row, previousData[symbol]);
          if (buyCheck.isBuy) {
            row.level = '建议';
            row.buyScore = buyCheck.buyScore;
            row.signals = buyCheck.signals;
            allRows.buy.push(row);
          }
        }

        allRows.yao.sort((a, b) => b.yaoScore - a.yaoScore);
        allRows.buy.sort((a, b) => b.buyScore - a.buyScore);

        const tempPrev = {};
        [...allRows.yao, ...allRows.buy].forEach(row => {
          tempPrev[row.symbol] = {
            price: row.price,
            oiMcap: row.oiMcap,
            funding: row.funding
          };
        });
        previousData = tempPrev;

        renderYaoList();
        renderBuyList();

        // 更新统计
        document.getElementById('stat-yao').innerText = allRows.yao.length;
        document.getElementById('stat-yao-futures').innerText = allRows.yao.length;
        document.getElementById('stat-yao-momentum').innerText = allRows.yao.filter(x => x.priceChange > -15).length;
        
        if (allRows.yao.length > 0) {
          const avgYaoScore = allRows.yao.reduce((s, x) => s + x.yaoScore, 0) / allRows.yao.length;
          document.getElementById('stat-yao-score').innerText = avgYaoScore.toFixed(1);
        }

        document.getElementById('stat-buy').innerText = allRows.buy.length;
        document.getElementById('stat-buy-spot').innerText = allRows.buy.filter(x => x.buyScore >= 85).length;
        document.getElementById('stat-high-quality').innerText = allRows.buy.filter(x => x.buyScore >= 85).length;
        
        if (allRows.buy.length > 0) {
          const avgBuyScore = allRows.buy.reduce((s, x) => s + x.buyScore, 0) / allRows.buy.length;
          document.getElementById('stat-buy-score').innerText = avgBuyScore.toFixed(1);
        }

        document.getElementById('last-update').innerText = '最后更新：' + new Date().toLocaleTimeString();

      } catch (e) {
        console.error(e);
      } finally {
        isLoading = false;
        document.getElementById('refresh-dot').classList.remove('loading');
      }
    }

    function startAutoRefresh() {
      let countdown = 60;
      
      loadData();

      autoRefreshInterval = setInterval(() => {
        countdown--;
        document.getElementById('refresh-countdown').innerText = countdown;

        if (countdown <= 0) {
          countdown = 60;
          loadData();
        }
      }, 1000);
    }

    startAutoRefresh();

    window.addEventListener('beforeunload', () => {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
      }
    });

    // 搜索框失焦隐藏
    document.getElementById('search-input').addEventListener('blur', () => {
      setTimeout(() => {
        document.getElementById('search-dropdown').classList.remove('active');
      }, 100);
    });

    // 点击外面关闭详细面板
    document.getElementById('detail-modal').addEventListener('click', (e) => {
      if (e.target.id === 'detail-modal') {
        closeDetail();
      }
    });
  </script>

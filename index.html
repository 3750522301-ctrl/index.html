<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>币安永续山寨币监控</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      color: #e5eefb;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .container { max-width: 1500px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: #10c4f5;
      margin-bottom: 20px;
      font-size: 36px;
    }
    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(16,196,245,.2);
    }
    .tab-btn {
      background: none;
      border: none;
      color: #8ca3ba;
      padding: 12px 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 14px;
    }
    .tab-btn.active {
      color: #10c4f5;
      border-bottom-color: #10c4f5;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .time-info {
      color: #8ca3ba;
      font-size: 13px;
    }
    button {
      background: #11b7e6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
    }
    button:hover { opacity: .9; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }
    .card {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 14px;
      padding: 16px;
    }
    .label {
      color: #8ca3ba;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .value {
      color: #10c4f5;
      font-weight: bold;
      font-size: 24px;
    }
    .table-wrap, .detail-box {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 16px;
      overflow: auto;
    }
    .status {
      text-align: center;
      color: #9db0c4;
      padding: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #0d1a2d;
      color: #c5d4e5;
    }
    tr:hover { background: rgba(255,255,255,.04); }
    .symbol {
      color: #10c4f5;
      font-weight: bold;
      cursor: pointer;
    }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .gray { color: #94a3b8; }
    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(16,196,245,.12);
      color: #10c4f5;
      font-size: 11px;
      margin-right: 5px;
      margin-bottom: 4px;
    }
    .stage-吸筹 { color: #f59e0b; }
    .stage-拉升 { color: #22c55e; }
    .stage-见顶 { color: #ef4444; }
    .stage-下跌 { color: #8b5cf6; }
    .stage-震荡 { color: #94a3b8; }
    .detail-box {
      padding: 20px;
    }
    .detail-title {
      font-size: 28px;
      color: #10c4f5;
      margin-bottom: 15px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
    }
    .detail-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(16,196,245,.12);
      border-radius: 12px;
      padding: 14px;
    }
    .detail-card h3 {
      color: #10c4f5;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .row:last-child { border-bottom: none; }
    .link-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .link-btn {
      display: inline-block;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(16,196,245,.12);
      color: #10c4f5;
      border: 1px solid rgba(16,196,245,.2);
      font-size: 13px;
    }
    @media (max-width: 1000px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ 币安永续山寨币监控 - 完整版</h1>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('list', this)">币种列表</button>
      <button class="tab-btn" onclick="switchTab('detail', this)">币种详情</button>
    </div>

    <div id="list" class="tab-content active">
      <div class="toolbar">
        <div class="time-info" id="last-update">最后更新：-</div>
        <button onclick="loadData()">手动刷新</button>
      </div>

      <div class="stats">
        <div class="card">
          <div class="label">监控币种数</div>
          <div class="value" id="stat-total">-</div>
        </div>
        <div class="card">
          <div class="label">高换手(Vol/Mcap>20%)</div>
          <div class="value" id="stat-vol">-</div>
        </div>
        <div class="card">
          <div class="label">多头拥挤(Funding>0.04%)</div>
          <div class="value" id="stat-long">-</div>
        </div>
        <div class="card">
          <div class="label">平均 Funding</div>
          <div class="value" id="stat-funding">-</div>
        </div>
      </div>

      <div class="table-wrap">
        <div id="status" class="status">加载中...</div>
        <table id="table" style="display:none;">
          <thead>
            <tr>
              <th>合约</th>
              <th>价格</th>
              <th>市值</th>
              <th>Vol/Mcap</th>
              <th>OI/Mcap</th>
              <th>Funding</th>
              <th>24h涨跌</th>
              <th>评分</th>
              <th>阶段</th>
              <th>标签</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="detail" class="tab-content">
      <div class="detail-box">
        <div id="detail-empty" class="status">请先在列表页点击一个币种</div>
        <div id="detail-content"></div>
      </div>
    </div>
  </div>

  <script>
    let allRows = [];
    let selectedRow = null;

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      if (el) el.classList.add('active');
    }

    function activateDetailTab() {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById('detail').classList.add('active');
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }

    function colorClass(v) {
      if (v === null || v === undefined || isNaN(v)) return 'gray';
      if (v > 0) return 'green';
      if (v < 0) return 'red';
      return 'gray';
    }

    function fmtNum(n, d = 2) {
      if (n === null || n === undefined || isNaN(n)) return '-';
      if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(2) + 'K';
      return Number(n).toFixed(d);
    }

    async function getJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('请求失败: ' + url);
      return await res.json();
    }

    function calcStage(row) {
      const oiMcap = row.oiMcap ?? 0;
      const volMcap = row.volMcap ?? 0;
      const funding = row.funding ?? 0;
      const priceChange = row.priceChange ?? 0;

      if (oiMcap > 5 && oiMcap < 15 && Math.abs(funding) < 0.02 && volMcap > 8) return '吸筹';
      if (oiMcap > 10 && funding > 0.01 && priceChange > 4) return '拉升';
      if (funding > 0.06 && oiMcap > 18 && volMcap > 20) return '见顶';
      if (funding < -0.02 && priceChange < -4) return '下跌';
      return '震荡';
    }

    function calcWhaleScore(row) {
      let s = 0;
      if ((row.oiMcap || 0) > 10) s += 30;
      if ((row.volMcap || 0) > 20) s += 25;
      if ((row.funding || 0) > 0.03) s += 20;
      if ((row.priceChange || 0) > 5) s += 15;
      return Math.min(100, s);
    }

    function calcBuyScore(row) {
      let score = 50;
      if (row.volMcap) score += Math.min(row.volMcap / 3, 15);
      if (row.oiMcap) score += Math.min(row.oiMcap / 2.5, 20);
      if (Math.abs(row.funding) < 0.03) score += 8;
      if (row.priceChange > 0 && row.priceChange < 12) score += 8;
      if (row.stage === '吸筹') score += 8;
      if (row.stage === '拉升') score += 5;
      if (row.stage === '见顶') score -= 18;
      if (row.stage === '下跌') score -= 10;
      return Math.max(0, Math.min(100, score));
    }

    function buildTags(row) {
      const tags = [];
      if ((row.volMcap || 0) > 20) tags.push('放量');
      if ((row.oiMcap || 0) > 10) tags.push('杠杆集中');
      if ((row.funding || 0) > 0.04) tags.push('多头拥挤');
      if ((row.funding || 0) < -0.04) tags.push('空头拥挤');
      if (row.stage === '吸筹') tags.push('疑似吸筹');
      if (row.stage === '见顶') tags.push('高位风险');
      return tags;
    }

    function showDetail(row) {
      selectedRow = row;
      document.getElementById('detail-empty').style.display = 'none';

      const coin = row.symbol.replace('USDT', '');
      const html = `
        <div class="detail-title">${row.symbol}</div>
        <div class="link-group">
          <a class="link-btn" target="_blank" href="https://www.binance.com/zh-CN/futures/${row.symbol}">币安交易</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/futures/${coin}">CoinGlass合约页</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/liq/${coin}">清算数据</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/unlock/${coin}">解锁数据</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/position/${coin}">持仓/浮盈</a>
          <a class="link-btn" target="_blank" href="https://dexscreener.com/search?q=${coin}">DEX Screener</a>
        </div>

        <div class="detail-grid">
          <div class="detail-card">
            <h3>基础数据</h3>
            <div class="row"><span>价格</span><span>$${fmtNum(row.price, 6)}</span></div>
            <div class="row"><span>市值</span><span>$${fmtNum(row.mcap, 2)}</span></div>
            <div class="row"><span>24h涨跌</span><span class="${colorClass(row.priceChange)}">${row.priceChange.toFixed(2)}%</span></div>
            <div class="row"><span>24h成交额</span><span>$${fmtNum(row.quoteVol, 2)}</span></div>
          </div>

          <div class="detail-card">
            <h3>合约数据</h3>
            <div class="row"><span>OI</span><span>${fmtNum(row.oi, 2)}</span></div>
            <div class="row"><span>OI价值</span><span>$${fmtNum(row.oiValue, 2)}</span></div>
            <div class="row"><span>OI/Mcap</span><span class="${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(2) + '%' : '-'}</span></div>
            <div class="row"><span>Vol/Mcap</span><span class="${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(2) + '%' : '-'}</span></div>
            <div class="row"><span>Funding</span><span class="${colorClass(row.funding)}">${row.funding.toFixed(4)}%</span></div>
          </div>

          <div class="detail-card">
            <h3>综合分析</h3>
            <div class="row"><span>阶段</span><span class="stage-${row.stage}">${row.stage}</span></div>
            <div class="row"><span>买入评分</span><span>${row.score.toFixed(1)}/100</span></div>
            <div class="row"><span>庄家活跃估算</span><span>${row.whaleScore}/100</span></div>
            <div class="row"><span>风险</span><span>${
              row.stage === '见顶' ? '高' :
              row.stage === '拉升' ? '中高' :
              row.stage === '吸筹' ? '较低' :
              row.stage === '下跌' ? '高' : '中'
            }</span></div>
          </div>
        </div>

        <div style="margin-top:16px;">
          ${row.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      `;
      document.getElementById('detail-content').innerHTML = html;
      activateDetailTab();
    }

    async function loadData() {
      const status = document.getElementById('status');
      const table = document.getElementById('table');
      const tbody = document.getElementById('tbody');

      status.style.display = 'block';
      status.innerText = '加载中...';
      table.style.display = 'none';
      tbody.innerHTML = '';

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 120);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));

        const mcapMap = {};
        gecko.forEach(x => {
          mcapMap[(x.symbol || '').toUpperCase() + 'USDT'] = x.market_cap;
        });

        const rows = [];

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];
          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const oi = parseFloat(p.openInterest || 0);
          const oiValue = oi * price;
          const mcap = mcapMap[symbol] || null;

          let volMcap = null;
          let oiMcap = null;
          if (mcap) {
            volMcap = quoteVol / mcap * 100;
            oiMcap = oiValue / mcap * 100;
          }

          const row = {
            symbol, price, mcap, quoteVol, funding, priceChange,
            oi, oiValue, volMcap, oiMcap
          };

          row.stage = calcStage(row);
          row.whaleScore = calcWhaleScore(row);
          row.score = calcBuyScore(row);
          row.tags = buildTags(row);

          rows.push(row);
        }

        rows.sort((a, b) => b.score - a.score);
        allRows = rows;

        document.getElementById('stat-total').innerText = rows.length;
        document.getElementById('stat-vol').innerText = rows.filter(x => (x.volMcap || 0) > 20).length;
        document.getElementById('stat-long').innerText = rows.filter(x => x.funding > 0.04).length;
        const avgFunding = rows.length ? rows.reduce((s, x) => s + x.funding, 0) / rows.length : 0;
        document.getElementById('stat-funding').innerText = avgFunding.toFixed(4) + '%';

        rows.slice(0, 100).forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="symbol">${row.symbol}</td>
            <td>$${fmtNum(row.price, 6)}</td>
            <td>$${fmtNum(row.mcap, 2)}</td>
            <td class="${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(2) + '%' : '-'}</td>
            <td class="${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(2) + '%' : '-'}</td>
            <td class="${colorClass(row.funding)}">${row.funding.toFixed(4)}%</td>
            <td class="${colorClass(row.priceChange)}">${row.priceChange.toFixed(2)}%</td>
            <td style="color:#10c4f5;font-weight:bold;">${row.score.toFixed(1)}</td>
            <td><span class="tag stage-${row.stage}">${row.stage}</span></td>
            <td>${row.tags.map(t => `<span class="tag">${t}</span>`).join('')}</td>
          `;
          tr.addEventListener('click', () => showDetail(row));
          tbody.appendChild(tr);
        });

        status.style.display = 'none';
        table.style.display = 'table';
        document.getElementById('last-update').innerText = '最后更新：' + new Date().toLocaleString();

      } catch (e) {
        console.error(e);
        status.style.display = 'block';
        status.innerText = '加载失败：' + e.message;
        table.style.display = 'none';
      }
    }

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>

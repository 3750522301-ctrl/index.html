<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>币安全品种启动点捕捉系统 v4.0</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0e27;
      --sub-bg: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --sub: #9ca3af;
      --cyan: #22d3ee;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --purple: #a855f7;
      --orange: #f97316;
      --splus: #ff1493;
      --s: #ff6b6b;
      --a: #ffa500;
      --b: #4169e1;
      --c: #808080;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
      color: var(--cyan);
    }

    .nav-tabs {
      display: flex;
      gap: 12px;
    }

    .nav-tab {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--sub);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .nav-tab.active {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .nav-tab:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .update-time {
      font-size: 12px;
      color: var(--sub);
    }

    .update-time-val {
      color: var(--cyan);
      font-weight: 700;
      font-size: 14px;
    }

    .scan-status {
      font-size: 12px;
      color: var(--yellow);
      font-weight: 700;
      padding: 4px 12px;
      background: rgba(234, 179, 8, 0.1);
      border-radius: 4px;
      border: 1px solid rgba(234, 179, 8, 0.3);
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
      font-size: 12px;
    }

    .btn:hover:not(.loading) {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn.primary {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .btn.primary:hover:not(.loading) {
      background: #06b6d4;
    }

    .btn.loading {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      position: relative;
    }

    .search-input {
      flex: 1;
      padding: 10px 12px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-size: 12px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--cyan);
    }

    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 80px;
      max-height: 300px;
      overflow-y: auto;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      z-index: 100;
      display: none;
    }

    .search-suggestions.active {
      display: block;
    }

    .suggestion-item {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .suggestion-item:hover {
      background: rgba(34, 211, 238, 0.1);
    }

    .suggestion-asset {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 4px;
    }

    .suggestion-pairs {
      font-size: 11px;
      color: var(--sub);
      line-height: 1.4;
    }

    .pair-badge {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(34, 211, 238, 0.2);
      border-radius: 3px;
      margin-right: 4px;
      margin-bottom: 2px;
      cursor: pointer;
    }

    .pair-badge:hover {
      background: rgba(34, 211, 238, 0.4);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      padding: 12px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 900;
      color: var(--cyan);
    }

    .grade-section {
      margin-bottom: 24px;
    }

    .grade-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      margin-bottom: 12px;
      border-left: 4px solid;
    }

    .grade-header.splus { border-left-color: var(--splus); }
    .grade-header.s { border-left-color: var(--s); }
    .grade-header.a { border-left-color: var(--a); }
    .grade-header.b { border-left-color: var(--b); }
    .grade-header.c { border-left-color: var(--c); }

    .grade-label {
      font-weight: 700;
      font-size: 14px;
      min-width: 60px;
    }

    .grade-label.splus { color: var(--splus); }
    .grade-label.s { color: var(--s); }
    .grade-label.a { color: var(--a); }
    .grade-label.b { color: var(--b); }
    .grade-label.c { color: var(--c); }

    .grade-count {
      color: var(--sub);
      font-size: 12px;
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .coin-card {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .coin-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(34, 211, 238, 0.15);
    }

    .coin-card.splus { border-color: rgba(255, 20, 147, 0.3); }
    .coin-card.splus:hover { border-color: var(--splus); box-shadow: 0 8px 24px rgba(255, 20, 147, 0.2); }

    .coin-card.s { border-color: rgba(255, 107, 107, 0.3); }
    .coin-card.s:hover { border-color: var(--s); box-shadow: 0 8px 24px rgba(255, 107, 107, 0.2); }

    .coin-card.a { border-color: rgba(255, 165, 0, 0.3); }
    .coin-card.a:hover { border-color: var(--a); box-shadow: 0 8px 24px rgba(255, 165, 0, 0.2); }

    .coin-card.b { border-color: rgba(65, 105, 225, 0.3); }
    .coin-card.b:hover { border-color: var(--b); box-shadow: 0 8px 24px rgba(65, 105, 225, 0.2); }

    .coin-card.c { border-color: rgba(128, 128, 128, 0.3); }
    .coin-card.c:hover { border-color: var(--c); box-shadow: 0 8px 24px rgba(128, 128, 128, 0.2); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .coin-info {
      flex: 1;
    }

    .coin-name {
      font-weight: 700;
      color: var(--cyan);
      font-size: 16px;
    }

    .coin-price {
      font-size: 12px;
      color: var(--sub);
      margin-top: 2px;
    }

    .price-change {
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }

    .price-change.up { color: var(--green); }
    .price-change.down { color: var(--red); }

    .grade-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      margin-right: 6px;
    }

    .grade-badge.splus { background: rgba(255, 20, 147, 0.2); color: var(--splus); }
    .grade-badge.s { background: rgba(255, 107, 107, 0.2); color: var(--s); }
    .grade-badge.a { background: rgba(255, 165, 0, 0.2); color: var(--a); }
    .grade-badge.b { background: rgba(65, 105, 225, 0.2); color: var(--b); }
    .grade-badge.c { background: rgba(128, 128, 128, 0.2); color: var(--c); }

    .recommend-section {
      background: rgba(0, 0, 0, 0.2);
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 11px;
      line-height: 1.6;
    }

    .recommend-label {
      color: var(--sub);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .recommend-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      color: var(--text);
    }

    .recommend-type {
      background: rgba(34, 211, 238, 0.2);
      padding: 2px 6px;
      border-radius: 3px;
      color: var(--cyan);
    }

    .recommend-value {
      font-weight: 700;
      color: var(--yellow);
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 10px;
      padding: 4px 8px;
      background: rgba(34, 211, 238, 0.2);
      border: 1px solid rgba(34, 211, 238, 0.4);
      border-radius: 4px;
      color: var(--cyan);
      white-space: nowrap;
    }

    .tag.risk-high { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: #fca5a5; }
    .tag.risk-mid { background: rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.4); color: #fcd34d; }
    .tag.risk-low { background: rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.4); color: #86efac; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }

    .metric {
      background: rgba(0, 0, 0, 0.3);
      padding: 6px;
      border-radius: 4px;
      text-align: center;
    }

    .metric-label {
      font-size: 9px;
      color: var(--sub);
      margin-bottom: 2px;
    }

    .metric-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }

    .metric-value.up { color: var(--green); }
    .metric-value.down { color: var(--red); }

    .quick-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .quick-link {
      flex: 1;
      min-width: 60px;
      padding: 6px;
      background: rgba(34, 211, 238, 0.15);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 4px;
      font-size: 9px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .quick-link:hover {
      background: rgba(34, 211, 238, 0.3);
      border-color: var(--cyan);
    }

    .detail-page {
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back-btn {
      padding: 8px 16px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 20px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .back-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .detail-metric {
      background: var(--sub-bg);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .detail-metric-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .detail-metric-value {
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
    }

    .detail-metric-value.up { color: var(--green); }
    .detail-metric-value.down { color: var(--red); }

    .timeframe-analysis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .tf-analysis {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .tf-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 8px;
      font-size: 12px;
    }

    .tf-content {
      font-size: 11px;
      line-height: 1.8;
      color: var(--sub);
    }

    .tf-content strong {
      color: var(--text);
    }

    .quick-channel-section {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .quick-channel-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
      font-size: 13px;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    @media (max-width: 768px) {
      .channel-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .channel-hint {
      margin-top: 12px;
      padding: 8px;
      background: rgba(34, 211, 238, 0.1);
      border-radius: 6px;
      font-size: 11px;
      color: var(--sub);
      line-height: 1.5;
    }

    .error-box {
      padding: 30px;
      text-align: center;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      color: #fca5a5;
      margin: 20px 0;
      font-size: 13px;
      line-height: 1.8;
    }

    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 16px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      z-index: 1000;
      animation: slideIn 0.3s;
      max-width: 300px;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
      }
      to {
        transform: translateX(0);
      }
    }

    .notification.success {
      border-color: rgba(34, 197, 94, 0.5);
      background: rgba(34, 197, 94, 0.1);
      color: #86efac;
    }

    .notification.error {
      border-color: rgba(239, 68, 68, 0.5);
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
    }

    .notification.info {
      border-color: rgba(34, 211, 238, 0.5);
      background: rgba(34, 211, 238, 0.1);
      color: #22d3ee;
    }

    .derivatives-panel {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .panel-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
      font-size: 13px;
    }

    .crowding-risk-high {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .crowding-risk-mid {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .crowding-risk-low {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.3);
    }

    @media (max-width: 768px) {
      .container { padding: 12px; }
      .header { flex-direction: column; align-items: stretch; }
      .header-left, .header-right { flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .detail-metrics { grid-template-columns: repeat(2, 1fr); }
      .timeframe-analysis { grid-template-columns: 1fr; }
      .channel-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .loading-spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .scanning-info {
      padding: 12px;
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid rgba(234, 179, 8, 0.3);
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    .scanning-progress {
      height: 4px;
      background: rgba(34, 211, 238, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .scanning-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo">🚀 启动点捕捉 v4.0</div>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchPage('monitor', this)">📊 监控</button>
          <button class="nav-tab" onclick="switchPage('search', this)">🔍 搜索</button>
        </div>
      </div>
      <div class="header-right">
        <div class="update-time">最后更新: <span class="update-time-val" id="update-time">--:--</span></div>
        <div id="scan-status" class="scan-status" style="display: none;"></div>
        <button class="btn primary" id="manual-refresh-btn" onclick="manualRefresh()"><span id="refresh-icon">🔄</span> 手动扫描</button>
      </div>
    </div>

    <div id="monitor" class="page active">
      <div id="scanning-status" class="scanning-info" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <span id="scanning-text">正在扫描币种...</span>
          <span id="scanning-progress-text">0/500</span>
        </div>
        <div class="scanning-progress">
          <div class="scanning-progress-bar" id="scanning-progress-bar"></div>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">S+ 级</div>
          <div class="stat-value" id="grade-splus-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">S 级</div>
          <div class="stat-value" id="grade-s-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">A 级</div>
          <div class="stat-value" id="grade-a-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">B 级</div>
          <div class="stat-value" id="grade-b-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">C 级</div>
          <div class="stat-value" id="grade-c-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">已分析币种</div>
          <div class="stat-value" id="analyzed-count">0</div>
        </div>
      </div>

      <div id="monitor-content">
        <div class="error-box">⏳ 正在加载数据...</div>
      </div>
    </div>

    <div id="search" class="page">
      <div class="search-box">
        <input type="text" id="search-input" class="search-input" placeholder="输入币种代码或名称（如 PEPE、BTC、SOL）" onkeyup="showSearchSuggestions()" />
        <button class="btn primary" id="search-btn" onclick="searchCoin()">🔍 搜索</button>
        <div id="search-suggestions" class="search-suggestions"></div>
      </div>
      <div id="search-content">
        <div class="error-box">输入币种名称开始搜索</div>
      </div>
    </div>

    <div id="detail" class="page">
      <div id="detail-content">
        <div class="error-box">⏳ 加载中...</div>
      </div>
    </div>
  </div>

  <script>
    // ============ 全局配置 ============
    const CONFIG = {
      refreshMs: 300000,
      binanceUrl: 'https://api.binance.com/api/v3',
      futuresUrl: 'https://fapi.binance.com/fapi/v1',
      futuresDataUrl: 'https://fapi.binance.com/futures/data',
      coingeckoApi: 'https://api.coingecko.com/api/v3',
      concurrentLimit: 4,
      requestTimeout: 12000,
      maxCoinsToMonitor: 300,
      quickScanMode: true,

      const absNum = Math.abs(num);
      if (absNum >= 1e9) return (num / 1e9).toFixed(decimals) + 'B';
      if (absNum >= 1e6) return (num / 1e6).toFixed(decimals) + 'M';
      if (absNum >= 1e3) return (num / 1e3).toFixed(decimals) + 'K';
      return num.toFixed(decimals);
    }

      const sign = num > 0 ? '+' : '';

    // ============ HTTP 请求函数 ============
    async function fetchJSON(url, options = {}) {
      const timeout = options.timeout || CONFIG.requestTimeout;
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);

      try {
        const response = await fetch(url, {
          ...options,
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        return await response.json();
      } catch (error) {
        clearTimeout(timeoutId);
        throw error;
      }
    }

    // ============ 并发控制 ============
    async function runWithConcurrencyLimit(tasks, limit) {
      const results = new Array(tasks.length);
      const executing = [];

      for (let i = 0; i < tasks.length; i++) {
        const task = tasks[i];

        const promise = Promise.resolve()
          .then(() => task())
          .then(result => {
            results[i] = result;
          })
          .catch(err => {
            console.warn(`Task ${i} failed:`, err.message);
            results[i] = null;
          })
          .finally(() => {
            const index = executing.indexOf(promise);
            if (index > -1) executing.splice(index, 1);
          });

        executing.push(promise);

        if (executing.length >= limit) {
          await Promise.race(executing);
        }
      }

      await Promise.all(executing);
      return results;
    }

    // ============ 技术指标计算 ============
    function calcRSI(prices, period = 14) {
      if (prices.length < period + 1) return 50;
      const gains = [];
      const losses = [];

      for (let i = 1; i < prices.length; i++) {
        const diff = prices[i] - prices[i - 1];
        if (diff > 0) {
          gains.push(diff);
          losses.push(0);
        } else {
          gains.push(0);
          losses.push(Math.abs(diff));
        }
      }

      const avgGain = gains.slice(-period).reduce((a, b) => a + b, 0) / period;
      const avgLoss = losses.slice(-period).reduce((a, b) => a + b, 0) / period;

      if (avgLoss === 0) return avgGain === 0 ? 50 : 100;
      const rs = avgGain / avgLoss;
      const rsi = 100 - (100 / (1 + rs));
      return Math.max(0, Math.min(100, rsi));
    }

    function calcMACD(prices, fastPeriod = 12, slowPeriod = 26, signalPeriod = 9) {
      if (prices.length < slowPeriod) return { macd: 0, signal: 0, histogram: 0 };

      const emaFast = calcEMA(prices, fastPeriod);
      const emaSlow = calcEMA(prices, slowPeriod);
      const macd = emaFast - emaSlow;

      const macdLine = [];
      for (let i = 0; i < prices.length; i++) {
        const f = calcEMA(prices.slice(0, i + 1), fastPeriod);
        const s = calcEMA(prices.slice(0, i + 1), slowPeriod);
        macdLine.push(f - s);
      }

      const signal = calcEMA(macdLine, signalPeriod);
      const histogram = macd - signal;

      return { macd, signal, histogram };
    }

    function calcEMA(prices, period) {
      if (prices.length === 0) return 0;
      if (prices.length < period) return prices[prices.length - 1];

      let sma = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
      const multiplier = 2 / (period + 1);

      for (let i = period; i < prices.length; i++) {
        sma = (prices[i] - sma) * multiplier + sma;
      }

      return sma;
    }

    function calcCVD(volumes, buyPressure) {
      if (volumes.length === 0) return { trend: 'neutral', value: 0 };
      const cvdValue = volumes.reduce((sum, v) => sum + v * (buyPressure ? 1 : -1), 0);
      return {
        trend: cvdValue > 0 ? 'up' : cvdValue < 0 ? 'down' : 'neutral',
        value: cvdValue
      };
    }

    // ============ 拥挤度风险计算 ============
    function calculateCrowdingRisk(longShortRatio, oiMcapRatio, rsi, direction) {
      let score = 50;
      let reasons = [];
      let level = 'low';
      let side = null;

      if (longShortRatio > 2) {
        score += 20;
        reasons.push('多头严重拥挤');
        side = 'long_crowded';
      } else if (longShortRatio > 1.5) {
        score += 10;
        reasons.push('多头拥挤');
        side = 'long_crowded';
      }

      if (longShortRatio < 0.5) {
        score += 20;
        reasons.push('空头严重拥挤');
        side = 'short_crowded';
      } else if (longShortRatio < 0.8) {
        score += 10;
        reasons.push('空头拥挤');
        side = 'short_crowded';
      }

      if (oiMcapRatio > 50) {
        score += 15;
        reasons.push('OI/MCAP 极高（> 50%）');
      } else if (oiMcapRatio > 30) {
        score += 10;
        reasons.push('OI/MCAP 较高（> 30%）');
      }

      if (rsi > 85 || rsi < 15) {
        score += 15;
        reasons.push('RSI 极端水平');
      }

      if (direction === 'up' && longShortRatio > 1.8) {
        score += 10;
        reasons.push('上升中多头过度拥挤');
      }
      if (direction === 'down' && longShortRatio < 0.6) {
        score += 10;
        reasons.push('下跌中空头过度拥挤');
      }

      if (score >= 80) {
        level = 'high';
      } else if (score >= 60) {
        level = 'mid';
      } else {
        level = 'low';
      }

      return {
        score: Math.min(100, score),
        level,
        side,
        reasons
      };
    }

        if (macd1h.histogram > 0) longReasons.push('1小时 MACD 正向');
        if (cvd1h.trend === 'up') longReasons.push('1小时 CVD 上升');
        if (change1h > 1) longReasons.push('1小时 涨幅 > 1%');

        if (rsi5m > 70) shortReasons.push('5分钟 RSI 超买');
        if (rsi1h > 70) shortReasons.push('1小时 RSI 超买');
        if (macd1h.histogram < 0) shortReasons.push('1小时 MACD 负向');
        if (cvd1h.trend === 'down') shortReasons.push('1小时 CVD 下降');
        if (change1h < -1) shortReasons.push('1小时 跌幅 > 1%');

        return {
          symbol,
          price,
          change24h,
          marketCap,
          rsi5m,
          rsi1h,
          rsi4h,
          rsi1d,
          macd1h,
          macd4h,
          cvd5m,
          cvd1h,
          change5m,
          change1h,
          change4h,
          change1d,
          mainDirection,
          phase5m,
          phase1h,
          phase4h,
          phase1d,
          buySignalCount,
          sellSignalCount,
          totalSignal,
          grade,
          gradeScore,
          openInterest: futuresData.openInterest,
          fundingRate: futuresData.fundingRate,
          globalLongShortRatio: futuresData.globalLongShortRatio,
          oiMcapRatio,
          crowdingRisk,
          longReasons,
          shortReasons,
          recommendType,
          recommendLeverage,
          recommendPosition,
          timestamp: Date.now()
        };
      } catch (e) {
        console.error(`分析 ${symbol} 失败:`, e.message);
        return null;
      }
    }

    // ============ 两阶段扫描流程 ============
    async function twoPhaseFullRefresh() {
      if (isRefreshing) {
        showNotification('⏳ 扫描进行中，请稍候...', 'info');
        return;
      }

      isRefreshing = true;
      const refreshBtn = document.getElementById('manual-refresh-btn');
      refreshBtn.disabled = true;

      const icon = document.getElementById('refresh-icon');
      icon.classList.add('loading-spinner');

      const statusDiv = document.getElementById('scanning-status');
      statusDiv.style.display = 'block';

      try {
        console.log('开始第一阶段：快速扫描...');
        document.getElementById('scanning-text').textContent = '第一阶段：快速扫描所有币种...';

        const quickTasks = allSymbols.map(symbol => () => quickScanCoin(symbol));
        const quickResults = await runWithConcurrencyLimit(quickTasks, CONFIG.concurrentLimit);

        const passedCoins = [];
        quickResults.forEach((result, index) => {
          if (result) {
            passedCoins.push({ symbol: allSymbols[index], quickData: result });
          }
          const progress = ((index + 1) / allSymbols.length) * 50;
          document.getElementById('scanning-progress-bar').style.width = progress + '%';
          document.getElementById('scanning-progress-text').textContent = `${index + 1}/${allSymbols.length}`;
        });

        console.log(`快速扫描完成：${passedCoins.length}/${allSymbols.length} 币种通过筛选`);
        showNotification(`✅ 快速扫描完成：${passedCoins.length} 个币种待分析`, 'success');

        console.log('开始第二阶段：完整分析...');
        document.getElementById('scanning-text').textContent = '第二阶段：完整分析筛选币种...';

        const fullTasks = passedCoins.map(coin => () => analyzeCoin(coin.symbol, coin.quickData));
        const fullResults = await runWithConcurrencyLimit(fullTasks, CONFIG.concurrentLimit);

        let analyzedCount = 0;
        fullResults.forEach((result, index) => {
          if (result) {
            allCoins[passedCoins[index].symbol] = result;
            analyzedCount++;
          }
          const progress = 50 + ((index + 1) / passedCoins.length) * 50;
          document.getElementById('scanning-progress-bar').style.width = progress + '%';
          document.getElementById('scanning-progress-text').textContent = `${passedCoins[index].symbol}`;
        });

        if (currentPage === 'monitor') {
          renderMonitorContent();
        }

        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        document.getElementById('update-time').textContent = timeStr;

        showNotification(`✅ 扫描完成！已分析 ${analyzedCount} 个币种`, 'success');
        console.log(`最终完成：分析了 ${analyzedCount} 个币种`);
      } catch (e) {
        showNotification(`❌ 扫描失败: ${e.message}`, 'error');
        console.error('扫描错误:', e);
      } finally {
        isRefreshing = false;
        refreshBtn.disabled = false;
        icon.classList.remove('loading-spinner');
        statusDiv.style.display = 'none';
      }
    }

    // ============ 手动刷新 ============
    function manualRefresh() {
      twoPhaseFullRefresh();
    }

    // ============ 渲染监控内容 ============
    function renderMonitorContent() {
      const grades = { splus: [], s: [], a: [], b: [], c: [] };

      Object.values(allCoins).forEach(coin => {
        if (!coin) return;
        if (grades[coin.grade]) {
          grades[coin.grade].push(coin);
        }
      });

      Object.keys(grades).forEach(grade => {
        grades[grade].sort((a, b) => {
          const scoreA = Math.abs(a.totalSignal);
          const scoreB = Math.abs(b.totalSignal);
          return scoreB - scoreA;
        });
      });

      document.getElementById('grade-splus-count').textContent = grades.splus.length;
      document.getElementById('grade-s-count').textContent = grades.s.length;
      document.getElementById('grade-a-count').textContent = grades.a.length;
      document.getElementById('grade-b-count').textContent = grades.b.length;
      document.getElementById('grade-c-count').textContent = grades.c.length;
      document.getElementById('analyzed-count').textContent = Object.keys(allCoins).length;

      let html = '';

      const gradeConfigs = [
        { key: 'splus', label: 'S+', color: 'splus' },
        { key: 's', label: 'S', color: 's' },
        { key: 'a', label: 'A', color: 'a' },
        { key: 'b', label: 'B', color: 'b' },
        { key: 'c', label: 'C', color: 'c' }
      ];

      gradeConfigs.forEach(config => {
        const coins = grades[config.key];
        if (coins.length === 0) return;

        html += `
          <div class="grade-section">
            <div class="grade-header ${config.color}">
              <div class="grade-label ${config.color}">${config.label} 级</div>
              <div class="grade-count">${coins.length} 个币种</div>
            </div>
            <div class="grid">
              ${coins.map(coin => renderCoinCard(coin)).join('')}
            </div>
          </div>
        `;
      });

      document.getElementById('monitor-content').innerHTML = html;
    }

    // ============ 搜索功能 ============
    async function showSearchSuggestions() {
      const input = document.getElementById('search-input');
      const query = input.value.trim().toUpperCase();

      if (query.length < 1) {
        document.getElementById('search-suggestions').classList.remove('active');
        return;
      }

      const suggestions = document.getElementById('search-suggestions');
      const matching = Object.values(binanceAssets).filter(asset =>
        asset.asset.includes(query)
      ).slice(0, 10);

      if (matching.length === 0) {
        suggestions.innerHTML = '<div class="suggestion-item">未找到匹配的资产</div>';
      } else {
        suggestions.innerHTML = matching.map(asset => `
          <div class="suggestion-item" onclick="searchCoinBySymbol('${asset.asset}')">
            <div class="suggestion-asset">${asset.asset}</div>
            <div class="suggestion-pairs">
              ${asset.spot.length > 0 ? `<span class="pair-badge">${asset.asset}USDT (现货)</span>` : ''}
              ${asset.futures.length > 0 ? `<span class="pair-badge">${asset.asset}USDT (合约)</span>` : ''}
            </div>
          </div>
        `).join('');
      }

      suggestions.classList.add('active');
    }

    async function searchCoin() {
      const rawQuery = document.getElementById('search-input').value.trim().toUpperCase();
      if (!rawQuery) return;

      const query = rawQuery.endsWith('USDT') ? rawQuery.replace('USDT', '') : rawQuery;

      switchPage('search');
      document.getElementById('search-content').innerHTML = '<div class="error-box">⏳ 搜索中...</div>';

      const assetInfo = binanceAssets[query];
      if (!assetInfo) {
        document.getElementById('search-content').innerHTML = `
          <div class="error-box">
            未找到 ${query} 的交易对<br>
            请检查币种代码是否正确
          </div>
        `;
        return;
      }

      try {
        const coinData = await analyzeCoinForSearch(query);

        if (!coinData) {
          document.getElementById('search-content').innerHTML = `
            <div class="error-box">
              ${query} 存在于币安，但当前数据获取失败<br>
              可能原因：接口限流 / 扫描中占用 / 临时超时<br><br>
              建议：<br>
              1. 等 3~5 秒再搜一次<br>
              2. 先停止大批量扫描再搜索<br>
              3. 点击手动扫描后稍等一会
            </div>
          `;
          return;
        }

        allCoins[query] = coinData;
        document.getElementById('search-content').innerHTML = `
          <button class="back-btn" onclick="switchPage('monitor')">← 返回监控</button>
          ${renderCoinCard(coinData)}
        `;

        setTimeout(() => showDetail(query), 200);
      } catch (e) {
        console.error('搜索失败:', e);
        document.getElementById('search-content').innerHTML = `
          <div class="error-box">
            搜索 ${query} 失败：${e.message}
          </div>
        `;
      }
    }

      document.getElementById('search-input').value = symbol;

            <div class="tf-analysis">
              <div class="tf-title">4小时</div>
              <div class="tf-content">
                <strong>相位:</strong> ${coin.phase4h === 'overbought' ? '超买' : coin.phase4h === 'oversold' ? '超卖' : '常规'}<br>
                <strong>涨幅:</strong> ${fmtPct(coin.change4h)}<br>
                <strong>RSI:</strong> ${coin.rsi4h.toFixed(0)}<br>
                <strong>MACD:</strong> ${coin.macd4h.histogram > 0 ? '✅ 正' : '❌ 负'}
              </div>
            </div>
            <div class="tf-analysis">
              <div class="tf-title">日线</div>
              <div class="tf-content">
                <strong>相位:</strong> ${coin.phase1d === 'overbought' ? '超买' : coin.phase1d === 'oversold' ? '超卖' : '常规'}<br>
                <strong>涨幅:</strong> ${fmtPct(coin.change1d)}<br>
                <strong>RSI:</strong> ${coin.rsi1d.toFixed(0)}<br>
                <strong>主方向:</strong> ${coin.mainDirection === 'up' ? '⬆️ 上升' : '⬇️ 下降'}
              </div>
            </div>
          </div>
        </div>

        <div class="quick-channel-section">
          <div class="quick-channel-title">🔗 快捷通道</div>
          <div class="channel-grid">
            <button class="btn primary" onclick="openLink(getChartLink('${coin.symbol}'))">📈 TradingView</button>
            <button class="btn primary" onclick="openLink('https://www.binance.com/trade/${coin.symbol}_USDT')">💰 币安现货</button>
            <button class="btn primary" onclick="openLink('https://www.binance.com/futures/${coin.symbol}USDT')">⚡ 币安合约</button>
            <button class="btn primary" onclick="openLink(getCoinGlassLink('${coin.symbol}'))">📊 CoinGlass</button>
            <button class="btn primary" onclick="openLink(getLiquidationMapLink('${coin.symbol}'))">💥 清算地图</button>
            <button class="btn primary" onclick="openLink(getDexScreenerLink('${coin.symbol}'))">🔍 DexScreener</button>
            <button class="btn primary" onclick="openLink(getCoinGeckoLink('${coin.symbol}'))">🪙 CoinGecko</button>
            <button class="btn primary" onclick="openLink(getWhaleAlertLink('${coin.symbol}'))">🐋 鲸鱼警报</button>
          </div>
          <div class="channel-hint">
            💡 提示: 点击任何按钮在新标签页打开相应工具。根据推荐的现货/合约和杠杆选择交易方式。
          </div>
        </div>
      `;

      document.getElementById('detail-content').innerHTML = html;
    }

    // ============ 定期自动扫描 ============
    function startAutoRefresh() {
      setTimeout(() => {
        twoPhaseFullRefresh();
      }, 1000);

      setInterval(() => {
        console.log('定时自动扫描...');
        twoPhaseFullRefresh();
      }, CONFIG.refreshMs);
    }

    // ============ 缓存清理机制 ============
    function clearOldCache() {
      const now = Date.now();
      const maxAge = 3600000;

      Object.keys(klineCache).forEach(key => {
        if (now - klineCache[key].time > maxAge) {
          delete klineCache[key];
        }
      });

      Object.keys(marketCapCache).forEach(key => {
        if (now - marketCapCache[key].time > maxAge) {
          delete marketCapCache[key];
        }
      });
    }

    setInterval(clearOldCache, 1800000);

    // ============ 初始化 ============
    async function init() {
      try {
        showNotification('🔄 正在加载币安全部交易对...', 'info');
        await loadExchangeInfo();

        showNotification(`✅ 已加载 ${allSymbols.length} 个币种，准备开始扫描...`, 'success');

        startAutoRefresh();

        showNotification('✨ 系统已就绪，开始两阶段扫描', 'success');
      } catch (e) {
        showNotification(`❌ 初始化失败: ${e.message}`, 'error');
        console.error('初始化错误:', e);
      }
    }

    window.addEventListener('load', init);

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        console.log('标签页激活');
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            searchCoin();
          }
        });
      }
    });

    // ============ 页面卸载时清理 ============
    window.addEventListener('beforeunload', () => {
      console.log('页面即将关闭，清理资源...');
      klineCache = {};
      marketCapCache = {};
    });

    // ============ 错误处理 ============
    window.addEventListener('error', (event) => {
      console.error('全局错误:', event.error);
    });

    window.addEventListener('unhandledrejection', (event) => {
      console.error('未处理的 Promise 拒绝:', event.reason);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>币安永续山寨币监控 - 优化版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      color: #e5eefb;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .container { max-width: 1500px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: #10c4f5;
      margin-bottom: 20px;
      font-size: 36px;
    }
    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(16,196,245,.2);
    }
    .tab-btn {
      background: none;
      border: none;
      color: #8ca3ba;
      padding: 12px 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 14px;
    }
    .tab-btn.active {
      color: #10c4f5;
      border-bottom-color: #10c4f5;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .time-info {
      color: #8ca3ba;
      font-size: 13px;
    }
    button {
      background: #11b7e6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { opacity: .9; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }
    .card {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 14px;
      padding: 16px;
    }
    .label {
      color: #8ca3ba;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .value {
      color: #10c4f5;
      font-weight: bold;
      font-size: 24px;
    }
    .table-wrap, .detail-box {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 16px;
      overflow: auto;
    }
    .status {
      text-align: center;
      color: #9db0c4;
      padding: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #0d1a2d;
      color: #c5d4e5;
      font-size: 12px;
    }
    tr:hover { background: rgba(255,255,255,.04); }
    .symbol {
      color: #10c4f5;
      font-weight: bold;
      cursor: pointer;
    }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .gray { color: #94a3b8; }

    /* 风险标签颜色 */
    .risk-极高 { background: rgba(239, 68, 68, .2); color: #fca5a5; }
    .risk-较高 { background: rgba(245, 158, 11, .2); color: #fcd34d; }
    .risk-平衡 { background: rgba(34, 197, 94, .2); color: #86efac; }
    .risk-可介入 { background: rgba(34, 197, 94, .2); color: #86efac; }
    .risk-非常好 { background: rgba(34, 197, 94, .2); color: #86efac; }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      margin-right: 6px;
      margin-bottom: 5px;
      border: 1px solid;
    }

    /* 阶段标签 */
    .stage-震荡吸筹 { background: rgba(245, 158, 11, .2); color: #fcd34d; border-color: #f59e0b; }
    .stage-突破 { background: rgba(34, 197, 94, .2); color: #86efac; border-color: #22c55e; }
    .stage-回调扫损 { background: rgba(139, 92, 246, .2); color: #c4b5fd; border-color: #8b5cf6; }
    .stage-见顶 { background: rgba(239, 68, 68, .2); color: #fca5a5; border-color: #ef4444; }
    .stage-缓升 { background: rgba(34, 197, 94, .15); color: #86efac; border-color: #22c55e; }
    .stage-缓跌 { background: rgba(156, 163, 175, .2); color: #d1d5db; border-color: #9ca3af; }
    .stage-回弹扫损 { background: rgba(139, 92, 246, .2); color: #c4b5fd; border-color: #8b5cf6; }
    .stage-砸盘出货 { background: rgba(239, 68, 68, .2); color: #fca5a5; border-color: #ef4444; }
    .stage-二波浪小幅 { background: rgba(59, 130, 246, .2); color: #93c5fd; border-color: #3b82f6; }
    .stage-二波浪反弹 { background: rgba(99, 102, 241, .2); color: #a5b4fc; border-color: #6366f1; }
    .stage-二波浪确认 { background: rgba(139, 92, 246, .2); color: #c4b5fd; border-color: #8b5cf6; }

    .detail-box {
      padding: 20px;
    }
    .detail-title {
      font-size: 28px;
      color: #10c4f5;
      margin-bottom: 15px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
    }
    .detail-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(16,196,245,.12);
      border-radius: 12px;
      padding: 14px;
    }
    .detail-card h3 {
      color: #10c4f5;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: 13px;
    }
    .row:last-child { border-bottom: none; }
    .row-label { color: #8ca3ba; }
    .row-value { color: #e5eefb; font-weight: bold; }

    .link-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .link-btn {
      display: inline-block;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(16,196,245,.12);
      color: #10c4f5;
      border: 1px solid rgba(16,196,245,.2);
      font-size: 12px;
      cursor: pointer;
    }
    .link-btn:hover { background: rgba(16,196,245,.2); }

    .tags-container {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 1000px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      table { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ 币安永续山寨币监控 - 优化版</h1>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('list', this)">币种列表</button>
      <button class="tab-btn" onclick="switchTab('detail', this)">币种详情</button>
    </div>

    <div id="list" class="tab-content active">
      <div class="toolbar">
        <div class="time-info" id="last-update">最后更新：-</div>
        <button onclick="loadData()">手动刷新</button>
      </div>

      <div class="stats">
        <div class="card">
          <div class="label">监控币种数</div>
          <div class="value" id="stat-total">-</div>
        </div>
        <div class="card">
          <div class="label">非常好/可介入</div>
          <div class="value" id="stat-good">-</div>
        </div>
        <div class="card">
          <div class="label">高风险币种</div>
          <div class="value" id="stat-risk">-</div>
        </div>
        <div class="card">
          <div class="label">平均 Funding</div>
          <div class="value" id="stat-funding">-</div>
        </div>
      </div>

      <div class="table-wrap">
        <div id="status" class="status">加载中...</div>
        <table id="table" style="display:none;">
          <thead>
            <tr>
              <th>合约</th>
              <th>价格</th>
              <th>市值</th>
              <th>Vol/Mcap</th>
              <th>OI/Mcap</th>
              <th>Funding</th>
              <th>24h%</th>
              <th>阶段</th>
              <th>风险评级</th>
              <th>多空</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="detail" class="tab-content">
      <div class="detail-box">
        <div id="detail-empty" class="status">请先在列表页点击一个币种</div>
        <div id="detail-content"></div>
      </div>
    </div>
  </div>

  <script>
    let allRows = [];
    let selectedRow = null;

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      if (el) el.classList.add('active');
    }

    function activateDetailTab() {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById('detail').classList.add('active');
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }

    function colorClass(v) {
      if (v === null || v === undefined || isNaN(v)) return 'gray';
      if (v > 0) return 'green';
      if (v < 0) return 'red';
      return 'gray';
    }

    function fmtNum(n, d = 2) {
      if (n === null || n === undefined || isNaN(n)) return '-';
      if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(2) + 'K';
      return Number(n).toFixed(d);
    }

    async function getJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('请求失败');
      return await res.json();
    }

    // 核心：计算阶段（细分版）
    function calcStage(row) {
      const oi = row.oiMcap || 0;
      const vol = row.volMcap || 0;
      const fund = row.funding || 0;
      const price = row.priceChange || 0;

      // 见顶：Funding极高，OI极高，成交量巨大，价格已涨幅大
      if (fund > 0.08 && oi > 20 && vol > 30 && price > 15) {
        return '见顶';
      }

      // 砸盘出货：价格急跌，OI快速下降，Funding转负或变小，成交量大
      if (price < -10 && oi > 8 && vol > 15 && fund < 0.02) {
        return '砸盘出货';
      }

      // 二波浪 - 确认（OI持续高，Funding仍正，但price停滞或微跌）
      if (oi > 15 && fund > 0.03 && price > -5 && price < 3) {
        return '二波浪确认';
      }

      // 二波浪 - 反弹（从低点反弹，OI开始增长，Funding转正）
      if (oi > 8 && oi <= 15 && fund > 0.01 && fund < 0.05 && price > 0 && price <= 10) {
        return '二波浪反弹';
      }

      // 二波浪 - 小幅（低位震荡，OI略升，Funding接近0）
      if (oi > 3 && oi <= 8 && Math.abs(fund) < 0.015 && price > -5 && price < 5) {
        return '二波浪小幅';
      }

      // 突破：OI快速增长，Funding转正且持续升高，价格快速上升
      if (oi > 10 && oi <= 18 && fund > 0.04 && fund < 0.08 && price > 8 && price < 18) {
        return '突破';
      }

      // 回弹扫损：价格反弹，OI增加，Funding持续正值但不极端，回升较快
      if (price > 3 && price < 12 && oi > 5 && oi <= 12 && fund > 0.015 && fund < 0.045) {
        return '回弹扫损';
      }

      // 回调扫损：价格小幅回调，OI略降但未崩，Funding从正变小或转负，成交量中等
      if (price > -8 && price < 0 && oi > 5 && oi < 15 && fund > -0.02 && fund < 0.015 && vol > 8) {
        return '回调扫损';
      }

      // 缓升：OI稳定，Funding小正，价格缓慢上升，成交量温和
      if (oi > 6 && oi < 12 && fund > 0 && fund <= 0.015 && price > 0 && price <= 5 && vol < 18) {
        return '缓升';
      }

      // 缓跌：OI略降，Funding小负或接近0，价格缓慢下跌，成交量平稳
      if (oi > 3 && oi < 10 && fund > -0.02 && fund < 0.01 && price > -5 && price < 0 && vol < 16) {
        return '缓跌';
      }

      // 震荡吸筹：OI低位，Funding接近0，价格震荡，成交量中等
      if (oi > 2 && oi <= 6 && Math.abs(fund) <= 0.01 && Math.abs(price) <= 5 && vol > 6) {
        return '震荡吸筹';
      }

      return '震荡吸筹'; // 默认
    }

    // 核心：计算风险等级
    function calcRiskLevel(row) {
      const stage = row.stage;
      const oi = row.oiMcap || 0;
      const vol = row.volMcap || 0;
      const fund = row.funding || 0;
      const price = row.priceChange || 0;

      // 风险极高
      if (stage === '见顶' || stage === '砸盘出货') {
        return '风险极高';
      }
      if (fund > 0.07 && oi > 18) {
        return '风险极高';
      }

      // 较高风险
      if (stage === '二波浪确认' || stage === '二波浪反弹') {
        return '较高风险';
      }
      if (fund > 0.04 && oi > 12) {
        return '较高风险';
      }

      // 平衡
      if (stage === '回调扫损' || stage === '回弹扫损') {
        return '平衡';
      }
      if (Math.abs(fund) < 0.02 && oi > 5 && oi < 12 && price > -3 && price < 5) {
        return '平衡';
      }

      // 可介入
      if (stage === '缓升' || stage === '二波浪小幅') {
        return '可介入';
      }
      if (oi > 4 && oi <= 8 && fund > -0.01 && fund <= 0.02 && vol > 6) {
        return '可介入';
      }

      // 非常好
      if (stage === '震荡吸筹' && vol > 10 && oi > 3 && oi <= 6) {
        return '非常好';
      }
      if (oi > 2 && oi <= 5 && Math.abs(fund) <= 0.008 && price > -3 && price < 3) {
        return '非常好';
      }

      // 缓跌情况
      if (stage === '缓跌' && price < -3) {
        return '较高风险';
      }

      return '平衡';
    }

    // 计算多空拥挤度
    function calcLongShortStatus(fund) {
      if (fund > 0.04) return '挤压多头';
      if (fund < -0.04) return '挤压空头';
      return '平衡';
    }

    function showDetail(row) {
      selectedRow = row;
      document.getElementById('detail-empty').style.display = 'none';

      const coin = row.symbol.replace('USDT', '');
      
      // 构建详细标签
      const riskEmoji = {
        '风险极高': '🔴',
        '较高风险': '🟠',
        '平衡': '🟡',
        '可介入': '🟢',
        '非常好': '💚'
      };

      const html = `
        <div class="detail-title">${row.symbol}</div>
        <div style="margin-bottom: 16px;">
          <span class="tag stage-${row.stage}">${row.stage}</span>
          <span class="tag risk-${row.riskLevel}">${riskEmoji[row.riskLevel] || ''} ${row.riskLevel}</span>
          <span class="tag" style="background: ${row.longShortStatus === '挤压多头' ? 'rgba(239, 68, 68, .2)' : row.longShortStatus === '挤压空头' ? 'rgba(34, 197, 94, .2)' : 'rgba(34, 197, 94, .15)'}; color: ${row.longShortStatus === '挤压多头' ? '#fca5a5' : row.longShortStatus === '挤压空头' ? '#86efac' : '#86efac'}; border: none;">
            ${row.longShortStatus === '挤压多头' ? '⬆️ 挤压多头' : row.longShortStatus === '挤压空头' ? '⬇️ 挤压空头' : '⚖️ 多空平衡'}
          </span>
        </div>

        <div class="link-group">
          <a class="link-btn" target="_blank" href="https://www.binance.com/zh-CN/futures/${row.symbol}">币安交易</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/futures/${coin}">CoinGlass合约</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/liq/${coin}">清算数据</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/unlock/${coin}">解锁数据</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/position/${coin}">持仓/浮盈</a>
          <a class="link-btn" target="_blank" href="https://dexscreener.com/search?q=${coin}">DEX</a>
        </div>

        <div class="detail-grid">
          <div class="detail-card">
            <h3>基础数据</h3>
            <div class="row">
              <span class="row-label">价格</span>
              <span class="row-value">$${fmtNum(row.price, 6)}</span>
            </div>
            <div class="row">
              <span class="row-label">市值</span>
              <span class="row-value">$${fmtNum(row.mcap, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">24h涨跌</span>
              <span class="row-value ${colorClass(row.priceChange)}">${row.priceChange.toFixed(2)}%</span>
            </div>
            <div class="row">
              <span class="row-label">24h成交额</span>
              <span class="row-value">$${fmtNum(row.quoteVol, 2)}</span>
            </div>
          </div>

          <div class="detail-card">
            <h3>合约数据</h3>
            <div class="row">
              <span class="row-label">OI</span>
              <span class="row-value">${fmtNum(row.oi, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">OI/Mcap</span>
              <span class="row-value ${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="row">
              <span class="row-label">Vol/Mcap</span>
              <span class="row-value ${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="row">
              <span class="row-label">Funding</span>
              <span class="row-value ${colorClass(row.funding)}">${row.funding.toFixed(4)}%</span>
            </div>
          </div>

          <div class="detail-card">
            <h3>综合分析</h3>
            <div class="row">
              <span class="row-label">阶段</span>
              <span class="row-value">${row.stage}</span>
            </div>
            <div class="row">
              <span class="row-label">风险等级</span>
              <span class="row-value">${riskEmoji[row.riskLevel]} ${row.riskLevel}</span>
            </div>
            <div class="row">
              <span class="row-label">多空态势</span>
              <span class="row-value">${row.longShortStatus}</span>
            </div>
            <div class="row">
              <span class="row-label">综合评分</span>
              <span class="row-value" style="color: #10c4f5;">${row.score.toFixed(1)}/100</span>
            </div>
          </div>
        </div>
      `;
      document.getElementById('detail-content').innerHTML = html;
      activateDetailTab();
    }

    async function loadData() {
      const status = document.getElementById('status');
      const table = document.getElementById('table');
      const tbody = document.getElementById('tbody');

      status.style.display = 'block';
      status.innerText = '加载中...';
      table.style.display = 'none';
      tbody.innerHTML = '';

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 120);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));

        const mcapMap = {};
        gecko.forEach(x => {
          mcapMap[(x.symbol || '').toUpperCase() + 'USDT'] = x.market_cap;
        });

        const rows = [];

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];
          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const oi = parseFloat(p.openInterest || 0);
          const oiValue = oi * price;
          const mcap = mcapMap[symbol] || null;

          let volMcap = null;
          let oiMcap = null;
          if (mcap && mcap > 0) {
            volMcap = quoteVol / mcap * 100;
            oiMcap = oiValue / mcap * 100;
          }

          const row = {
            symbol, price, mcap, quoteVol, funding, priceChange,
            oi, oiValue, volMcap, oiMcap
          };

          // 关键计算
          row.stage = calcStage(row);
          row.riskLevel = calcRiskLevel(row);
          row.longShortStatus = calcLongShortStatus(funding);

          // 综合评分（基于风险等级调整）
          let score = 50;
          if (row.riskLevel === '非常好') score = 90;
          if (row.riskLevel === '可介入') score = 75;
          if (row.riskLevel === '平衡') score = 60;
          if (row.riskLevel === '较高风险') score = 35;
          if (row.riskLevel === '风险极高') score = 15;

          // 微调
          if (row.volMcap) score += Math.min(row.volMcap / 10, 8);
          score = Math.max(0, Math.min(100, score));
          row.score = score;

          rows.push(row);
        }

        rows.sort((a, b) => b.score - a.score);
        allRows = rows;

        document.getElementById('stat-total').innerText = rows.length;
        document.getElementById('stat-good').innerText = 
          rows.filter(x => x.riskLevel === '非常好' || x.riskLevel === '可介入').length;
        document.getElementById('stat-risk').innerText = 
          rows.filter(x => x.riskLevel === '风险极高' || x.riskLevel === '较高风险').length;
        const avgFunding = rows.length ? rows.reduce((s, x) => s + x.funding, 0) / rows.length : 0;
        document.getElementById('stat-funding').innerText = avgFunding.toFixed(4) + '%';

        rows.slice(0, 100).forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="symbol">${row.symbol}</td>
            <td>$${fmtNum(row.price, 6)}</td>
            <td>$${fmtNum(row.mcap, 2)}</td>
            <td class="${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.funding)}">${row.funding.toFixed(3)}%</td>
            <td class="${colorClass(row.priceChange)}">${row.priceChange.toFixed(1)}%</td>
            <td><span class="tag stage-${row.stage}">${row.stage}</span></td>
            <td><span class="tag risk-${row.riskLevel}">${row.riskLevel}</span></td>
            <td>${row.longShortStatus === '挤压多头' ? '⬆️多' : row.longShortStatus === '挤压空头' ? '⬇️空' : '⚖️平'}</td>
          `;
          tr.addEventListener('click', () => showDetail(row));
          tbody.appendChild(tr);
        });

        status.style.display = 'none';
        table.style.display = 'table';
        document.getElementById('last-update').innerText = '最后更新：' + new Date().toLocaleString();

      } catch (e) {
        console.error(e);
        status.style.display = 'block';
        status.innerText = '加载失败：' + e.message;
        table.style.display = 'none';
      }
    }

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>币安启动点捕捉系统 v5.0 - OI优先版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0e27;
      --sub-bg: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --sub: #9ca3af;
      --cyan: #22d3ee;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --purple: #a855f7;
      --orange: #f97316;
      --splus: #ff1493;
      --s: #ff6b6b;
      --a: #ffa500;
      --b: #4169e1;
      --c: #808080;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
      color: var(--cyan);
    }

    .nav-tabs {
      display: flex;
      gap: 12px;
    }

    .nav-tab {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--sub);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .nav-tab.active {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .nav-tab:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .update-time {
      font-size: 12px;
      color: var(--sub);
    }

    .update-time-val {
      color: var(--cyan);
      font-weight: 700;
      font-size: 14px;
    }

    .scan-status {
      font-size: 12px;
      color: var(--yellow);
      font-weight: 700;
      padding: 4px 12px;
      background: rgba(234, 179, 8, 0.1);
      border-radius: 4px;
      border: 1px solid rgba(234, 179, 8, 0.3);
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
      font-size: 12px;
    }

    .btn:hover:not(.loading) {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn.primary {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .btn.primary:hover:not(.loading) {
      background: #06b6d4;
    }

    .btn.loading {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      position: relative;
    }

    .search-input {
      flex: 1;
      padding: 10px 12px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-size: 12px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--cyan);
    }

    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 80px;
      max-height: 300px;
      overflow-y: auto;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      z-index: 100;
      display: none;
    }

    .search-suggestions.active {
      display: block;
    }

    .suggestion-item {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .suggestion-item:hover {
      background: rgba(34, 211, 238, 0.1);
    }

    .suggestion-asset {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 4px;
    }

    .suggestion-pairs {
      font-size: 11px;
      color: var(--sub);
      line-height: 1.4;
    }

    .pair-badge {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(34, 211, 238, 0.2);
      border-radius: 3px;
      margin-right: 4px;
      margin-bottom: 2px;
      cursor: pointer;
    }

    .pair-badge:hover {
      background: rgba(34, 211, 238, 0.4);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      padding: 12px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 900;
      color: var(--cyan);
    }

    .grade-section {
      margin-bottom: 24px;
    }

    .grade-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      margin-bottom: 12px;
      border-left: 4px solid;
    }

    .grade-header.splus { border-left-color: var(--splus); }
    .grade-header.s { border-left-color: var(--s); }
    .grade-header.a { border-left-color: var(--a); }
    .grade-header.b { border-left-color: var(--b); }
    .grade-header.c { border-left-color: var(--c); }

    .grade-label {
      font-weight: 700;
      font-size: 14px;
      min-width: 60px;
    }

    .grade-label.splus { color: var(--splus); }
    .grade-label.s { color: var(--s); }
    .grade-label.a { color: var(--a); }
    .grade-label.b { color: var(--b); }
    .grade-label.c { color: var(--c); }

    .grade-count {
      color: var(--sub);
      font-size: 12px;
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .coin-card {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .coin-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(34, 211, 238, 0.15);
    }

    .coin-card.splus { border-color: rgba(255, 20, 147, 0.3); }
    .coin-card.splus:hover { border-color: var(--splus); box-shadow: 0 8px 24px rgba(255, 20, 147, 0.2); }

    .coin-card.s { border-color: rgba(255, 107, 107, 0.3); }
    .coin-card.s:hover { border-color: var(--s); box-shadow: 0 8px 24px rgba(255, 107, 107, 0.2); }

    .coin-card.a { border-color: rgba(255, 165, 0, 0.3); }
    .coin-card.a:hover { border-color: var(--a); box-shadow: 0 8px 24px rgba(255, 165, 0, 0.2); }

    .coin-card.b { border-color: rgba(65, 105, 225, 0.3); }
    .coin-card.b:hover { border-color: var(--b); box-shadow: 0 8px 24px rgba(65, 105, 225, 0.2); }

    .coin-card.c { border-color: rgba(128, 128, 128, 0.3); }
    .coin-card.c:hover { border-color: var(--c); box-shadow: 0 8px 24px rgba(128, 128, 128, 0.2); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .coin-info {
      flex: 1;
    }

    .coin-name {
      font-weight: 700;
      color: var(--cyan);
      font-size: 16px;
    }

    .coin-price {
      font-size: 12px;
      color: var(--sub);
      margin-top: 2px;
    }

    .price-change {
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }

    .price-change.up { color: var(--green); }
    .price-change.down { color: var(--red); }

    .grade-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      margin-right: 6px;
    }

    .grade-badge.splus { background: rgba(255, 20, 147, 0.2); color: var(--splus); }
    .grade-badge.s { background: rgba(255, 107, 107, 0.2); color: var(--s); }
    .grade-badge.a { background: rgba(255, 165, 0, 0.2); color: var(--a); }
    .grade-badge.b { background: rgba(65, 105, 225, 0.2); color: var(--b); }
    .grade-badge.c { background: rgba(128, 128, 128, 0.2); color: var(--c); }

    .resonance-tag {
      font-size: 10px;
      padding: 4px 8px;
      background: rgba(168, 85, 247, 0.2);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 4px;
      color: #d8b4fe;
      white-space: nowrap;
      margin-right: 6px;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 10px;
      padding: 4px 8px;
      background: rgba(34, 211, 238, 0.2);
      border: 1px solid rgba(34, 211, 238, 0.4);
      border-radius: 4px;
      color: var(--cyan);
      white-space: nowrap;
    }

    .tag.risk-high { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: #fca5a5; }
    .tag.risk-mid { background: rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.4); color: #fcd34d; }
    .tag.risk-low { background: rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.4); color: #86efac; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }

    .metric {
      background: rgba(0, 0, 0, 0.3);
      padding: 6px;
      border-radius: 4px;
      text-align: center;
    }

    .metric-label {
      font-size: 9px;
      color: var(--sub);
      margin-bottom: 2px;
    }

    .metric-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }

    .metric-value.up { color: var(--green); }
    .metric-value.down { color: var(--red); }

    .derivatives-info {
      background: rgba(34, 211, 238, 0.1);
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 11px;
      line-height: 1.6;
      border: 1px solid rgba(34, 211, 238, 0.3);
    }

    .derivatives-label {
      color: var(--sub);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .derivatives-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
      color: var(--text);
    }

    .quick-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .quick-link {
      flex: 1;
      min-width: 60px;
      padding: 6px;
      background: rgba(34, 211, 238, 0.15);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 4px;
      font-size: 9px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .quick-link:hover {
      background: rgba(34, 211, 238, 0.3);
      border-color: var(--cyan);
    }

    .detail-page {
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back-btn {
      padding: 8px 16px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 20px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .back-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .detail-metric {
      background: var(--sub-bg);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .detail-metric-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .detail-metric-value {
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
    }

    .detail-metric-value.up { color: var(--green); }
    .detail-metric-value.down { color: var(--red); }

    .timeframe-analysis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .tf-analysis {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .tf-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 8px;
      font-size: 12px;
    }

    .tf-content {
      font-size: 11px;
      line-height: 1.8;
      color: var(--sub);
    }

    .tf-content strong {
      color: var(--text);
    }

    .quick-channel-section {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .quick-channel-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
      font-size: 13px;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    @media (max-width: 768px) {
      .channel-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .channel-hint {
      margin-top: 12px;
      padding: 8px;
      background: rgba(34, 211, 238, 0.1);
      border-radius: 6px;
      font-size: 11px;
      color: var(--sub);
      line-height: 1.5;
    }

    .error-box {
      padding: 30px;
      text-align: center;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      color: #fca5a5;
      margin: 20px 0;
      font-size: 13px;
      line-height: 1.8;
    }

    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 16px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      z-index: 1000;
      animation: slideIn 0.3s;
      max-width: 300px;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
      }
      to {
        transform: translateX(0);
      }
    }

    .notification.success {
      border-color: rgba(34, 197, 94, 0.5);
      background: rgba(34, 197, 94, 0.1);
      color: #86efac;
    }

    .notification.error {
      border-color: rgba(239, 68, 68, 0.5);
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
    }

    .notification.info {
      border-color: rgba(34, 211, 238, 0.5);
      background: rgba(34, 211, 238, 0.1);
      color: #22d3ee;
    }

    .derivatives-panel {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .panel-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
      font-size: 13px;
    }

    .crowding-risk-high {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .crowding-risk-mid {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .crowding-risk-low {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.3);
    }

    @media (max-width: 768px) {
      .container { padding: 12px; }
      .header { flex-direction: column; align-items: stretch; }
      .header-left, .header-right { flex-direction: column; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .detail-metrics { grid-template-columns: repeat(2, 1fr); }
      .timeframe-analysis { grid-template-columns: 1fr; }
    }

    .loading-spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .scanning-info {
      padding: 12px;
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid rgba(234, 179, 8, 0.3);
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    .scanning-progress {
      height: 4px;
      background: rgba(34, 211, 238, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .scanning-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      width: 0%;
      transition: width 0.3s;
    }

    .signal-item {
      padding: 8px;
      margin-bottom: 6px;
      background: rgba(0, 0, 0, 0.2);
      border-left: 3px solid;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
    }

    .signal-item.long {
      border-left-color: var(--green);
      background: rgba(34, 197, 94, 0.05);
    }

    .signal-item.short {
      border-left-color: var(--red);
      background: rgba(239, 68, 68, 0.05);
    }

    .signal-title {
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .signal-value {
      color: var(--sub);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo">🚀 启动点捕捉 v5.0</div>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchPage('monitor', this)">📊 监控</button>
          <button class="nav-tab" onclick="switchPage('search', this)">🔍 搜索</button>
        </div>
      </div>
      <div class="header-right">
        <div class="update-time">最后更新: <span class="update-time-val" id="update-time">--:--</span></div>
        <div id="scan-status" class="scan-status" style="display: none;"></div>
        <button class="btn primary" id="manual-refresh-btn" onclick="manualRefresh()"><span id="refresh-icon">🔄</span> 手动扫描</button>
      </div>
    </div>

    <div id="monitor" class="page active">
      <div id="scanning-status" class="scanning-info" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <span id="scanning-text">正在扫描币种...</span>
          <span id="scanning-progress-text">0/500</span>
        </div>
        <div class="scanning-progress">
          <div class="scanning-progress-bar" id="scanning-progress-bar"></div>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">S+ 级</div>
          <div class="stat-value" id="grade-splus-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">S 级</div>
          <div class="stat-value" id="grade-s-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">A 级</div>
          <div class="stat-value" id="grade-a-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">B 级</div>
          <div class="stat-value" id="grade-b-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">C 级</div>
          <div class="stat-value" id="grade-c-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">已分析币种</div>
          <div class="stat-value" id="analyzed-count">0</div>
        </div>
      </div>

      <div id="monitor-content">
        <div class="error-box">⏳ 正在加载数据...</div>
      </div>
    </div>

    <div id="search" class="page">
      <div class="search-box">
        <input type="text" id="search-input" class="search-input" placeholder="输入币种代码或名称（如 PEPE、BTC、SOL）" onkeyup="showSearchSuggestions()" />
        <button class="btn primary" id="search-btn" onclick="searchCoin()">🔍 搜索</button>
        <div id="search-suggestions" class="search-suggestions"></div>
      </div>
      <div id="search-content">

    function fmt(num, decimals = 2) {
      if (!isFinite(num)) return '--';
      const absNum = Math.abs(num);
      if (absNum >= 1e9) return (num / 1e9).toFixed(decimals) + 'B';
      if (absNum >= 1e6) return (num / 1e6).toFixed(decimals) + 'M';
      if (absNum >= 1e3) return (num / 1e3).toFixed(decimals) + 'K';
      return num.toFixed(decimals);
    }

    function fmtPct(num, decimals = 2) {
      if (!isFinite(num)) return '--';
      const sign = num > 0 ? '+' : '';
      return sign + num.toFixed(decimals) + '%';
    }

    // ============ HTTP 请求函数 ============
    async function fetchJSON(url, options = {}) {
      const timeout = options.timeout || CONFIG.requestTimeout;
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);

      try {
        const response = await fetch(url, {
          ...options,
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        return await response.json();
      } catch (error) {
        clearTimeout(timeoutId);
        throw error;
      }
    }

    // ============ 并发控制 ============
    async function runWithConcurrencyLimit(tasks, limit) {
      const results = new Array(tasks.length);
      const executing = [];

      for (let i = 0; i < tasks.length; i++) {
        const task = tasks[i];

              const promise = Promise.resolve().then(() => task()).then(
          result => {
            results[i] = result;
            return i;
          },
          error => {
            console.warn(`任务 ${i} 失败:`, error.message);
            results[i] = null;
            return i;
          }
        );

        executing.push(promise);

        if (executing.length >= limit) {
          await Promise.race(executing);
          executing.splice(executing.findIndex(p => p === promise), 1);
        }
      }

      await Promise.all(executing);
      return results;
    }

    // ============ 加载交所信息 ============
    async function loadExchangeInfo() {

    // ============ 技术指标计算 ============
    function calcRSI(prices, period = 14) {
      if (prices.length < period + 1) return 50;
      const gains = [];
      const losses = [];

      for (let i = 1; i < prices.length; i++) {
        const diff = prices[i] - prices[i - 1];
        if (diff > 0) {
          gains.push(diff);
          losses.push(0);
        } else {
          gains.push(0);
          losses.push(Math.abs(diff));
        }
      }

      const avgGain = gains.slice(-period).reduce((a, b) => a + b, 0) / period;
      const avgLoss = losses.slice(-period).reduce((a, b) => a + b, 0) / period;

      if (avgLoss === 0) return avgGain === 0 ? 50 : 100;
      const rs = avgGain / avgLoss;
      const rsi = 100 - (100 / (1 + rs));
      return Math.max(0, Math.min(100, rsi));
    }

    function calcMACD(prices, fastPeriod = 12, slowPeriod = 26, signalPeriod = 9) {
      if (prices.length < slowPeriod) return { macd: 0, signal: 0, histogram: 0 };

      const macdLine = [];
      for (let i = 0; i < prices.length; i++) {
        const f = calcEMA(prices.slice(0, i + 1), fastPeriod);
        const s = calcEMA(prices.slice(0, i + 1), slowPeriod);
        macdLine.push(f - s);
      }

      const emaFast = calcEMA(prices, fastPeriod);
      const emaSlow = calcEMA(prices, slowPeriod);
      const macd = emaFast - emaSlow;
      const signal = calcEMA(macdLine, signalPeriod);
      const histogram = macd - signal;

      return { macd, signal, histogram };
    }

    function calcEMA(prices, period) {
      if (prices.length === 0) return 0;
      if (prices.length < period) return prices[prices.length - 1];

      let sma = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
      const multiplier = 2 / (period + 1);

      for (let i = period; i < prices.length; i++) {
        sma = (prices[i] - sma) * multiplier + sma;
      }

      return sma;
    }

    function calcCVD(volumes, buyPressure) {
      if (volumes.length === 0) return { trend: 'neutral', value: 0 };
      const cvdValue = volumes.reduce((sum, v) => sum + v * (buyPressure ? 1 : -1), 0);
      return {
        trend: cvdValue > 0 ? 'up' : cvdValue < 0 ? 'down' : 'neutral',
        value: cvdValue
      };
    }

    // ============ 获取K线数据 ============
    async function getKlineData(symbol, interval = '1h', limit = 100, market = 'spot') {
      const cacheKey = `${market}_${symbol}_${interval}`;
      if (klineCache[cacheKey] && Date.now() - klineCache[cacheKey].time < 60000) {
        return klineCache[cacheKey].data;
      }

      try {
        const baseUrl = market === 'futures' ? CONFIG.futuresUrl : CONFIG.binanceUrl;
        const res = await fetchJSON(
          `${baseUrl}/klines?symbol=${symbol}USDT&interval=${interval}&limit=${limit}`

        const data = res.map(k => ({
          time: k[0],
          open: parseFloat(k[1]),
          high: parseFloat(k[2]),
          low: parseFloat(k[3]),
          close: parseFloat(k[4]),
          volume: parseFloat(k[7])
        }));

        klineCache[cacheKey] = { data, time: Date.now() };
        return data;
      } catch (e) {
        console.warn(`获取 ${symbol} ${market} K线失败:`, e.message);
        return [];

    // ============ 获取市值数据（真实数据） ============
    async function getMarketCapData(symbol) {

    // ============ 获取合约数据（真实OI数据） ============
    async function getFuturesData(symbol) {
      try {
        // 检查缓存
        const cacheKey = `futures_${symbol}`;
        if (futuresDataCache[cacheKey] && Date.now() - futuresDataCache[cacheKey].time < 30000) {
          return futuresDataCache[cacheKey].data;
        }

        // 获取当前OI
        const oiRes = await fetchJSON(
          `${CONFIG.futuresUrl}/openInterest?symbol=${symbol}USDT`,
          { timeout: 8000 }
        ).catch(() => null);

        // 获取资金费率
        const fundRes = await fetchJSON(
          `${CONFIG.futuresUrl}/fundingRate?symbol=${symbol}USDT&limit=20`,
          { timeout: 8000 }
        ).catch(() => []);

        // 获取长短持仓比
        const lsRes = await fetchJSON(
          `${CONFIG.futuresUrl}/globalLongShortAccountRatio?symbol=${symbol}USDT&period=5m&limit=100`,
          { timeout: 8000 }
        ).catch(() => []);

        // 获取OI历史数据
        const oiHistRes = await fetchJSON(
          `${CONFIG.futuresUrl}/openInterestHist?symbol=${symbol}USDT&period=5m&limit=288`,
          { timeout: 8000 }
        ).catch(() => []);

        let currentOI = 0;
        let currentOIValue = 0;

        if (oiRes) {
          currentOI = parseFloat(oiRes.openInterest || 0);
          currentOIValue = parseFloat(oiRes.sumOpenInterestValue || 0);
        }

        // 计算平均资金费率
        let fundingRate = 0;
        if (Array.isArray(fundRes) && fundRes.length > 0) {
          const rates = fundRes.map(f => parseFloat(f.fundingRate || 0));
          fundingRate = rates.reduce((a, b) => a + b, 0) / rates.length;
        }

        // 获取多空比
        let globalLongShortRatio = 1;
        if (Array.isArray(lsRes) && lsRes.length > 0) {
          const latest = lsRes[lsRes.length - 1];
          globalLongShortRatio = parseFloat(latest.longShortRatio || 1);
        }

        // 计算OI变化百分比
        let oi6hPct = 0;
        let oi24hPct = 0;

        if (Array.isArray(oiHistRes) && oiHistRes.length > 1) {
          const nowOI = parseFloat(oiHistRes[oiHistRes.length - 1].sumOpenInterestValue || currentOIValue);

          // 6小时前 (72条 * 5分钟)
          const sixHoursAgoIdx = Math.max(0, oiHistRes.length - 72);
          const sixHourOI = parseFloat(oiHistRes[sixHoursAgoIdx].sumOpenInterestValue || 0);
          if (sixHourOI > 0) {
            oi6hPct = ((nowOI - sixHourOI) / sixHourOI) * 100;
          }

          // 24小时前 (288条 * 5分钟)
          const oneDayAgoIdx = Math.max(0, oiHistRes.length - 288);
          const dayOI = parseFloat(oiHistRes[oneDayAgoIdx].sumOpenInterestValue || 0);
          if (dayOI > 0) {
            oi24hPct = ((nowOI - dayOI) / dayOI) * 100;
          }
        }

        const result = {
          openInterest: currentOI,
          oiValue: currentOIValue,
          fundingRate: fundingRate * 100,
          globalLongShortRatio: isFinite(globalLongShortRatio) ? globalLongShortRatio : 1,
          oi6hPct: isFinite(oi6hPct) ? oi6hPct : 0,
          oi24hPct: isFinite(oi24hPct) ? oi24hPct : 0
        };

        // 缓存结果
        futuresDataCache[cacheKey] = { data: result, time: Date.now() };

        console.log(`✅ 获取 ${symbol} 合约数据: OI=${fmt(currentOI, 0)}, 资金费=${fmtPct(fundingRate*100, 3)}, L/S=${fmt(globalLongShortRatio, 2)}`);

        return result;
      } catch (e) {
        console.warn(`获取 ${symbol} 合约数据失败:`, e.message);
        return {
          openInterest: 0,
          oiValue: 0,
          fundingRate: 0,
          globalLongShortRatio: 1,
          oi6hPct: 0,
          oi24hPct: 0
        };
      }
    }

    // ============ 计算OI与市值比例 ============
    function calculateOiMcapRatio(oiValue, marketCap) {
      if (!marketCap || marketCap <= 0 || !oiValue || oiValue <= 0) {
        return 0;
      }
      const ratio = (oiValue / marketCap) * 100;
      return isFinite(ratio) ? ratio : 0;
    }

    // ============ 计算OI与24h成交量比例 ============
    function calculateOiVolumeRatio(oiValue, volume24h) {
      if (!volume24h || volume24h <= 0 || !oiValue || oiValue <= 0) {
        return 0;
      }
      const ratio = (oiValue / volume24h) * 100;
      return isFinite(ratio) ? ratio : 0;
    }

    // ============ 计算拥挤度风险 ============
    function calculateCrowdingRisk(longShortRatio, oiMcapRatio, rsi1h, mainDirection, oi6hPct, oi24hPct) {
      const reasons = [];
      let score = 0;

      // 多空比极端检查
      if (longShortRatio > 2.5 && mainDirection === 'up') {
        score += 35;
        reasons.push('多头极度拥挤 (多空比 > 2.5)');
      } else if (longShortRatio > 2.0 && mainDirection === 'up') {
        score += 25;
        reasons.push('多头严重拥挤 (多空比 > 2.0)');
      } else if (longShortRatio > 1.5 && mainDirection === 'up') {
        score += 15;
        reasons.push('多头中度拥挤 (多空比 > 1.5)');
      }

      if (longShortRatio < 0.4 && mainDirection === 'down') {
        score += 35;
        reasons.push('空头极度拥挤 (多空比 < 0.4)');
      } else if (longShortRatio < 0.5 && mainDirection === 'down') {
        score += 25;
        reasons.push('空头严重拥挤 (多空比 < 0.5)');
      } else if (longShortRatio < 0.67 && mainDirection === 'down') {
        score += 15;
        reasons.push('空头中度拥挤 (多空比 < 0.67)');
      }

      // OI/MCAP比例检查
      if (oiMcapRatio > 50 && mainDirection === 'up') {
        score += 20;
        reasons.push('OI占比过高 (> 50%)，风险大');
      } else if (oiMcapRatio > 30 && mainDirection === 'up') {
        score += 12;
        reasons.push('OI占比较高 (> 30%)');
      } else if (oiMcapRatio > 50 && mainDirection === 'down') {
        score += 20;
        reasons.push('OI占比过高 (> 50%)，空头风险大');
      }

      // RSI极端检查
      if (rsi1h > 80) {
        score += 15;
        reasons.push('RSI 极度超买 (> 80)');
      } else if (rsi1h > 70) {
        score += 8;
        reasons.push('RSI 超买 (> 70)');
      }

      if (rsi1h < 20) {
        score += 15;
        reasons.push('RSI 极度超卖 (< 20)');
      } else if (rsi1h < 30) {
        score += 8;
        reasons.push('RSI 超卖 (< 30)');
      }

      // OI增长过快检查
      if (mainDirection === 'up' && oi6hPct > 50) {
        score += 18;
        reasons.push('OI 6h增长过快 (> 50%)，可能空头反制');
      } else if (mainDirection === 'up' && oi24hPct > 100) {
        score += 15;
        reasons.push('OI 24h增长过快 (> 100%)');
      }

      let level = 'low';
      let side = 'none';

      if (score >= 60) {
        level = 'high';
        side = mainDirection === 'up' ? 'long_crowded' : 'short_crowded';
      } else if (score >= 35) {
        level = 'mid';
        side = mainDirection === 'up' ? 'long_crowded' : 'short_crowded';
      } else {
        level = 'low';
        side = 'none';
      }

      return { level, side, score, reasons };
    }

    // ============ 检查共振条件 ============
    function checkResonance(coin) {
      const resonance = {
        priceResonance: false,
        cvdResonance: false,
        oiResonance: false,
        count: 0,
        details: []
      };

      // 价格共振：5m/1h/4h 都是同方向
      const priceUp5m = coin.change5m > 0.3;
      const priceUp1h = coin.change1h > 0.5;
      const priceUp4h = coin.change4h > 1;

      if ((priceUp5m && priceUp1h && priceUp4h) || (!priceUp5m && !priceUp1h && !priceUp4h)) {
        resonance.priceResonance = true;
        resonance.count++;
        resonance.details.push('价格多周期共振');
      }

      // CVD共振：5m/1h 都是上升趋势
      const cvdUp = coin.cvd5m.trend === 'up' && coin.cvd1h.trend === 'up';
      if (cvdUp) {
        resonance.cvdResonance = true;
        resonance.count++;
        resonance.details.push('CVD共振向上');
      }

      // OI共振：OI增长 + 资金费率合理 + 多空不极端
      const oiGrowth = coin.oi6hPct > 5 || coin.oi24hPct > 10;
      const fundingOk = coin.fundingRate > 0 && coin.fundingRate < 0.3;
      const lsRatioOk = coin.globalLongShortRatio > 0.8 && coin.globalLongShortRatio < 2;

      if (oiGrowth && fundingOk && lsRatioOk) {
        resonance.oiResonance = true;
        resonance.count++;
        resonance.details.push('OI共振向上');
      }

      return resonance;
    }

        });

          value: `${fmtPct(coin.oi6hPct, 1)}`,
          weight: 4,
          long: false
        });
      }

      if (coin.oi24hPct > 50) {
        longSignals.push({
          type: 'OI增长',
          name: '24h OI剧烈增长',
          value: `+${fmtPct(coin.oi24hPct, 1)}`,
          weight: 4,
          long: true
        });
      } else if (coin.oi24hPct > 20) {
        longSignals.push({
          type: 'OI增长',
          name: '24h OI持续增长',
          value: `+${fmtPct(coin.oi24hPct, 1)}`,
          weight: 2,
          long: true
        });
      }

      // OI/MCAP比例
      if (coin.oiMcapRatio > 20) {
        longSignals.push({
          type: 'OI/MCAP',
          name: 'OI占比偏高',
          value: `${fmtPct(coin.oiMcapRatio, 1)}`,
          weight: 2,
          long: true
        });
      }

      // OI/成交量比例
      if (coin.oiVolumeRatio > 10) {
        longSignals.push({
          type: 'OI/Vol',
          name: 'OI占成交量比高',
          value: `${fmtPct(coin.oiVolumeRatio, 1)}`,
          weight: 2,
          long: true
        });
      }

      // 资金费率
      if (coin.fundingRate > 0.05 && coin.fundingRate < 0.3) {
        longSignals.push({
          type: '资金费率',
          name: '资金费率正向合理',
          value: `${fmtPct(coin.fundingRate, 3)}`,
          weight: 3,
          long: true
        });
      } else if (coin.fundingRate > 0.3) {
        shortSignals.push({
          type: '资金费率',
          name: '资金费率过高',
          value: `${fmtPct(coin.fundingRate, 3)}`,
          weight: 3,
          long: false
        });
      } else if (coin.fundingRate < -0.2) {
        shortSignals.push({
          type: '资金费率',
          name: '资金费率过低',
          value: `${fmtPct(coin.fundingRate, 3)}`,
          weight: 2,
          long: false
        });
      }

      // 多空比
      if (coin.globalLongShortRatio > 2) {
        shortSignals.push({
          type: '多空比',
          name: '多头极度拥挤',
          value: `${fmt(coin.globalLongShortRatio, 2)}`,
          weight: 4,
          long: false
        });
      } else if (coin.globalLongShortRatio > 1.5 && coin.mainDirection === 'up') {
        shortSignals.push({
          type: '多空比',
          name: '多头严重拥挤',
          value: `${fmt(coin.globalLongShortRatio, 2)}`,
          weight: 2,
          long: false
        });
      } else if (coin.globalLongShortRatio < 0.5 && coin.mainDirection === 'down') {
        longSignals.push({
          type: '多空比',
          name: '空头极度拥挤',
          value: `${fmt(coin.globalLongShortRatio, 2)}`,
          weight: 3,
          long: true
        });
      }

      // ============ CVD信号（权重次高） ============
      if (coin.cvd5m.trend === 'up') {
        longSignals.push({
          type: 'CVD',
          name: '5m成交量向上',
          value: `趋势: ${coin.cvd5m.trend}`,
          weight: 2,
          long: true
        });
      } else if (coin.cvd5m.trend === 'down') {
        shortSignals.push({
          type: 'CVD',
          name: '5m成交量向下',
          value: `趋势: ${coin.cvd5m.trend}`,
          weight: 2,
          long: false
        });
      }

      if (coin.cvd1h.trend === 'up') {
        longSignals.push({
          type: 'CVD',
          name: '1h成交量向上',
          value: `趋势: ${coin.cvd1h.trend}`,
          weight: 3,
          long: true
        });
      } else if (coin.cvd1h.trend === 'down') {
        shortSignals.push({
          type: 'CVD',
          name: '1h成交量向下',
          value: `趋势: ${coin.cvd1h.trend}`,
          weight: 3,
          long: false
        });
      }

      // ============ MACD信号（权重中等） ============
      if (coin.macd1h.histogram > 0) {
        longSignals.push({
          type: 'MACD',
          name: '1h MACD正向',
          value: `${coin.macd1h.histogram.toFixed(6)}`,
          weight: 1,
          long: true
        });
      } else if (coin.macd1h.histogram < 0) {
        shortSignals.push({
          type: 'MACD',
          name: '1h MACD负向',
          value: `${coin.macd1h.histogram.toFixed(6)}`,
          weight: 1,
          long: false
        });
      }

      if (coin.macd4h.histogram > 0) {
        longSignals.push({
          type: 'MACD',
          name: '4h MACD正向',
          value: `${coin.macd4h.histogram.toFixed(6)}`,
          weight: 1,
          long: true
        });
      }

      // ============ RSI信号（权重较低） ============
      if (coin.rsi5m < 30) {
        longSignals.push({
          type: 'RSI',
          name: '5m RSI超卖',
          value: `${coin.rsi5m.toFixed(0)}`,
          weight: 2,
          long: true
        });
      } else if (coin.rsi5m > 70) {
        shortSignals.push({
          type: 'RSI',
          name: '5m RSI超买',
          value: `${coin.rsi5m.toFixed(0)}`,
          weight: 2,
          long: false
        });
      }

      if (coin.rsi1h < 30) {
        longSignals.push({
          type: 'RSI',
          name: '1h RSI超卖',
          value: `${coin.rsi1h.toFixed(0)}`,
          weight: 2,
          long: true
        });
      } else if (coin.rsi1h > 70) {
        shortSignals.push({
          type: 'RSI',
          name: '1h RSI超买',
          value: `${coin.rsi1h.toFixed(0)}`,
          weight: 2,
          long: false
        });
      }

      // ============ 价格信号（权重最低） ============
      if (coin.change5m > 1) {
        longSignals.push({
          type: '价格',
          name: '5m强势上涨',
          value: `${fmtPct(coin.change5m, 2)}`,
          weight: 0.5,
          long: true
        });
      } else if (coin.change5m < -1) {
        shortSignals.push({
          type: '价格',
          name: '5m强势下跌',
          value: `${fmtPct(coin.change5m, 2)}`,
          weight: 0.5,
          long: false
        });
      }

      if (coin.change1h > 1) {
        longSignals.push({
          type: '价格',
          name: '1h上涨',
          value: `${fmtPct(coin.change1h, 2)}`,
          weight: 0.5,
          long: true
        });
      } else if (coin.change1h < -1) {
        shortSignals.push({
          type: '价格',
          name: '1h下跌',
          value: `${fmtPct(coin.change1h, 2)}`,
          weight: 0.5,
          long: false
        });
      }

      return { longSignals, shortSignals };
    }

    // ============ 核心评分函数（OI优先） ============
    function calculateGrade(coin) {
      let score = 0;

      // 权重1: OI（最高权重 1.5x）
      let oiScore = 0;

      if (coin.openInterest > 0 && coin.oiValue > 0) {
        oiScore += 15;
        
        if (coin.oiMcapRatio > 30) oiScore += 12;
        else if (coin.oiMcapRatio > 20) oiScore += 8;
        else if (coin.oiMcapRatio > 10) oiScore += 4;
        else if (coin.oiMcapRatio > 5) oiScore += 2;

        if (coin.oi6hPct > 30) oiScore += 10;
        else if (coin.oi6hPct > 15) oiScore += 7;
        else if (coin.oi6hPct > 5) oiScore += 3;

        if (coin.oi24hPct > 50) oiScore += 8;
        else if (coin.oi24hPct > 25) oiScore += 5;
        else if (coin.oi24hPct > 10) oiScore += 2;

                if (coin.fundingRate > 0.01 && coin.fundingRate < 0.3) oiScore += 5;

        if (coin.globalLongShortRatio > 0.9 && coin.globalLongShortRatio < 2) oiScore += 4;
      }

      score += oiScore * 1.5;

      // 权重2: CVD（次高权重 1.2x）
      let cvdScore = 0;

      if (coin.cvd5m.trend === 'up') cvdScore += 10;
      if (coin.cvd1h.trend === 'up') cvdScore += 15;

      score += cvdScore * 1.2;

      // 权重3: MACD（中等权重 0.8x）
      let macdScore = 0;

      if (coin.macd1h.histogram > 0) macdScore += 10;
      if (coin.macd4h.histogram > 0) macdScore += 8;

      score += macdScore * 0.8;

      // 权重4: RSI（较低权重 0.7x）
      let rsiScore = 0;

      if (coin.rsi5m < 30) rsiScore += 8;
      if (coin.rsi1h < 30) rsiScore += 10;
      if (coin.rsi5m > 70) rsiScore -= 8;
      if (coin.rsi1h > 70) rsiScore -= 10;

      score += Math.max(0, rsiScore) * 0.7;

      // 权重5: 价格（最低权重 0.5x）
      let priceScore = 0;

      if (coin.change5m > 0.5) priceScore += 5;
      if (coin.change1h > 0.5) priceScore += 8;
      if (coin.change4h > 1) priceScore += 5;

      score += priceScore * 0.5;

      // 共振加分
      if (coin.resonance.count >= 3) score += 25;
      else if (coin.resonance.count === 2) score += 15;
      else if (coin.resonance.count === 1) score += 8;

      // 拥挤度减分
      if (coin.crowdingRisk.level === 'high') score *= 0.7;
      else if (coin.crowdingRisk.level === 'mid') score *= 0.85;

      // 确定等级
      let grade = 'c';
      if (score >= 120) grade = 'splus';
      else if (score >= 90) grade = 's';
      else if (score >= 65) grade = 'a';
      else if (score >= 40) grade = 'b';
      else grade = 'c';

      return {
        grade,
        gradeScore: Math.round(score),
        score: Math.round(score)
      };
    }

    // ============ 快速扫描 ============
    async function quickScanCoin(symbol) {
      try {
        const stats24h = await get24hStats(symbol, 'spot');
        if (!stats24h) return null;

        const futuresData = await getFuturesData(symbol);

        let quickScore = 0;

        // OI增长快速检查
        if (futuresData.oi6hPct > 15) quickScore += 10;
        if (futuresData.oi24hPct > 30) quickScore += 10;

        // 价格动能
        if (stats24h.change24h > 5) quickScore += 5;

        // 成交量活跃
        if (stats24h.volume24h > 0) quickScore += 3;

        return {
          symbol,
          price: stats24h.price,
          change24h: stats24h.change24h,
          volume24h: stats24h.volume24h,
          openInterest: futuresData.openInterest,
          oi6hPct: futuresData.oi6hPct,
          quickScore
        };
      } catch (e) {
        return null;
      }
    }

    // ============ 完整分析 ============
    async function analyzeCoin(symbol, quickData = null) {
      try {
        // 获取基础数据
        const [stats24h, kline5m, kline1h, kline4h, kline1d, futuresData, marketCap] = await Promise.all([
          get24hStats(symbol, 'spot'),
          getKlineData(symbol, '5m', 100, 'spot'),
          getKlineData(symbol, '1h', 100, 'spot'),
          getKlineData(symbol, '4h', 100, 'spot'),
          getKlineData(symbol, '1d', 100, 'spot'),
          getFuturesData(symbol),
          getMarketCapData(symbol)
        ]);

        if (!stats24h || kline5m.length === 0) return null;

        // 计算技术指标
        const prices5m = kline5m.map(k => k.close);
        const prices1h = kline1h.map(k => k.close);
        const prices4h = kline4h.map(k => k.close);
        const prices1d = kline1d.map(k => k.close);

        const rsi5m = calcRSI(prices5m, 14);
        const rsi1h = calcRSI(prices1h, 14);
        const rsi4h = calcRSI(prices4h, 14);
        const rsi1d = calcRSI(prices1d, 14);

        const macd1h = calcMACD(prices1h);
        const macd4h = calcMACD(prices4h);

        const volumes5m = kline5m.map(k => k.volume);
        const volumes1h = kline1h.map(k => k.volume);

        const cvd5m = calcCVD(volumes5m, true);
        const cvd1h = calcCVD(volumes1h, true);

        const change5m = ((prices5m[prices5m.length - 1] - prices5m[0]) / prices5m[0]) * 100;
        const change1h = ((prices1h[prices1h.length - 1] - prices1h[0]) / prices1h[0]) * 100;
        const change4h = ((prices4h[prices4h.length - 1] - prices4h[0]) / prices4h[0]) * 100;
        const change1d = ((prices1d[prices1d.length - 1] - prices1d[0]) / prices1d[0]) * 100;

        const mainDirection = change1h > 0 ? 'up' : 'down';

        // 计算比例
        const oiMcapRatio = calculateOiMcapRatio(futuresData.oiValue, marketCap);
        const oiVolumeRatio = calculateOiVolumeRatio(futuresData.oiValue, stats24h.volume24h);

        // 相位分析
        const phase5m = rsi5m > 70 ? 'overbought' : rsi5m < 30 ? 'oversold' : 'normal';
        const phase1h = rsi1h > 70 ? 'overbought' : rsi1h < 30 ? 'oversold' : 'normal';
        const phase4h = rsi4h > 70 ? 'overbought' : rsi4h < 30 ? 'oversold' : 'normal';
        const phase1d = rsi1d > 70 ? 'overbought' : rsi1d < 30 ? 'oversold' : 'normal';

        // 生成交易信号（融入OI、成交量、市值）
        const { longSignals, shortSignals } = generateTradingSignals({
          symbol,
          openInterest: futuresData.openInterest,
          oiValue: futuresData.oiValue,
          oiMcapRatio,
          oiVolumeRatio,
          oi6hPct: futuresData.oi6hPct,
          oi24hPct: futuresData.oi24hPct,
          fundingRate: futuresData.fundingRate,
          globalLongShortRatio: futuresData.globalLongShortRatio,
          cvd5m, cvd1h,
          macd1h, macd4h,
          rsi5m, rsi1h, rsi4h, rsi1d,
          change5m, change1h, change4h, change1d,
          mainDirection
        });

        const buySignalCount = longSignals.length;
        const sellSignalCount = shortSignals.length;
        const totalSignal = buySignalCount - sellSignalCount;

        // 推荐设置
        let recommendType = 'spot';
        let recommendLeverage = 1;
        let recommendPosition = 5;

        if (futuresData.openInterest > 0) {
          if (totalSignal > 6) {
            recommendType = 'futures';
            recommendLeverage = 2;
            recommendPosition = 3;
          } else if (totalSignal > 3) {
            recommendType = 'futures';
            recommendLeverage = 1;
            recommendPosition = 5;
          } else if (totalSignal < -6) {
            recommendType = 'futures';
            recommendLeverage = 2;
            recommendPosition = 3;
          }
        } else {
          recommendPosition = totalSignal > 3 ? 8 : 5;
        }

        // 拥挤度评估
        const crowdingRisk = calculateCrowdingRisk(
          futuresData.globalLongShortRatio,
          oiMcapRatio,
          rsi1h,
          mainDirection,
          futuresData.oi6hPct,
          futuresData.oi24hPct
        );

        // 共振检查
        const resonance = checkResonance({
          change5m, change1h, change4h,
          cvd5m, cvd1h,
          openInterest: futuresData.openInterest,
          oi6hPct: futuresData.oi6hPct,
          oi24hPct: futuresData.oi24hPct,
          fundingRate: futuresData.fundingRate,
          globalLongShortRatio: futuresData.globalLongShortRatio
        });

        // 构建币对象
        const coin = {
          symbol,
          price: stats24h.price,
          change24h: stats24h.change24h,
          volume24h: stats24h.volume24h,
          marketCap,
          rsi5m, rsi1h, rsi4h, rsi1d,
          macd1h, macd4h,
          cvd5m, cvd1h,
          change5m, change1h, change4h, change1d,
          mainDirection,
          phase5m, phase1h, phase4h, phase1d,
          buySignalCount,
          sellSignalCount,
          totalSignal,
          longSignals,
          shortSignals,
          recommendType,
          recommendLeverage,
          recommendPosition,
          openInterest: futuresData.openInterest,
          oiValue: futuresData.oiValue,
          fundingRate: futuresData.fundingRate,
          globalLongShortRatio: futuresData.globalLongShortRatio,
          oi6hPct: futuresData.oi6hPct,
          oi24hPct: futuresData.oi24hPct,
          oiMcapRatio,
          oiVolumeRatio,
          crowdingRisk,
          resonance,
          timestamp: Date.now()
        };

        // 计算评级
        const gradeInfo = calculateGrade(coin);
        coin.grade = gradeInfo.grade;
        coin.gradeScore = gradeInfo.gradeScore;
        coin.totalScore = gradeInfo.score;

        return coin;
      } catch (e) {
        console.warn(`分析 ${symbol} 失败:`, e.message);
        return null;
      }
    }

    // ============ 搜索分析 ============
    async function analyzeCoinForSearch(symbol) {
      return await analyzeCoin(symbol);
    }

    // ============ 两阶段全量刷新 ============
    async function twoPhaseFullRefresh() {
      if (isRefreshing) return;
      isRefreshing = true;

      const statusDiv = document.getElementById('scanning-status');
      const progressBar = document.getElementById('scanning-progress-bar');
      const progressText = document.getElementById('scanning-progress-text');
      const scanStatusDiv = document.getElementById('scan-status');
      const refreshBtn = document.getElementById('manual-refresh-btn');
      const refreshIcon = document.getElementById('refresh-icon');

      try {
        if (statusDiv) statusDiv.style.display = 'block';
        if (refreshBtn) {
          refreshBtn.disabled = true;
          refreshBtn.classList.add('loading');
          refreshIcon.textContent = '⏳';
        }
        if (scanStatusDiv) {
          scanStatusDiv.textContent = '⏳ 扫描中...';
          scanStatusDiv.style.display = 'block';
        }
        if (progressBar) progressBar.style.width = '0%';
        if (progressText) progressText.textContent = `0/${allSymbols.length}`;

        const startTime = Date.now();
        let currentIndex = 0;
        allCoins = {};

        // 第一阶段：快速筛选
        const quickScanList = allSymbols.slice(0, CONFIG.quickScanLimit);
        const quickResults = [];

        for (let i = 0; i < quickScanList.length; i++) {
          const symbol = quickScanList[i];
          const result = await quickScanCoin(symbol);

          if (result && result.quickScore > 0) {
            quickResults.push(result);
          }

          currentIndex++;
          const progress = (currentIndex / allSymbols.length) * 100;
          if (progressBar) progressBar.style.width = progress + '%';
          if (progressText) progressText.textContent = `${currentIndex}/${allSymbols.length}`;
        }

        console.log(`✅ 快速扫描完成：${quickResults.length} 个候选币种`);

        // 第二阶段：完整分析
        const toAnalyze = quickResults.slice(0, CONFIG.fullScanLimit);
        const analyzeTasks = toAnalyze.map(qr => () => analyzeCoin(qr.symbol, qr));
        const fullResults = await runWithConcurrencyLimit(analyzeTasks, CONFIG.concurrentLimit);

        fullResults.forEach((coin) => {
          if (coin) {
            allCoins[coin.symbol] = coin;
          }
        });

        // 补充扫描其他币种
        const remaining = allSymbols.slice(CONFIG.quickScanLimit).slice(0, 50);
        for (const symbol of remaining) {
          if (allCoins[symbol]) continue;

          const result = await quickScanCoin(symbol);
          if (result && result.quickScore > -2) {
            const coin = await analyzeCoin(symbol, result);
            if (coin) {
              allCoins[coin.symbol] = coin;
            }
          }

          currentIndex++;
          const progress = (currentIndex / allSymbols.length) * 100;
          if (progressBar) progressBar.style.width = Math.min(progress, 100) + '%';
          if (progressText) progressText.textContent = `${currentIndex}/${allSymbols.length}`;
        }

        const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
        console.log(`✅ 扫描完成！总耗时 ${totalTime}s，共分析 ${Object.keys(allCoins).length} 个币种`);

        const updateTimeEl = document.getElementById('update-time');
        if (updateTimeEl) {
          updateTimeEl.textContent = new Date().toLocaleTimeString('zh-CN');
        }

        renderMonitorContent();
        showNotification(`✅ 扫描完成！分析了 ${Object.keys(allCoins).length} 个币种`, 'success');
      } catch (e) {
        console.error('扫描失败:', e);
        showNotification(`❌ 扫描失败: ${e.message}`, 'error');
      } finally {
        isRefreshing = false;
        if (statusDiv) statusDiv.style.display = 'none';
        if (refreshBtn) {
          refreshBtn.disabled = false;
          refreshBtn.classList.remove('loading');
          refreshIcon.textContent = '🔄';
        }
        if (scanStatusDiv) {
          scanStatusDiv.style.display = 'none';
        }
      }
    }

    async function manualRefresh() {
      await twoPhaseFullRefresh();
    }

    // ============ 渲染监控内容 ============
    function renderMonitorContent() {
      const container = document.getElementById('monitor-content');

      if (Object.keys(allCoins).length === 0) {
        container.innerHTML = '<div class="error-box">⏳ 正在扫描中，请稍候...</div>';
        return;
      }

      const grades = ['splus', 's', 'a', 'b', 'c'];
      const gradeCounts = {};
      grades.forEach(g => {
        gradeCounts[g] = Object.values(allCoins).filter(c => c.grade === g).length;
      });

      document.getElementById('grade-splus-count').textContent = gradeCounts.splus;
      document.getElementById('grade-s-count').textContent = gradeCounts.s;
      document.getElementById('grade-a-count').textContent = gradeCounts.a;
      document.getElementById('grade-b-count').textContent = gradeCounts.b;
      document.getElementById('grade-c-count').textContent = gradeCounts.c;
      document.getElementById('analyzed-count').textContent = Object.keys(allCoins).length;

      let html = '';

      grades.forEach(grade => {
        const coins = Object.values(allCoins)
          .filter(c => c.grade === grade)
          .sort((a, b) => b.totalSignal - a.totalSignal);

        if (coins.length === 0) return;

        const gradeLabels = { splus: 'S+', s: 'S', a: 'A', b: 'B', c: 'C' };

        html += `
          <div class="grade-section">
            <div class="grade-header ${grade}">
              <div class="grade-label ${grade}">${gradeLabels[grade]} 级</div>
              <div class="grade-count">${coins.length} 个币种</div>
            </div>
            <div class="grid">
              ${coins.map(coin => renderCoinCard(coin)).join('')}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    // ============ 搜索功能 ============
    async function showSearchSuggestions() {
      const input = document.getElementById('search-input');
      const query = input.value.trim().toUpperCase();

      if (query.length < 1) {
        document.getElementById('search-suggestions').classList.remove('active');
        return;
      }

      const suggestions = document.getElementById('search-suggestions');
      const matching = Object.values(binanceAssets)
        .filter(asset => asset.asset.includes(query))
        .slice(0, 10);

      if (matching.length === 0) {
        suggestions.innerHTML = '<div class="suggestion-item">未找到匹配的资产</div>';
      } else {
        suggestions.innerHTML = matching.map(asset => `
          <div class="suggestion-item" onclick="searchCoinBySymbol('${asset.asset}')">
            <div class="suggestion-asset">${asset.asset}</div>
            <div class="suggestion-pairs">
              ${asset.spot.length > 0 ? `<span class="pair-badge">现货</span>` : ''}
              ${asset.futures.length > 0 ? `<span class="pair-badge">合约</span>` : ''}
            </div>
          </div>
        `).join('');
      }

      suggestions.classList.add('active');
    }

    async function searchCoin() {
      const rawQuery = document.getElementById('search-input').value.trim().toUpperCase();
      if (!rawQuery) return;

      const query = rawQuery.endsWith('USDT') ? rawQuery.replace('USDT', '') : rawQuery;

      switchPage('detail');
      document.getElementById('detail-content').innerHTML = '<div class="error-box">⏳ 分析中...</div>';

      if (!binanceAssets[query]) {
        document.getElementById('detail-content').innerHTML = `
          <div class="error-box">
            未找到 ${query} 的交易对<br>
            请检查币种代码是否正确
          </div>
        `;
        return;
      }

      try {
        const coinData = await analyzeCoinForSearch(query);

        if (!coinData) {
          document.getElementById('detail-content').innerHTML = `
            <div class="error-box">
              ${query} 数据获取失败<br>
              可能原因：接口限流 / 无法获取足够数据<br><br>
              建议：稍后重试
            </div>
          `;
          return;
        }

        allCoins[query] = coinData;
        showDetail(query);
      } catch (e) {
        console.error('搜索失败:', e);
        document.getElementById('detail-content').innerHTML = `
          <div class="error-box">
            搜索 ${query} 失败：${e.message}
          </div>
        `;
      }
    }

    async function searchCoinBySymbol(symbol) {
      document.getElementById('search-input').value = symbol;
      document.getElementById('search-suggestions').classList.remove('active');
      await searchCoin();
    }

            <div>系统版本: v5.0 (OI优先版)</div>
            <div>分析周期: 5m, 1h, 4h, 1d</div>
            <div>评级权重: OI(1.5x) > CVD(1.2x) > MACD(0.8x) > RSI(0.7x) > 价格(0.5x)</div>
            <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1);">
              <strong style="color: var(--cyan);">数据来源:</strong><br>
              ✓ 币安现货 API<br>
              ✓ 币安合约 API (OI、资金费率、多空比)<br>
              ✓ CoinGecko (市值、流动性)<br>
              <strong style="color: var(--green);">所有数据实时刷新，无延迟</strong>
            </div>
          </div>
        </div>
      `;

      document.getElementById('detail-content').innerHTML = html;
    }

    // ============ 初始化 ============
    async function init() {
      try {
        console.log('正在加载交所信息...');
        await loadExchangeInfo();
        console.log(`已加载 ${allSymbols.length} 个币种信息`);

        const updateTimeEl = document.getElementById('update-time');
        if (updateTimeEl) {
          updateTimeEl.textContent = new Date().toLocaleTimeString('zh-CN');
        }

        await twoPhaseFullRefresh();

        setInterval(() => {
          if (!isRefreshing) {
            twoPhaseFullRefresh();
          }
        }, CONFIG.refreshMs);
      } catch (e) {
        console.error('初始化失败:', e);
        document.getElementById('monitor-content').innerHTML = `
          <div class="error-box">
            系统初始化失败<br>
            ${e.message}<br><br>
            请检查网络连接并刷新页面重试
          </div>
        `;
      }
    }

    // 页面加载完成后启动
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>币安启动点捕捉系统 v5.0 - OI优先版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0e27;
      --sub-bg: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --sub: #9ca3af;
      --cyan: #22d3ee;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --purple: #a855f7;
      --orange: #f97316;
      --splus: #ff1493;
      --s: #ff6b6b;
      --a: #ffa500;
      --b: #4169e1;
      --c: #808080;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
      color: var(--cyan);
    }

    .nav-tabs {
      display: flex;
      gap: 12px;
    }

    .nav-tab {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--sub);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .nav-tab.active {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .nav-tab:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .update-time {
      font-size: 12px;
      color: var(--sub);
    }

    .update-time-val {
      color: var(--cyan);
      font-weight: 700;
      font-size: 14px;
    }

    .scan-status {
      font-size: 12px;
      color: var(--yellow);
      font-weight: 700;
      padding: 4px 12px;
      background: rgba(234, 179, 8, 0.1);
      border-radius: 4px;
      border: 1px solid rgba(234, 179, 8, 0.3);
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
      font-size: 12px;
    }

    .btn:hover:not(.loading) {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn.primary {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .btn.primary:hover:not(.loading) {
      background: #06b6d4;
    }

    .btn.loading {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      position: relative;
    }

    .search-input {
      flex: 1;
      padding: 10px 12px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-size: 12px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--cyan);
    }

    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 80px;
      max-height: 300px;
      overflow-y: auto;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      z-index: 100;
      display: none;
    }

    .search-suggestions.active {
      display: block;
    }

    .suggestion-item {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .suggestion-item:hover {
      background: rgba(34, 211, 238, 0.1);
    }

    .suggestion-asset {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 4px;
    }

    .suggestion-pairs {
      font-size: 11px;
      color: var(--sub);
      line-height: 1.4;
    }

    .pair-badge {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(34, 211, 238, 0.2);
      border-radius: 3px;
      margin-right: 4px;
      margin-bottom: 2px;
      cursor: pointer;
    }

    .pair-badge:hover {
      background: rgba(34, 211, 238, 0.4);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      padding: 12px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 900;
      color: var(--cyan);
    }

    .grade-section {
      margin-bottom: 24px;
    }

    .grade-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      margin-bottom: 12px;
      border-left: 4px solid;
    }

    .grade-header.splus { border-left-color: var(--splus); }
    .grade-header.s { border-left-color: var(--s); }
    .grade-header.a { border-left-color: var(--a); }
    .grade-header.b { border-left-color: var(--b); }
    .grade-header.c { border-left-color: var(--c); }

    .grade-label {
      font-weight: 700;
      font-size: 14px;
      min-width: 60px;
    }

    .grade-label.splus { color: var(--splus); }
    .grade-label.s { color: var(--s); }
    .grade-label.a { color: var(--a); }
    .grade-label.b { color: var(--b); }
    .grade-label.c { color: var(--c); }

    .grade-count {
      color: var(--sub);
      font-size: 12px;
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .coin-card {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .coin-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(34, 211, 238, 0.15);
    }

    .coin-card.splus { border-color: rgba(255, 20, 147, 0.3); }
    .coin-card.splus:hover { border-color: var(--splus); box-shadow: 0 8px 24px rgba(255, 20, 147, 0.2); }

    .coin-card.s { border-color: rgba(255, 107, 107, 0.3); }
    .coin-card.s:hover { border-color: var(--s); box-shadow: 0 8px 24px rgba(255, 107, 107, 0.2); }

    .coin-card.a { border-color: rgba(255, 165, 0, 0.3); }
    .coin-card.a:hover { border-color: var(--a); box-shadow: 0 8px 24px rgba(255, 165, 0, 0.2); }

    .coin-card.b { border-color: rgba(65, 105, 225, 0.3); }
    .coin-card.b:hover { border-color: var(--b); box-shadow: 0 8px 24px rgba(65, 105, 225, 0.2); }

    .coin-card.c { border-color: rgba(128, 128, 128, 0.3); }
    .coin-card.c:hover { border-color: var(--c); box-shadow: 0 8px 24px rgba(128, 128, 128, 0.2); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .coin-info {
      flex: 1;
    }

    .coin-name {
      font-weight: 700;
      color: var(--cyan);
      font-size: 16px;
    }

    .coin-price {
      font-size: 12px;
      color: var(--sub);
      margin-top: 2px;
    }

    .price-change {
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }

    .price-change.up { color: var(--green); }
    .price-change.down { color: var(--red); }

    .grade-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      margin-right: 6px;
    }

    .grade-badge.splus { background: rgba(255, 20, 147, 0.2); color: var(--splus); }
    .grade-badge.s { background: rgba(255, 107, 107, 0.2); color: var(--s); }
    .grade-badge.a { background: rgba(255, 165, 0, 0.2); color: var(--a); }
    .grade-badge.b { background: rgba(65, 105, 225, 0.2); color: var(--b); }
    .grade-badge.c { background: rgba(128, 128, 128, 0.2); color: var(--c); }

    .resonance-tag {
      font-size: 10px;
      padding: 4px 8px;
      background: rgba(168, 85, 247, 0.2);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 4px;
      color: #d8b4fe;
      white-space: nowrap;
      margin-right: 6px;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 10px;
      padding: 4px 8px;
      background: rgba(34, 211, 238, 0.2);
      border: 1px solid rgba(34, 211, 238, 0.4);
      border-radius: 4px;
      color: var(--cyan);
      white-space: nowrap;
    }

    .tag.risk-high { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: #fca5a5; }
    .tag.risk-mid { background: rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.4); color: #fcd34d; }
    .tag.risk-low { background: rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.4); color: #86efac; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }

    .metric {
      background: rgba(0, 0, 0, 0.3);
      padding: 6px;
      border-radius: 4px;
      text-align: center;
    }

    .metric-label {
      font-size: 9px;
      color: var(--sub);
      margin-bottom: 2px;
    }

    .metric-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }

    .metric-value.up { color: var(--green); }
    .metric-value.down { color: var(--red); }

    .derivatives-info {
      background: rgba(34, 211, 238, 0.1);
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 11px;
      line-height: 1.6;
      border: 1px solid rgba(34, 211, 238, 0.3);
    }

    .derivatives-label {
      color: var(--sub);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .derivatives-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
      color: var(--text);
    }

    .quick-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .quick-link {
      flex: 1;
      min-width: 60px;
      padding: 6px;
      background: rgba(34, 211, 238, 0.15);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 4px;
      font-size: 9px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .quick-link:hover {
      background: rgba(34, 211, 238, 0.3);
      border-color: var(--cyan);
    }

    .detail-page {
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back-btn {
      padding: 8px 16px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 20px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .back-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .detail-metric {
      background: var(--sub-bg);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .detail-metric-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .detail-metric-value {
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
    }

    .detail-metric-value.up { color: var(--green); }
    .detail-metric-value.down { color: var(--red); }

    .timeframe-analysis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .tf-analysis {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .tf-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 8px;
      font-size: 12px;
    }

    .tf-content {
      font-size: 11px;
      line-height: 1.8;
      color: var(--sub);
    }

    .tf-content strong {
      color: var(--text);
    }

    .quick-channel-section {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .quick-channel-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
      font-size: 13px;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    @media (max-width: 768px) {
      .channel-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .channel-hint {
      margin-top: 12px;
      padding: 8px;
      background: rgba(34, 211, 238, 0.1);
      border-radius: 6px;
      font-size: 11px;
      color: var(--sub);
      line-height: 1.5;
    }

    .error-box {
      padding: 30px;
      text-align: center;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      color: #fca5a5;
      margin: 20px 0;
      font-size: 13px;
      line-height: 1.8;
    }

    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 16px;
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      z-index: 1000;
      animation: slideIn 0.3s;
      max-width: 300px;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
      }
      to {
        transform: translateX(0);
      }
    }

    .notification.success {
      border-color: rgba(34, 197, 94, 0.5);
      background: rgba(34, 197, 94, 0.1);
      color: #86efac;
    }

    .notification.error {
      border-color: rgba(239, 68, 68, 0.5);
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
    }

    .notification.info {
      border-color: rgba(34, 211, 238, 0.5);
      background: rgba(34, 211, 238, 0.1);
      color: #22d3ee;
    }

    .derivatives-panel {
      background: var(--sub-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .panel-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
      font-size: 13px;
    }

    .crowding-risk-high {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .crowding-risk-mid {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .crowding-risk-low {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.3);
    }

    @media (max-width: 768px) {
      .container { padding: 12px; }
      .header { flex-direction: column; align-items: stretch; }
      .header-left, .header-right { flex-direction: column; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .detail-metrics { grid-template-columns: repeat(2, 1fr); }
      .timeframe-analysis { grid-template-columns: 1fr; }
    }

    .loading-spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .scanning-info {
      padding: 12px;
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid rgba(234, 179, 8, 0.3);
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    .scanning-progress {
      height: 4px;
      background: rgba(34, 211, 238, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .scanning-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo">🚀 启动点捕捉 v5.0</div>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchPage('monitor', this)">📊 监控</button>
          <button class="nav-tab" onclick="switchPage('search', this)">🔍 搜索</button>
        </div>
      </div>
      <div class="header-right">
        <div class="update-time">最后更新: <span class="update-time-val" id="update-time">--:--</span></div>
        <div id="scan-status" class="scan-status" style="display: none;"></div>
        <button class="btn primary" id="manual-refresh-btn" onclick="manualRefresh()"><span id="refresh-icon">🔄</span> 手动扫描</button>
      </div>
    </div>

    <div id="monitor" class="page active">
      <div id="scanning-status" class="scanning-info" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <span id="scanning-text">正在扫描币种...</span>
          <span id="scanning-progress-text">0/500</span>
        </div>
        <div class="scanning-progress">
          <div class="scanning-progress-bar" id="scanning-progress-bar"></div>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">S+ 级</div>
          <div class="stat-value" id="grade-splus-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">S 级</div>
          <div class="stat-value" id="grade-s-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">A 级</div>
          <div class="stat-value" id="grade-a-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">B 级</div>
          <div class="stat-value" id="grade-b-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">C 级</div>
          <div class="stat-value" id="grade-c-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">已分析币种</div>
          <div class="stat-value" id="analyzed-count">0</div>
        </div>
      </div>

      <div id="monitor-content">
        <div class="error-box">⏳ 正在加载数据...</div>
      </div>
    </div>

    <div id="search" class="page">
      <div class="search-box">
        <input type="text" id="search-input" class="search-input" placeholder="输入币种代码或名称（如 PEPE、BTC、SOL）" onkeyup="showSearchSuggestions()" />
        <button class="btn primary" id="search-btn" onclick="searchCoin()">🔍 搜索</button>
        <div id="search-suggestions" class="search-suggestions"></div>
      </div>
      <div id="search-content">
        <div class="error-box">输入币种名称开始搜索</div>
      </div>
    </div>

    <div id="detail" class="page">
      <div id="detail-content">
        <div class="error-box">⏳ 加载中...</div>
      </div>
    </div>
  </div>

  <script>
    // ============ 全局配置 ============
    const CONFIG = {
      refreshMs: 300000,
      binanceUrl: 'https://api.binance.com/api/v3',
      futuresUrl: 'https://fapi.binance.com/fapi/v1',
      futuresDataUrl: 'https://fapi.binance.com/futures/data',
      coingeckoApi: 'https://api.coingecko.com/api/v3',
      concurrentLimit: 4,

      if (absNum >= 1e6) return (num / 1e6).toFixed(decimals) + 'M';

    // ============ HTTP 请求函数 ============
    async function fetchJSON(url, options = {}) {
      const timeout = options.timeout || CONFIG.requestTimeout;
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);

      try {
        const response = await fetch(url, {
          ...options,
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        return await response.json();
      } catch (error) {
        clearTimeout(timeoutId);
        throw error;
      }
    }

    // ============ 并发控制 ============
    async function runWithConcurrencyLimit(tasks, limit) {
      const results = new Array(tasks.length);
      const executing = [];

      for (let i = 0; i < tasks.length; i++) {
        const task = tasks[i];

        const promise = Promise.resolve()
          .then(() => task())
          .then(result => {
            results[i] = result;
          })
          .catch(err => {
            console.warn(`Task ${i} failed:`, err.message);
            results[i] = null;
          })
          .finally(() => {
            const index = executing.indexOf(promise);
            if (index > -1) executing.splice(index, 1);
          });

        executing.push(promise);

        if (executing.length >= limit) {
          await Promise.race(executing);
        }
      }

      await Promise.all(executing);
      return results;
    }

    // ============ 技术指标计算 ============
    function calcRSI(prices, period = 14) {
      if (prices.length < period + 1) return 50;
      const gains = [];
      const losses = [];

      for (let i = 1; i < prices.length; i++) {
        const diff = prices[i] - prices[i - 1];
        if (diff > 0) {
          gains.push(diff);
          losses.push(0);
        } else {
          gains.push(0);
          losses.push(Math.abs(diff));
        }
      }

      const avgGain = gains.slice(-period).reduce((a, b) => a + b, 0) / period;
      const avgLoss = losses.slice(-period).reduce((a, b) => a + b, 0) / period;

      if (avgLoss === 0) return avgGain === 0 ? 50 : 100;
      const rs = avgGain / avgLoss;
      const rsi = 100 - (100 / (1 + rs));
      return Math.max(0, Math.min(100, rsi));
    }

    function calcMACD(prices, fastPeriod = 12, slowPeriod = 26, signalPeriod = 9) {
      if (prices.length < slowPeriod) return { macd: 0, signal: 0, histogram: 0 };

      const emaFast = calcEMA(prices, fastPeriod);
      const emaSlow = calcEMA(prices, slowPeriod);
      const macd = emaFast - emaSlow;

      const macdLine = [];
      for (let i = 0; i < prices.length; i++) {
        const f = calcEMA(prices.slice(0, i + 1), fastPeriod);
        const s = calcEMA(prices.slice(0, i + 1), slowPeriod);
        macdLine.push(f - s);
      }

      const signal = calcEMA(macdLine, signalPeriod);
      const histogram = macd - signal;

      return { macd, signal, histogram };
    }

    function calcEMA(prices, period) {
      if (prices.length === 0) return 0;
      if (prices.length < period) return prices[prices.length - 1];

      let sma = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
      const multiplier = 2 / (period + 1);

      for (let i = period; i < prices.length; i++) {
        sma = (prices[i] - sma) * multiplier + sma;
      }

      return sma;
    }

    function calcCVD(volumes, buyPressure) {
      if (volumes.length === 0) return { trend: 'neutral', value: 0 };
      const cvdValue = volumes.reduce((sum, v) => sum + v * (buyPressure ? 1 : -1), 0);
      return {
        trend: cvdValue > 0 ? 'up' : cvdValue < 0 ? 'down' : 'neutral',
        value: cvdValue
      };
    }

    function checkResonance(coin) {

      if (cvdUp) {

      // OI共振：OI增长 + 资金费率 + 多空不极端
      const oiGrowth = coin.oi6hPct > 5 || coin.oi24hPct > 10;
      const fundingOk = coin.fundingRate > 0 && coin.fundingRate < 0.3;
      const lsRatioOk = coin.globalLongShortRatio > 0.8 && coin.globalLongShortRatio < 2;

      if (oiGrowth && fundingOk && lsRatioOk) {

    // ============ 核心评分函数（权重：OI > CVD > MACD > 价格） ============
    function calculateGrade(coin) {
      let score = 0;

      // 权重1: OI（最高权重）
      let oiScore = 0;

      // OI绝对值
      if (coin.openInterest > 0) {
        oiScore += 10;
        if (coin.oiMcapRatio > 25) oiScore += 8;
        else if (coin.oiMcapRatio > 15) oiScore += 5;
        else if (coin.oiMcapRatio > 5) oiScore += 2;
      }

      // OI增长趋势
      if (coin.oi6hPct > 20) oiScore += 8;
      else if (coin.oi6hPct > 10) oiScore += 5;
      else if (coin.oi6hPct > 0) oiScore += 2;

      if (coin.oi24hPct > 30) oiScore += 6;
      else if (coin.oi24hPct > 15) oiScore += 3;

      // 资金费率（正向为好）
      if (coin.fundingRate > 0.01 && coin.fundingRate < 0.2) oiScore += 4;
      else if (coin.fundingRate > 0 && coin.fundingRate <= 0.01) oiScore += 2;

      // 多空比（接近1为好）
      const lsDeviation = Math.abs(coin.globalLongShortRatio - 1);
      if (lsDeviation < 0.3) oiScore += 3;
      else if (lsDeviation < 0.6) oiScore += 1;

      score += oiScore * 1.5; // OI权重倍数

      // 权重2: CVD（中等权重）
      let cvdScore = 0;

      if (coin.cvd5m.trend === 'up') cvdScore += 4;
      if (coin.cvd1h.trend === 'up') cvdScore += 5;
      if (coin.cvd5m.trend === 'up' && coin.cvd1h.trend === 'up') cvdScore += 3; // 共振加分

      score += cvdScore * 1.2; // CVD权重倍数

      // 权重3: MACD（低权重，辅助）
      let macdScore = 0;

      if (coin.macd1h.histogram > 0) macdScore += 2;
      if (coin.macd4h.histogram > 0) macdScore += 1;

      score += macdScore * 0.8; // MACD权重倍数

      // 权重4: RSI（辅助，极端情况扣分）
      let rsiScore = 0;

      if (coin.rsi5m < 30) rsiScore += 3;
      else if (coin.rsi5m > 70) rsiScore -= 2;

      if (coin.rsi1h < 30) rsiScore += 4;
      else if (coin.rsi1h > 70) rsiScore -= 3;

      score += rsiScore * 0.7; // RSI权重倍数

      // 权重5: 价格（最低权重）
      let priceScore = 0;

      if (coin.change5m > 0) priceScore += 1;
      if (coin.change1h > 1) priceScore += 2;
      else if (coin.change1h > 0) priceScore += 1;

      // 24h权重降低（根据要求）
      if (coin.change24h > 5) priceScore += 0.5;

      score += priceScore * 0.5; // 价格权重倍数

      // ============ 评级判定 ============
      let grade = 'c';
      let gradeScore = 1;

      // S+级：强OI+CVD共振 + 低拥挤 + 6h/24h OI增长
      if (
        coin.resonance.count >= 3 &&
        coin.resonance.oiResonance &&
        coin.resonance.cvdResonance &&
        coin.crowdingRisk.level === 'low' &&
        coin.oi6hPct > 15 &&
        coin.oi24hPct > 20 &&
        score > 60
      ) {
        grade = 'splus';
        gradeScore = 5;
      }
      // S级：OI+CVD共振 + 可接受拥挤 + OI增长
      else if (
        coin.resonance.count >= 3 &&
        coin.resonance.oiResonance &&
        coin.resonance.cvdResonance &&
        coin.crowdingRisk.level !== 'high' &&
        coin.oi6hPct > 5 &&
        score > 45
      ) {
        grade = 's';
        gradeScore = 4;
      }
      // A级：至少OI共振或CVD共振 + 不过度拥挤
      else if (
        (coin.resonance.oiResonance || coin.resonance.cvdResonance) &&
        coin.crowdingRisk.level !== 'high' &&
        score > 30
      ) {
        grade = 'a';
        gradeScore = 3;
      }
      // B级：有一定信号但指标不够完美
      else if (score > 15 && coin.crowdingRisk.level !== 'high') {
        grade = 'b';
        gradeScore = 2;
      }
      // C级：其他
      else {
        grade = 'c';
        gradeScore = 1;
      }

      return { grade, gradeScore, score };
    }

            const rsi5m = calcRSI(prices5m, 14);
            const rsi1h = calcRSI(prices1h, 14);
            const rsi4h = calcRSI(prices4h, 14);
            const rsi1d = calcRSI(prices1d, 14);

            const macd1h = calcMACD(prices1h);
            const macd4h = calcMACD(prices4h);

            const volumes5m = kline5m.length ? kline5m.map(k => k.volume) : [0];
            const volumes1h = kline1h.length ? kline1h.map(k => k.volume) : [0];

            const cvd5m = calcCVD(volumes5m, true);
            const cvd1h = calcCVD(volumes1h, true);

            const calcChange = prices => prices.length > 1
              ? ((prices[prices.length - 1] - prices[0]) / prices[0]) * 100
              : 0;

            const change5m = calcChange(prices5m);
            const change1h = calcChange(prices1h);
            const change4h = calcChange(prices4h);
            const change1d = calcChange(prices1d);

            const mainDirection = change1h > 0 ? 'up' : 'down';

            const oiMcapRatio = calculateOiMcapRatio(futuresData.oiValue, marketCap);

            const phase5m = rsi5m > 70 ? 'overbought' : rsi5m < 30 ? 'oversold' : 'normal';
            const phase1h = rsi1h > 70 ? 'overbought' : rsi1h < 30 ? 'oversold' : 'normal';
            const phase4h = rsi4h > 70 ? 'overbought' : rsi4h < 30 ? 'oversold' : 'normal';
            const phase1d = rsi1d > 70 ? 'overbought' : rsi1d < 30 ? 'oversold' : 'normal';

            let buySignalCount = 0;
            let sellSignalCount = 0;

            // 短周期权重高
            if (rsi5m < 30) buySignalCount += 4;
            if (rsi5m > 70) sellSignalCount += 4;
            if (rsi1h < 30) buySignalCount += 5;
            if (rsi1h > 70) sellSignalCount += 5;
            if (rsi4h < 30) buySignalCount += 2;
            if (rsi4h > 70) sellSignalCount += 2;

            // MACD权重降低
            if (macd1h.histogram > 0) buySignalCount += 1;
            if (macd1h.histogram < 0) sellSignalCount += 1;
            if (macd4h.histogram > 0) buySignalCount += 1;
            if (macd4h.histogram < 0) sellSignalCount += 1;

            const totalSignal = buySignalCount - sellSignalCount;

            let grade = 'c';
            let gradeScore = 1;
            if (totalSignal >= 12) {
              grade = 'splus'; gradeScore = 5;
            } else if (totalSignal >= 8) {
              grade = 's'; gradeScore = 4;
            } else if (totalSignal >= 4) {
              grade = 'a'; gradeScore = 3;
            } else if (totalSignal >= 0) {
              grade = 'b'; gradeScore = 2;
            }

            const crowdingRisk = calculateCrowdingRisk(
              futuresData.globalLongShortRatio,
              oiMcapRatio,
              rsi1h,
              mainDirection,
              futuresData.oi6hPct,
              futuresData.oi24hPct
            );

            const coin = {
              symbol,
              price: stats24h.price,
              change24h: stats24h.change24h,
              marketCap,
              rsi5m, rsi1h, rsi4h, rsi1d,
              macd1h, macd4h,
              cvd5m, cvd1h,
              change5m, change1h, change4h, change1d,
              mainDirection,
              phase5m, phase1h, phase4h, phase1d,
              buySignalCount,
              sellSignalCount,
              totalSignal,
              grade,
              gradeScore,
              openInterest: futuresData.openInterest,
              oiValue: futuresData.oiValue,
              fundingRate: futuresData.fundingRate,
              globalLongShortRatio: futuresData.globalLongShortRatio,
              oi6hPct: futuresData.oi6hPct,
              oi24hPct: futuresData.oi24hPct,
              oiMcapRatio,
              crowdingRisk,
              resonance: { count: 0, details: [] },
              timestamp: Date.now()
            };

            return coin;
          } catch (err) {
            console.warn(`搜索分析 ${symbol} 在 ${market} 失败:`, err.message);
          }
        }

        return null;
      } catch (e) {
        console.error(`搜索分析 ${symbol} 失败:`, e.message);
        return null;
      }
    }

    // ============ 完整分析函数 ============
    async function analyzeCoin(symbol, quickScanData = null) {
      try {
        let kline5m, kline1h, kline4h, kline1d, stats24h, futuresData, marketCap;

        if (quickScanData) {
          stats24h = quickScanData.stats24h;
          futuresData = quickScanData.futuresData;
          kline1h = await getKlineData(symbol, '1h', CONFIG.fullScanLimit);
          [kline5m, kline4h, kline1d, marketCap] = await Promise.all([
            getKlineData(symbol, '5m', 50),
            getKlineData(symbol, '4h', CONFIG.fullScanLimit),
            getKlineData(symbol, '1d', 100),
            getMarketCapData(symbol)
          ]);
        } else {
          [kline5m, kline1h, kline4h, kline1d, stats24h, futuresData, marketCap] = await Promise.all([
            getKlineData(symbol, '5m', 50),
            getKlineData(symbol, '1h', CONFIG.fullScanLimit),
            getKlineData(symbol, '4h', CONFIG.fullScanLimit),
            getKlineData(symbol, '1d', 100),
            get24hStats(symbol),
            getFuturesData(symbol),
            getMarketCapData(symbol)
          ]);
        }

        if (!stats24h || !kline1h || kline1h.length === 0) {
          return null;
        }

        const prices5m = kline5m.map(k => k.close);
        const prices1h = kline1h.map(k => k.close);
        const prices4h = kline4h.map(k => k.close);
        const prices1d = kline1d.map(k => k.close);

        const rsi5m = calcRSI(prices5m, 14);
        const rsi1h = calcRSI(prices1h, 14);
        const rsi4h = calcRSI(prices4h, 14);
        const rsi1d = calcRSI(prices1d, 14);

        const macd1h = calcMACD(prices1h);
        const macd4h = calcMACD(prices4h);

        const volumes5m = kline5m.map(k => k.volume);
        const volumes1h = kline1h.map(k => k.volume);

        const cvd5m = calcCVD(volumes5m, true);
        const cvd1h = calcCVD(volumes1h, true);

        const change5m = ((prices5m[prices5m.length - 1] - prices5m[0]) / prices5m[0]) * 100;
        const change1h = ((prices1h[prices1h.length - 1] - prices1h[0]) / prices1h[0]) * 100;
        const change4h = ((prices4h[prices4h.length - 1] - prices4h[0]) / prices4h[0]) * 100;
        const change1d = ((prices1d[prices1d.length - 1] - prices1d[0]) / prices1d[0]) * 100;

        const mainDirection = change1h > 0 ? 'up' : 'down';

        const oiMcapRatio = calculateOiMcapRatio(futuresData.oiValue, marketCap);

        const phase5m = rsi5m > 70 ? 'overbought' : rsi5m < 30 ? 'oversold' : 'normal';
        const phase1h = rsi1h > 70 ? 'overbought' : rsi1h < 30 ? 'oversold' : 'normal';
        const phase4h = rsi4h > 70 ? 'overbought' : rsi4h < 30 ? 'oversold' : 'normal';
        const phase1d = rsi1d > 70 ? 'overbought' : rsi1d < 30 ? 'oversold' : 'normal';

        let longReasons = [];
        let shortReasons = [];

        // 短周期做多信号（权重高）
        if (rsi5m < 30) longReasons.push('5m RSI 超卖');
        if (rsi5m < 25) longReasons.push('5m RSI 极度超卖');
        if (rsi1h < 30) longReasons.push('1h RSI 超卖');
        if (rsi1h < 25) longReasons.push('1h RSI 极度超卖');

        // 做空信号
        if (rsi5m > 70) shortReasons.push('5m RSI 超买');
        if (rsi5m > 75) shortReasons.push('5m RSI 极度超买');
        if (rsi1h > 70) shortReasons.push('1h RSI 超买');
        if (rsi1h > 75) shortReasons.push('1h RSI 极度超买');

        // OI趋势信号（权重高）
        if (futuresData.openInterest > 0 && futuresData.oi6hPct > 10) {
          longReasons.push(`OI 6h增长 ${futuresData.oi6hPct.toFixed(1)}%`);
        }
        if (futuresData.openInterest > 0 && futuresData.oi24hPct > 20) {
          longReasons.push(`OI 24h增长 ${futuresData.oi24hPct.toFixed(1)}%`);
        }

        // 资金费率信号
        if (futuresData.fundingRate > 0.1) {
          longReasons.push(`资金费率上升 ${futuresData.fundingRate.toFixed(3)}%`);
        } else if (futuresData.fundingRate < -0.1) {
          shortReasons.push(`资金费率下降 ${futuresData.fundingRate.toFixed(3)}%`);
        }

        // CVD信号（中等权重）
        if (cvd1h.trend === 'up') longReasons.push('1h CVD向上');
        if (cvd1h.trend === 'down') shortReasons.push('1h CVD向下');
        if (cvd5m.trend === 'up') longReasons.push('5m CVD向上');
        if (cvd5m.trend === 'down') shortReasons.push('5m CVD向下');

        // MACD信号（权重降低）
        if (macd1h.histogram > 0) longReasons.push('1h MACD正向');
        if (macd1h.histogram < 0) shortReasons.push('1h MACD负向');
        if (macd4h.histogram > 0 && macd4h.histogram > macd1h.histogram) {
          longReasons.push('4h MACD向上');
        }

        // 价格动能信号（权重最低）
        if (change5m > 1) longReasons.push('5m强势上涨');
        if (change5m < -1) shortReasons.push('5m强势下跌');
        if (change1h > 2) longReasons.push('1h强势上涨');
        if (change1h < -2) shortReasons.push('1h强势下跌');

        // 24h信号权重大幅降低
        if (stats24h && stats24h.change24h > 10 && mainDirection === 'up') {
          longReasons.push('24h涨幅较大（参考）');
        }

        const buySignalCount = longReasons.length;
        const sellSignalCount = shortReasons.length;
        const totalSignal = buySignalCount - sellSignalCount;

        // ============ 构建推荐 ============
        let recommendType = 'spot';
        let recommendLeverage = 1;
        let recommendPosition = 5;

        if (futuresData.openInterest > 0) {
          if (totalSignal > 6) {
            recommendType = 'futures';
            recommendLeverage = 2;
            recommendPosition = 3;
          } else if (totalSignal > 3) {
            recommendType = 'futures';
            recommendLeverage = 1;
            recommendPosition = 5;
          } else if (totalSignal < -6) {
            recommendType = 'futures';
            recommendLeverage = 2;
            recommendPosition = 3;
          }
        } else {
          recommendPosition = totalSignal > 3 ? 8 : 5;
        }

        // 拥挤度评估
        const crowdingRisk = calculateCrowdingRisk(
          futuresData.globalLongShortRatio,
          oiMcapRatio,
          rsi1h,
          mainDirection,
          futuresData.oi6hPct,
          futuresData.oi24hPct
        );

        // 创建硬币对象
        const coin = {
          symbol,
          price: stats24h.price,
          change24h: stats24h.change24h,
          marketCap,
          rsi5m, rsi1h, rsi4h, rsi1d,
          macd1h, macd4h,
          cvd5m, cvd1h,
          change5m, change1h, change4h, change1d,
          mainDirection,
          phase5m, phase1h, phase4h, phase1d,
          buySignalCount,
          sellSignalCount,
          totalSignal,
          longReasons,
          shortReasons,
          recommendType,
          recommendLeverage,
          recommendPosition,
          openInterest: futuresData.openInterest,
          oiValue: futuresData.oiValue,
          fundingRate: futuresData.fundingRate,
          globalLongShortRatio: futuresData.globalLongShortRatio,
          oi6hPct: futuresData.oi6hPct,
          oi24hPct: futuresData.oi24hPct,
          oiMcapRatio,
          crowdingRisk,
          resonance: checkResonance({
            change5m, change1h, change4h,
            cvd5m, cvd1h,
            openInterest: futuresData.openInterest,
            oi6hPct: futuresData.oi6hPct,
            oi24hPct: futuresData.oi24hPct,
            fundingRate: futuresData.fundingRate,
            globalLongShortRatio: futuresData.globalLongShortRatio
          }),
          timestamp: Date.now()
        };

        // 计算评级
        const gradeInfo = calculateGrade(coin);
        coin.grade = gradeInfo.grade;
        coin.gradeScore = gradeInfo.gradeScore;
        coin.totalScore = gradeInfo.score;

        return coin;
      } catch (e) {
        console.warn(`分析 ${symbol} 失败:`, e.message);
        return null;
      }
    }

async function twoPhaseFullRefresh() {
  if (isRefreshing) return;
  isRefreshing = true;

  const statusDiv = document.getElementById('scanning-status');
  const progressBar = document.getElementById('scanning-progress-bar');
  const progressText = document.getElementById('scanning-progress-text');
  const scanStatusDiv = document.getElementById('scan-status');
  const refreshBtn = document.getElementById('manual-refresh-btn');

  try {
    if (statusDiv) statusDiv.style.display = 'block';
    if (refreshBtn) {
      refreshBtn.disabled = true;
      refreshBtn.classList.add('loading');
    }
    if (scanStatusDiv) {
      scanStatusDiv.textContent = '⏳ 扫描中...';
      scanStatusDiv.style.display = 'block';
    }
    if (progressBar) progressBar.style.width = '0%';
    if (progressText) progressText.textContent = `0/${allSymbols.length}`;

    const startTime = Date.now();
    let currentIndex = 0;
    allCoins = {};

    const quickScanList = allSymbols.slice(0, CONFIG.quickScanLimit);
    const quickResults = [];

    for (let i = 0; i < quickScanList.length; i++) {
      const symbol = quickScanList[i];
      const result = await quickScanCoin(symbol);

      if (result && result.quickScore > 0) {
        quickResults.push(result);
      }

      currentIndex++;
      const progress = (currentIndex / allSymbols.length) * 100;
      if (progressBar) progressBar.style.width = progress + '%';
      if (progressText) progressText.textContent = `${currentIndex}/${allSymbols.length}`;
    }

    console.log(`快速扫描完成：${quickResults.length} 个候选币种`);

    const toAnalyze = quickResults.slice(0, CONFIG.fullScanLimit);
    const analyzeTasks = toAnalyze.map(qr => () => analyzeCoin(qr.symbol, qr));
    const fullResults = await runWithConcurrencyLimit(analyzeTasks, CONFIG.concurrentLimit);

    fullResults.forEach((coin) => {
      if (coin) {
        allCoins[coin.symbol] = coin;
      }
    });

    const remaining = allSymbols.slice(CONFIG.quickScanLimit).slice(0, 50);
    for (const symbol of remaining) {
      if (allCoins[symbol]) continue;

      const result = await quickScanCoin(symbol);
      if (result && result.quickScore > -2) {
        const coin = await analyzeCoin(symbol, result);
        if (coin) {
          allCoins[coin.symbol] = coin;
        }
      }

      currentIndex++;
      const progress = (currentIndex / allSymbols.length) * 100;
      if (progressBar) progressBar.style.width = Math.min(progress, 100) + '%';
      if (progressText) progressText.textContent = `${currentIndex}/${allSymbols.length}`;
    }

    const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
    console.log(`扫描完成！总耗时 ${totalTime}s，共分析 ${Object.keys(allCoins).length} 个币种`);

    const updateTimeEl = document.getElementById('update-time');
    if (updateTimeEl) {
      updateTimeEl.textContent = new Date().toLocaleTimeString('zh-CN');
    }

    renderMonitorContent();
    showNotification(`✅ 扫描完成！分析了 ${Object.keys(allCoins).length} 个币种`, 'success');
  } catch (e) {
    console.error('扫描失败:', e);
    showNotification(`❌ 扫描失败: ${e.message}`, 'error');
  } finally {
    isRefreshing = false;
    if (statusDiv) statusDiv.style.display = 'none';
    if (refreshBtn) {
      refreshBtn.disabled = false;
      refreshBtn.classList.remove('loading');
    }
    if (scanStatusDiv) {
      scanStatusDiv.style.display = 'none';
    }
  }
}

      document.getElementById('grade-c-count').textContent = gradeCounts.c;
      document.getElementById('analyzed-count').textContent = Object.keys(allCoins).length;

      let html = '';

      grades.forEach(grade => {
        const coins = Object.values(allCoins)
          .filter(c => c.grade === grade)
          .sort((a, b) => b.totalSignal - a.totalSignal);

        if (coins.length === 0) return;

        const gradeLabels = { splus: 'S+', s: 'S', a: 'A', b: 'B', c: 'C' };

        html += `

            </div>
            <div class="grid">
              ${coins.map(coin => renderCoinCard(coin)).join('')}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    // ============ 初始化 ============
    async function init() {
      const statusDiv = document.getElementById('scanning-status');
      statusDiv.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <span id="init-text">加载交所信息...</span>
          <span id="init-progress-text">0%</span>
        </div>
        <div class="scanning-progress">
          <div class="scanning-progress-bar" id="init-progress-bar"></div>
        </div>
      `;
      statusDiv.style.display = 'block';

      try {
        document.getElementById('init-text').textContent = '加载币种列表...';
        await loadExchangeInfo();
        document.getElementById('init-progress-bar').style.width = '50%';
        document.getElementById('init-progress-text').textContent = '50%';

        document.getElementById('init-text').textContent = '初始化完成，开始首次扫描...';
        document.getElementById('init-progress-bar').style.width = '100%';
        document.getElementById('init-progress-text').textContent = '100%';

        setTimeout(() => {
          statusDiv.style.display = 'none';
          twoPhaseFullRefresh();
        }, 800);

        // 定时刷新
        setInterval(() => {
          twoPhaseFullRefresh();
        }, CONFIG.refreshMs);
      } catch (e) {
        console.error('初始化失败:', e);
        document.getElementById('monitor-content').innerHTML = `
          <div class="error-box">
            初始化失败: ${e.message}<br>
            请检查网络连接或刷新页面重试
          </div>
        `;
      }
    }

    // 页面加载完成后初始化
    window.addEventListener('load', init);

    // 搜索框回车处理
    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            document.getElementById('search-suggestions').classList.remove('active');
            searchCoin();
          }
        });
      }
    });
  </script>

  <script>
const CONFIG = {
  symbols: [
    'PEPE','WIF','BONK','FLOKI','NOT','DOGE','SHIB','GROK','BRETT','POPCAT',
    'NEIRO','PNUT','VANA','ZRO','MEME','AI','BLUR','SEI','JUP','SUI',
    'NEAR','APT','ENA','TRB','INJ','ARB','OP','STRK','MANTA','PIXEL'
  ],
  refreshMs: 60000,
  binanceUrl: 'https://api.binance.com/api/v3',
  bybitUrl: 'https://api.bybit.com/v5'
};

let allCoins = {};
let klineCache = {};
let signalHistory = {};
let currentPage = 'monitor';

// ============ 工具函数 ============

function fmt(n, decimals = 2) {
  const num = Number(n);
  if (!isFinite(num)) return '--';
  if (Math.abs(num) >= 1e9) return (num / 1e9).toFixed(decimals) + 'B';
  if (Math.abs(num) >= 1e6) return (num / 1e6).toFixed(decimals) + 'M';
  if (Math.abs(num) >= 1e3) return (num / 1e3).toFixed(decimals) + 'K';
  return num.toFixed(decimals);
}

function fmtPct(n, decimals = 2) {
  const num = Number(n);
  if (!isFinite(num)) return '--';
  return (num > 0 ? '+' : '') + num.toFixed(decimals) + '%';
}

function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page + '-page').classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event?.target?.classList.add('active');
}

function showNotification(msg, type = 'success') {
  const div = document.createElement('div');
  div.className = 'notification';
  if (type === 'warning') {
    div.style.borderColor = 'var(--orange)';
    div.style.color = 'var(--orange)';
  }
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text);
  showNotification('✅ 已复制: ' + text);
}

// ============ 数据获取 ============

async function getKlines(symbol, timeframe, limit = 100) {
  try {
    const interval = { '5m': '5m', '15m': '15m', '1h': '1h', '4h': '4h', '1d': '1d' }[timeframe];
    const response = await axios.get(
      `${CONFIG.binanceUrl}/klines?symbol=${symbol}USDT&interval=${interval}&limit=${limit}`,
      { timeout: 5000 }
    );
    return response.data.map(k => ({
      time: Number(k[0]),
      o: Number(k[1]),
      h: Number(k[2]),
      l: Number(k[3]),
      c: Number(k[4]),
      v: Number(k[7])
    }));
  } catch (error) {
    console.error(`获取 ${symbol} ${timeframe} K线失败:`, error.message);
    return null;
  }
}

async function getTicker(symbol) {
  try {
    const response = await axios.get(
      `${CONFIG.binanceUrl}/ticker/24hr?symbol=${symbol}USDT`,
      { timeout: 5000 }
    );
    const data = response.data;
    return {
      price: Number(data.lastPrice),
      change24h: Number(data.priceChangePercent),
      volume24h: Number(data.quoteAssetVolume),
      high24h: Number(data.highPrice),
      low24h: Number(data.lowPrice),
      bid: Number(data.bidPrice),
      ask: Number(data.askPrice)
    };
  } catch (error) {
    console.error(`获取 ${symbol} 行情失败:`, error.message);
    return null;
  }
}

async function getBybitFuturesData(symbol) {
  try {
    const [ticker, oi, ratio, funding, liq] = await Promise.all([
      axios.get(`${CONFIG.bybitUrl}/market/tickers?category=linear&symbol=${symbol}USDT`, { timeout: 5000 }),
      axios.get(`${CONFIG.bybitUrl}/market/open-interest?category=linear&symbol=${symbol}USDT&intervalTime=5min`, { timeout: 5000 }),
      axios.get(`${CONFIG.bybitUrl}/market/account-ratio?category=linear&symbol=${symbol}USDT&period=5min`, { timeout: 5000 }),
      axios.get(`${CONFIG.bybitUrl}/market/funding/history?category=linear&symbol=${symbol}USDT&limit=1`, { timeout: 5000 }),
      axios.get(`${CONFIG.bybitUrl}/market/liquidation?category=linear&symbol=${symbol}USDT&limit=100`, { timeout: 5000 })
    ]);

    const tickerData = ticker.data.result.list[0];
    const oiData = oi.data.result;
    const ratioData = ratio.data.result[0] || {};
    const fundingData = funding.data.result.list[0] || {};
    const liqData = liq.data.result.list || [];

    let longLiq = 0, shortLiq = 0;
    liqData.forEach(item => {
      const size = Number(item.quantity || 0) * Number(item.price || 0);
      if (item.side === 'Buy') shortLiq += size;
      else longLiq += size;
    });

    const currOI = Number(oiData.openInterest || 0);
    let oiChange = 0;
    if (allCoins[symbol]?.futures?.lastOI && currOI) {
      oiChange = ((currOI - allCoins[symbol].futures.lastOI) / allCoins[symbol].futures.lastOI) * 100;
    }

    return {
      oi: currOI,
      oiChange,
      longRatio: Number(ratioData.buyRatio || 0.5) * 100,
      shortRatio: Number(ratioData.sellRatio || 0.5) * 100,
      fundingRate: Number(fundingData.fundingRate || 0) * 100,
      longLiq,
      shortLiq,
      totalLiq: longLiq + shortLiq,
      lastOI: currOI,
      chipDensity: currOI > 0 ? (Number(fundingData.fundingRate || 0) * 100 / currOI * 1e8) : 0 // OI和成交量比
    };
  } catch (error) {
    console.error(`获取 ${symbol} 期货数据失败:`, error.message);
    return null;
  }
}

// ============ 技术指标 ============

function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = closes.length - period; i < closes.length; i++) {
    const change = closes[i] - closes[i - 1];
    if (change > 0) gains += change;
    else losses += Math.abs(change);
  }
  const avgGain = gains / period;
  const avgLoss = losses / period;
  return avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
}

function calcEMA(values, period) {
  if (values.length < period) return null;
  const k = 2 / (period + 1);
  let ema = values.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < values.length; i++) {
    ema = values[i] * k + ema * (1 - k);
  }
  return ema;
}

function calcMACD(closes) {
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  if (!ema12 || !ema26) return null;
  const macd = ema12 - ema26;
  const signal = (closes.length > 35) ? calcEMA(closes.slice(-35).map((_, i, arr) => 
    (calcEMA(arr.slice(0, i + 1), 12) || 0) - (calcEMA(arr.slice(0, i + 1), 26) || 0)
  ), 9) : null;
  return { macd, signal };
}

function calcCVD(klines) {
  let cvd = 0;
  const cvdArray = [];
  for (let k of klines) {
    const delta = k.c > k.o ? k.v : (k.c < k.o ? -k.v : 0);
    cvd += delta;
    cvdArray.push(cvd);
  }
  return { cvd: cvd, array: cvdArray, trend: cvdArray[cvdArray.length - 1] > (cvdArray[Math.max(0, cvdArray.length - 20)] || 0) ? 'up' : 'down' };
}

function analyzeWyckoff(klines) {
  // 威科夫分析：检测积累、春鸭、上升、分布、衰退等阶段
  if (klines.length < 20) return 'unknown';

  const recent = klines.slice(-20);
  const closes = recent.map(k => k.c);
  const highs = recent.map(k => k.h);
  const lows = recent.map(k => k.l);
  const volumes = recent.map(k => k.v);

  const priceRange = Math.max(...closes) - Math.min(...closes);
  const priceChange = closes[closes.length - 1] - closes[0];
  const avgVol = volumes.reduce((a, b) => a + b) / volumes.length;
  const recentVol = volumes[volumes.length - 1];

  // 1. 积累阶段 (Accumulation): 底部横盘，成交量逐步放大
  if (priceRange < priceChange * 0.5 && recentVol > avgVol * 1.2) {
    return 'accumulation';
  }

  // 2. 启动上升 (Markup/Breakout): 向上突破，成交量突增
  if (priceChange > priceRange * 0.3 && recentVol > avgVol * 1.8) {
    return 'breakout';
  }

  // 3. 上升趋势 (Uptrend): 持续上升，回撤不破关键支撑
  const rsi = calcRSI(closes);
  if (priceChange > 0 && rsi > 50 && Math.min(...lows.slice(-10)) > Math.min(...lows.slice(0, 10))) {
    return 'uptrend';
  }

  // 4. 分布阶段 (Distribution): 顶部横盘，成交量放大
  if (Math.max(...closes.slice(-10)) === Math.max(...closes) && recentVol > avgVol) {
    return 'distribution';
  }

  // 5. 下降趋势 (Downtrend)
  if (priceChange < 0 && rsi < 50) {
    return 'downtrend';
  }

  return 'consolidation';
}

function detectSignals(symbol, klines) {
  // 检测多时间框架信号共振
  if (!klines || klines.length < 10) return { signals: [], strength: 0, direction: null };

  const closes = klines.map(k => k.c);
  const volumes = klines.map(k => k.v);
  const rsi = calcRSI(closes);
  const macd = calcMACD(closes);
  const cvd = calcCVD(klines);

  let signals = [];
  let strength = 0;
  let direction = null;

  // 信号1: RSI极端反弹
  if (rsi < 25 && closes[closes.length - 1] > closes[closes.length - 2]) {
    signals.push('rsi_oversold_bounce');
    strength += 20;
    direction = 'LONG';
  }

  // 信号2: RSI极端下跌
  if (rsi > 75 && closes[closes.length - 1] < closes[closes.length - 2]) {
    signals.push('rsi_overbought_drop');
    strength += 20;
    direction = 'SHORT';
  }

  // 信号3: 成交量突破
  const avgVol = volumes.slice(0, 10).reduce((a, b) => a + b) / 10;
  if (volumes[volumes.length - 1] > avgVol * 2) {
    signals.push('volume_breakout');
    strength += 15;
  }

  // 信号4: CVD底背离 (价格新低但CVD上升)
  if (closes[closes.length - 1] < Math.min(...closes.slice(-10, -1)) && cvd.trend === 'up') {
    signals.push('cvd_bullish_divergence');
    strength += 25;
    direction = 'LONG';
  }

  // 信号5: CVD顶背离 (价格新高但CVD下降)
  if (closes[closes.length - 1] > Math.max(...closes.slice(-10, -1)) && cvd.trend === 'down') {
    signals.push('cvd_bearish_divergence');
    strength += 25;
    direction = 'SHORT';
  }

  // 信号6: MACD金叉
  if (macd && macd.signal && macd.macd > macd.signal) {
    signals.push('macd_golden_cross');
    strength += 15;
    direction = 'LONG';
  }

  // 信号7: 价格量齐头并进
  const priceUp = closes[closes.length - 1] > closes[closes.length - 2];
  const volUp = volumes[volumes.length - 1] > volumes[volumes.length - 2];
  if (priceUp && volUp) {
    signals.push('price_volume_sync_up');
    strength += 20;
    direction = 'LONG';
  }
  if (!priceUp && volUp) {
    signals.push('price_volume_sync_down');
    strength += 20;
    direction = 'SHORT';
  }

  return { signals, strength: Math.min(strength, 100), direction };
}

// ============ 风险评估 ============

function assessRisk(coin_data, futures_data) {
  let riskLevel = 'low';
  let riskScore = 0;

  if (!futures_data) return 'mid';

  // 1. RSI极端 (高风险)
  if (coin_data.rsi_1h > 80) riskScore += 30;
  else if (coin_data.rsi_1h > 70) riskScore += 15;

  if (coin_data.rsi_1h < 20) riskScore += 20;
  else if (coin_data.rsi_1h < 30) riskScore += 10;

  // 2. 多头/空头拥挤 (高风险)
  if (futures_data.longRatio > 75) riskScore += 35;
  if (futures_data.shortRatio > 75) riskScore -= 20;

  // 3. 清液堆积 (中等风险)
  if (futures_data.totalLiq > 1e7  ) riskScore += 20;

  // 4. 资金费率过高 (中等风险)
  if (futures_data.fundingRate > 0.05) riskScore += 15;
  if (futures_data.fundingRate < -0.05) riskScore -= 10;

  // 5. OI急速增长 (高风险)
  if (coin_data.oiChange > 50) riskScore += 25;

  // 6. 筹码密集度
  if (coin_data.chipDensity > 100) riskScore += 15;

  if (riskScore >= 70) riskLevel = 'high';
  else if (riskScore >= 40) riskLevel = 'mid';
  else riskLevel = 'low';

  return riskLevel;
}

// ============ 推荐等级判断 ============

function determineLevel(symbol, coin_data, futures_data, signal_data) {
  // 等级: 'buy' | 'excellent' | 'yao-buy' | 'yao-watch' | null

  const riskLevel = assessRisk(coin_data, futures_data);
  const isYao = coin_data.price < 0.01 && coin_data.chipDensity > 50; // 妖币判断
  const signalCount = signalHistory[symbol]?.filter(s => Date.now() - s.time < 300000).length || 0; // 5分钟内信号次数

  // 妖币判断
  if (isYao) {
    // 妖币买入: 刚开始拉盘，多个信号共振，风险可控
    if (signal_data.strength >= 60 && riskLevel !== 'high' && signal_data.direction === 'LONG') {
      return 'yao-buy';
    }
    // 妖币观察: 走势好但有回调风险或动能减弱
    if (signal_data.strength >= 40 && (riskLevel === 'high' || signal_data.strength < 60)) {
      return 'yao-watch';
    }
  }

  // 普通币判断
  // 直接买入: 右侧交易，点位好，拉升途中，高胜率，盈亏比大
  if (
    signal_data.strength >= 70 &&
    riskLevel !== 'high' &&
    coin_data.change_1h > 0 &&
    coin_data.change_4h > 0 &&
    signal_data.direction === 'LONG' &&
    signalCount >= 2
  ) {
    return 'buy';
  }

  // 优秀币: 走势好但可能有回调，可以继续观察
  if (
    signal_data.strength >= 50 &&
    riskLevel !== 'high' &&
    coin_data.change_1h > -2 &&
    signalCount >= 1
  ) {
    return 'excellent';
  }

  return null;
}

// ============ 完整分析 ============

async function analyzeCoin(symbol) {
  try {
    const [ticker, klines_5m, klines_15m, klines_1h, klines_4h, klines_1d, futures] = await Promise.all([
      getTicker(symbol),
      getKlines(symbol, '5m', 100),
      getKlines(symbol, '15m', 100),
      getKlines(symbol, '1h', 100),
      getKlines(symbol, '4h', 100),
      getKlines(symbol, '1d', 100),
      getBybitFuturesData(symbol)
    ]);

    if (!ticker || !klines_1h) return null;

    // 缓存K线
    klineCache[symbol] = { klines_5m, klines_15m, klines_1h, klines_4h, klines_1d };

    // 计算各时间框架的指标
    const c_5m = klines_5m?.map(k => k.c) || [];
    const c_15m = klines_15m?.map(k => k.c) || [];
    const c_1h = klines_1h.map(k => k.c);
    const c_4h = klines_4h?.map(k => k.c) || [];
    const c_1d = klines_1d?.map(k => k.c) || [];

    const rsi_5m = calcRSI(c_5m);
    const rsi_15m = calcRSI(c_15m);
    const rsi_1h = calcRSI(c_1h);
    const rsi_4h = calcRSI(c_4h);
    const rsi_1d = calcRSI(c_1d);

    const macd_1h = calcMACD(c_1h);
    const cvd_1h = calcCVD(klines_1h);
    const cvd_5m = calcCVD(klines_5m || []);

    // 计算各时间框架涨跌
    const getChange = (klines) => {
      if (!klines || klines.length < 2) return 0;
      return ((klines[klines.length - 1].c - klines[0].c) / klines[0].c) * 100;
    };

    const change_5m = getChange(klines_5m);
    const change_15m = getChange(klines_15m);
    const change_1h = getChange(klines_1h);
    const change_4h = getChange(klines_4h);
    const change_1d = getChange(klines_1d);

    // 威科夫阶段分析
    const phase_5m = analyzeWyckoff(klines_5m || []);
    const phase_1h = analyzeWyckoff(klines_1h);
    const phase_4h = analyzeWyckoff(klines_4h || []);

    // 检测信号 (优先近期K线)
    const signal_5m = detectSignals(symbol, klines_5m || []);
    const signal_1h = detectSignals(symbol, klines_1h);
    const signal_4h = detectSignals(symbol, klines_4h || []);

    // 综合信号强度
    const totalSignalStrength = (signal_5m.strength + signal_1h.strength * 1.5 + signal_4h.strength) / 3.5;
    const mainDirection = signal_1h.direction || signal_5m.direction;

    // 更新信号历史
    if (!signalHistory[symbol]) signalHistory[symbol] = [];
    if (signal_5m.signals.length > 0 || signal_1h.signals.length > 0) {
      signalHistory[symbol].push({
        time: Date.now(),
        signals: [...signal_5m.signals, ...signal_1h.signals],
        strength: totalSignalStrength
      });
      if (signalHistory[symbol].length > 100) signalHistory[symbol].shift();
    }

    const coinData = {
      symbol,
      price: ticker.price,
      change24h: ticker.change24h,
      volume24h: ticker.volume24h,
      high24h: ticker.high24h,
      low24h: ticker.low24h,
      bid: ticker.bid,
      ask: ticker.ask,
      
      rsi_5m, rsi_15m, rsi_1h, rsi_4h, rsi_1d,
      change_5m, change_15m, change_1h, change_4h, change_1d,
      
      macd_1h,
      cvd_1h,
      cvd_5m,
      
      phase_5m, phase_1h, phase_4h,
      
      signal_5m, signal_1h, signal_4h,
      signalStrength: totalSignalStrength,
      mainDirection,
      signalCount: signalHistory[symbol]?.filter(s => Date.now() - s.time < 300000).length || 0,
      
      chipDensity: futures?.chipDensity || 0
    };

    const riskLevel = assessRisk(coinData, futures);
    const level = determineLevel(symbol, coinData, futures, { strength: totalSignalStrength, direction: mainDirection });

    allCoins[symbol] = {
      data: coinData,
      futures,
      riskLevel,
      level,
      lastUpdate: Date.now()
    };

    return allCoins[symbol];
  } catch (error) {
    console.error(`分析 ${symbol} 失败:`, error.message);
    return null;
  }
}

function getPhaseEmoji(phase) {
  const map = {
    'accumulation': '📦',
    'breakout': '🚀',
    'uptrend': '📈',
    'distribution': '📉',
    'downtrend': '⬇️',
    'consolidation': '➡️',
    'unknown': '❓'
  };
  return map[phase] || '❓';
}

function getTrendEmoji(direction) {
  if (direction === 'LONG') return '🟢';
  if (direction === 'SHORT') return '🔴';
  return '⚪';
}

function getAnalysisTitle(c, riskLevel) {
  if (riskLevel === 'high') {
    if (c.rsi_1h > 75) return '⚠️ RSI极高，可能下跌';
    if (c.rsi_1h < 25) return '⚠️ RSI极低，反弹风险';
    return '⚠️ 风险较高，谨慎介入';
  }
  
  if (c.mainDirection === 'LONG') {
    if (c.phase_1h === 'breakout' || c.phase_1h === 'uptrend') {
      return '🟢 处于上升阶段，多个信号共振，可考虑追进';
    }
    return '🟢 看多信号，可低吸或观察';
  }
  
  if (c.mainDirection === 'SHORT') {
    return '🔴 看空信号，建议规避或止损';
  }

  return '⚪ 信号不明确，继续观察';
}

function getAnalysisText(c, f, riskLevel) {
  let text = '';
  
  // 价格行为
  if (c.change_1h > 2 && c.change_4h > 3) {
    text += '最近强势上涨，近1h 4h都是正收益。';
  } else if (c.change_1h < -2) {
    text += '1小时跌幅较大，短期承压。';
  }

  // CVD背离
  if (c.cvd_1h.trend === 'up' && c.change_1h < 0) {
    text += 'CVD持续上升但价格下跌，底背离信号。';
  }

  // 期货数据
  if (f) {
    if (f.longRatio > 70) {
      text += `多头严重拥挤(${fmt(f.longRatio)}%)，存在被爆风险。`;
    } else if (f.shortRatio > 70) {
      text += `空头严重拥挤(${fmt(f.shortRatio)}%)，可能反弹。`;
    }

    if (f.fundingRate > 0.02) {
      text += `资金费率过高(${fmt(f.fundingRate, 4)}%)，市场过热。`;
    }
  }

  return text;
}

            <strong>涨幅:</strong> ${fmtPct(c.change_15m)}<br>
            <strong>RSI:</strong> ${fmt(c.rsi_15m)}<br>
            <strong>CVD:</strong> ${c.cvd_5m.trend === 'up' ? '📈向上' : '📉向下'}<br>
            <strong>评价:</strong> ${c.rsi_15m > 50 ? '看多' : '看空'}
          </div>
        </div>
        <div class="tf-analysis">
          <div class="tf-title">1小时 ⭐</div>
          <div class="tf-content">
            <strong>涨幅:</strong> <span style="color: ${c.change_1h > 0 ? 'var(--green)' : 'var(--red)'};">${fmtPct(c.change_1h)}</span><br>
            <strong>阶段:</strong> ${c.phase_1h}<br>
            <strong>RSI:</strong> ${fmt(c.rsi_1h)}<br>
            <strong>MACD:</strong> ${c.macd_1h ? (c.macd_1h.macd > c.macd_1h.signal ? '金叉' : '死叉') : '计算中'}<br>
            <strong>CVD:</strong> ${c.cvd_1h.trend === 'up' ? '📈向上' : '📉向下'}
          </div>
        </div>
        <div class="tf-analysis">
          <div class="tf-title">4小时</div>
          <div class="tf-content">
            <strong>涨幅:</strong> ${fmtPct(c.change_4h)}<br>
            <strong>阶段:</strong> ${c.phase_4h}<br>
            <strong>RSI:</strong> ${fmt(c.rsi_4h)}<br>
            <strong>评价:</strong> ${c.rsi_4h > 50 ? '看多' : c.rsi_4h < 50 ? '看空' : '中立'}
          </div>
        </div>
      </div>
    </div>

    <!-- 期货数据 -->
    ${f ? `
    <div style="margin-bottom: 20px;">
      <h3 style="color: var(--cyan); margin-bottom: 12px; font-size: 16px;">📈 期货数据监控</h3>
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
        <div class="detail-metric">

        </div>
        <div class="detail-metric">

        </div>
        <div class="detail-metric">
          <div class="detail-metric-label">资金费率 ⭐</div>
          <div class="detail-metric-value ${f.fundingRate > 0 ? 'up' : 'down'}">
            ${fmt(f.fundingRate, 4)}%
          </div>
        </div>
        <div class="detail-metric">
          <div class="detail-metric-label">OI变化 ⭐</div>
          <div class="detail-metric-value ${f.oiChange > 0 ? 'up' : 'down'}">
            ${fmtPct(f.oiChange)}
          </div>
        </div>
        <div class="detail-metric">
          <div class="detail-metric-label">多头清液</div>
          <div class="detail-metric-value">${fmt(f.longLiq)}</div>
        </div>
        <div class="detail-metric">
          <div class="detail-metric-label">空头清液</div>
          <div class="detail-metric-value">${fmt(f.shortLiq)}</div>
        </div>
        <div class="detail-metric">
          <div class="detail-metric-label">清液总额</div>

          <div class="detail-metric-value">${fmt(f.chipDensity)}</div>
        </div>
      </div>

    <!-- 快速通道 -->
    <div style="margin-bottom: 20px; background: rgba(168,85,247,.12); border: 1px solid rgba(168,85,247,.3); border-radius: 12px; padding: 16px;">
      <h3 style="color: var(--cyan); margin-bottom: 12px; font-size: 14px;">⚡ 快速通道</h3>
      <div class="quick-links" style="gap: 10px;">

          💱 币安交易页面
        </span>
        <span class="quick-link" onclick="openLink('https://www.coinglass.com/'); event.stopPropagation();" style="padding: 10px 14px;">
          📊 Coinglass清算页面

    <!-- 威科夫分析说明 -->
    <div style="background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.18); border-radius: 12px; padding: 16px;">
      <h3 style="color: var(--cyan); margin-bottom: 12px; font-size: 14px;">🎯 威科夫操盘法分析</h3>
      <div style="font-size: 12px; line-height: 1.8; color: #bfdbfe;">
        <p><strong>当前阶段:</strong> ${c.phase_4h.toUpperCase()}</p>
        <p><strong>价格行为:</strong> ${getPriceActionText(c, f)}</p>
        <p><strong>预期走势:</strong> ${getPriceExpectation(c, f, coin.riskLevel)}</p>
        <p><strong>建议操作:</strong> ${getTradeAdvice(c, f, coin.riskLevel, coin.level)}</p>
      </div>
    </div>
  `;

  document.getElementById('detail-content').innerHTML = html;
}

function getPriceActionText(c, f) {
  if (c.phase_1h === 'breakout') {
    return `价格刚突破重要阻力位，成交量放大${c.change_1h > 0 ? '，多头确认' : '但乏力'}`
  }
  if (c.phase_1h === 'uptrend') {
    return `处于上升趋势中，每次回调都得到支撑`
  }
  if (c.phase_1h === 'accumulation') {
    return `在底部进行筹码积累，庄家可能在暗地收集`
  }
  if (c.phase_1h === 'downtrend') {
    return `处于下跌趋势，每次反弹都面临压力`
  }
  return `价格处于整理阶段`;
}

function getPriceExpectation(c, f, riskLevel) {
  if (riskLevel === 'high') {
    return '风险较高，短期可能面临调整，建议观察关键支撑位';
  }

  if (c.mainDirection === 'LONG') {
    if (c.signalStrength > 70) {
      return '多个信号共振，有望继续上涨，可追进或等回调';
    }
    return '看多信号中等，建议低吸或等待确认';
  }

  if (c.mainDirection === 'SHORT') {
    return '看空信号，短期可能下跌或整理，建议规避';
  }

  return '走势不明确，继续观察关键支撑阻力';
}

function getTradeAdvice(c, f, riskLevel, level) {
  if (level === 'buy') {
    return `✅ 可以直接买入。点位较好，已确认突破，盈亏比大，胜率高。可分批建仓，设止损在24h低点附近。`;
  }
  if (level === 'excellent') {
    return `🔵 优秀币种。走势向好，但建议继续观察或低吸。如果回调到支撑位(如EMA或昨日低点)，可升级为买入信号。`;
  }
  if (level === 'yao-buy') {
    return `🔥 妖币买入。价格低，筹码密集，庄家控盘强，刚开始拉盘。高潜力高风险，只能短线，赚了就跑。`;
  }
  if (level === 'yao-watch') {
    return `🟠 妖币观察。妖币特征明显但当前有风险(RSI过高或多头过挤)。等待回调到支撑位或动能恢复再介入。`;
  }
  return `⚪ 暂不建议。信号不足，继续观察。`;
}

// ============ 搜索功能 ============

function searchCoin() {
  const input = document.getElementById('search-input').value.toUpperCase();
  if (!input) {
    alert('请输入币种名称');
    return;
  }

  const coin = allCoins[input];
  if (!coin) {
    document.getElementById('search-content').innerHTML = `<div class="empty">未找到 ${input} 或数据未加载，请确保币种存在</div>`;
    return;
  }

  viewDetail(input);
}

// ============ 初始化和刷新 ============

function updateTime() {
  const now = new Date();
  document.getElementById('update-time').textContent = 
    `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
}

async function init() {
  showNotification('⏳ 正在加载数据...', 'info');
  await renderMonitor();
  showNotification('✅ 数据加载完成', 'success');
  setInterval(async () => {
    await renderMonitor();
    updateTime();
  }, CONFIG.refreshMs);
}

window.addEventListener('DOMContentLoaded', init);
  </script>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="60">
  <title>币安异动监控</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    h1 { text-align: center; color: #58a6ff; margin-bottom: 8px; font-size: 24px; }
    .subtitle { text-align: center; color: #8b949e; font-size: 13px; margin-bottom: 24px; }
    .stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 24px; text-align: center; }
    .stat-box .num { font-size: 28px; font-weight: bold; color: #58a6ff; }
    .stat-box .label { font-size: 12px; color: #8b949e; margin-top: 4px; }
    .filter-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .filter-btn.active { background: #58a6ff; border-color: #58a6ff; color: #0d1117; font-weight: bold; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; transition: border-color 0.2s; }
    .card:hover { border-color: #58a6ff; }
    .card.up   { border-left: 4px solid #3fb950; }
    .card.down { border-left: 4px solid #f85149; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .symbol { font-size: 18px; font-weight: bold; color: #58a6ff; }
    .time { font-size: 11px; color: #8b949e; }
    .price { font-size: 13px; color: #8b949e; margin-bottom: 10px; }
    .stable-info { font-size: 12px; color: #8b949e; margin-bottom: 10px; padding: 6px 10px; background: #0d1117; border-radius: 6px; }
    .signal { background: #0d1117; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .signal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .period { font-size: 12px; font-weight: bold; background: #21262d; padding: 2px 8px; border-radius: 10px; color: #e6edf3; }
    .direction-up   { color: #3fb950; font-weight: bold; }
    .direction-down { color: #f85149; font-weight: bold; }
    .signal-row { display: flex; justify-content: space-between; font-size: 12px; color: #8b949e; margin-top: 3px; }
    .signal-row span:last-child { color: #e6edf3; }
    .multiplier { color: #e3b341; font-weight: bold; }
    .no-data { text-align: center; color: #8b949e; padding: 60px; font-size: 16px; }
    .update-time { text-align: center; color: #8b949e; font-size: 12px; margin-top: 24px; }
  </style>
</head>
<body>

<h1>⚡ 币安异动监控</h1>
<p class="subtitle">稳定≥5天(日波动&lt;10%) → 突破涨跌&gt;10% 且波动率暴增</p>

<div class="stats">
  <div class="stat-box">
    <div class="num" id="total-count">-</div>
    <div class="label">累计异动</div>
  </div>
  <div class="stat-box">
    <div class="num" id="today-count">-</div>
    <div class="label">今日异动</div>
  </div>
  <div class="stat-box">
    <div class="num" id="up-count" style="color:#3fb950">-</div>
    <div class="label">暴涨信号</div>
  </div>
  <div class="stat-box">
    <div class="num" id="down-count" style="color:#f85149">-</div>
    <div class="label">暴跌信号</div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterData('all', this)">全部</button>
  <button class="filter-btn" onclick="filterData('up', this)">🚀 暴涨</button>
  <button class="filter-btn" onclick="filterData('down', this)">💥 暴跌</button>
  <button class="filter-btn" onclick="filterData('today', this)">今日</button>
</div>

<div class="grid" id="grid"></div>
<div class="update-time" id="update-time"></div>

<script>
  let allData = []

  async function loadData() {
    try {
      const res  = await fetch('alerts.json?t=' + Date.now())
      const data = await res.json()
      allData = data.reverse()  // 最新的在前

      updateStats()
      renderCards(allData)

      document.getElementById('update-time').textContent =
        '最后更新: ' + new Date().toLocaleString('zh-CN')
    } catch(e) {
      document.getElementById('grid').innerHTML =
        '<div class="no-data">暂无数据 / alerts.json 未生成</div>'
    }
  }

  function updateStats() {
    const today = new Date().toISOString().slice(0, 10)

    document.getElementById('total-count').textContent = allData.length

    document.getElementById('today-count').textContent =
      allData.filter(d => d.detected_at.startsWith(today)).length

    document.getElementById('up-count').textContent =
      allData.filter(d => d.signals.some(s => s['方向'].includes('暴涨'))).length

    document.getElementById('down-count').textContent =
      allData.filter(d => d.signals.some(s => s['方向'].includes('暴跌'))).length
  }

  function filterData(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')

    const today = new Date().toISOString().slice(0, 10)
    let filtered = allData

    if (type === 'up')
      filtered = allData.filter(d => d.signals.some(s => s['方向'].includes('暴涨')))
    else if (type === 'down')
      filtered = allData.filter(d => d.signals.some(s => s['方向'].includes('暴跌')))
    else if (type === 'today')
      filtered = allData.filter(d => d.detected_at.startsWith(today))

    renderCards(filtered)
  }

  function renderCards(data) {
    const grid = document.getElementById('grid')

    if (!data.length) {
      grid.innerHTML = '<div class="no-data">暂无符合条件的异动</div>'
      return
    }

    grid.innerHTML = data.map(item => {
      const isUp   = item.signals.some(s => s['方向'].includes('暴涨'))
      const cardCls = isUp ? 'up' : 'down'

      const signalsHtml = item.signals.map(s => `
        <div class="signal">
          <div class="signal-header">
            <span class="period">${s['周期']}</span>
            <span class="${s['方向'].includes('暴涨') ? 'direction-up' : 'direction-down'}">
              ${s['方向']}
            </span>
          </div>
          <div class="signal-row">
            <span>涨跌幅</span>
            <span class="${s['涨跌幅'] > 0 ? 'direction-up' : 'direction-down'}">
              ${s['涨跌幅'] > 0 ? '+' : ''}${s['涨跌幅']}%
            </span>
          </div>
          <div class="signal-row">
            <span>K线波动</span>
            <span>${s['K线波动']}%</span>
          </div>
          <div class="signal-row">
            <span>波动放大</span>
            <span class="multiplier">${s['波动倍数']}x</span>
          </div>
          <div class="signal-row">
            <span>K线时间</span>
            <span>${s['K线时间'].slice(0, 16)}</span>
          </div>
        </div>
      `).join('')

      return `
        <div class="card ${cardCls}">
          <div class="card-header">
            <span class="symbol">${item.symbol}</span>
            <span class="time">${item.detected_at}</span>
          </div>
          <div class="price">💰 当前价: ${item.current_price}</div>
          <div class="stable-info">
            📅 稳定 ${item.stable_days} 天 &nbsp;|&nbsp;
            均波动 ${item.avg_vol_pct}%
          </div>
          ${signalsHtml}
        </div>
      `
    }).join('')
  }

  loadData()
</script>
</body>
</html>

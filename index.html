<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>币安交易管理系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      color: #e5eefb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      padding: 16px;
      font-size: 13px;
    }
    .container { max-width: 1600px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: #10c4f5;
      margin-bottom: 4px;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #8ca3ba;
      font-size: 11px;
      margin-bottom: 14px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .time-info {
      color: #8ca3ba;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-status {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .refresh-status.loading {
      background: #f59e0b;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(16,196,245,.2);
    }
    .tab-btn {
      background: none;
      border: none;
      color: #8ca3ba;
      padding: 8px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 12px;
      transition: all 0.2s;
      font-weight: bold;
    }
    .tab-btn.active {
      color: #10c4f5;
      border-bottom-color: #10c4f5;
    }
    .tab-btn:hover { color: #10c4f5; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .search-box {
      width: 100%;
      max-width: 350px;
      position: relative;
      margin-bottom: 12px;
    }
    .search-input {
      width: 100%;
      padding: 6px 10px;
      background: rgba(10, 22, 40, .95);
      border: 1px solid rgba(16,196,245,.3);
      border-radius: 6px;
      color: #e5eefb;
      font-size: 12px;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: #10c4f5;
      box-shadow: 0 0 8px rgba(16,196,245,.2);
    }
    .search-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(10, 22, 40, .98);
      border: 1px solid rgba(16,196,245,.3);
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 280px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .search-dropdown.active { display: block; }
    .search-item {
      padding: 6px 10px;
      cursor: pointer;
      border-bottom: 1px solid rgba(16,196,245,.1);
      transition: all 0.2s;
      font-size: 11px;
    }
    .search-item:hover { background: rgba(16,196,245,.15); }
    .search-item-symbol { color: #10c4f5; font-weight: bold; }
    .search-item-mcap { color: #8ca3ba; font-size: 10px; margin-top: 2px; }

    .section { margin-bottom: 14px; }
    .section-title {
      font-size: 13px;
      color: #10c4f5;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 2px solid rgba(16,196,245,.2);
      font-weight: bold;
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 10px;
    }
    .coin-card {
      background: rgba(10, 22, 40, .95);
      border: 1px solid rgba(16,196,245,.25);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .coin-card:hover {
      border-color: rgba(16,196,245,.6);
      box-shadow: 0 0 12px rgba(16,196,245,.15);
      transform: translateY(-1px);
    }

    .coin-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .coin-symbol {
      font-size: 15px;
      color: #10c4f5;
      font-weight: bold;
    }
    .coin-tag {
      display: inline-block;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: bold;
      border: 1px solid;
    }
    .tag-yao {
      background: rgba(168, 85, 247, .3);
      color: #d8b4fe;
      border-color: rgba(168, 85, 247, .5);
    }
    .tag-buy {
      background: rgba(34, 197, 94, .3);
      color: #22c55e;
      border-color: rgba(34, 197, 94, .5);
    }
    .tag-watch {
      background: rgba(59, 130, 246, .3);
      color: #93c5fd;
      border-color: rgba(59, 130, 246, .5);
    }

    .coin-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .stat {
      display: flex;
      justify-content: space-between;
    }
    .stat-label { color: #8ca3ba; }
    .stat-value { color: #e5eefb; font-weight: bold; }
    .green { color: #22c55e; }
    .red { color: #ef4444; }

    .coin-note {
      background: rgba(34, 197, 94, .1);
      border-left: 2px solid rgba(34, 197, 94, .4);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: #86efac;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .coin-note.warn {
      background: rgba(245, 158, 11, .1);
      border-left-color: rgba(245, 158, 11, .4);
      color: #fcd34d;
    }
    .coin-note.risk {
      background: rgba(239, 68, 68, .1);
      border-left-color: rgba(239, 68, 68, .4);
      color: #fca5a5;
    }

    .coin-footer {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      padding-top: 6px;
      border-top: 1px solid rgba(16,196,245,.1);
    }
    .badge {
      display: inline-block;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 9px;
      background: rgba(59, 130, 246, .2);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, .4);
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      color: #8ca3ba;
      padding: 20px;
      font-size: 12px;
    }

    /* 详细面板 */
    .detail-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, .85);
      z-index: 1000;
      overflow-y: auto;
      padding: 16px;
    }
    .detail-modal.active { display: block; }
    .detail-content {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      border: 1px solid rgba(16,196,245,.3);
      border-radius: 12px;
      padding: 20px;
      max-width: 850px;
      margin: 16px auto;
      position: relative;
    }
    .close-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: #8ca3ba;
      font-size: 22px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .close-btn:hover {
      color: #10c4f5;
      transform: rotate(90deg);
    }

    .detail-title {
      font-size: 24px;
      color: #10c4f5;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    .detail-item {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(16,196,245,.12);
      border-radius: 6px;
      padding: 8px;
    }
    .detail-item-label { color: #8ca3ba; font-size: 10px; margin-bottom: 4px; }
    .detail-item-value { color: #10c4f5; font-size: 14px; font-weight: bold; }

    .detail-box {
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.4);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .detail-box h3 {
      color: #22c55e;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .detail-box.warn {
      background: rgba(245, 158, 11, .1);
      border-color: rgba(245, 158, 11, .4);
    }
    .detail-box.warn h3 { color: #fcd34d; }
    .detail-box.risk {
      background: rgba(239, 68, 68, .1);
      border-color: rgba(239, 68, 68, .4);
    }
    .detail-box.risk h3 { color: #fca5a5; }

    .decision-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: 11px;
    }
    .decision-row:last-child { border-bottom: none; }
    .decision-label { color: #8ca3ba; }
    .decision-value { font-weight: bold; color: #e5eefb; }

    .confidence-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 8px 0;
    }
    .confidence-fill {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #ef4444, #f59e0b, #22c55e);
      flex: 1;
    }
    .confidence-text {
      font-size: 10px;
      color: #8ca3ba;
      min-width: 40px;
      text-align: right;
    }

    @media (max-width: 1024px) {
      .coin-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
      .detail-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .coin-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      h1 { font-size: 20px; }
      .detail-title { font-size: 18px; }
    }
  </style>
</head>
<body translate="no">
  <div class="container">
    <h1 translate="no">⚡ 币安交易系统 v10</h1>
    <p class="subtitle">多维度联动检测 | 精准筹码分析 | 拉盘前夕发现</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('monitor', this)">📊 监控</button>
      <button class="tab-btn" onclick="switchTab('search', this)">🔍 搜索</button>
    </div>

    <!-- 监控页 -->
    <div id="monitor" class="tab-content active">
      <div class="toolbar">
        <div class="time-info">
          <span class="refresh-status" id="refresh-dot"></span>
          <span id="last-update">更新中...</span>
          <span style="color: #8ca3ba;">| ⏱️ <span id="refresh-countdown">60</span>s</span>
        </div>
      </div>

      <!-- 妖币 -->
      <div class="section">
        <div class="section-title">💎 妖币机会 (<span id="stat-yao">0</span>)</div>
        <div class="coin-grid" id="yao-list"></div>
      </div>

      <!-- 建议买入 -->
      <div class="section">
        <div class="section-title">🚀 建议买入 (<span id="stat-buy">0</span>)</div>
        <div class="coin-grid" id="buy-list"></div>
      </div>

      <!-- 观察名单 -->
      <div class="section">
        <div class="section-title">👀 观察中 (<span id="stat-watch">0</span>)</div>
        <div class="coin-grid" id="watch-list"></div>
      </div>
    </div>

    <!-- 搜索页 -->
    <div id="search" class="tab-content">
      <div class="search-box">
        <input 
          type="text" 
          class="search-input" 
          id="search-input" 
          placeholder="搜索币种..."
          oninput="handleSearch(this.value)"
        />
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
      <div id="search-result" class="empty-state">搜索一个币种查看详情</div>
    </div>
  </div>

  <!-- 详细面板 -->
  <div class="detail-modal" id="detail-modal">
    <div class="detail-content">
      <button class="close-btn" onclick="closeDetail()">✕</button>
      <div id="detail-body"></div>
    </div>
  </div>

  <script>
    let allCoinsData = [];
    let allRows = { yao: [], buy: [], watch: [] };
    let oiMap = {};
    let isLoading = false;
    let previousData = {};
    let twoStepsAgoData = {};
    let autoRefreshInterval = null;

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      el.classList.add('active');
    }

    function fmtNum(n, d = 2) {
      if (!n || isNaN(n)) return '-';
      if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(1) + 'B';
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return Number(n).toFixed(d);
    }

    async function getJSON(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        return await res.json();
      } catch (e) {
        return null;
      }
    }

    async function fetchOpenInterest(symbols) {
      const map = {};
      for (let i = 0; i < symbols.length; i += 20) {
        const batch = symbols.slice(i, i + 20);
        const promises = batch.map(async symbol => {
          const data = await getJSON(`https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`);
          if (data?.openInterest) {
            map[symbol] = parseFloat(data.openInterest);
          }
        });
        await Promise.all(promises);
        await new Promise(r => setTimeout(r, 50));
      }
      return map;
    }

    /**
     * 多维度综合分析框架
     * 不只看单个指标，而是看指标间的逻辑关系
     */
    class CoinAnalyzer {
      constructor(row, previous, twoStepsAgo) {
        this.row = row;
        this.prev = previous;
        this.twoStepsAgo = twoStepsAgo;
        this.evidences = [];
        this.score = 0;
      }

      // 维度1：价格动态
      analyzePriceDynamics() {
        const priceChange = this.row.priceChange;
        
        // 检测：长期沉寂 + 最近无大跌
        if (priceChange > -15 && priceChange < 10) {
          this.evidences.push('价格平稳');
          
          // 如果是刚从底部反弹（前面跌过，现在恢复了）
          if (this.prev && this.row.price > this.prev.price) {
            this.evidences.push('短期反弹');
            return 15; // 反弹是好信号
          }
          return 8;
        }

        // 如果在缓慢上升（没有暴跌过）
        if (priceChange > 0 && priceChange < 8) {
          this.evidences.push('缓慢上升');
          return 12;
        }

        return 0;
      }

      // 维度2：成交量真实性检验
      // 用来检测OI是否真实（OI高但成交低 = 假OI）
      analyzeVolumeAuthenticity() {
        if (!this.row.volMcap || !this.row.oiMcap) return 0;

        // 检测：OI和成交的比例
        // 正常：Vol/Mcap 是 OI/Mcap 的 1/3 ~ 1/5
        // 异常：OI很高但成交很低 = 假OI
        const oiToVolRatio = this.row.oiMcap / (this.row.volMcap || 0.1);

        // 比例太高 = OI虚假，减分
        if (oiToVolRatio > 2) {
          this.evidences.push('⚠️ OI可能虚假');
          return -20; // 大幅减分！
        }

        // 比例合理 = OI真实
        if (this.row.volMcap > 8 && this.row.oiMcap > 2) {
          this.evidences.push('成交成✓OI真');
          return 18;
        }

        // 成交活跃 + OI适中
        if (this.row.volMcap > 10 && this.row.oiMcap > 1.5) {
          this.evidences.push('成交活跃');
          return 15;
        }

        return 0;
      }

      // 维度3：资金进场方向（Funding Rate三角验证）
      analyzeFundingPattern() {
        if (!this.prev) return 0;

        const fundingNow = this.row.funding;
        const fundingPrev = this.prev.funding;
        const fundingTrend = fundingNow - fundingPrev;

        // 检测1：从负→正 = 空头转多头（空头被轧）
        if (fundingPrev < 0 && fundingNow > 0.003) {
          this.evidences.push('空头平仓');
          return 20; // 强信号！
        }

        // 检测2：持续正向 + 逐步上升 = 多头在持续加仓
        if (fundingNow > 0.01 && fundingNow < 0.04 && fundingTrend > 0.002) {
          this.evidences.push('多头加仓中');
          return 16;
        }

        // 检测3：funding太高 = 容易砸盘风险
        if (fundingNow > 0.05) {
          this.evidences.push('资费过高-风险');
          return -15;
        }

        // 正向funding但稳定 = 资金在做多（好）
        if (fundingNow > 0.005 && fundingNow < 0.025) {
          this.evidences.push('资金做多');
          return 12;
        }

        return 0;
      }

      // 维度4：OI增长率（需要时序数据验证）
      analyzeOIGrowth() {
        if (!this.prev || !this.row.oiMcap) return 0;

        const oiGrowth = (this.row.oiMcap - this.prev.oiMcap) / (this.prev.oiMcap || 0.1);
        const priceGrowth = (this.row.price - this.prev.price) / this.prev.price;

        // 检测：OI增长 > 价格增长 = 资金在进，但价格还没跟上（底部信号！）
        if (oiGrowth > 0.15 && Math.abs(priceGrowth) < 0.05) {
          this.evidences.push('底部积累中');
          return 22; // 最强信号之一
        }

        // OI保持稳定 + 价格缓涨 = 稳健上升
        if (oiGrowth > -0.05 && oiGrowth < 0.1 && priceGrowth > 0) {
          this.evidences.push('OI稳健');
          return 10;
        }

        // OI大幅下降 = 资金出逃（减分！）
        if (oiGrowth < -0.2) {
          this.evidences.push('资金出逃');
          return -25;
        }

        return 0;
      }

      // 维度5：地址活跃度（链上信号）
      // 通过成交量变化反推
      analyzeAddressActivity() {
        if (!this.prev || !this.row.volMcap) return 0;

        const volGrowth = (this.row.volMcap - this.prev.volMcap) / (this.prev.volMcap || 0.1);

        // 成交量突然爆升 + OI也升 = 大量地址在活跃
        if (volGrowth > 0.4 && this.row.oiMcap > 2) {
          this.evidences.push('地址活跃度↑');
          return 18;
        }

        // 成交持续稳定 = 地址保持活跃
        if (Math.abs(volGrowth) < 0.3 && this.row.volMcap > 8) {
          this.evidences.push('地址活跃✓');
          return 12;
        }

        return 0;
      }

      // 维度6：市值规模（拉盘潜力）
      analyzeMarketCap() {
        const mcap = this.row.mcap;
        if (!mcap) return 0;

        // 理想的妖币市值：1000万 ~ 3亿
        // 理想的建议币市值：3000万 ~ 10亿
        if (mcap > 1e7 && mcap < 3e8) {
          this.evidences.push('市值合适');
          return 10; // 有拉盘空间
        }

        if (mcap > 3e8 && mcap < 1e9) {
          this.evidences.push('市值偏大');
          return 6;
        }

        if (mcap > 1e9) {
          this.evidences.push('市值太大');
          return -5; // 拉盘空间小
        }

        return 0;
      }

      // 维度7：时序验证（2次数据对比）
      analyzeTimeSequence() {
        if (!this.prev || !this.twoStepsAgo) return 0;

        // 检测趋势：是否连续向好
        const oiTrend = (this.row.oiMcap > this.prev.oiMcap) && 
                        (this.prev.oiMcap > this.twoStepsAgo.oiMcap);
        const volTrend = (this.row.volMcap > this.prev.volMcap) && 
                        (this.prev.volMcap > this.twoStepsAgo.volMcap);
        const fundingTrend = (this.row.funding > this.prev.funding) && 
                            (this.prev.funding > this.twoStepsAgo.funding);

        let trends = 0;
        if (oiTrend) { this.evidences.push('OI连升'); trends++; }
        if (volTrend) { this.evidences.push('成交连升'); trends++; }
        if (fundingTrend) { this.evidences.push('资费连升'); trends++; }

        // 多条指标连续向好 = 非常强的信号
        return trends * 8; // 每条趋势 +8分
      }

      // 最终综合分数
      getScore() {
        const dimensions = [
          this.analyzePriceDynamics(),
          this.analyzeVolumeAuthenticity(),
          this.analyzeFundingPattern(),
          this.analyzeOIGrowth(),
          this.analyzeAddressActivity(),
          this.analyzeMarketCap(),
          this.analyzeTimeSequence()
        ];

        this.score = Math.max(0, Math.min(100, dimensions.reduce((a, b) => a + b, 0)));
        return this.score;
      }

      // 获取检测信心度（用来显示在UI上）
      getConfidence() {
        // 信心度 = 证据数量
        // 证据越多 = 信号越清晰 = 信心越高
        const evidenceCount = this.evidences.length;
        return Math.min(100, evidenceCount * 12);
      }
    }

    function detectYaoCoin(row, prev, twoStepsAgo) {
      const analyzer = new CoinAnalyzer(row, prev, twoStepsAgo);
      const score = analyzer.getScore();
      const confidence = analyzer.getConfidence();
      
      // 妖币标准：分数 >= 75 + 证据 >= 5个 + 市值 < 3亿
      const hasNegativeEvidence = analyzer.evidences.some(e => e.includes('⚠️') || e.includes('风险'));

      if (
        score >= 75 &&
        analyzer.evidences.length >= 5 &&
        !hasNegativeEvidence &&
        row.mcap < 3e8
      ) {
        let status = '';
        if (row.priceChange < -15) {
          status = '🔴 底部蓄势';
        } else if (row.priceChange > 3) {
          status = '🟡 温和上升';
        } else {
          status = '🟢 筹码激活';
        }

        return {
          isYao: true,
          status,
          yaoScore: score,
          confidence,
          signals: analyzer.evidences,
          reason: analyzer.evidences.slice(0, 3).join(' + ')
        };
      }

      return { isYao: false };
    }

    function detectBuyCoin(row, prev, twoStepsAgo) {
      const analyzer = new CoinAnalyzer(row, prev, twoStepsAgo);
      const score = analyzer.getScore();
      const confidence = analyzer.getConfidence();

      const hasNegativeEvidence = analyzer.evidences.some(e => e.includes('⚠️') || e.includes('风险'));

      // 建议币标准：分数 >= 72 + 证据 >= 4个 + 市值 3亿~ 10亿 + 价格稳健
      if (
        score >= 72 &&
        analyzer.evidences.length >= 4 &&
        !hasNegativeEvidence &&
        row.mcap > 3e7 &&
        row.mcap < 1e9 &&
        row.priceChange > -5 &&
        row.priceChange < 15
      ) {
        return {
          isBuy: true,
          buyScore: score,
          confidence,
          signals: analyzer.evidences,
          reason: analyzer.evidences.slice(0, 3).join(' + ')
        };
      }

      return { isBuy: false };
    }

    function detectWatch(row, prev, twoStepsAgo) {
      const analyzer = new CoinAnalyzer(row, prev, twoStepsAgo);
      const score = analyzer.getScore();

      // 观察标准：分数 >= 60 但低于建议 + 证据 >= 3个
      if (score >= 60 && score < 72 && analyzer.evidences.length >= 3) {
        return {
          isWatch: true,
          watchScore: score,
          signals: analyzer.evidences,
          reason: '信号不足，继续观察'
        };
      }

      return { isWatch: false };
    }

    function getTradingAdvice(row, type) {
      if (type === 'yao') {
        if (row.priceChange < -15) {

    function calculateTP(row, isYao) {
      const p = row.price;
      if (isYao) {
        return {
          sl: (p * 0.97).toFixed(6),
          tp1: (p * 1.05).toFixed(6),
          tp2: (p * 1.10).toFixed(6),
          tp3: (p * 1.20).toFixed(6)
        };
      } else {
        return {
          sl: (p * 0.97).toFixed(6),
          tp1: (p * 1.03).toFixed(6),
          tp2: (p * 1.08).toFixed(6),
          tp3: (p * 1.15).toFixed(6)
        };
      }
    }

    function calculateAdd(row, isYao) {
      const p = row.price;
      if (isYao) {
        return {
          add1: (p * 0.95).toFixed(6),
          add2: (p * 0.90).toFixed(6)
        };
      } else {
        return {
          add1: (p * 0.97).toFixed(6),
          add2: (p * 0.94).toFixed(6)
        };
      }
    }

        coin.symbol.toUpperCase().includes(query.toUpperCase())

      dropdown.innerHTML = filtered.map(coin => `

    function searchSelect(symbol) {
      document.getElementById('search-input').value = symbol;
      document.getElementById('search-dropdown').classList.remove('active');
      
      const coin = allCoinsData.find(c => c.symbol === symbol);
      if (!coin) {
        document.getElementById('search-result').innerHTML = '<div class="empty-state">未找到</div>';
        return;
      }

      const yaoCheck = detectYaoCoin(coin, previousData[symbol], twoStepsAgoData[symbol]);
      const buyCheck = detectBuyCoin(coin, previousData[symbol], twoStepsAgoData[symbol]);
      const watchCheck = detectWatch(coin, previousData[symbol], twoStepsAgoData[symbol]);

      let type = '';
      if (yaoCheck.isYao) {
        type = 'yao';
        coin.status = yaoCheck.status;
        coin.yaoScore = yaoCheck.yaoScore;
        coin.confidence = yaoCheck.confidence;
        coin.signals = yaoCheck.signals;
        coin.reason = yaoCheck.reason;
      } else if (buyCheck.isBuy) {
        type = 'buy';
        coin.buyScore = buyCheck.buyScore;
        coin.confidence = buyCheck.confidence;
        coin.signals = buyCheck.signals;
        coin.reason = buyCheck.reason;
      } else if (watchCheck.isWatch) {
        type = 'watch';
        coin.watchScore = watchCheck.watchScore;
        coin.signals = watchCheck.signals;
        coin.reason = watchCheck.reason;
      } else {
        document.getElementById('search-result').innerHTML = `
          <div class="empty-state">
            💭 暂不符合推荐标准<br/>
            信号不足或指标不匹配
          </div>
        `;
        return;
      }

      showDetail(symbol, type);
    }

    async function loadData() {
      if (isLoading) return;

      isLoading = true;
      document.getElementById('refresh-dot').classList.add('loading');

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        if (!exchangeInfo || !ticker24h || !premiumIndex) throw new Error('数据获取失败');

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 300);

        oiMap = await fetchOpenInterest(symbols);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
        const mcapMap = {};
        gecko.forEach(x => {
          mcapMap[(x.symbol || '').toUpperCase() + 'USDT'] = x.market_cap;
        });

        allRows = { yao: [], buy: [], watch: [] };
        allCoinsData = [];

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];
          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price || price === 0) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const oi = oiMap[symbol] || 0;
          const oiValue = oi * price;
          const mcap = mcapMap[symbol] || null;

          let volMcap = null;
          let oiMcap = null;
          if (mcap && mcap > 0) {
            volMcap = quoteVol / mcap * 100;
            oiMcap = oiValue / mcap * 100;
          }

          const row = {
            symbol, price, mcap, quoteVol, funding, priceChange,
            oi, oiValue, volMcap, oiMcap
          };

          allCoinsData.push(row);

          // 使用时序数据进行三维度分析
          const prev = previousData[symbol];
          const twoStepsAgo = twoStepsAgoData[symbol];

          // 优先判建议，再判妖币，最后判观察
          const buyCheck = detectBuyCoin(row, prev, twoStepsAgo);
          if (buyCheck.isBuy) {
            row.level = '建议';
            row.buyScore = buyCheck.buyScore;
            row.confidence = buyCheck.confidence;
            row.signals = buyCheck.signals;
            row.reason = buyCheck.reason;
            allRows.buy.push(row);
            continue;
          }

          const yaoCheck = detectYaoCoin(row, prev, twoStepsAgo);
          if (yaoCheck.isYao) {
            row.level = '妖币';
            row.status = yaoCheck.status;
            row.yaoScore = yaoCheck.yaoScore;
            row.confidence = yaoCheck.confidence;
            row.signals = yaoCheck.signals;
            row.reason = yaoCheck.reason;
            allRows.yao.push(row);
            continue;
          }

          const watchCheck = detectWatch(row, prev, twoStepsAgo);
          if (watchCheck.isWatch) {
            row.level = '观察';
            row.watchScore = watchCheck.watchScore;
            row.signals = watchCheck.signals;
            row.reason = watchCheck.reason;
            allRows.watch.push(row);
          }
        }

        // 排序
        allRows.yao.sort((a, b) => b.yaoScore - a.yaoScore);
        allRows.buy.sort((a, b) => b.buyScore - a.buyScore);
        allRows.watch.sort((a, b) => b.watchScore - a.watchScore);

        // 保存历史（两层历史数据）
        const newTwoStepsAgo = previousData;
        const newPreviousData = {};
        
        [...allRows.yao, ...allRows.buy, ...allRows.watch].forEach(row => {
          newPreviousData[row.symbol] = {
            price: row.price,
            oiMcap: row.oiMcap,
            funding: row.funding,
            volMcap: row.volMcap
          };
        });

        twoStepsAgoData = newTwoStepsAgo;
        previousData = newPreviousData;

        renderYaoList();
        renderBuyList();
        renderWatchList();

        // 统计
        document.getElementById('stat-yao').innerText = allRows.yao.length;
        document.getElementById('stat-buy').innerText = allRows.buy.length;
        document.getElementById('stat-watch').innerText = allRows.watch.length;

        document.getElementById('last-update').innerText = '✅ ' + new Date().toLocaleTimeString();

      } catch (e) {
        console.error(e);
        document.getElementById('last-update').innerText = '❌ 获取失败';
      } finally {
        isLoading = false;
        document.getElementById('refresh-dot').classList.remove('loading');
      }
    }

    function startAutoRefresh() {
      let countdown = 60;
      
      loadData();

      autoRefreshInterval = setInterval(() => {
        countdown--;
        document.getElementById('refresh-countdown').innerText = countdown;

        if (countdown <= 0) {
          countdown = 60;
          loadData();
        }
      }, 1000);
    }

    startAutoRefresh();

    document.getElementById('search-input').addEventListener('blur', () => {
      setTimeout(() => {
        document.getElementById('search-dropdown').classList.remove('active');
      }, 100);
    });

    document.getElementById('detail-modal').addEventListener('click', (e) => {
      if (e.target.id === 'detail-modal') {
        closeDetail();
      }
    });

    window.addEventListener('beforeunload', () => {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    });
  </script>
</body>
</html>

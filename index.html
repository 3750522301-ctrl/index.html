<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>币安永续精选监控 - v4.1 强化版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      color: #e5eefb;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .container { max-width: 1600px; margin: 0 auto; }
    .version-tag {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(16,196,245,.2);
      border: 1px solid rgba(16,196,245,.4);
      color: #10c4f5;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      z-index: 999;
    }
    h1 {
      text-align: center;
      color: #10c4f5;
      margin-bottom: 8px;
      font-size: 36px;
    }
    .subtitle {
      text-align: center;
      color: #8ca3ba;
      font-size: 12px;
      margin-bottom: 20px;
    }
    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(16,196,245,.2);
    }
    .tab-btn {
      background: none;
      border: none;
      color: #8ca3ba;
      padding: 12px 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #10c4f5;
      border-bottom-color: #10c4f5;
    }
    .tab-btn:hover { color: #10c4f5; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .time-info {
      color: #8ca3ba;
      font-size: 13px;
    }
    button {
      background: #11b7e6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    button:hover { opacity: .85; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .filter-group {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      background: rgba(16,196,245,.12);
      color: #10c4f5;
      border: 1px solid rgba(16,196,245,.3);
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: #11b7e6;
      border-color: #11b7e6;
      color: white;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }
    .card {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 14px;
      padding: 16px;
      transition: all 0.2s;
    }
    .card:hover { border-color: rgba(16,196,245,.4); }
    .label {
      color: #8ca3ba;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .value {
      color: #10c4f5;
      font-weight: bold;
      font-size: 24px;
    }
    .table-wrap {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 16px;
      overflow: auto;
      max-height: 700px;
    }
    .status {
      text-align: center;
      color: #9db0c4;
      padding: 30px;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #0d1a2d;
      color: #c5d4e5;
      font-size: 12px;
      font-weight: 600;
    }
    tbody tr {
      transition: none;
      cursor: pointer;
    }
    tbody tr:hover { background: rgba(16,196,245,.08); }
    .symbol {
      color: #10c4f5;
      font-weight: bold;
    }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .gray { color: #94a3b8; }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      margin-right: 6px;
      margin-bottom: 5px;
      border: 1px solid;
      white-space: nowrap;
    }

    .level-极其好 { background: rgba(34, 197, 94, .3); color: #22c55e; border-color: #22c55e; font-weight: bold; }
    .level-非常好 { background: rgba(34, 197, 94, .2); color: #86efac; border-color: #22c55e; }
    .level-较好 { background: rgba(59, 130, 246, .2); color: #93c5fd; border-color: #3b82f6; }

    .detail-box {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 16px;
      padding: 20px;
    }
    .detail-title {
      font-size: 28px;
      color: #10c4f5;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
    }
    .detail-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(16,196,245,.12);
      border-radius: 12px;
      padding: 14px;
    }
    .detail-card h3 {
      color: #10c4f5;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: 13px;
    }
    .row:last-child { border-bottom: none; }
    .row-label { color: #8ca3ba; }
    .row-value { color: #e5eefb; font-weight: bold; }

    .link-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .link-btn {
      display: inline-block;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(16,196,245,.12);
      color: #10c4f5;
      border: 1px solid rgba(16,196,245,.2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .link-btn:hover { background: rgba(16,196,245,.25); }

    .analysis-box {
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
      color: #86efac;
      font-size: 12px;
      line-height: 1.6;
    }

    .analysis-box h3 {
      color: #22c55e;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .analysis-item {
      margin-bottom: 8px;
    }

    .warning-box {
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.3);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      color: #fcd34d;
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 1200px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
      .link-group { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      table { font-size: 11px; }
      th, td { padding: 8px 10px; }
      .link-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="version-tag">v4.1 强化版</div>

  <div class="container">
    <h1>⚡ 币安永续精选监控</h1>
    <p class="subtitle">强化分析能力 | 综合评估好币 | 快捷查询通道</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('list', this)">📊 精选币种</button>
      <button class="tab-btn" onclick="switchTab('detail', this)">📈 币种详情</button>
    </div>

    <!-- 列表页 -->
    <div id="list" class="tab-content active">
      <div class="toolbar">
        <div class="time-info" id="last-update">最后更新：-</div>
        <button id="refresh-btn" onclick="loadData()">🔄 手动刷新</button>
      </div>

      <div class="filter-group">
        <span style="color: #8ca3ba; font-size: 12px;">筛选等级：</span>
        <button class="filter-btn active" onclick="filterLevel('all')">全部</button>
        <button class="filter-btn" onclick="filterLevel('极其好')">💚 极其好</button>
        <button class="filter-btn" onclick="filterLevel('非常好')">💛 非常好</button>
        <button class="filter-btn" onclick="filterLevel('较好')">🔵 较好</button>
      </div>

      <div class="stats">
        <div class="card">
          <div class="label">精选币种总数</div>
          <div class="value" id="stat-total">-</div>
        </div>
        <div class="card">
          <div class="label">💚 极其好</div>
          <div class="value" id="stat-best">-</div>
        </div>
        <div class="card">
          <div class="label">💛 非常好</div>
          <div class="value" id="stat-vgood">-</div>
        </div>
        <div class="card">
          <div class="label">🔵 较好</div>
          <div class="value" id="stat-good">-</div>
        </div>
        <div class="card">
          <div class="label">平均评分</div>
          <div class="value" id="stat-avg">-</div>
        </div>
      </div>

      <div class="table-wrap">
        <div id="status" class="status">加载中...</div>
        <table id="table" style="display:none;">
          <thead>
            <tr>
              <th>合约</th>
              <th>价格</th>
              <th>市值</th>
              <th>Vol/Mcap</th>
              <th>OI/Mcap</th>
              <th>Funding</th>
              <th>24h%</th>
              <th>评级</th>
              <th>评分</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 详情页 -->
    <div id="detail" class="tab-content">
      <div class="detail-box">
        <div id="detail-empty" class="status">请先在列表页点击一个币种</div>
        <div id="detail-content"></div>
      </div>
    </div>
  </div>

  <script>
    let allRows = [];
    let filteredRows = [];
    let selectedRow = null;
    let oiMap = {};
    let isLoading = false;
    let currentFilter = 'all';

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      if (el) el.classList.add('active');
    }

    function activateDetailTab() {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById('detail').classList.add('active');
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }

    function filterLevel(level) {
      currentFilter = level;
      document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
      event.target.classList.add('active');
      renderTable();
    }

    function colorClass(v) {
      if (v === null || v === undefined || isNaN(v)) return 'gray';
      return v > 0 ? 'green' : v < 0 ? 'red' : 'gray';
    }

    function fmtNum(n, d = 2) {
      if (n === null || n === undefined || isNaN(n)) return '-';
      if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(2) + 'K';
      return Number(n).toFixed(d);
    }

    async function getJSON(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (e) {
        console.error('Fetch error:', url, e);
        return null;
      }
    }

    async function fetchOpenInterest(symbols) {
      const map = {};
      const topSymbols = symbols.slice(0, 100);
      const chunk = 25;
      
      for (let i = 0; i < topSymbols.length; i += chunk) {
        const batch = topSymbols.slice(i, i + chunk);
        const promises = batch.map(async symbol => {
          const url = `https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`;
          const data = await getJSON(url);
          if (data && data.openInterest) {
            map[symbol] = parseFloat(data.openInterest);
          }
        });
        await Promise.all(promises);
        await new Promise(r => setTimeout(r, 100));
      }
      return map;
    }

    // 强化的综合评分算法
    function calcQualityLevel(row) {
      const oi = row.oiMcap || 0;
      const vol = row.volMcap || 0;
      const fund = row.funding || 0;
      const price = row.priceChange || 0;
      const mcap = row.mcap || 0;

      let score = 0;

      // OI/Mcap 评分（0-25分）
      if (oi >= 3 && oi <= 8) score += 25;
      else if (oi >= 2 && oi <= 12) score += 20;
      else if (oi >= 1 && oi <= 15) score += 15;
      else score += 5;

      // Vol/Mcap 评分（0-25分）
      if (vol >= 8 && vol <= 20) score += 25;
      else if (vol >= 5 && vol <= 25) score += 20;
      else if (vol >= 3 && vol <= 30) score += 15;
      else score += 5;

      // Funding 评分（0-25分）
      if (fund >= -0.01 && fund <= 0.02) score += 25;
      else if (fund >= -0.015 && fund <= 0.03) score += 20;
      else if (fund >= -0.02 && fund <= 0.04) score += 15;
      else if (Math.abs(fund) <= 0.05) score += 10;
      else score += 3;

      // 价格动量评分（0-25分）
      if (price >= -2 && price <= 5) score += 25;
      else if (price >= -5 && price <= 8) score += 20;
      else if (price >= -8 && price <= 15) score += 15;
      else if (price >= -15 && price <= 30) score += 10;
      else score += 3;

      // 市值稳定性加分（0-5分）
      if (mcap > 1e8) score += 3;
      if (mcap > 5e8) score += 2;

      // 综合判定
      if (score >= 95) return { level: '极其好', score };
      else if (score >= 80) return { level: '非常好', score };
      else if (score >= 65) return { level: '较好', score };
      else return { level: '一般', score };
    }

    function showDetail(row) {
      selectedRow = row;
      document.getElementById('detail-empty').style.display = 'none';

      const coin = row.symbol.replace('USDT', '');
      const levelEmoji = { '极其好': '💚', '非常好': '💛', '较好': '🔵', '一般': '⚪' };

      // 生成分析理由
      let analysis = [];
      let warnings = [];

      if (row.oiMcap >= 3 && row.oiMcap <= 8) {
        analysis.push('✅ OI热度适中（3-8%），风险可控');
      } else if (row.oiMcap > 15) {
        warnings.push('⚠️ OI过热（>15%），容易暴涨暴跌');
      }

      if (row.volMcap >= 8 && row.volMcap <= 20) {
        analysis.push('✅ 成交活跃（8-20%），有真实买卖');
      } else if (row.volMcap > 25) {
        warnings.push('⚠️ 成交过度活跃，可能是顶部特征');
      }

      if (row.funding >= -0.01 && row.funding <= 0.02) {
        analysis.push('✅ 多空平衡（Funding接近0），底部风险低');
      } else if (row.funding > 0.05) {
        warnings.push('⚠️ Funding过高（>0.05%），多头挤压严重');
      }

      if (row.priceChange >= -2 && row.priceChange <= 5) {
        analysis.push('✅ 温和上涨或小回调，缓升特征');
      } else if (row.priceChange < -15) {
        analysis.push('💡 大幅下跌，可能是底部机会');
      } else if (row.priceChange > 30) {
        warnings.push('⚠️ 涨幅过大（>30%），需警惕回调');
      }

      if (row.mcap > 1e8) {
        analysis.push('✅ 市值充足（>1亿），流动性好');
      }

      const html = `
        <div class="detail-title">
          ${row.symbol}
          <span class="tag level-${row.level}">${levelEmoji[row.level]} ${row.level}</span>
          <span style="color: #10c4f5; font-size: 16px; margin-left: auto; font-weight: bold;">${row.detailScore.toFixed(1)}/100</span>
        </div>

        <div class="link-group">
          <a class="link-btn" target="_blank" href="https://www.binance.com/zh-CN/futures/${row.symbol}">
            📊 币安交易
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/futures/${coin}">
            📈 CoinGlass合约
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/liq/${coin}">
            💥 清算热力图
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/unlock/${coin}">
            🔓 解锁数据
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/position/${coin}">
            👥 持仓数据
          </a>
          <a class="link-btn" target="_blank" href="https://dexscreener.com/search?q=${coin}">
            🌊 DEX数据
          </a>
        </div>

        <div class="detail-grid">
          <div class="detail-card">
            <h3>📊 基础数据</h3>
            <div class="row">
              <span class="row-label">现价</span>
              <span class="row-value">$${fmtNum(row.price, 6)}</span>
            </div>
            <div class="row">
              <span class="row-label">市值</span>
              <span class="row-value">$${fmtNum(row.mcap, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">24h涨跌</span>
              <span class="row-value ${colorClass(row.priceChange)}">${row.priceChange.toFixed(2)}%</span>
            </div>
            <div class="row">
              <span class="row-label">24h成交</span>
              <span class="row-value">$${fmtNum(row.quoteVol, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">OI价值</span>
              <span class="row-value">$${fmtNum(row.oiValue, 2)}</span>
            </div>
          </div>

          <div class="detail-card">
            <h3>📈 合约数据</h3>
            <div class="row">
              <span class="row-label">OI持仓</span>
              <span class="row-value">${fmtNum(row.oi, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">OI/Mcap</span>
              <span class="row-value ${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="row">
              <span class="row-label">Vol/Mcap</span>
              <span class="row-value ${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="row">
              <span class="row-label">Funding Rate</span>
              <span class="row-value ${colorClass(row.funding)}">${row.funding.toFixed(4)}%</span>
            </div>
            <div class="row">
              <span class="row-label">Funding 评估</span>
              <span class="row-value">${
                row.funding >= -0.01 && row.funding <= 0.02 ? '✅ 平衡' :
                row.funding > 0.05 ? '⚠️ 多头挤压' :
                row.funding < -0.05 ? '⚠️ 空头挤压' :
                '⚖️ 一般'
              }</span>
            </div>
          </div>

          <div class="detail-card">
            <h3>🎯 质量评估</h3>
            <div class="row">
              <span class="row-label">综合评级</span>
              <span class="row-value">${levelEmoji[row.level]} ${row.level}</span>
            </div>
            <div class="row">
              <span class="row-label">OI热度</span>
              <span class="row-value">${
                row.oiMcap >= 3 && row.oiMcap <= 8 ? '✅ 适中' :
                row.oiMcap > 15 ? '🔥 过热' :
                row.oiMcap < 2 ? '❄️ 冷清' :
                '⚖️ 一般'
              }</span>
            </div>
            <div class="row">
              <span class="row-label">成交热度</span>
              <span class="row-value">${
                row.volMcap >= 8 && row.volMcap <= 20 ? '✅ 活跃' :
                row.volMcap > 25 ? '🔥 很热' :
                row.volMcap < 5 ? '🥶 清淡' :
                '⚖️ 一般'
              }</span>
            </div>
            <div class="row">
              <span class="row-label">价格动量</span>
              <span class="row-value">${
                row.priceChange >= 0 && row.priceChange <= 5 ? '📈 缓升' :
                row.priceChange > 10 ? '🚀 快速上升' :
                row.priceChange < -10 ? '📉 快速下跌' :
                '⚖️ 盘整'
              }</span>
            </div>
            <div class="row">
              <span class="row-label">市值规模</span>
              <span class="row-value">${
                row.mcap > 5e8 ? '大盘' :
                row.mcap > 1e8 ? '中盘' :
                '小盘'
              }</span>
            </div>
          </div>
        </div>

        ${analysis.length > 0 ? `
          <div class="analysis-box">
            <h3>📋 为什么选择这个币：</h3>
            ${analysis.map(a => `<div class="analysis-item">${a}</div>`).join('')}
          </div>
        ` : ''}

        ${warnings.length > 0 ? `
          <div class="warning-box">
            <strong>⚠️ 需要关注的风险：</strong><br>
            ${warnings.map(w => `<div style="margin-top: 4px;">${w}</div>`).join('')}
          </div>
        ` : ''}
      `;
      document.getElementById('detail-content').innerHTML = html;
      activateDetailTab();
    }

    function renderTable() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      let displayRows = allRows;
      if (currentFilter !== 'all') {
        displayRows = allRows.filter(r => r.level === currentFilter);
      }

      if (displayRows.length === 0) {
        document.getElementById('table').style.display = 'none';
        document.getElementById('status').style.display = 'block';
        document.getElementById('status').innerText = `暂无 ${currentFilter} 级别的币种`;
        return;
      }

      displayRows.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="symbol">${row.symbol}</td>
          <td>$${fmtNum(row.price, 6)}</td>
          <td>$${fmtNum(row.mcap, 2)}</td>
          <td class="${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(1) + '%' : '-'}</td>
          <td class="${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(1) + '%' : '-'}</td>
          <td class="${colorClass(row.funding)}">${row.funding.toFixed(3)}%</td>
          <td class="${colorClass(row.priceChange)}">${row.priceChange.toFixed(1)}%</td>
          <td><span class="tag level-${row.level}">${row.level}</span></td>
          <td style="color: #10c4f5; font-weight: bold;">${row.detailScore.toFixed(1)}</td>
        `;
        tr.addEventListener('click', () => showDetail(row));
        tbody.appendChild(tr);
      });

      document.getElementById('table').style.display = 'table';
      document.getElementById('status').style.display = 'none';
    }

    async function loadData() {
      if (isLoading) return;

      isLoading = true;
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.innerText = '⏳ 加载中...';

      const status = document.getElementById('status');
      const table = document.getElementById('table');

      status.style.display = 'block';
      status.innerText = '加载中...';
      table.style.display = 'none';

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        if (!exchangeInfo || !ticker24h || !premiumIndex) throw new Error('基础数据获取失败');

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 200);

        status.innerText = '加载合约数据...';
        oiMap = await fetchOpenInterest(symbols);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
        const mcapMap = {};
        gecko.forEach(x => {
          mcapMap[(x.symbol || '').toUpperCase() + 'USDT'] = x.market_cap;
        });

        const candidates = [];

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];
          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const oi = oiMap[symbol] || 0;
          const oiValue = oi * price;
          const mcap = mcapMap[symbol] || null;

          let volMcap = null;
           let oiMcap = null;
          if (mcap && mcap > 0) {
            volMcap = quoteVol / mcap * 100;
            oiMcap = oiValue / mcap * 100;
          }

          const row = {
            symbol, price, mcap, quoteVol, funding, priceChange,
            oi, oiValue, volMcap, oiMcap
          };

          // 计算质量等级
          const quality = calcQualityLevel(row);
          row.level = quality.level;
          row.detailScore = quality.score;

          // 只保留质量好的币（过滤掉 "一般" 级别）
          if (row.level !== '一般') {
            candidates.push(row);
          }
        }

        // 按评分排序
        candidates.sort((a, b) => b.detailScore - a.detailScore);
        allRows = candidates;

        // 更新统计数据
        document.getElementById('stat-total').innerText = candidates.length;
        document.getElementById('stat-best').innerText = 
          candidates.filter(x => x.level === '极其好').length;
        document.getElementById('stat-vgood').innerText = 
          candidates.filter(x => x.level === '非常好').length;
        document.getElementById('stat-good').innerText = 
          candidates.filter(x => x.level === '较好').length;
        const avgScore = candidates.length ? candidates.reduce((s, x) => s + x.detailScore, 0) / candidates.length : 0;
        document.getElementById('stat-avg').innerText = avgScore.toFixed(1);

        renderTable();
        document.getElementById('last-update').innerText = '最后更新：' + new Date().toLocaleString();

      } catch (e) {
        console.error(e);
        status.style.display = 'block';
        status.innerText = '❌ 加载失败：' + e.message;
        table.style.display = 'none';
      } finally {
        isLoading = false;
        btn.disabled = false;
        btn.innerText = '🔄 手动刷新';
      }
    }

    // 页面加载时自动加载一次
    loadData();
  </script>
</body>
</html>

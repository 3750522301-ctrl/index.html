<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>币圈狙击手 - 衍生品监控系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0e27;
      --card: #111b2e;
      --border: #1e2847;
      --text: #e0e6ed;
      --sub: #8b95a5;
      --cyan: #00ffc8;
      --purple: #a78bfa;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #fbbf24;
      --orange: #f97316;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      overflow-x: hidden;
    }

    /* ============ 布局 ============ */
    .container {
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      padding: 0;
    }

    /* ============ 导航栏 ============ */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 14, 39, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .navbar-title {
      font-size: 18px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .navbar-center {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .search-box {
      position: relative;
      width: 100%;
      max-width: 400px;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: all 0.3s;
    }

    .search-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 10px rgba(0, 255, 200, 0.2);
    }

    .search-input::placeholder {
      color: var(--sub);
    }

    #search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 400px;
      overflow-y: auto;
      display: none;
      z-index: 1000;
    }

    #search-suggestions.active {
      display: block;
    }

    .suggestion-item {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }

    .suggestion-item:hover {
      background: rgba(0, 255, 200, 0.05);
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-asset {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 2px;
    }

    .navbar-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .update-time {
      font-size: 12px;
      color: var(--sub);
      padding: 0 12px;
      border-right: 1px solid var(--border);
    }

    #update-time {
      color: var(--cyan);
      font-weight: 700;
    }

    .nav-btn {
      padding: 8px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--sub);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    #manual-refresh-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--cyan);
      border-radius: 6px;
      color: var(--cyan);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.3s;
    }

    #manual-refresh-btn:hover {
      background: rgba(0, 255, 200, 0.1);
    }

    #manual-refresh-btn.loading {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #refresh-icon {
      display: inline-block;
      font-size: 14px;
    }

    /* ============ 扫描进度 ============ */
    #scanning-status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      z-index: 2000;
      display: none;
      text-align: center;
      min-width: 300px;
    }

    #scanning-status.active {
      display: block;
    }

    #scanning-progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      margin: 16px 0;
      overflow: hidden;
    }

    #scanning-progress-bar::after {
      content: '';
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      width: 0%;
      transition: width 0.3s;
    }

    /* ============ 主内容 ============ */
    .main-content {
      padding: 20px;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    /* ============ 统计面板 ============ */
    .stats-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 900;
      color: var(--cyan);
    }

    .stat-card.sss .stat-value {
      color: #ff6b6b;
    }

    .stat-card.ss .stat-value {
      color: var(--orange);
    }

    .stat-card.s .stat-value {
      color: var(--green);
    }

    .stat-card.total .stat-value {
      color: var(--purple);
    }

    /* ============ 等级分组 ============ */
    .grade-section {
      margin-bottom: 32px;
    }

    .grade-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .grade-label {
      font-size: 18px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .grade-label.sss {
      color: #ff6b6b;
    }

    .grade-label.ss {
      color: var(--orange);
    }

    .grade-label.s {
      color: var(--green);
    }

    .grade-label.b {
      color: var(--cyan);
    }

    .grade-label.c {
      color: var(--sub);
    }

    .grade-count {
      font-size: 12px;
      color: var(--sub);
      background: var(--card);
      padding: 4px 8px;
      border-radius: 4px;
    }

    /* ============ 网格布局 ============ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* ============ 币种卡片 ============ */
    .coin-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .coin-card:hover {
      border-color: var(--cyan);
      box-shadow: 0 8px 24px rgba(0, 255, 200, 0.15);
      transform: translateY(-2px);
    }

    .coin-card.sss {
      border-left: 4px solid #ff6b6b;
    }

    .coin-card.ss {
      border-left: 4px solid var(--orange);
    }

    .coin-card.s {
      border-left: 4px solid var(--green);
    }

    .coin-card.b {
      border-left: 4px solid var(--cyan);
    }

    .coin-card.c {
      border-left: 4px solid var(--sub);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .coin-info {
      flex: 1;
    }

    .coin-name {
      font-size: 18px;
      font-weight: 900;
      color: var(--cyan);
      margin-bottom: 2px;
    }

    .coin-price {
      font-size: 12px;
      color: var(--sub);
    }

    .price-change {
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }

    .price-change.up {
      color: var(--green);
    }

    .price-change.down {
      color: var(--red);
    }

    .grade-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 900;
      margin-right: 8px;
      background: rgba(0, 255, 200, 0.1);
      color: var(--cyan);
    }

    .grade-badge.sss {
      background: rgba(255, 107, 107, 0.1);
      color: #ff6b6b;
    }

    .grade-badge.ss {
      background: rgba(249, 115, 22, 0.1);
      color: var(--orange);
    }

    .grade-badge.s {
      background: rgba(16, 185, 129, 0.1);
      color: var(--green);
    }

    .resonance-tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      background: rgba(167, 139, 250, 0.1);
      color: var(--purple);
      font-weight: 700;
    }

    .derivatives-info {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 11px;
    }

    .derivatives-label {
      color: var(--cyan);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .derivatives-item {
      display: flex;
      justify-content: space-between;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .derivatives-item:last-child {
      margin-bottom: 0;
    }

    .derivatives-item strong {
      color: var(--text);
      font-weight: 700;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }

    .metric-label {
      font-size: 10px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    .metric-value.up {
      color: var(--green);
    }

    .metric-value.down {
      color: var(--red);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 10px;
      background: rgba(0, 255, 200, 0.1);
      color: var(--cyan);
      font-weight: 700;
    }

    .tag.risk-high {
      background: rgba(239, 68, 68, 0.1);
      color: var(--red);
    }

    .tag.risk-mid {
      background: rgba(251, 191, 36, 0.1);
      color: var(--yellow);
    }

    .tag.risk-low {
      background: rgba(16, 185, 129, 0.1);
      color: var(--green);
    }

    .quick-links {
      display: flex;
      gap: 6px;
      justify-content: space-between;
    }

    .quick-link {
      flex: 1;
      padding: 6px;
      background: rgba(0, 255, 200, 0.05);
      border: 1px solid rgba(0, 255, 200, 0.2);
      border-radius: 4px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .quick-link:hover {
      background: rgba(0, 255, 200, 0.1);
      border-color: var(--cyan);
    }

    /* ============ 详情页面 ============ */
    .back-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--cyan);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(0, 255, 200, 0.1);
      border-color: var(--cyan);
    }

    .derivatives-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 900;
      color: var(--cyan);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .detail-metric {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      padding: 12px;
      text-align: center;
    }

    .detail-metric-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .detail-metric-value {
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
    }

    .detail-metric-value.up {
      color: var(--green);
    }

    .detail-metric-value.down {
      color: var(--red);
    }

    .signal-item {
      background: rgba(0, 0, 0, 0.3);
      border-left: 3px solid var(--green);
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 8px;
    }

    .signal-item.short {
      border-left-color: var(--red);
    }

    .signal-title {
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }

    .signal-value {
      font-size: 11px;
      color: var(--sub);
    }

    .quick-btn {
      padding: 8px 12px;
      background: rgba(0, 255, 200, 0.05);
      border: 1px solid rgba(0, 255, 200, 0.2);
      border-radius: 6px;
      color: var(--cyan);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: rgba(0, 255, 200, 0.1);
      border-color: var(--cyan);
    }

    /* ============ 通知 ============ */
    #notification-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 3000;
      pointer-events: none;
    }

    .notification {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 8px;
      font-size: 13px;
      opacity: 0;
      transform: translateX(400px);
      transition: all 0.3s;
      pointer-events: auto;
    }

    .notification.show {
      opacity: 1;
      transform: translateX(0);
    }

    .notification.success {
      border-color: var(--green);
      background: rgba(16, 185, 129, 0.1);
      color: var(--green);
    }

    .notification.error {
      border-color: var(--red);
      background: rgba(239, 68, 68, 0.1);
      color: var(--red);
    }

    .notification.info {
      border-color: var(--cyan);
      background: rgba(0, 255, 200, 0.1);
      color: var(--cyan);
    }

    /* ============ 响应式 ============ */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }

      .navbar {
        flex-wrap: wrap;
      }

      .navbar-center {
        order: 3;
        flex-basis: 100%;
      }

      .search-box {
        max-width: 100%;
      }

      .detail-metrics {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .navbar {
        padding: 12px;
        gap: 8px;
      }

      .navbar-title {
        font-size: 14px;
      }

      .nav-btn {
        font-size: 11px;
        padding: 6px 10px;
      }

      #manual-refresh-btn {
        padding: 6px 12px;
        font-size: 11px;
      }

      .stats-panel {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .detail-metrics {
        grid-template-columns: 1fr;
      }
    }

    /* ============ 扫描状态动画 ============ */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .scan-status {
      text-align: center;
      padding: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--cyan);
      font-weight: 700;
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 导航栏 -->
    <div class="navbar">
      <div class="navbar-title">🚀 币圈狙击手</div>
      
      <div class="navbar-center">
        <div class="search-box">
          <input 
            type="text" 
            id="search-input" 
            class="search-input" 
            placeholder="搜索币种... (支持全部币种)"
          >
          <div id="search-suggestions"></div>
        </div>
      </div>

      <div class="navbar-right">
        <div class="update-time">最后更新: <span id="update-time">--:--:--</span></div>
        
        <button class="nav-btn active" onclick="switchPage('monitor')">📊 TOP10</button>
        <button class="nav-btn" onclick="switchPage('search')">🔍 全部</button>
        <button class="nav-btn" onclick="switchPage('detail')">📈 详情</button>
        
        <button id="manual-refresh-btn" onclick="twoPhaseFullRefresh()">
          <span id="refresh-icon">🔄</span> 扫描
        </button>
      </div>
    </div>

    <!-- 扫描进度 -->
    <div id="scanning-status">
      <div style="font-size: 24px; margin-bottom: 12px;">⏳ 正在扫描币种</div>
      <div id="scanning-progress-bar"></div>
      <div id="scanning-progress-text" style="font-size: 12px; color: var(--sub);">0/0</div>
      <div style="font-size: 12px; color: var(--sub); margin-top: 12px;">
        这通常需要 2-5 分钟，请耐心等待...
      </div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
      <!-- TOP10 监控页 -->
      <div id="monitor-page" class="page active">
        <div id="scan-status" class="scan-status" style="display: none;"></div>

        <div class="stats-panel">
          <div class="stat-card sss">
            <div>
              <div class="stat-label">SSS级 (重仓买入)</div>
              <div class="stat-value" id="top10-sss-count">0</div>
            </div>
            <div style="font-size: 32px;">🚀</div>
          </div>
          <div class="stat-card ss">
            <div>
              <div class="stat-label">SS级 (中仓买入)</div>
              <div class="stat-value" id="top10-ss-count">0</div>
            </div>
            <div style="font-size: 32px;">📈</div>
          </div>
          <div class="stat-card s">
            <div>
              <div class="stat-label">S级 (部分仓位)</div>
              <div class="stat-value" id="top10-s-count">0</div>
            </div>
            <div style="font-size: 32px;">✨</div>
          </div>
          <div class="stat-card total">
            <div>
              <div class="stat-label">分析总数</div>
              <div class="stat-value" id="total-analyzed">0</div>
            </div>
            <div style="font-size: 32px;">📊</div>
          </div>
        </div>

        <div id="monitor-content"></div>
      </div>

      <!-- 全部币种页 -->
      <div id="search-page" class="page">
        <div class="stats-panel">
          <div class="stat-card sss">
            <div>
              <div class="stat-label">SSS级</div>
              <div class="stat-value" id="all-sss-count">0</div>
            </div>
            <div style="font-size: 32px;">🚀</div>
          </div>
          <div class="stat-card ss">
            <div>
              <div class="stat-label">SS级</div>
              <div class="stat-value" id="all-ss-count">0</div>
            </div>
            <div style="font-size: 32px;">📈</div>
          </div>
          <div class="stat-card s">
            <div>
              <div class="stat-label">S级</div>
              <div class="stat-value" id="all-s-count">0</div>
            </div>
            <div style="font-size: 32px;">✨</div>
          </div>
          <div class="stat-card total">
            <div>
              <div class="stat-label">总币种数</div>
              <div class="stat-value" id="total-coins">0</div>
            </div>
            <div style="font-size: 32px;">📊</div>
          </div>
        </div>

        <div id="search-content"></div>
      </div>

      <!-- 详情页 -->
      <div id="detail-page" class="page">
        <div id="detail-content"></div>
      </div>
    </div>
  </div>

  <!-- 通知容器 -->
  <div id="notification-container"></div>

  <script>
    // ============ 配置 ============
    const CONFIG = {
      binanceUrl: 'https://api.binance.com/api/v3',
      futuresUrl: 'https://fapi.binance.com/fapi/v1',
      
      // 并发和超时
      concurrentLimit: 2,
      requestTimeout: 15000,
      retryTimes: 3,
      autoRefreshInterval: 300000, // 5分钟
      
      // 过滤参数

    function fmt(num, decimals = 2) {
      if (typeof num !== 'number' || !isFinite(num)) return '--';
      if (num >= 1e9) return (num / 1e9).toFixed(decimals) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(decimals) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(decimals) + 'K';
      return num.toFixed(decimals);
    }

    function fmtPct(value, decimals = 2) {

    // ============ API 请求（带重试和限流） ============
    async function fetchWithTimeout(url, timeout = CONFIG.requestTimeout, retry = CONFIG.retryTimes) {
      let lastError = null;

      for (let attempt = 0; attempt <= retry; attempt++) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);

        try {
          const res = await fetch(url, {
            method: 'GET',
            headers: {
              'Accept': 'application/json',
              'User-Agent': 'Mozilla/5.0'
            },
            signal: controller.signal
          });

          clearTimeout(timeoutId);

          if (!res.ok) {
            if (res.status === 429) {
              const delay = 1000 * Math.pow(2, attempt);
              await sleep(delay);
              continue;
            }
            throw new Error(`HTTP ${res.status}`);
          }

          return await res.json();
        } catch (error) {
          clearTimeout(timeoutId);
          lastError = error;

          if (attempt < retry) {
            const delay = 500 * Math.pow(2, attempt);
            await sleep(delay);
          }
        }
      }

      throw lastError;
    }

    // ============ 技术指标计算 ============
    function calcEMA(data, period) {
      if (data.length === 0) return data;
      const k = 2 / (period + 1);
      let ema = data[0];
      const result = [ema];

      for (let i = 1; i < data.length; i++) {
        ema = data[i] * k + ema * (1 - k);
        result.push(ema);
      }
      return result;
    }

    function calcRSI(data, period = 14) {
      if (data.length < period + 1) return 50;

      let gains = 0, losses = 0;
      for (let i = 1; i <= period; i++) {
        const diff = data[i] - data[i - 1];
        if (diff > 0) gains += diff;
        else losses += Math.abs(diff);
      }

      let avgGain = gains / period;
      let avgLoss = losses / period;

      for (let i = period + 1; i < data.length; i++) {
        const diff = data[i] - data[i - 1];
        if (diff > 0) {
          avgGain = (avgGain * (period - 1) + diff) / period;
          avgLoss = (avgLoss * (period - 1)) / period;
        } else {
          avgGain = (avgGain * (period - 1)) / period;
          avgLoss = (avgLoss * (period - 1) + Math.abs(diff)) / period;
        }
      }

      const rs = avgGain / (avgLoss || 1);
      const rsi = 100 - (100 / (1 + rs));
      return Math.max(0, Math.min(100, rsi));
    }

    function calcMACD(data, fast = 12, slow = 26, signal = 9) {
      const emaFast = calcEMA(data, fast);
      const emaSlow = calcEMA(data, slow);

      const macdLine = emaFast.map((val, i) => val - emaSlow[i]);
      const signalLine = calcEMA(macdLine, signal);

      return {
        macd: macdLine[macdLine.length - 1],
        signal: signalLine[signalLine.length - 1],
        histogram: macdLine[macdLine.length - 1] - signalLine[signalLine.length - 1]
      };
    }

    // ============ CVD 改进版：逐根K线计算 ============
    function calcCVD(klines) {
      let cvd = 0;
      for (const kline of klines) {
        const direction = kline.close > kline.open ? 1 : -1;
        cvd += kline.volume * direction;
      }
      const trend = cvd > 0 ? 'up' : cvd < 0 ? 'down' : 'neutral';
      return { cvd, trend };
    }

    // ============ 拥挤度计算 ============
    function calculateCrowdingRisk(longShortRatio, oiMcapRatio, rsi1h, oi6hPct, oi24hPct) {
      const reasons = [];
      let score = 0;

      if (longShortRatio > 2 || longShortRatio < 0.5) {

        reasons.push('OI/MCAP较高(>5%)');

    // ============ 评级计算（改进版：降低难度 + 新等级体系） ============
    function calculateGrade(coin) {
      let score = 0;

      // OI权重 1.5x
      let oiScore = 0;
      if (coin.oi24hPct > 50) oiScore += 10;
      else if (coin.oi24hPct > 30) oiScore += 8;
      else if (coin.oi24hPct > 10) oiScore += 5;
      
      if (coin.oi6hPct > 20) oiScore += 10;
      else if (coin.oi6hPct > 10) oiScore += 6;
      
      if (coin.oiMcapRatio > 5) oiScore += 8;
      else if (coin.oiMcapRatio > 2) oiScore += 5;
      
      if (coin.fundingRate > 0.01 && coin.fundingRate < 0.3) oiScore += 5;
      if (coin.globalLongShortRatio > 0.9 && coin.globalLongShortRatio < 2) oiScore += 4;
      score += oiScore * 1.5;

      // CVD权重 1.2x
      let cvdScore = 0;
      if (coin.cvd5m.trend === 'up') cvdScore += 8;
      if (coin.cvd1h.trend === 'up') cvdScore += 12;
      score += cvdScore * 1.2;

      // MACD权重 0.8x
      let macdScore = 0;
      if (coin.macd1h.histogram > 0) macdScore += 10;
      if (coin.macd4h.histogram > 0) macdScore += 8;
      score += macdScore * 0.8;

      // RSI权重 0.7x
      let rsiScore = 0;
      if (coin.rsi5m < 30) rsiScore += 6;
      if (coin.rsi1h < 30) rsiScore += 8;
      if (coin.rsi1h > 70) rsiScore -= 8;
      if (coin.rsi5m > 70) rsiScore -= 6;
      score += Math.max(0, rsiScore) * 0.7;

      // 价格权重 0.5x
      let priceScore = 0;
      if (coin.change5m > 0.5) priceScore += 5;
      if (coin.change1h > 0.5) priceScore += 8;
      if (coin.change4h > 1) priceScore += 5;
      score += priceScore * 0.5;

      // 共振加分（改进：降低门槛）
      if (coin.resonance.count >= 3) score += 20;
      else if (coin.resonance.count === 2) score += 12;
      else if (coin.resonance.count === 1) score += 6;

      // 拥挤度减分（改进：更温和）
      if (coin.crowdingRisk.level === 'high') score *= 0.75;
      else if (coin.crowdingRisk.level === 'mid') score *= 0.9;

      // 确定等级（改进：降低分数线 + 新等级体系）
      let grade = 'c';
      if (score >= 70) grade = 'sss';      // SSS：重仓买入（≥70分，约3天1个）
      else if (score >= 48) grade = 'ss';  // SS：中仓买入（48-69分，约1-2天1个）
      else if (score >= 28) grade = 's';   // S：部分仓位（28-47分，每天都有）
      else if (score >= 15) grade = 'b';   // B：观望
      else grade = 'c';                    // C：观察

      return {
        grade,
        gradeScore: Math.round(score),
        score: Math.round(score)
      };
    }

    // ============ 完整分析 ============
    async function analyzeCoin(symbol) {
      try {
        // 预检
        const precheck = await quickPrecheck(symbol);
        if (!precheck.pass) {
          return null;
        }

        let stats24h = await get24hStats(symbol);
        if (!stats24h) return null;

        // K线数据
        let kline5m = await getKlineData(symbol, '5m', 100);
        let kline1h = await getKlineData(symbol, '1h', 100);
        let kline4h = await getKlineData(symbol, '4h', 100);
        let kline1d = await getKlineData(symbol, '1d', 100);

        if (!kline5m.length || !kline1h.length) return null;

        if (!kline4h.length) kline4h = kline1h;
        if (!kline1d.length) kline1d = kline1h;

        // 衍生品和市值
        const futuresData = await getFuturesData(symbol);
        const marketCapData = await getMarketCapData(symbol);

        // OI/Volume检查
        const oiVolumeRatio = calculateOiVolumeRatio(futuresData.oiValue, stats24h.volume24h);
        if (oiVolumeRatio < CONFIG.minOiVolume && futuresData.openInterest > 0) {
          return null;
        }

        // 计算指标
        const prices5m = kline5m.map(k => k.close);
        const prices1h = kline1h.map(k => k.close);
        const prices4h = kline4h.map(k => k.close);
        const prices1d = kline1d.map(k => k.close);

        const rsi5m = calcRSI(prices5m, 14);
        const rsi1h = calcRSI(prices1h, 14);
        const rsi4h = calcRSI(prices4h, 14);
        const rsi1d = calcRSI(prices1d, 14);

        const macd1h = calcMACD(prices1h);
        const macd4h = calcMACD(prices4h);

        // CVD 改进版
        const cvd5m = calcCVD(kline5m);
        const cvd1h = calcCVD(kline1h);

        const change5m = ((prices5m[prices5m.length - 1] - prices5m[0]) / prices5m[0]) * 100;
        const change1h = ((prices1h[prices1h.length - 1] - prices1h[0]) / prices1h[0]) * 100;
        const change4h = ((prices4h[prices4h.length - 1] - prices4h[0]) / prices4h[0]) * 100;
        const change1d = ((prices1d[prices1d.length - 1] - prices1d[0]) / prices1d[0]) * 100;

        const mainDirection = change1h > 0 ? 'up' : 'down';
        const oiMcapRatio = calculateOiMcapRatio(futuresData.oiValue, marketCapData.marketCap);

        // 生成信号
        const { longSignals, shortSignals } = generateTradingSignals({
          cvd5m, cvd1h,
          macd1h, macd4h,
          rsi5m, rsi1h, rsi4h, rsi1d,
          change5m, change1h, change4h, change1d,
          oi6hPct: futuresData.oi6hPct,
          oi24hPct: futuresData.oi24hPct,
          fundingRate: futuresData.fundingRate,
          globalLongShortRatio: futuresData.globalLongShortRatio
        });

        const buySignalCount = longSignals.length;
        const sellSignalCount = shortSignals.length;
        const totalSignal = buySignalCount - sellSignalCount;

        // 拥挤度
        const crowdingRisk = calculateCrowdingRisk(
          futuresData.globalLongShortRatio,
          oiMcapRatio,
          rsi1h,
          futuresData.oi6hPct,
          futuresData.oi24hPct
        );

        // 共振
        const resonance = checkResonance({
          change5m, change1h, change4h,
          cvd5m, cvd1h,
          oi6hPct: futuresData.oi6hPct,
          oi24hPct: futuresData.oi24hPct
        });

        // 构建币对象
        const coin = {
          symbol,
          price: stats24h.price,
          change24h: stats24h.change24h,
          volume24h: stats24h.volume24h,
          marketCap: marketCapData.marketCap,
          rsi5m, rsi1h, rsi4h, rsi1d,
          macd1h, macd4h,
          cvd5m, cvd1h,
          change5m, change1h, change4h, change1d,
          mainDirection,
          buySignalCount,
          sellSignalCount,
          totalSignal,
          longSignals,
          shortSignals,
          openInterest: futuresData.openInterest,
          oiValue: futuresData.oiValue,
          fundingRate: futuresData.fundingRate,
          globalLongShortRatio: futuresData.globalLongShortRatio,
          oi6hPct: futuresData.oi6hPct,
          oi24hPct: futuresData.oi24hPct,
          oiMcapRatio,
          oiVolumeRatio,
          crowdingRisk,
          resonance,
          timestamp: Date.now()
        };

        // 评级
        const gradeInfo = calculateGrade(coin);
        coin.grade = gradeInfo.grade;
        coin.gradeScore = gradeInfo.gradeScore;

        return coin;
      } catch (e) {
        console.error(`分析 ${symbol} 失败:`, e.message);
        return null;
      }
    }

    // ============ 全量扫描 + TOP10筛选 ============
    async function twoPhaseFullRefresh() {
      if (isRefreshing) {
        showNotification('⏳ 正在扫描中，请耐心等待...', 'info');
        return;
      }
      isRefreshing = true;

      const statusDiv = document.getElementById('scanning-status');
      const progressBar = document.getElementById('scanning-progress-bar');
      const progressText = document.getElementById('scanning-progress-text');
      const scanStatusDiv = document.getElementById('scan-status');
      const refreshBtn = document.getElementById('manual-refresh-btn');
      const refreshIcon = document.getElementById('refresh-icon');

      try {
        if (statusDiv) statusDiv.classList.add('active');
        if (refreshBtn) {
          refreshBtn.disabled = true;
          refreshBtn.classList.add('loading');
          refreshIcon.textContent = '⏳';
        }
        if (scanStatusDiv) {
          scanStatusDiv.textContent = '⏳ 全量扫描中...';
          scanStatusDiv.style.display = 'block';
        }
        if (progressBar) progressBar.style.width = '0%';
        if (progressText) progressText.textContent = `0/${allSymbols.length}`;

        const startTime = Date.now();
        const tempCoins = {};
        const totalSymbols = allSymbols.length;

        console.log(`🚀 开始扫描全部 ${totalSymbols} 个币种...`);

        const analyzeTasks = allSymbols.map(symbol => async () => {
          try {
            const coin = await analyzeCoin(symbol);
            if (coin) {
              tempCoins[symbol] = coin;
            }
            return symbol;
          } catch (e) {
            console.warn(`分析 ${symbol} 异常`);
            return null;
          }
        });

        let completed = 0;

        // 并发控制
        await new Promise((resolve) => {
          const executing = [];
          let taskIndex = 0;

          async function enqueueNext() {
            if (taskIndex >= analyzeTasks.length && executing.length === 0) {
              resolve();
              return;
            }

            while (taskIndex < analyzeTasks.length && executing.length < CONFIG.concurrentLimit) {const currentIndex = taskIndex;
              taskIndex++;

              const promise = analyzeTasks[currentIndex]().then(
                result => {
                  completed++;
                  const progress = (completed / totalSymbols) * 100;
                  if (progressBar) progressBar.style.width = progress + '%';
                  if (progressText) progressText.textContent = `${completed}/${totalSymbols}`;

                  executing.splice(executing.indexOf(promise), 1);
                  enqueueNext();
                },
                error => {
                  completed++;
                  const progress = (completed / totalSymbols) * 100;
                  if (progressBar) progressBar.style.width = progress + '%';
                  if (progressText) progressText.textContent = `${completed}/${totalSymbols}`;

                  executing.splice(executing.indexOf(promise), 1);
                  enqueueNext();
                }
              );

              executing.push(promise);
            }
          }

          enqueueNext();
        });

        // ✅ 排序和筛选
        const sortedCoins = Object.values(tempCoins)
          .sort((a, b) => {
            const gradeOrder = { sss: 0, ss: 1, s: 2, b: 3, c: 4 };
            const gradeDiff = gradeOrder[a.grade] - gradeOrder[b.grade];
            if (gradeDiff !== 0) return gradeDiff;
            return b.gradeScore - a.gradeScore;
          })
          .slice(0, CONFIG.topCoinsCount);

        // 更新全局数据
        allCoins = {};
        sortedCoins.forEach(coin => {
          allCoins[coin.symbol] = coin;
        });

        // ✅ 提取TOP10
        topCoins = sortedCoins.slice(0, CONFIG.top10Count);

        const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
        const filteredCount = Object.keys(tempCoins).length;
        console.log(
          `✅ 扫描完成！耗时 ${totalTime}s，过滤后 ${filteredCount}/${totalSymbols}，` +
          `显示Top${CONFIG.topCoinsCount}（首页Top${topCoins.length}）`
        );

        // 统计等级分布
        const gradeCounts = {
          sss: sortedCoins.filter(c => c.grade === 'sss').length,
          ss: sortedCoins.filter(c => c.grade === 'ss').length,
          s: sortedCoins.filter(c => c.grade === 's').length,
          b: sortedCoins.filter(c => c.grade === 'b').length,
          c: sortedCoins.filter(c => c.grade === 'c').length
        };

        console.log(
          `📊 等级分布: SSS=${gradeCounts.sss} | SS=${gradeCounts.ss} | ` +
          `S=${gradeCounts.s} | B=${gradeCounts.b} | C=${gradeCounts.c}`
        );

        const updateTimeEl = document.getElementById('update-time');
        if (updateTimeEl) {
          updateTimeEl.textContent = new Date().toLocaleTimeString('zh-CN');
        }

        if (scanStatusDiv) {
          scanStatusDiv.textContent = `✅ 扫描完成 ${filteredCount}/${totalSymbols}`;
        }

        renderAllPages();
        showNotification(
          `✅ 扫描完成！分析${filteredCount}/${totalSymbols}个币种，显示Top${sortedCoins.length}`,
          'success'
        );

        lastRefreshTime = Date.now();
      } catch (e) {
        console.error('❌ 扫描失败:', e);
        showNotification(`❌ 扫描失败: ${e.message}`, 'error');
      } finally {
        isRefreshing = false;
        if (statusDiv) statusDiv.classList.remove('active');
        if (refreshBtn) {
          refreshBtn.disabled = false;
          refreshBtn.classList.remove('loading');
          refreshIcon.textContent = '🔄';
        }
      }
    }

        <!-- 共振分析 -->

          <div class="panel-title">💡 交易建议</div>

            ${
              coin.grade === 'sss'
                ? '🚀 <strong>SSS级 - 重仓买入</strong><br>◆ 信号极强，可考虑重仓介入<br>◆ 建议约3天出现一次<br>◆ 设置好止损，控制风险'
                : coin.grade === 'ss'
                ? '📈 <strong>SS级 - 中仓买入</strong><br>◆ 信号很强，建议中等仓位<br>◆ 约1-2天出现一次<br>◆ 技术面支撑较好，可跟进'

                ? '✨ <strong>S级 - 部分仓位</strong><br>◆ 信号良好，每天都有机会<br>◆ 建议部分仓位分批进场<br>◆ 留意技术面支撑位'
                : coin.grade === 'b'
                ? '📊 <strong>B级 - 观望</strong><br>◆ 信号中性，暂时保持观察<br>◆ 等待更多确认信号<br>◆ 可作为长期标的关注'
                : '⚠️ <strong>C级 - 谨慎</strong><br>◆ 信号较弱，不建议主动介入<br>◆ 暂不符合操作标准<br>◆ 持续关注，等待转变'
            }

        <!-- 快速链接 -->
        <div class="derivatives-panel" style="margin-bottom: 40px;">
          <div class="panel-title">🔗 快速链接</div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px;">
            <button class="quick-btn" onclick="openLink(getChartLink('${coin.symbol}'))">📈 TradingView</button>
            <button class="quick-btn" onclick="openLink('https://www.binance.com/trade/${coin.symbol}_USDT')">💰 币安现货</button>
            <button class="quick-btn" onclick="openLink('https://www.binance.com/futures/${coin.symbol}USDT')">⚡ 币安合约</button>

            <button class="quick-btn" onclick="openLink('https://www.coinglass.com/pro/futures/${coin.symbol}/liquidationMap')">📊 清算地图</button>
            <button class="quick-btn" onclick="openLink(getCoinGeckoLink('${coin.symbol}'))">💎 CoinGecko</button>
            <button class="quick-btn" onclick="openLink(getDexScreenerLink('${coin.symbol}'))">🌐 DexScreener</button>

      `;

      document.getElementById('detail-content').innerHTML = html;
    }

    // ============ 搜索功能（改进版：支持全量币种搜索） ============
    async function showSearchSuggestions() {
      const input = document.getElementById('search-input');
      const suggestionsEl = document.getElementById('search-suggestions');
      const query = input.value.toUpperCase().trim();

      if (!query || query.length < 1) {
        suggestionsEl.classList.remove('active');
        return;
      }

      // 第1优先级：已分析的币种（allCoins）
      const analyzedMatches = Object.keys(allCoins)
        .filter(s => s.includes(query))
        .sort((a, b) => {
          const coinA = allCoins[a];
          const coinB = allCoins[b];
          return coinB.gradeScore - coinA.gradeScore;
        })
        .slice(0, 5);

      // 第2优先级：所有可交易币种（allSymbols 但未分析）
      const unanalyzedMatches = allSymbols
        .filter(s => 
          s.includes(query) && 
          !allCoins[s]
        )
        .slice(0, 5);

      const allMatches = [...analyzedMatches, ...unanalyzedMatches].slice(0, 12);

      if (allMatches.length === 0) {
        suggestionsEl.classList.remove('active');
        return;
      }

      suggestionsEl.innerHTML = allMatches.map(symbol => {
        const coin = allCoins[symbol];
        
        if (coin) {
          // 已分析的币种
          const gradeColors = {
            sss: '#ff6b6b',
            ss: '#f97316',
            s: '#10b981',
            b: '#00ffc8',
            c: '#8b95a5'
          };
          const gradeLabels = {
            sss: 'SSS',
            ss: 'SS',
            s: 'S',
            b: 'B',
            c: 'C'
          };

          return `
            <div class="suggestion-item" onclick="searchCoin('${symbol}')">
              <div>
                <div class="suggestion-asset">${symbol} ✅</div>
                <div style="font-size: 10px; color: var(--sub);">$${fmt(coin.price, 2)}</div>
              </div>
              <div style="background: rgba(${
                gradeColors[coin.grade] === '#ff6b6b' ? '255,107,107' :
                gradeColors[coin.grade] === '#f97316' ? '249,115,22' :
                gradeColors[coin.grade] === '#10b981' ? '16,185,129' :
                '0,255,200'
              },0.1); padding: 4px 8px; border-radius: 4px; font-size: 10px; color: ${gradeColors[coin.grade]}; font-weight: 700;">
                ${gradeLabels[coin.grade]} - ${coin.gradeScore}分
              </div>
            </div>
          `;
        } else {
          // 未分析的币种（快速分析）
          return `
            <div class="suggestion-item" onclick="quickAnalyzeCoin('${symbol}')">
              <div>
                <div class="suggestion-asset">${symbol}</div>
                <div style="font-size: 10px; color: var(--sub);">加载中...</div>
              </div>
              <div style="background: rgba(255,200,100,0.1); padding: 4px 8px; border-radius: 4px; font-size: 10px; color: var(--yellow); font-weight: 700;">
                🔄 快速分析
              </div>
            </div>
          `;
        }
      }).join('');

      suggestionsEl.classList.add('active');
    }

    // ============ 快速分析单个币种 ============
    async function quickAnalyzeCoin(symbol) {
      const input = document.getElementById('search-input');
      const suggestionsEl = document.getElementById('search-suggestions');

      // 关闭搜索框
      suggestionsEl.classList.remove('active');
      input.value = symbol;

      // 显示加载状态
      switchPage('detail');
      document.getElementById('detail-content').innerHTML = `
        <button class="back-btn" onclick="switchPage('monitor')">← 返回TOP10</button>
        <div style="text-align: center; padding: 40px; color: var(--sub);">
          <div style="font-size: 32px; margin-bottom: 16px; animation: spin 1s linear infinite;">⏳</div>
          <div style="font-size: 16px;">正在快速分析 <strong style="color: var(--cyan);">${symbol}</strong>...</div>
          <div style="font-size: 12px; margin-top: 8px;">这通常需要 3-8 秒</div>
        </div>
        <style>
          @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
        </style>
      `;

      try {
        // 预检
        const precheck = await quickPrecheck(symbol);
        if (!precheck.pass) {
          showNotification(`❌ ${symbol} 不符合条件: ${precheck.reason}`, 'error');
          switchPage('monitor');
          return;
        }

        // 完整分析
        const coin = await analyzeCoin(symbol);

        if (!coin) {
          showNotification(`❌ ${symbol} 数据不足，无法分析`, 'error');
          switchPage('monitor');
          return;
        }

        // 添加到 allCoins（缓存）
        allCoins[symbol] = coin;

        // 显示详情
        showDetail(symbol);
        
        const gradeLabels = { sss: 'SSS', ss: 'SS', s: 'S', b: 'B', c: 'C' };
        showNotification(
          `✅ ${symbol} 分析完成！评级: ${gradeLabels[coin.grade]} (${coin.gradeScore}分)`,
          'success'
        );

      } catch (e) {
        console.error('快速分析失败:', e);
        showNotification(`❌ 分析失败: ${e.message}`, 'error');
        switchPage('monitor');
      }
    }

    function searchCoin(symbol = null) {
      const input = document.getElementById('search-input');
      const searchSymbol = (symbol || input.value.toUpperCase().trim()).toUpperCase();

      if (!searchSymbol) {
        showNotification('❌ 请输入币种代码', 'error');
        return;
      }

      const coin = allCoins[searchSymbol];
      if (!coin) {
        // 不存在 allCoins 中，尝试快速分析
        if (allSymbols.includes(searchSymbol)) {
          quickAnalyzeCoin(searchSymbol);
        } else {
          showNotification(`❌ 未找到币种 ${searchSymbol}`, 'error');
        }
        return;
      }

      showDetail(searchSymbol);
      document.getElementById('search-input').value = '';
      document.getElementById('search-suggestions').classList.remove('active');
    }

    // ============ 页面切换 ============
    function switchPage(page) {
      document.querySelectorAll('[id$="-page"]').forEach(el => {
        el.classList.remove('active');
      });

      document.getElementById(page + '-page').classList.add('active');

      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      const btnMap = {
        'monitor': 0,
        'search': 1,
        'detail': 2
      };

      const buttons = document.querySelectorAll('.nav-btn');
      if (btnMap[page] !== undefined && buttons[btnMap[page]]) {
        buttons[btnMap[page]].classList.add('active');
      }
    }

    // ============ 通知 ============
    function showNotification(message, type = 'info') {
      const container = document.getElementById('notification-container');
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      container.appendChild(notification);

      setTimeout(() => {
        notification.classList.add('show');
      }, 10);

      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }

    // ============ 初始化 ============
    async function init() {
      console.log('🚀 初始化应用...');

      // 加载币种列表
      const symbols = await loadExchangeInfo();
      if (symbols.length === 0) {
        showNotification('❌ 无法加载币种列表，请检查网络', 'error');
        return;
      }

      console.log(`✅ 已加载 ${symbols.length} 个币种`);

      // 初始化事件监听
      document.getElementById('search-input')?.addEventListener('input', showSearchSuggestions);
      document.getElementById('search-input')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchCoin();
      });

      // 点击搜索框外关闭建议
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-box')) {
          document.getElementById('search-suggestions').classList.remove('active');
        }
      });

      document.getElementById('manual-refresh-btn')?.addEventListener('click', () => {
        twoPhaseFullRefresh();
      });

      // 第1次：立即扫描
      showNotification('⏳ 正在扫描币种，请耐心等待...', 'info');
      await twoPhaseFullRefresh();

      // 定时刷新：每5分钟一次
      console.log('⏰ 已启动5分钟自动刷新...');
      setInterval(() => {
        if (!isRefreshing) {
          console.log('⏰ 触发自动刷新...');
          twoPhaseFullRefresh();
        }
      }, CONFIG.autoRefreshInterval);
    }

    // ============ 页面加载完成 ============
    window.addEventListener('load', init);

    // ============ 页面卸载清理 ============
    window.addEventListener('beforeunload', () => {
      klineCache = {};
      volume24hCache = {};
      futuresDataCache = {};
      marketCapCache = {};
      coinGeckoIdCache = {};
    });
  </script>

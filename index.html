<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>币安永续精选 - 妖币 + 建议买入 v5.1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      color: #e5eefb;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .container { max-width: 1600px; margin: 0 auto; }
    .version-tag {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(16,196,245,.2);
      border: 1px solid rgba(16,196,245,.4);
      color: #10c4f5;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      z-index: 999;
    }
    h1 {
      text-align: center;
      color: #10c4f5;
      margin-bottom: 8px;
      font-size: 36px;
    }
    .subtitle {
      text-align: center;
      color: #8ca3ba;
      font-size: 12px;
      margin-bottom: 20px;
    }
    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(16,196,245,.2);
    }
    .tab-btn {
      background: none;
      border: none;
      color: #8ca3ba;
      padding: 12px 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #10c4f5;
      border-bottom-color: #10c4f5;
    }
    .tab-btn:hover { color: #10c4f5; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .time-info {
      color: #8ca3ba;
      font-size: 13px;
    }
    button {
      background: #11b7e6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    button:hover { opacity: .85; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .section {
      margin-bottom: 30px;
    }
    .section-title {
      font-size: 18px;
      color: #10c4f5;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(16,196,245,.2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }
    .card {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 14px;
      padding: 16px;
      transition: all 0.2s;
    }
    .card:hover { border-color: rgba(16,196,245,.4); }
    .label {
      color: #8ca3ba;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .value {
      color: #10c4f5;
      font-weight: bold;
      font-size: 24px;
    }
    .table-wrap {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 16px;
      overflow: auto;
      max-height: 600px;
    }
    .empty-state {
      text-align: center;
      color: #8ca3ba;
      padding: 40px 20px;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #0d1a2d;
      color: #c5d4e5;
      font-size: 12px;
      font-weight: 600;
    }
    tbody tr {
      transition: none;
      cursor: pointer;
    }
    tbody tr:hover { background: rgba(16,196,245,.08); }
    .symbol {
      color: #10c4f5;
      font-weight: bold;
    }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .gray { color: #94a3b8; }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      margin-right: 6px;
      margin-bottom: 5px;
      border: 1px solid;
      white-space: nowrap;
    }

    .level-妖币 { background: rgba(168, 85, 247, .3); color: #d8b4fe; border-color: #a855f7; font-weight: bold; }
    .level-建议 { background: rgba(34, 197, 94, .3); color: #22c55e; border-color: #22c55e; font-weight: bold; }

    .risk-高风险观察 { background: rgba(239, 68, 68, .2); color: #fca5a5; border-color: #ef4444; }
    .risk-等待回调 { background: rgba(245, 158, 11, .2); color: #fcd34d; border-color: #f59e0b; }
    .risk-现在可入 { background: rgba(34, 197, 94, .2); color: #86efac; border-color: #22c55e; }

    .detail-box {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 16px;
      padding: 20px;
    }
    .detail-title {
      font-size: 28px;
      color: #10c4f5;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
    }
    .detail-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(16,196,245,.12);
      border-radius: 12px;
      padding: 14px;
    }
    .detail-card h3 {
      color: #10c4f5;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: 13px;
    }
    .row:last-child { border-bottom: none; }
    .row-label { color: #8ca3ba; }
    .row-value { color: #e5eefb; font-weight: bold; }

    .link-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .link-btn {
      display: inline-block;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(16,196,245,.12);
      color: #10c4f5;
      border: 1px solid rgba(16,196,245,.2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .link-btn:hover { background: rgba(16,196,245,.25); }

    .analysis-box {
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
      color: #86efac;
      font-size: 12px;
      line-height: 1.6;
    }

    .analysis-box h3 {
      color: #22c55e;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .warning-box {
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.3);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      color: #fcd34d;
      font-size: 12px;
      line-height: 1.5;
    }

    .reason-box {
      background: rgba(168,85,247,.1);
      border: 1px solid rgba(168,85,247,.3);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      color: #d8b4fe;
      font-size: 12px;
      line-height: 1.5;
    }

    .reason-box h3 {
      color: #a855f7;
      margin-bottom: 8px;
    }

    .notice-box {
      background: rgba(59, 130, 246, .1);
      border: 1px solid rgba(59, 130, 246, .3);
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
      color: #93c5fd;
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 1200px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
      .link-group { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      table { font-size: 11px; }
      th, td { padding: 8px 10px; }
      .link-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="version-tag">v5.1 精选版</div>

  <div class="container">
    <h1>⚡ 币安永续精选监控</h1>
    <p class="subtitle">求精不求量 | 妖币 + 建议买入 | 没有就不显示</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('list', this)">📊 精选币种</button>
      <button class="tab-btn" onclick="switchTab('detail', this)">📈 币种详情</button>
    </div>

    <!-- 列表页 -->
    <div id="list" class="tab-content active">
      <div class="toolbar">
        <div class="time-info" id="last-update">最后更新：-</div>
        <button id="refresh-btn" onclick="loadData()">🔄 手动刷新</button>
      </div>

      <!-- 妖币潜力部分 -->
      <div class="section">
        <div class="section-title">💎 有妖币潜力</div>
        <div class="stats">
          <div class="card">
            <div class="label">发现妖币</div>
            <div class="value" id="stat-yao">0</div>
          </div>
          <div class="card">
            <div class="label">🔴 高风险观察</div>
            <div class="value" id="stat-yao-high">0</div>
          </div>
          <div class="card">
            <div class="label">🟡 等待回调</div>
            <div class="value" id="stat-yao-wait">0</div>
          </div>
        </div>
        <div class="table-wrap">
          <div id="yao-empty" class="empty-state">暂未发现符合条件的妖币</div>
          <table id="yao-table" style="display:none;">
            <thead>
              <tr>
                <th>合约</th>
                <th>价格</th>
                <th>市值</th>
                <th>OI/Mcap</th>
                <th>Funding</th>
                <th>24h%</th>
                <th>入场建议</th>
              </tr>
            </thead>
            <tbody id="yao-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 建议买入部分 -->
      <div class="section">
        <div class="section-title">🚀 建议买入</div>
        <div class="stats">
          <div class="card">
            <div class="label">推荐币种</div>
            <div class="value" id="stat-buy">0</div>
          </div>
          <div class="card">
            <div class="label">平均评分</div>
            <div class="value" id="stat-avg-score">-</div>
          </div>
          <div class="card">
            <div class="label">最高评分</div>
            <div class="value" id="stat-max-score">-</div>
          </div>
        </div>
        <div class="table-wrap">
          <div id="buy-empty" class="empty-state">暂未发现符合条件的建议买入币种</div>
          <table id="buy-table" style="display:none;">
            <thead>
              <tr>
                <th>合约</th>
                <th>价格</th>
                <th>市值</th>
                <th>Vol/Mcap</th>
                <th>OI/Mcap</th>
                <th>Funding</th>
                <th>24h%</th>
                <th>质量评分</th>
              </tr>
            </thead>
            <tbody id="buy-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 详情页 -->
    <div id="detail" class="tab-content">
      <div class="detail-box">
        <div id="detail-empty" class="empty-state">请先在列表页点击一个币种</div>
        <div id="detail-content"></div>
      </div>
    </div>
  </div>

  <script>
    let allRows = {
      yao: [],
      buy: []
    };
    let selectedRow = null;
    let oiMap = {};
    let isLoading = false;

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      if (el) el.classList.add('active');
    }

    function activateDetailTab() {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById('detail').classList.add('active');
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }

    function colorClass(v) {
      if (v === null || v === undefined || isNaN(v)) return 'gray';
      return v > 0 ? 'green' : v < 0 ? 'red' : 'gray';
    }

    function fmtNum(n, d = 2) {
      if (n === null || n === undefined || isNaN(n)) return '-';
      if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(2) + 'K';
      return Number(n).toFixed(d);
    }

    async function getJSON(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (e) {
        console.error('Fetch error:', url, e);
        return null;
      }
    }

    async function fetchOpenInterest(symbols) {
      const map = {};
      const topSymbols = symbols.slice(0, 150);
      const chunk = 30;
      
      for (let i = 0; i < topSymbols.length; i += chunk) {
        const batch = topSymbols.slice(i, i + chunk);
        const promises = batch.map(async symbol => {
          const url = `https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`;
          const data = await getJSON(url);
          if (data && data.openInterest) {
            map[symbol] = parseFloat(data.openInterest);
          }
        });
        await Promise.all(promises);
        await new Promise(r => setTimeout(r, 80));
      }
      return map;
    }

    // 妖币检测 - 极其严格
    function detectYaoCoin(row) {
      const oi = row.oiMcap || 0;
      const vol = row.volMcap || 0;
      const fund = row.funding || 0;
      const price = row.priceChange || 0;
      const mcap = row.mcap || 0;

      // 妖币的严格条件
      const isLowMcap = mcap && mcap < 5e7; // 市值 < 5000 万
      const isLowOI = oi >= 1 && oi <= 5; // OI/Mcap 1-5%（极低热度）
      const isActiveVol = vol >= 5 && vol <= 15; // Vol/Mcap 5-15%（活跃但不过热）
      const isBalancedFund = fund >= -0.03 && fund <= 0.01; // Funding 接近 0
      const isBeaten = price < -10; // 近期被砸破

      // 同时满足 5 个条件
      const yaoScore = [isLowMcap, isLowOI, isActiveVol, isBalancedFund, isBeaten].filter(x => x).length;

      if (yaoScore >= 5) {
        // 判断入场方式
        let riskLevel = '';
        if (price < -20) riskLevel = '🔴 高风险观察'; // 跌太多，等反弹
        else if (price < -10 && price >= -15) riskLevel = '🟡 等待回调'; // 继续观察
        else riskLevel = '🟢 现在可入'; // 只有在特定条件才现在可入

        return { isYao: true, riskLevel, yaoScore };
      }

      return { isYao: false };
    }

    // 建议买入检测 - 所有指标必须完美对标
    function detectBuyCoin(row) {
      const oi = row.oiMcap || 0;
      const vol = row.volMcap || 0;
      const fund = row.funding || 0;
      const price = row.priceChange || 0;
      const mcap = row.mcap || 0;

      // 建议买入的标准：所有指标都必须完美对标
      const perfectOI = oi >= 3 && oi <= 8; // OI/Mcap 3-8%
      const perfectVol = vol >= 8 && vol <= 20; // Vol/Mcap 8-20%
      const perfectFund = fund >= -0.01 && fund <= 0.02; // Funding 极平衡
      const perfectPrice = price >= -2 && price <= 5; // 温和上涨或小回调
      const goodMcap = mcap && mcap > 1e8; // 市值 > 1 亿

      // ALL 条件必须满足
      const isBuyReady = perfectOI && perfectVol && perfectFund && perfectPrice && goodMcap;

      if (isBuyReady) {
        let buyScore = 100;
        if (price > 5) buyScore -= (price - 5) * 3;
        if (oi > 8) buyScore -= (oi - 8) * 3;
        if (vol > 20) buyScore -= (vol - 20) * 2;
        if (fund > 0.02) buyScore -= Math.abs(fund - 0.02) * 50;

        return { isBuy: true, buyScore: Math.max(75, buyScore) };
      }

      return { isBuy: false };
    }

    function showDetail(row) {
      selectedRow = row;
      document.getElementById('detail-empty').style.display = 'none';

      const coin = row.symbol.replace('USDT', '');
      const typeEmoji = row.level === '妖币' ? '💎' : '🚀';
      const levelName = row.level === '妖币' ? `有妖币潜力 (${row.riskLevel})` : '建议买入';

      // 生成分析
      let reasons = [];
      if (row.level === '妖币') {
        reasons.push(`💰 市值极低：$${fmtNum(row.mcap, 0)} (< 5000万)`);
        reasons.push(`🔥 OI热度极低：${row.oiMcap.toFixed(1)}% (1-5%)`);
        reasons.push(`🌊 成交活跃但不过热：${row.volMcap.toFixed(1)}% (5-15%)`);
        reasons.push(`⚖️ Funding 完全平衡：${row.funding.toFixed(4)}%`);
        if (row.priceChange < -10) reasons.push(`📉 被砸破：${row.priceChange.toFixed(1)}%`);
        reasons.push(`⚠️ 高波动，高收益潜力`);
      } else {
        reasons.push(`✅ OI热度完美：${row.oiMcap.toFixed(1)}% (3-8%)`);
        reasons.push(`✅ 成交活跃：${row.volMcap.toFixed(1)}% (8-20%)`);
        reasons.push(`✅ Funding完美平衡：${row.funding.toFixed(4)}% (-0.01~0.02%)`);
        reasons.push(`✅ 价格温和：${row.priceChange.toFixed(1)}% (-2~5%)`);
        reasons.push(`✅ 市值充足：$${fmtNum(row.mcap, 0)} (> 1亿)`);
        reasons.push(`📊 所有指标都对标，技术面成熟`);
      }

      const html = `
        <div class="detail-title">
          ${row.symbol}
          <span class="tag level-${row.level}">${typeEmoji} ${levelName}</span>
          ${row.level === '妖币' ? `<span class="tag risk-${row.riskLevel.replace('🔴 ', '').replace('🟡 ', '').replace('🟢 ', '')}">${row.riskLevel}</span>` : `<span style="color: #10c4f5; font-weight: bold; margin-left: auto;">${row.buyScore.toFixed(1)}/100</span>`}
        </div>

        <div class="link-group">
          <a class="link-btn" target="_blank" href="https://www.binance.com/zh-CN/futures/${row.symbol}">
            📊 币安交易
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/futures/${coin}">
            📈 CoinGlass合约
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/liq/${coin}">
            💥 清算热力图
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/unlock/${coin}">
            🔓 解锁数据
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/position/${coin}">
            👥 持仓数据
          </a>
          <a class="link-btn" target="_blank" href="https://dexscreener.com/search?q=${coin}">
            🌊 DEX数据
          </a>
        </div>

        <div class="detail-grid">
          <div class="detail-card">
            <h3>📊 基础数据</h3>
            <div class="row">
              <span class="row-label">现价</span>
              <span class="row-value">$${fmtNum(row.price, 6)}</span>
            </div>
            <div class="row">
              <span class="row-label">市值</span>
              <span class="row-value">$${fmtNum(row.mcap, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">24h涨跌</span>
              <span class="row-value ${colorClass(row.priceChange)}">${row.priceChange.toFixed(2)}%</span>
            </div>
            <div class="row">
              <span class="row-label">24h成交</span>
              <span class="row-value">$${fmtNum(row.quoteVol, 2)}</span>
            </div>
          </div>

          <div class="detail-card">
            <h3>📈 合约数据</h3>
            <div class="row">
              <span class="row-label">OI 持仓</span>
              <span class="row-value">${fmtNum(row.oi, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">OI/Mcap</span>
              <span class="row-value">${row.oiMcap ? row.oiMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="row">
              <span class="row-label">Vol/Mcap</span>
              <span class="row-value">${row.volMcap ? row.volMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="row">
              <span class="row-label">Funding Rate</span>
              <span class="row-value ${colorClass(row.funding)}">${row.funding.toFixed(4)}%</span>
            </div>
          </div>

          <div class="detail-card">
            <h3>🎯 质量评估</h3>
            <div class="row">
              <span class="row-label">等级</span>
              <span class="row-value">${levelName}</span>
            </div>
            <div class="row">
              <span class="row-label">OI热度</span>
              <span class="row-value">${
                row.oiMcap < 2 ? '❄️ 极低' :
                row.oiMcap >= 3 && row.oiMcap <= 8 ? '✅ 适中' :
                row.oiMcap > 15 ? '🔥 过热' :
                '⚖️ 一般'
              }</span>
            </div>
            <div class="row">
              <span class="row-label">成交热度</span>
              <span class="row-value">${
                row.volMcap < 5 ? '❄️ 低' :
                row.volMcap >= 8 && row.volMcap <= 20 ? '✅ 活跃' :
                row.volMcap > 25 ? '🔥 很热' :
                '⚖️ 一般'
              }</span>
            </div>
            <div class="row">
              <span class="row-label">多空状态</span>
              <span class="row-value">${
                row.funding >= -0.01 && row.funding <= 0.02 ? '✅ 完美平衡' :
                row.funding > 0.05 ? '⚠️ 多头挤压' :
                '⚖️ 一般'
              }</span>
            </div>
          </div>
        </div>

        <div class="reason-box">
          <h3>💡 ${row.level === '妖币' ? '为什么是妖币潜力' : '为什么建议买入'}：</h3>
          ${reasons.map(r => `<div style="margin-bottom: 6px;">${r}</div>`).join('')}
        </div>

        ${row.level === '妖币' ? `
          <div class="notice-box">
            <strong>📌 妖币操作建议：</strong><br>
            <div style="margin-top: 8px;">
              ${row.riskLevel === '🔴 高风险观察' ? '• 下跌超20%，极度恐慌。等待反弹迹象再进，或者耐心等待更低价格。' : ''}
              ${row.riskLevel === '🟡 等待回调' ? '• 下跌10-15%，风险和机会并存。建议继续观察，等待更明显的反弹信号。' : ''}
              ${row.riskLevel === '🟢 现在可入' ? '• 风险和回报比较平衡，技术面对标。可以小额试单，分批建仓。' : ''}
              <br><br>
              • 务必查看 CoinGlass 清算热力图，确认有无明显支撑位<br>
              • 查看持仓数据，确认是否有大户护盘<br>
              • 妖币高风险高收益，做好止损准备
            </div>
          </div>
        ` : `
          <div class="notice-box">
            <strong>📌 建议买入操作：</strong><br>
            <div style="margin-top: 8px;">
              • 所有技术指标都对标，当前是相对安全的建仓机会<br>
              • 但仍需查看 CoinGlass 数据，确认清算分布和持仓情况<br>
              • 建议分批建仓，不要一次性全仓<br>
              • 设置合理止损（建议 -3%~-5%）
            </div>
          </div>
        `}
      `;
      document.getElementById('detail-content').innerHTML = html;
      activateDetailTab();
    }

    function renderTables() {
      // 妖币表格
      const yaoTbody = document.getElementById('yao-tbody');
      yaoTbody.innerHTML = '';
      if (allRows.yao.length === 0) {
        document.getElementById('yao-table').style.display = 'none';
        document.getElementById('yao-empty').style.display = 'block';
      } else {
        allRows.yao.forEach(row => {
          const tr = document.createElement('tr');
          const riskClass = row.riskLevel.replace('🔴 ', '').replace('🟡 ', '').replace('🟢 ', '');
          tr.innerHTML = `
            <td class="symbol">${row.symbol}</td>
            <td>$${fmtNum(row.price, 6)}</td>
            <td>$${fmtNum(row.mcap, 2)}</td>
            <td class="${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.funding)}">${row.funding.toFixed(3)}%</td>
            <td class="${colorClass(row.priceChange)}">${row.priceChange.toFixed(1)}%</td>
            <td><span class="tag risk-${riskClass}">${row.riskLevel}</span></td>
          `;
tr.addEventListener('click', () => showDetail(row));
          yaoTbody.appendChild(tr);
        });
        document.getElementById('yao-table').style.display = 'table';
        document.getElementById('yao-empty').style.display = 'none';
      }
      
      // 统计妖币
      document.getElementById('stat-yao').innerText = allRows.yao.length;
      document.getElementById('stat-yao-high').innerText = allRows.yao.filter(x => x.riskLevel.includes('高风险')).length;
      document.getElementById('stat-yao-wait').innerText = allRows.yao.filter(x => x.riskLevel.includes('等待')).length;

      // 建议买入表格
      const buyTbody = document.getElementById('buy-tbody');
      buyTbody.innerHTML = '';
      if (allRows.buy.length === 0) {
        document.getElementById('buy-table').style.display = 'none';
        document.getElementById('buy-empty').style.display = 'block';
        document.getElementById('stat-buy').innerText = '0';
        document.getElementById('stat-avg-score').innerText = '-';
        document.getElementById('stat-max-score').innerText = '-';
      } else {
        allRows.buy.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="symbol">${row.symbol}</td>
            <td>$${fmtNum(row.price, 6)}</td>
            <td>$${fmtNum(row.mcap, 2)}</td>
            <td class="${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.funding)}">${row.funding.toFixed(3)}%</td>
            <td class="${colorClass(row.priceChange)}">${row.priceChange.toFixed(1)}%</td>
            <td style="color: #10c4f5; font-weight: bold;">${row.buyScore.toFixed(1)}</td>
          `;
          tr.addEventListener('click', () => showDetail(row));
          buyTbody.appendChild(tr);
        });
        document.getElementById('buy-table').style.display = 'table';
        document.getElementById('buy-empty').style.display = 'none';
        
        // 统计建议买入
        document.getElementById('stat-buy').innerText = allRows.buy.length;
        const avgScore = allRows.buy.reduce((s, x) => s + x.buyScore, 0) / allRows.buy.length;
        const maxScore = Math.max(...allRows.buy.map(x => x.buyScore));
        document.getElementById('stat-avg-score').innerText = avgScore.toFixed(1);
        document.getElementById('stat-max-score').innerText = maxScore.toFixed(1);
      }
    }

    async function loadData() {
      if (isLoading) return;

      isLoading = true;
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.innerText = '⏳ 加载中...';

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        if (!exchangeInfo || !ticker24h || !premiumIndex) throw new Error('基础数据获取失败');

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 250);

        oiMap = await fetchOpenInterest(symbols);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
        const mcapMap = {};
        gecko.forEach(x => {
          mcapMap[(x.symbol || '').toUpperCase() + 'USDT'] = x.market_cap;
        });

        // 重置分类
        allRows = { yao: [], buy: [] };

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];
          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const oi = oiMap[symbol] || 0;
          const oiValue = oi * price;
          const mcap = mcapMap[symbol] || null;

          let volMcap = null;
          let oiMcap = null;
          if (mcap && mcap > 0) {
            volMcap = quoteVol / mcap * 100;
            oiMcap = oiValue / mcap * 100;
          }

          const row = {
            symbol, price, mcap, quoteVol, funding, priceChange,
            oi, oiValue, volMcap, oiMcap
          };

          // 检测妖币（极其严格）
          const yaoCheck = detectYaoCoin(row);
          if (yaoCheck.isYao) {
            row.level = '妖币';
            row.riskLevel = yaoCheck.riskLevel;
            row.yaoScore = yaoCheck.yaoScore;
            allRows.yao.push(row);
            continue; // 妖币不进入其他分类
          }

          // 检测建议买入（所有指标必须完美）
          const buyCheck = detectBuyCoin(row);
          if (buyCheck.isBuy) {
            row.level = '建议';
            row.buyScore = buyCheck.buyScore;
            allRows.buy.push(row);
          }
        }

        // 排序
        allRows.yao.sort((a, b) => b.yaoScore - a.yaoScore);
        allRows.buy.sort((a, b) => b.buyScore - a.buyScore);

        renderTables();
        document.getElementById('last-update').innerText = '最后更新：' + new Date().toLocaleString();

      } catch (e) {
        console.error(e);
        alert('❌ 加载失败：' + e.message);
      } finally {
        isLoading = false;
        btn.disabled = false;
        btn.innerText = '🔄 手动刷新';
      }
    }

    // 页面加载时自动加载一次
    loadData();
  </script>
</body>

<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ 妖币猎手 Pro - Wyckoff精准阶段分析</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #10c4f5;
      --primary-dark: #0d9ecf;
      --primary-light: #4dd9ff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --purple: #a855f7;
      --bg-main: #061018;
      --bg-card: #0a1628;
      --bg-hover: #0d1f35;
      --text-primary: #e5eefb;
      --text-secondary: #8ca3ba;
      --border: rgba(16, 196, 245, 0.25);
      --border-light: rgba(16, 196, 245, 0.12);
      --long: #22c55e;
      --short: #ef4444;
      --neutral: #8ca3ba;
    }

    body {
      background: linear-gradient(135deg, var(--bg-main) 0%, #0b1730 100%);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      padding: 12px;
      font-size: 13px;
      overflow-x: hidden;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    /* ===== 顶部导航 ===== */
    .header {
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.1) 0%, rgba(168, 85, 247, 0.05) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    h1 {
      font-size: 24px;
      background: linear-gradient(135deg, var(--primary) 0%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }

    .nav-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-btn {
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s;
    }

    .nav-btn:hover,
    .nav-btn.active {
      border-color: var(--primary);
      background: rgba(16, 196, 245, 0.15);
      color: var(--primary);
    }

    .sound-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .sound-toggle:hover {
      border-color: var(--warning);
      color: var(--warning);
    }

    .sound-toggle.on {
      border-color: var(--success);
      color: var(--success);
      background: rgba(34, 197, 94, 0.1);
    }

    .status-info {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 11px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(16, 196, 245, 0.08);
      border-radius: 6px;
      border: 1px solid rgba(16, 196, 245, 0.2);
    }

    .stat-label {
      color: var(--text-secondary);
    }

    .stat-value {
      color: var(--primary);
      font-weight: bold;
      font-size: 14px;
    }

    .refresh-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s infinite;
    }

    .refresh-dot.loading {
      background: var(--warning);
      animation: spin-dot 1s linear infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes spin-dot {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== 搜索页面 ===== */
    .search-page {
      max-width: 900px;
      margin: 0 auto;
    }

    .search-box {
      margin-bottom: 24px;
    }

    .search-input {
      width: 100%;
      padding: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 16px rgba(16, 196, 245, 0.3);
    }

    .search-dropdown {
      position: relative;
      margin-top: 8px;
      max-height: 600px;
      overflow-y: auto;
    }

    .search-item {
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .search-item:hover {
      background: rgba(16, 196, 245, 0.15);
      border-color: var(--primary);
    }

    .search-item-symbol {
      color: var(--primary);
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .search-item-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      font-size: 10px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .search-item-btn {
      padding: 6px 12px;
      background: rgba(16, 196, 245, 0.2);
      color: var(--primary);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }

    .search-item-btn:hover {
      background: rgba(16, 196, 245, 0.35);
    }

    /* ===== 分类标题 ===== */
    .section-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
      margin-top: 24px;
      padding: 8px 12px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title.yao-buyable {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      border-left: 3px solid var(--danger);
    }

    .section-title.yao-watch {
      color: var(--purple);
      background: rgba(168, 85, 247, 0.1);
      border-left: 3px solid var(--purple);
    }

    .section-title.buy-elite {
      color: var(--success);
      background: rgba(34, 197, 94, 0.1);
      border-left: 3px solid var(--success);
    }

    .section-title.buy-prime {
      color: var(--primary);
      background: rgba(16, 196, 245, 0.1);
      border-left: 3px solid var(--primary);
    }

    /* ===== 硬币卡片网格 ===== */
    .coin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 1200px) {
      .coin-grid {
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      }
    }

    @media (max-width: 768px) {
      .coin-grid {
        grid-template-columns: 1fr;
      }
    }

    .coin-card {
      background: linear-gradient(135deg, rgba(10, 22, 40, 0.95) 0%, rgba(13, 31, 53, 0.6) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .coin-card:hover {
      border-color: rgba(16, 196, 245, 0.6);
      box-shadow: 0 8px 24px rgba(16, 196, 245, 0.2);
      transform: translateY(-2px);
    }

    .coin-card.yao-buyable {
      border: 1.5px solid rgba(239, 68, 68, 0.7);
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.05) 100%);
    }

    .coin-card.yao-watch {
      border: 1.5px solid rgba(168, 85, 247, 0.5);
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.08) 0%, rgba(168, 85, 247, 0.03) 100%);
    }

    .coin-card.buy-elite {
      border: 1.5px solid rgba(34, 197, 94, 0.5);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.08) 0%, rgba(34, 197, 94, 0.03) 100%);
    }

    .coin-card.buy-prime {
      border: 1.5px solid rgba(16, 196, 245, 0.4);
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.06) 0%, rgba(16, 196, 245, 0.02) 100%);
    }

    .coin-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .coin-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .coin-symbol {
      font-size: 16px;
      color: var(--primary);
      font-weight: 800;
    }

    .coin-price {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .coin-actions {
      display: flex;
      gap: 4px;
    }

    .action-btn {
      background: none;
      border: 1px solid rgba(16, 196, 245, 0.4);
      color: var(--primary);
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.2s;
    }

    .action-btn:hover {
      border-color: var(--primary);
      background: rgba(16, 196, 245, 0.2);
    }

    /* ===== 标签系统 ===== */
    .tags-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      border: 1px solid;
      white-space: nowrap;
    }

    .tag-yao-buyable { background: rgba(239, 68, 68, 0.4); color: #fca5a5; border-color: rgba(239, 68, 68, 0.7); }
    .tag-yao-buyable-s { background: rgba(239, 68, 68, 0.5); color: #ffffff; border-color: rgba(239, 68, 68, 0.8); font-weight: 900; }
    .tag-yao-buyable-a { background: rgba(239, 68, 68, 0.35); color: #fecaca; border-color: rgba(239, 68, 68, 0.6); }

    .tag-yao-watch { background: rgba(168, 85, 247, 0.35); color: #d8b4fe; border-color: rgba(168, 85, 247, 0.6); }

    .tag-buy-elite { background: rgba(34, 197, 94, 0.4); color: #4ade80; border-color: rgba(34, 197, 94, 0.7); }
    .tag-buy-elite-a { background: rgba(34, 197, 94, 0.35); color: #86efac; border-color: rgba(34, 197, 94, 0.6); }

    .tag-buy-prime { background: rgba(16, 196, 245, 0.3); color: #60a5fa; border-color: rgba(16, 196, 245, 0.6); }
    .tag-buy-prime-a { background: rgba(16, 196, 245, 0.25); color: #93c5fd; border-color: rgba(16, 196, 245, 0.5); }

    .tag-time { background: rgba(245, 158, 11, 0.25); color: #fbbf24; border-color: rgba(245, 158, 11, 0.5); }
    .tag-new { background: rgba(168, 85, 247, 0.4); color: #e9d5ff; border-color: rgba(168, 85, 247, 0.7); animation: pulse-new 1s infinite; }

    @keyframes pulse-new {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* ===== 做多做空标签 ===== */
    .tag-long {
      background: rgba(34, 197, 94, 0.5);
      color: #4ade80;
      border-color: rgba(34, 197, 94, 0.8);
      font-weight: 900;
    }

    .tag-short {
      background: rgba(239, 68, 68, 0.5);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.8);
      font-weight: 900;
    }

    .tag-neutral {
      background: rgba(140, 163, 186, 0.3);
      color: #cbd5e1;
      border-color: rgba(140, 163, 186, 0.6);
      font-weight: 700;
    }

    /* ===== Wyckoff阶段标签 ===== */
    .wyckoff-phases {
      background: rgba(16, 196, 245, 0.08);
      border: 1px solid rgba(16, 196, 245, 0.2);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 10px;
    }

    .phase-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 9px;
      margin-right: 4px;
      margin-bottom: 4px;
      border: 1px solid;
    }

    .phase-happening {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.5), rgba(245, 158, 11, 0.5));
      color: #fff;
      border-color: rgba(239, 68, 68, 0.7);
      font-weight: 900;
      animation: pulse-phase 1.5s infinite;
    }

    .phase-likely {
      background: rgba(34, 197, 94, 0.3);
      color: #4ade80;
      border-color: rgba(34, 197, 94, 0.5);
    }

    .phase-possible {
      background: rgba(245, 158, 11, 0.25);
      color: #fbbf24;
      border-color: rgba(245, 158, 11, 0.5);
    }

    @keyframes pulse-phase {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ===== 统计信息 ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 6px;
      margin-bottom: 8px;
      font-size: 10px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      padding: 4px 6px;
      background: rgba(16, 196, 245, 0.05);
      border-radius: 4px;
      border-left: 2px solid rgba(16, 196, 245, 0.3);
    }

    .stat-val {
      color: var(--text-primary);
      font-weight: bold;
    }

    .green { color: var(--success); }
    .red { color: var(--danger); }
    .yellow { color: var(--warning); }

    /* ===== 信心度条 ===== */
    .confidence-bar {
      width: 100%;
      height: 4px;
      background: rgba(16, 196, 245, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--danger), var(--warning), var(--success));
      width: 0;
      border-radius: 2px;
      transition: width 0.5s ease-out;
    }

    /* ===== 提示框 ===== */
    .advice-box {
      background: rgba(34, 197, 94, 0.12);
      border-left: 3px solid rgba(34, 197, 94, 0.5);
      padding: 7px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: #86efac;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .advice-box.warn {
      background: rgba(245, 158, 11, 0.12);
      border-left-color: rgba(245, 158, 11, 0.5);
      color: #fcd34d;
    }

    .advice-box.danger {
      background: rgba(239, 68, 68, 0.12);
      border-left-color: rgba(239, 68, 68, 0.5);
      color: #fca5a5;
    }

    .advice-box.purple {
      background: rgba(168, 85, 247, 0.12);
      border-left-color: rgba(168, 85, 247, 0.5);
      color: #d8b4fe;
    }

    /* ===== 操作指南 ===== */
    .operation-guide {
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.12), rgba(168, 85, 247, 0.08));
      border: 1px solid rgba(16, 196, 245, 0.25);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 10px;
      line-height: 1.6;
    }

    .operation-guide-title {
      color: var(--primary);
      font-weight: bold;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .operation-guide-content {
      color: var(--text-secondary);
    }

    .operation-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
      padding: 2px 0;
    }

    .operation-row strong {
      color: var(--text-primary);
      min-width: 60px;
    }

    /* ===== 动态阶段分析 ===== */
    .phase-analysis {
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.15), rgba(168, 85, 247, 0.08));
      border: 1px solid rgba(16, 196, 245, 0.3);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 10px;
      line-height: 1.6;
    }

    .phase-analysis-title {
      color: var(--primary);
      font-weight: bold;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .phase-analysis-content {
      color: var(--text-secondary);
    }

    /* ===== 详情模态框 ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px;
    }

    .modal.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 20px;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(6, 16, 24, 0.98) 0%, rgba(11, 23, 48, 0.98) 100%);
      border: 1px solid rgba(16, 196, 245, 0.3);
      border-radius: 12px;
      padding: 24px;
      max-width: 1000px;
      width: 100%;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .close-btn:hover {
      color: var(--primary);
      background: rgba(16, 196, 245, 0.1);
      transform: rotate(90deg);
    }

    .detail-title {
      font-size: 24px;
      color: var(--primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .detail-item {
      background: rgba(16, 196, 245, 0.08);
      border: 1px solid rgba(16, 196, 245, 0.2);
      border-radius: 6px;
      padding: 10px;
    }

    .detail-item-label {
      color: var(--text-secondary);
      font-size: 10px;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-item-value {
      color: var(--primary);
      font-size: 14px;
      font-weight: bold;
    }

    .detail-box {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .detail-box h3 {
      color: var(--success);
      margin-bottom: 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-box.warn {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .detail-box.warn h3 {
      color: var(--warning);
    }

    .detail-box.danger {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .detail-box.danger h3 {
      color: var(--danger);
    }

    .detail-box.purple {
      background: rgba(168, 85, 247, 0.12);
      border-color: rgba(168, 85, 247, 0.3);
    }

    .detail-box.purple h3 {
      color: var(--purple);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 11px;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-secondary);
    }

    .detail-value {
      font-weight: bold;
      color: var(--text-primary);
      text-align: right;
      max-width: 60%;
      word-break: break-word;
    }

    /* ===== 通道面板 ===== */
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .channel-item {
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .channel-item:hover {
      border-color: rgba(59, 130, 246, 0.6);
      background: rgba(59, 130, 246, 0.25);
    }

    .channel-icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .channel-name {
      font-size: 11px;
      color: #93c5fd;
      font-weight: bold;
    }

    /* ===== 空状态 ===== */
    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;

  <script>
    // ======================== 核心变量 ========================
    let allCoinsData = [];
    let yaoBuyableCoins = [];
    let yaoWatchCoins = [];
    let buyEliteCoins = [];
    let buyPrimeCoins = [];
    
    let previousData = JSON.parse(localStorage.getItem('previousData') || '{}');
    let yaoCoinMemory = JSON.parse(localStorage.getItem('yaoCoinMemory') || '{}');
    
    let soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
    
    let isLoading = false;
    let autoRefreshInterval = null;

    // ======================== 工具函数 ========================
    function fmtNum(num, decimal = 2) {
      if (!num || isNaN(num)) return '0';
      if (num >= 1e9) return (num / 1e9).toFixed(decimal) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(decimal) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(decimal) + 'K';
      return num.toFixed(decimal);
    }

    function playSound() {
      if (!soundEnabled) return;
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      
      oscillator.frequency.value = 800;
      oscillator.type = 'sine';
      
      gain.gain.setValueAtTime(0.3, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.5);
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      localStorage.setItem('soundEnabled', soundEnabled);
      const btn = document.getElementById('sound-toggle');
      if (soundEnabled) {
        btn.classList.add('on');
        btn.textContent = '🔔 声音';
      } else {
        btn.classList.remove('on');
        btn.textContent = '🔇 静音';
      }
    }

    function showNotification(message, type = 'success') {
      const div = document.createElement('div');
      div.className = `notification ${type}`;
      div.textContent = message;
      document.body.appendChild(div);

      if (Notification.permission === 'granted') {
        new Notification('妖币猎手', {
          body: message,
          icon: '⚡'
        });
      }

      playSound();
      setTimeout(() => div.remove(), 5000);
    }

    function goPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      
      document.getElementById(page + '-page').classList.add('active');
      event.target.classList.add('active');
    }

    // ======================== 做多做空判断 ========================
    
    class TrendAnalyzer {
      constructor(row, prev, market) {
        this.row = row;
        this.prev = prev;
        this.market = market;
        this.trend = 'NEUTRAL';
        this.strength = 0;
        this.reason = '';
      }

      analyzeTrend() {
        const p = this.row;
        const prev = this.prev;

        // === 强烈看多信号 ===
        if (p.priceChange > 15 && p.volMcap > 40 && p.oiMcap > 25 && p.funding > 0.015) {
          this.trend = 'LONG';
          this.strength = 90;
          this.reason = '价格暴升+成交爆量+OI堆积+正资费';
          return;
        }

        // === 中度看多 ===
        if (p.priceChange > 8 && p.volMcap > 25 && p.oiMcap > 15) {
          if (prev && p.priceChange > prev.priceChange) {
            this.trend = 'LONG';
            this.strength = 75;
            this.reason = '价格持续上升+成交放量';
            return;
          }
        }

        // === 弱势看多 ===
        if (p.priceChange > 3 && p.volMcap > 15 && p.funding > 0.008) {
          this.trend = 'LONG';
          this.strength = 55;
          this.reason = '温和上涨+成交温和';
          return;
        }

        // === 强烈看空信号 ===
        if (p.priceChange < -15 && p.volMcap > 40 && p.oiMcap > 25 && p.funding < -0.015) {
          this.trend = 'SHORT';
          this.strength = 90;
          this.reason = '价格暴跌+成交爆量+OI堆积+负资费';
          return;
        }

        // === 中度看空 ===
        if (p.priceChange < -8 && p.volMcap > 25 && p.oiMcap > 15) {
          if (prev && p.priceChange < prev.priceChange) {
            this.trend = 'SHORT';
            this.strength = 75;
            this.reason = '价格持续下跌+成交放量';
            return;
          }
        }

        // === 弱势看空 ===
        if (p.priceChange < -3 && p.volMcap > 15 && p.funding < -0.008) {
          this.trend = 'SHORT';
          this.strength = 55;
          this.reason = '温和下跌+成交温和';
          return;
        }

        // === 观望 ===
        this.trend = 'NEUTRAL';
        this.strength = 0;
        this.reason = '方向不明确，等待突破';
      }

      getTrendTag() {
        this.analyzeTrend();
        
        if (this.trend === 'LONG') {
          return {
            icon: '📈',
            label: `做多 (${this.strength}%)`,
            class: 'tag-long'
          };
        } else if (this.trend === 'SHORT') {
          return {
            icon: '📉',
            label: `做空 (${this.strength}%)`,
            class: 'tag-short'
          };
        } else {
          return {
            icon: '━',
            label: '观望',
            class: 'tag-neutral'
          };
        }
      }
    }

    // ======================== Wyckoff 阶段分析引擎 ========================
    
    class WyckoffPhaseAnalyzer {
      constructor(row, prev, market) {
        this.row = row;
        this.prev = prev;
        this.market = market;
        this.currentPhase = null;
        this.likelyNextPhases = [];
        this.possiblePhases = [];
        this.phaseDetails = {};
      }

      detectPhase() {
        const p = this.row;
        const prev = this.prev;

        const isHighVol = p.volMcap > 30;
        const isLowVol = p.volMcap < 15;
        const isRising = p.priceChange > 5;
        const isFalling = p.priceChange < -5;
        const isFlat = Math.abs(p.priceChange) <= 5;
        const highOI = p.oiMcap > 30;
        const lowOI = p.oiMcap < 15;

        // === 吸筹阶段 ===
        if (isLowVol && isFlat && !prev) {
          this.currentPhase = 'accumulation';
          this.phaseDetails.name = '吸筹盘整';
          this.phaseDetails.emoji = '📦';
          this.phaseDetails.description = '底部缓慢吸筹，成交温和，主力在默默积累';
          this.phaseDetails.confidence = 70;
          this.phaseDetails.trend = 'PRE_LONG';
          
          this.likelyNextPhases = ['潜伏', '底部夯实'];
          this.possiblePhases = ['突然放量', '缓慢抬升'];
          return;
        }

        // === 潜伏启动 ===
        if (isLowVol && isRising && !highOI) {
          this.currentPhase = 'latent';
          this.phaseDetails.name = '潜伏启动';
          this.phaseDetails.emoji = '🤫';
          this.phaseDetails.description = '缓慢拉升测试盘面，OI未充分积累';
          this.phaseDetails.confidence = 65;
          this.phaseDetails.trend = 'WEAK_LONG';
          
          this.likelyNextPhases = ['缓慢抬升', '放量拉升'];
          this.possiblePhases = ['假突破', '回调整理'];
          return;
        }

        // === 缓慢抬升 ===
        if (isLowVol && isRising && highOI && prev && p.priceChange > prev.priceChange) {
          this.currentPhase = 'slow_markup';
          this.phaseDetails.name = '缓慢抬升';
          this.phaseDetails.emoji = '📈';
          this.phaseDetails.description = 'OI稳步积累，小幅温和上涨，多头逐步进场';
          this.phaseDetails.confidence = 75;
          this.phaseDetails.trend = 'MEDIUM_LONG';
          
          this.likelyNextPhases = ['加速拉升', '强势突破'];
          this.possiblePhases = ['回调洗盘', '平台整理'];
          return;
        }

        // === 加速拉升 ===
        if (isHighVol && isRising && highOI && p.priceChange > 15) {
          this.currentPhase = 'aggressive_markup';
          this.phaseDetails.name = '加速拉升';
          this.phaseDetails.emoji = '🚀';
          this.phaseDetails.description = '成交放量，价格快速上涨，主升浪启动！';
          this.phaseDetails.confidence = 85;
          this.phaseDetails.trend = 'STRONG_LONG';
          
          this.likelyNextPhases = ['继续上涨', '创新高'];
          this.possiblePhases = ['获利回吐', '短期调整'];
          return;
        }

        // === 挤压压力 ===
        if (isLowVol && isFlat && highOI && prev && prev.volMcap > p.volMcap * 1.5) {
          this.currentPhase = 'compression';
          this.phaseDetails.name = '挤压压力';
          this.phaseDetails.emoji = '🤐';
          this.phaseDetails.description = '成交萎缩，价格震荡，积压能量即将释放';
          this.phaseDetails.confidence = 80;
          this.phaseDetails.trend = 'UNKNOWN';
          
          this.likelyNextPhases = ['突然爆发', '剧烈波动'];
          this.possiblePhases = ['假突破', '虚假反弹'];
          return;
        }

        // === 假突破 ===
        if (isHighVol && isRising && p.priceChange > 10 && p.priceChange < 20 && 
            !highOI && prev && prev.priceChange < 0) {
          this.currentPhase = 'fake_breakout';
          this.phaseDetails.name = '可能假突破';
          this.phaseDetails.emoji = '⚠️';
          this.phaseDetails.description = '成交不足、OI未够，看起来在涨实际在诱多';
          this.phaseDetails.confidence = 70;
          this.phaseDetails.trend = 'TRAP_LONG';
          
          this.likelyNextPhases = ['回调洗盘', '快速下跌'];
          this.possiblePhases = ['持续上涨', '平台整理'];
          return;
        }

        // === 回调洗盘 ===
        if (isFalling && isHighVol && prev && prev.priceChange > 10) {
          this.currentPhase = 'pullback';
          this.phaseDetails.name = '回调洗盘';
          this.phaseDetails.emoji = '📉';
          this.phaseDetails.description = '大幅下跌，成交活跃，清理浮筹';
          this.phaseDetails.confidence = 75;
          this.phaseDetails.trend = 'SHAKEOUT';
          
          this.likelyNextPhases = ['底部积累', '反弹确认'];
          this.possiblePhases = ['继续下跌', '止跌反弹'];
          return;
        }

        // === 派发阶段 ===
        if (isHighVol && isFlat && highOI && p.priceChange < 3 && prev && prev.priceChange > 20) {
          this.currentPhase = 'distribution';
          this.phaseDetails.name = '派发顶部';
          this.phaseDetails.emoji = '📤';
          this.phaseDetails.description = '高位成交活跃，但价格涨幅停滞。主力在派发';
          this.phaseDetails.confidence = 80;
          this.phaseDetails.trend = 'PRE_SHORT';
          
          this.likelyNextPhases = ['盘头回落', '长期下跌'];
          this.possiblePhases = ['再创新高', '平台整理'];
          return;
        }

        // === 砸盘阶段 ===
        if (isHighVol && isFalling && p.priceChange < -10 && highOI) {
          this.currentPhase = 'markdown';
          this.phaseDetails.name = '砸盘下跌';
          this.phaseDetails.emoji = '💥';
          this.phaseDetails.description = '成交爆量，价格跳水。空头全力进攻';
          this.phaseDetails.confidence = 85;
          this.phaseDetails.trend = 'STRONG_SHORT';
          
          this.likelyNextPhases = ['继续下跌', '快速探底'];
          this.possiblePhases = ['反弹', '止跌'];
          return;
        }

        // === 底部夯实 ===
        if (isLowVol && isFalling && prev && prev.isFalling && p.priceChange > prev.priceChange) {
          this.currentPhase = 'base_building';
          this.phaseDetails.name = '底部夯实';
          this.phaseDetails.emoji = '🔨';
          this.phaseDetails.description = '下跌力度减弱，低位震荡。即将反弹信号';
          this.phaseDetails.confidence = 72;
          this.phaseDetails.trend = 'BOTTOM';
          
          this.likelyNextPhases = ['反弹上升', '底部完成'];
          this.possiblePhases = ['继续探底', '止跌盘整'];
          return;
        }

        // === 虚假反弹 ===
        if (isRising && !isHighVol && prev && prev.isFalling && p.priceChange < 8) {
          this.currentPhase = 'false_rally';
          this.phaseDetails.name = '虚假反弹';
          this.phaseDetails.emoji = '🎭';
          this.phaseDetails.description = '反弹成交不足，可能是空头设置的陷阱';
          this.phaseDetails.confidence = 68;
          this.phaseDetails.trend = 'TRAP_SHORT';
          
          this.likelyNextPhases = ['再次下跌', '二次探底'];
          this.possiblePhases = ['持续反弹', '放量突破'];
          return;
        }

        // === 平台整理 ===
        if (isFlat && isLowVol && highOI) {
          this.currentPhase = 'consolidation';
          this.phaseDetails.name = '平台整理';
          this.phaseDetails.emoji = '━';
          this.phaseDetails.description = '盘面平静，资金博弈，等待方向明确';
          this.phaseDetails.confidence = 60;
          this.phaseDetails.trend = 'UNKNOWN';
          
          this.likelyNextPhases = ['向上突破', '向下跌破'];
          this.possiblePhases = ['继续震荡', '缓慢爬升'];
          return;
        }

        this.currentPhase = 'unknown';
        this.phaseDetails.name = '未知阶段';
        this.phaseDetails.emoji = '❓';
        this.phaseDetails.description = '数据不足，持续观察';
        this.phaseDetails.confidence = 40;
        this.phaseDetails.trend = 'UNKNOWN';
      }

      getPhaseHTML() {
        this.detectPhase();

        let html = `<div class="wyckoff-phases">`;
        
        if (this.currentPhase && this.phaseDetails.name) {
          html += `<div style="margin-bottom: 6px;">
            <span class="phase-badge phase-happening" title="当前发生中">🔴 ${this.phaseDetails.emoji} ${this.phaseDetails.name}</span>
            <span style="font-size: 9px; color: var(--text-secondary);">${this.phaseDetails.confidence}% 确定</span>
          </div>`;
        }

        if (this.likelyNextPhases.length > 0) {
          html += `<div style="margin-bottom: 4px; display: flex; gap: 4px; flex-wrap: wrap;">`;
          this.likelyNextPhases.forEach(phase => {
            html += `<span class="phase-badge phase-likely" title="可能即将发生">▶️ ${phase}</span>`;
          });
          html += `</div>`;
        }

        if (this.possiblePhases.length > 0) {
          html += `<div style="display: flex; gap: 4px; flex-wrap: wrap;">`;
          this.possiblePhases.forEach(phase => {
            html += `<span class="phase-badge phase-possible" title="可能性较低">❓ ${phase}</span>`;
          });
          html += `</div>`;
        }

        html += `</div>`;
        return html;
      }

      getPhaseAnalysisBox() {
        this.detectPhase();

        return `<div class="phase-analysis">
          <div class="phase-analysis-title">
            ${this.phaseDetails.emoji} Wyckoff阶段: ${this.phaseDetails.name}
          </div>
          <div class="phase-analysis-content">
            ${this.phaseDetails.description}
          </div>
        </div>`;
      }
    }

    // ======================== 妖币分析器 ========================
    
    class YaoCoinAnalyzer {
      constructor(row, prev, market) {
        this.row = row;
        this.prev = prev;
        this.market = market;
        this.signals = [];
        this.score = 0;
      }

      analyzeStructure() {
        const p = this.row;
        
        if (this.prev) {
          const priceRange = Math.abs(p.price - this.prev.price) / this.prev.price;
          const isCompression = priceRange < 0.03 && p.volMcap < (this.prev.volMcap || p.volMcap) * 0.8;
          
          if (isCompression) {
            this.signals.push('缩量横盘');
            return 15;
          }
          
          const lowerHighHigh = p.price > this.prev.price && priceRange > 0.02;
          if (lowerHighHigh && p.volMcap < 50) {
            this.signals.push('抬高低点');
            return 12;
          }
        }
        
        return 0;
      }

      analyzeOI() {
        const p = this.row;
        if (!p.oiMcap) return 0;

        if (p.oiMcap > 30) {
          this.signals.push('OI堆积');
          
          if (this.prev && this.prev.oiMcap && p.oiMcap > this.prev.oiMcap * 1.15) {
            this.signals.push('OI持续抬升');
            return 20;
          }
          
          return 12;
        }

        if (p.oiMcap > 15 && p.oiMcap < 30) {
          if (this.prev && p.oiMcap > this.prev.oiMcap * 1.2) {
            this.signals.push('OI突增');
            return 10;
          }
        }

        return 0;
      }

      analyzeOrderFlow() {
        const p = this.row;
        
        if (p.volMcap > 30 && p.priceChange > 5 && p.priceChange < 25) {
          this.signals.push('CVD强吸');
          return 18;
        }

        if (p.volMcap > 25 && p.priceChange < 8) {
          this.signals.push('吸筹放量');
          return 14;
        }

        if (this.prev && p.volMcap > (this.prev.volMcap || 0) * 1.5) {
          this.signals.push('成交暴增');
          return 10;
        }

        return 0;
      }

      analyzeLiquidation() {
        const p = this.row;
        
        if (p.funding > 0.02) {
          this.signals.push('多头拥挤');
          return 8;
        }

        if (p.funding < 0 && p.funding > -0.01) {
          if (p.priceChange > 10) {
            this.signals.push('空头清算');
            return 12;
          }
        }

        return 0;
      }

      analyzeIntention() {
        let score = 0;

        if (this.row.mcap && this.row.mcap < 5e7 && this.row.volMcap > 20) {
          this.signals.push('小币高热');
          score += 12;
        }

        if (this.row.price < 0.01 && this.row.volMcap > 30) {
          this.signals.push('低价启动');
          score += 15;
        }

        if (this.prev) {
          const prevVol = this.prev.volMcap || 0;
          const currVol = this.row.volMcap || 0;
          
          if (prevVol < 20 && currVol > 35 && this.row.priceChange > 5) {
            this.signals.push('突破启动');
            score += 18;
          }
        }

        if (this.row.priceChange < -10 && this.prev && this.prev.priceChange < this.row.priceChange) {
          if (this.row.volMcap > 25) {
            this.signals.push('V形反弹');
            score += 10;
          }
        }

        return score;
      }

      analyzeConfirmation() {
        if (!this.prev) return 0;

        const signal = this.signals;
        
        if (signal.length >= 3) {
          return 15;
        }

        if (signal.length >= 2) {
          return 8;
        }

        return 0;
      }

      getYaoBuyableScore() {
        const scores = [
          this.analyzeStructure(),
          this.analyzeOI(),
          this.analyzeOrderFlow(),
          this.analyzeLiquidation(),
          this.analyzeIntention(),
          this.analyzeConfirmation()
        ];

        this.score = Math.min(100, scores.reduce((a, b) => a + b, 0));
        return this.score;
      }

      getConfidence() {
        return Math.min(100, this.signals.length * 25);
      }
    }

    // ======================== 建议币分析器 ========================

    class SuggestCoinAnalyzer {
      constructor(row, prev) {
        this.row = row;
        this.prev = prev;
        this.signals = [];
        this.score = 0;
      }

      analyzeElite() {
        const p = this.row;
        
        const techGood = this.checkTechnical();
        const fundGood = this.checkFunding();
        const momentumGood = this.checkMomentum();

        if (techGood && fundGood && momentumGood) {
          if (this.signals.length >= 3) {
            this.score = 75;
            return true;
          }
        }

        return false;
      }

      analyzePrime() {
        const p = this.row;
        
        const techOk = this.checkTechnical();
        const dataOk = this.checkData();

        if (techOk && dataOk) {
          if (this.signals.length >= 2) {
            this.score = 60;
            return true;
          }
        }

        return false;
      }

      checkTechnical() {
        const p = this.row;
        
        if (p.priceChange > 5 && p.priceChange < 50) {
          this.signals.push('涨幅合理');
          return true;
        }

        if (this.prev && p.priceChange > this.prev.priceChange + 8) {
          this.signals.push('反弹确认');
          return true;
        }

        return false;
      }

      checkFunding() {
        const p = this.row;
        
        if (p.funding > -0.01 && p.funding < 0.015) {
          this.signals.push('资费健康');
          return true;
        }

        return false;
      }

      checkMomentum() {
        const p = this.row;
        
        if (p.volMcap > 20 && p.volMcap < 100) {
          this.signals.push('动量良好');
          return true;
        }

        return false;
      }

      checkData() {
        const p = this.row;
        
        if (p.volMcap > 15 && p.volMcap < 80) {
          if (!this.prev || Math.abs(p.oiMcap - (this.prev.oiMcap || 0)) < 20) {
            this.signals.push('数据优秀');
            return true;
          }
        }

        return false;
      }
    }

    // ======================== 妖币检测 ========================

    function detectYaoBuyable(row, prev, market) {
      const analyzer = new YaoCoinAnalyzer(row, prev, market);
      const score = analyzer.getYaoBuyableScore();
      const confidence = analyzer.getConfidence();

      if (score >= 75 && analyzer.signals.length >= 4 && confidence >= 75) {
        let grade = 'A';
        if (score >= 90 && confidence >= 85) {
          grade = 'S+';
        } else if (score >= 85) {
          grade = 'S';
        }

        return {
          isBuyable: true,
          grade,
          score,
          confidence,
          signals: analyzer.signals,
          reason: analyzer.signals.slice(0, 3).join(' + ')
        };
      }

      return { isBuyable: false };
    }

    function detectYaoWatch(row, prev, market) {
      const analyzer = new YaoCoinAnalyzer(row, prev, market);
      const score = analyzer.getYaoBuyableScore();
      const confidence = analyzer.getConfidence();

      if (score >= 50 && analyzer.signals.length >= 2 && confidence >= 50) {
        return {
          isWatchable: true,
          score,
          confidence,
          signals: analyzer.signals,
          reason: '持续监控中，等待强化'
        };
      }

      return { isWatchable: false };
    }

    function detectBuyElite(row, prev) {
      const analyzer = new SuggestCoinAnalyzer(row, prev);
      
      if (analyzer.analyzeElite()) {
        return {
          isElite: true,
          grade: 'S',
          position: '2-4%',
          leverage: '1-2x',
          score: analyzer.score,
          signals: analyzer.signals,
          reason: analyzer.signals.join(' + ')
        };
      }

      return { isElite: false };
    }

    function detectBuyPrime(row, prev) {
      const analyzer = new SuggestCoinAnalyzer(row, prev);
      
      if (analyzer.analyzePrime()) {
        return {
          isPrime: true,
          grade: 'B',
          position: '1-1.5%',
          leverage: '1x',
          score: analyzer.score,
          signals: analyzer.signals,
          reason: analyzer.signals.join(' + ')
        };
      }

      return { isPrime: false };
    }

    // ======================== 妖币记忆 ========================

    function updateYaoCoinMemory(symbol, type) {
      const now = Date.now();
      
      if (!yaoCoinMemory[symbol]) {
        yaoCoinMemory[symbol] = {
          firstDetected: now,
          currentType: type,
          lastUpdate: now,
          notified: false
        };
        
        showNotification(`👁 新妖币: ${symbol}`, 'alert');
        playSound();
        
        return 'new';
      } else {
        const mem = yaoCoinMemory[symbol];
        const prevType = mem.currentType;
        mem.currentType = type;
        mem.lastUpdate = now;

        if (prevType === 'watch' && type === 'buyable' && !mem.notified) {
          showNotification(`🚀 升级：${symbol} 妖币可买！`, 'alert');
          playSound();
          mem.notified = true;
          return 'upgrade';
        }

        return 'update';
      }
    }

    function cleanExpiredMemory() {
      const now = Date.now();
      const h6 = 6 * 60 * 60 * 1000;

      Object.keys(yaoCoinMemory).forEach(symbol => {
        const mem = yaoCoinMemory[symbol];
        
        if (mem.currentType === 'watch' && (now - mem.lastUpdate) > h6) {
          delete yaoCoinMemory[symbol];
        }
      });

      localStorage.setItem('yaoCoinMemory', JSON.stringify(yaoCoinMemory));
    }

    // ======================== API 数据获取 ========================

    const cache = {
      exchangeInfo: { data: null, time: 0 },
      gecko: { data: null, time: 0 }
    };

    const CACHE_TIME = {
      exchangeInfo: 60 * 60 * 1000,
      gecko: 30 * 60 * 1000
    };

    async function getJSON(url) {
      try {
        const response = await fetch(url, {
          headers: { 'Accept-Encoding': 'gzip, deflate' },
          timeout: 10000
        });
        if (!response.ok) return null;
        return await response.json();
      } catch (error) {
        console.error('请求失败:', url, error);
        return null;
      }
    }

    async function getCachedData(key, url) {
      const now = Date.now();
      if (cache[key].data && (now - cache[key].time) < CACHE_TIME[key]) {
        return cache[key].data;
      }
      
      const data = await getJSON(url);
      if (data) {
        cache[key].data = data;
        cache[key].time = now;
      }
      return data;
    }

    // ======================== 数据加载 ========================

    async function loadData() {
      if (isLoading) return;

      isLoading = true;
      document.getElementById('refresh-dot').classList.add('loading');

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await
          Promise.all([
getCachedData('exchangeInfo', 'https://fapi.binance.com/fapi/v1/exchangeInfo'),
getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
getCachedData('gecko', 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
]);

    if (!exchangeInfo || !ticker24h || !premiumIndex) {
      throw new Error('接口请求失败');
    }

    const symbols = exchangeInfo.symbols
      .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
      .map(s => s.symbol)
      .slice(0, 200);

    const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
    const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
    const mcapMap = {};

    if (Array.isArray(gecko)) {
      gecko.forEach(x => {
        if (x.symbol) {
          mcapMap[x.symbol.toUpperCase() + 'USDT'] = x.market_cap || 0;
        }
      });
    }

    const allPriceChanges = ticker24h.map(t => parseFloat(t.priceChangePercent || 0)).filter(p => !isNaN(p));
    const avgChange = allPriceChanges.reduce((a, b) => a + b, 0) / allPriceChanges.length;
    const maxChange = Math.max(...allPriceChanges);
    const market = {
      avgChange,
      maxChange,
      isStrongMarket: maxChange > 30
    };

    yaoBuyableCoins = [];
    yaoWatchCoins = [];
    buyEliteCoins = [];
    buyPrimeCoins = [];
    allCoinsData = [];

    const newPreviousData = {};

    for (const symbol of symbols) {
      const t = tickerMap[symbol];
      const p = premiumMap[symbol];

      if (!t || !p) continue;

      const price = parseFloat(p.markPrice || t.lastPrice || 0);
      if (!price || price <= 0) continue;

      const quoteVol = parseFloat(t.quoteVolume || 0);
      const funding = parseFloat(p.lastFundingRate || 0) * 100;
      const priceChange = parseFloat(t.priceChangePercent || 0);
      const mcap = mcapMap[symbol] || 0;

      let volMcap = null;
      let oiMcap = null;

      if (mcap > 0) {
        const estimatedOi = (quoteVol * 0.15) / price;
        const oiValue = estimatedOi * price;
        volMcap = (quoteVol / mcap) * 100;
        oiMcap = (oiValue / mcap) * 100;
      }

      const row = {
        symbol,
        price,
        mcap,
        quoteVol,
        funding,
        priceChange,
        volMcap,
        oiMcap,
        timestamp: Date.now()
      };

      allCoinsData.push(row);
      newPreviousData[symbol] = { ...row };

      const prev = previousData[symbol];

      // ===== Wyckoff 阶段检测 =====
      const wyckoffAnalyzer = new WyckoffPhaseAnalyzer(row, prev, market);
      wyckoffAnalyzer.detectPhase();

      // ===== 趋势方向检测 =====
      const trendAnalyzer = new TrendAnalyzer(row, prev, market);
      const trendTag = trendAnalyzer.getTrendTag();

      // ===== 妖币检测 =====
      const yaoBuyCheck = detectYaoBuyable(row, prev, market);
      if (yaoBuyCheck.isBuyable) {
        row.type = 'yao-buyable';
        row.grade = yaoBuyCheck.grade;
        row.score = yaoBuyCheck.score;
        row.confidence = yaoBuyCheck.confidence;
        row.signals = yaoBuyCheck.signals;
        row.reason = yaoBuyCheck.reason;
        row.trend = trendAnalyzer.trend;
        row.trendStrength = trendAnalyzer.strength;
        row.trendTag = trendTag;
        row.wyckoff = wyckoffAnalyzer;
        
        updateYaoCoinMemory(symbol, 'buyable');
        yaoBuyableCoins.push(row);
      } else {
        const yaoWatchCheck = detectYaoWatch(row, prev, market);
        if (yaoWatchCheck.isWatchable) {
          row.type = 'yao-watch';
          row.score = yaoWatchCheck.score;
          row.confidence = yaoWatchCheck.confidence;
          row.signals = yaoWatchCheck.signals;
          row.reason = yaoWatchCheck.reason;
          row.trend = trendAnalyzer.trend;
          row.trendStrength = trendAnalyzer.strength;
          row.trendTag = trendTag;
          row.wyckoff = wyckoffAnalyzer;
          
          updateYaoCoinMemory(symbol, 'watch');
          yaoWatchCoins.push(row);
        } else {
          // ===== 建议币检测 =====
          const buyEliteCheck = detectBuyElite(row, prev);
          if (buyEliteCheck.isElite) {
            row.type = 'buy-elite';
            row.grade = buyEliteCheck.grade;
            row.position = buyEliteCheck.position;
            row.leverage = buyEliteCheck.leverage;
            row.score = buyEliteCheck.score;
            row.signals = buyEliteCheck.signals;
            row.reason = buyEliteCheck.reason;
            row.trend = trendAnalyzer.trend;
            row.trendStrength = trendAnalyzer.strength;
            row.trendTag = trendTag;
            row.wyckoff = wyckoffAnalyzer;
            buyEliteCoins.push(row);
          } else {
            const buyPrimeCheck = detectBuyPrime(row, prev);
            if (buyPrimeCheck.isPrime) {
              row.type = 'buy-prime';
              row.grade = buyPrimeCheck.grade;
              row.position = buyPrimeCheck.position;
              row.leverage = buyPrimeCheck.leverage;
              row.score = buyPrimeCheck.score;
              row.signals = buyPrimeCheck.signals;
              row.reason = buyPrimeCheck.reason;
              row.trend = trendAnalyzer.trend;
              row.trendStrength = trendAnalyzer.strength;
              row.trendTag = trendTag;
              row.wyckoff = wyckoffAnalyzer;
              buyPrimeCoins.push(row);
            }
          }
        }
      }
    }

    yaoBuyableCoins.sort((a, b) => (b.score || 0) - (a.score || 0));
    yaoWatchCoins.sort((a, b) => (b.score || 0) - (a.score || 0));
    buyEliteCoins.sort((a, b) => (b.score || 0) - (a.score || 0));
    buyPrimeCoins.sort((a, b) => (b.score || 0) - (a.score || 0));

    previousData = newPreviousData;
    localStorage.setItem('previousData', JSON.stringify(previousData));
    localStorage.setItem('yaoCoinMemory', JSON.stringify(yaoCoinMemory));

    renderMonitorList();
    updateBadges();
    cleanExpiredMemory();

    document.getElementById('last-update').innerText = 
      `✅ ${new Date().toLocaleTimeString()}`;

  } catch (error) {
    console.error('加载失败:', error);
    document.getElementById('last-update').innerText = '❌ 获取失败';
    document.getElementById('monitor-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div>加载失败: ${error.message}</div>
        <div style="font-size: 11px; margin-top: 8px;">请检查网络连接</div>
      </div>
    `;
  } finally {
    isLoading = false;
    document.getElementById('refresh-dot').classList.remove('loading');
  }
}

function renderMonitorList() {
  const container = document.getElementById('monitor-list');
  let html = '';

  if (yaoBuyableCoins.length > 0) {
    html += `<div class="section-title yao-buyable">🔥 妖币-可买入 (${yaoBuyableCoins.length})</div>`;
    html += '<div class="coin-grid">';
    yaoBuyableCoins.forEach(coin => {
      html += renderYaoBuyableCard(coin);
    });
    html += '</div>';
  }

  if (yaoWatchCoins.length > 0) {
    html += `<div class="section-title yao-watch">✨ 妖币-观察 (${yaoWatchCoins.length})</div>`;
    html += '<div class="coin-grid">';
    yaoWatchCoins.forEach(coin => {
      html += renderYaoWatchCard(coin);
    });
    html += '</div>';
  }

  if (buyEliteCoins.length > 0) {
    html += `<div class="section-title buy-elite">💎 建议币-精选 (${buyEliteCoins.length})</div>`;
    html += '<div class="coin-grid">';
    buyEliteCoins.forEach(coin => {
      html += renderBuyEliteCard(coin);
    });
    html += '</div>';
  }

  if (buyPrimeCoins.length > 0) {
    html += `<div class="section-title buy-prime">⭐ 建议币-优秀 (${buyPrimeCoins.length})</div>`;
    html += '<div class="coin-grid">';
    buyPrimeCoins.forEach(coin => {
      html += renderBuyPrimeCard(coin);
    });
    html += '</div>';
  }

  if (!yaoBuyableCoins.length && !yaoWatchCoins.length && 
      !buyEliteCoins.length && !buyPrimeCoins.length) {
    html = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div>暂未发现符合条件的币种</div>
      <div style="font-size: 11px; color: var(--text-secondary); margin-top: 8px;">
        系统正在分析 200+ 交易对...
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

function getMemoryTime(symbol) {
  const mem = yaoCoinMemory[symbol];
  if (!mem) return '新';
  
  const elapsed = (Date.now() - mem.firstDetected) / (60 * 60 * 1000);
  if (elapsed < 1) return '< 1h';
  if (elapsed < 6) return `${elapsed.toFixed(0)}h`;
  return '6h+';
}

  document.getElementById('stat-buy-prime').textContent = buyPrimeCoins.length;
}

// ======================== 搜索功能 ========================

let searchTimeout = null;

function handleSearch(query) {
  clearTimeout(searchTimeout);
  const results = document.getElementById('search-results');

  if (!query.trim()) {
    results.innerHTML = '';
    return;
  }

  searchTimeout = setTimeout(() => {
    const q = query.toUpperCase();
    const filtered = allCoinsData
      .filter(coin => coin.symbol.includes(q))
      .slice(0, 50);

    if (filtered.length === 0) {
      results.innerHTML = `<div class="empty-state"><div>未找到相关币种</div></div>`;
      return;
    }

    results.innerHTML = filtered.map(coin => {
      let tag = '';
      let tagClass = '';

      if (coin.type === 'yao-buyable') {
        tag = `🔥 妖币-可买`;
        tagClass = 'tag-yao-buyable';
      } else if (coin.type === 'yao-watch') {
        tag = `✨ 妖币-观察`;
        tagClass = 'tag-yao-watch';
      } else if (coin.type === 'buy-elite') {
        tag = `💎 建议-精选`;
        tagClass = 'tag-buy-elite';
      } else if (coin.type === 'buy-prime') {
        tag = `⭐ 建议-优秀`;
        tagClass = 'tag-buy-prime';
      }

      return `
        <div class="search-item">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <div class="search-item-symbol">${coin.symbol}</div>
            ${tag ? `<span class="tag ${tagClass}">${tag}</span>` : ''}
          </div>
          <div class="search-item-info">
            <div>价格: $${fmtNum(coin.price, 6)}</div>
            <div>市值: $${fmtNum(coin.mcap, 2)}</div>
            <div>24h: <span class="${coin.priceChange > 0 ? 'green' : 'red'}">${coin.priceChange.toFixed(2)}%</span></div>
          </div>
          <button class="search-item-btn" onclick="showDetail('${coin.symbol}')">查看详情</button>
        </div>
      `;
    }).join('');
  }, 300);
}

// ======================== 快速通道 ========================

function openBinance(symbol) {
  window.open(`https://www.binance.com/en/trade/${symbol}`, '_blank');
}

function openTradingView(symbol) {
  window.open(`https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}`, '_blank');
}

function openCoinMarketCap(symbol) {
  const pair = symbol.replace('USDT', '');
  window.open(`https://coinmarketcap.com/currencies/${pair.toLowerCase()}/`, '_blank');
}

function openCoingecko(symbol) {
  const pair = symbol.replace('USDT', '');
  window.open(`https://www.coingecko.com/en/coins/${pair.toLowerCase()}`, '_blank');
}

function copySymbol(symbol, event, showMsg = false) {
  if (event) event.stopPropagation();
  navigator.clipboard.writeText(symbol);
  if (showMsg) {
    showNotification(`已复制: ${symbol}`, 'success');
  }
}

function openChart(symbol, event) {
  event.stopPropagation();
  openTradingView(symbol);
}

// ======================== 自动刷新 ========================

function startAutoRefresh() {
  let countdown = 60;

  loadData();

  autoRefreshInterval = setInterval(() => {
    countdown--;
    document.getElementById('refresh-countdown').innerText = countdown + 's';

    if (countdown <= 0) {
      countdown = 60;
      loadData();
    }
  }, 1000);
}

// ======================== 初始化 ========================

document.addEventListener('DOMContentLoaded', () => {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  startAutoRefresh();
  cleanExpiredMemory();

  document.getElementById('detail-modal').addEventListener('click', (e) => {
    if (e.target.id === 'detail-modal') {
      closeDetail();
    }
  });

  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('focus', () => {
      document.getElementById('search-results').style.display = 'block';
    });
    document.addEventListener('click', (e) => {
      if (!searchInput.contains(e.target) && !document.getElementById('search-results').contains(e.target)) {
        document.getElementById('search-results').style.display = 'none';
      }
    });
  }

  window.addEventListener('beforeunload', () => {
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    localStorage.setItem('previousData', JSON.stringify(previousData));
    localStorage.setItem('yaoCoinMemory', JSON.stringify(yaoCoinMemory));
  });
});

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聪慧交易系统 - 妖币捕手 Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e27;
      --card: #111829;
      --border: rgba(59,130,246,.2);
      --text: #e2e8f0;
      --sub: #94a3b8;
      --cyan: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --purple: #a78bfa;
      --yellow: #eab308;
    }
    body {
      background: linear-gradient(135deg, var(--bg) 0%, #0f1535 100%);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .container { max-width: 1920px; margin: 0 auto; padding: 12px; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(17,24,41,.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 {
      font-size: 28px;
      background: linear-gradient(135deg, var(--cyan), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
    }
    .header-info {
      color: var(--sub);
      font-size: 11px;
    }
    .header-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .refresh-btn {
      background: linear-gradient(135deg, var(--cyan), #22d3ee);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: .3s;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-btn:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }
    .refresh-btn.loading {
      opacity: 0.6;
      pointer-events: none;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      flex-wrap: wrap;
    }
    .tab {
      background: none;
      border: none;
      color: var(--sub);
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: .2s;
    }
    .tab.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    .page { display: none; }
    .page.active { display: block; }

    .section-title {
      margin: 24px 0 12px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      border-left: 4px solid;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-title.buy { background: rgba(34,197,94,.12); border-left-color: #10b981; color: #86efac; }
    .section-title.excellent { background: rgba(59,130,246,.12); border-left-color: #3b82f6; color: #bfdbfe; }
    .section-title.yao-buy { background: rgba(245,158,11,.12); border-left-color: var(--orange); color: #fef3c7; }
    .section-title.yao-watch { background: rgba(239,68,68,.12); border-left-color: #ef4444; color: #fecaca; }
    .section-title.watching { background: rgba(168,85,247,.12); border-left-color: var(--purple); color: #e9d5ff; }
    .section-count { font-size: 12px; color: var(--sub); font-weight: 400; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }

    .coin-card {
      background: linear-gradient(135deg, rgba(17,24,41,.95), rgba(15,23,42,.95));
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: .3s;
      overflow: hidden;
      position: relative;
    }
    .coin-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,.4);
    }
    .coin-card.buy { border-color: rgba(34,197,94,.6); }
    .coin-card.excellent { border-color: rgba(59,130,246,.6); }
    .coin-card.yao-buy { border-color: rgba(245,158,11,.6); }
    .coin-card.yao-watch { border-color: rgba(239,68,68,.6); }
    .coin-card.watching { border-color: rgba(168,85,247,.6); }

    .watch-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(168,85,247,.8);
      color: #e9d5ff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
    }
    .trend-protection {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(34,197,94,.8);
      color: #d1fae5;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 8px;
      margin-top: 20px;
    }
    .coin-name {
      font-size: 20px;
      font-weight: 900;
      color: var(--cyan);
      text-transform: uppercase;
    }
    .coin-price {
      color: var(--sub);
      font-size: 11px;
      margin-top: 4px;
    }
    .price-24h {
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }
    .price-24h.up { color: var(--green); }
    .price-24h.down { color: var(--red); }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .tag {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid;
      white-space: nowrap;
    }
    .tag.risk-low { background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.4); color: #a7f3d0; }
    .tag.risk-mid { background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.4); color: #fde047; }
    .tag.risk-high { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.4); color: #fca5a5; }
    .tag.phase { background: rgba(168,85,247,.15); border-color: rgba(168,85,247,.4); color: #e9d5ff; }
    .tag.trend { background: rgba(59,130,246,.15); border-color: rgba(59,130,246,.4); color: #bfdbfe; }
    .tag.signal-count { background: rgba(34,197,94,.2); border-color: rgba(34,197,94,.5); color: #d1fae5; font-weight: 800; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    @media (max-width: 600px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
    }
    .metric {
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .metric-label {
      color: var(--sub);
      font-size: 10px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .metric-value {
      font-weight: 700;
      font-size: 12px;
      color: var(--text);
    }
    .metric-value.up { color: var(--green); }
    .metric-value.down { color: var(--red); }
    .metric-value.star::after { content: ' ⭐'; color: var(--yellow); }

    .quick-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .quick-link {
      background: rgba(168,85,247,.15);
      border: 1px solid rgba(168,85,247,.3);
      color: #e9d5ff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 10px;
      cursor: pointer;
      transition: .2s;
      font-weight: 600;
    }
    .quick-link:hover {
      background: rgba(168,85,247,.3);
      transform: translateY(-2px);
    }

    .analysis-text {
      background: rgba(59,130,246,.08);
      border: 1px solid rgba(59,130,246,.18);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      line-height: 1.6;
      color: #bfdbfe;
      margin-top: 8px;
    }
    .analysis-text strong { color: var(--cyan); }

    .detail-page {
      background: rgba(17,24,41,.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .back-btn {
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.2);
      color: var(--cyan);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
      font-weight: 600;
      transition: .2s;
    }
    .back-btn:hover {
      background: rgba(59,130,246,.3);
    }

    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      .detail-metrics { grid-template-columns: repeat(3, 1fr); }
    }
    .detail-metric {
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .detail-metric-label {
      color: var(--sub);
      font-size: 11px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .detail-metric-value {
      font-weight: 700;
      font-size: 14px;
    }
    .detail-metric-value.up { color: var(--green); }
    .detail-metric-value.down { color: var(--red); }
    .detail-metric-value.star::after { content: ' ⭐'; color: var(--yellow); }

    .timeframe-analysis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      .timeframe-analysis { grid-template-columns: 1fr; }
    }
    .tf-analysis {
      background: rgba(59,130,246,.08);
      border: 1px solid rgba(59,130,246,.18);
      border-radius: 8px;
      padding: 12px;
    }
    .tf-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 8px;
      font-size: 12px;
    }
    .tf-content {
      font-size: 11px;
      line-height: 1.6;
      color: #bfdbfe;
    }
    .tf-content strong { color: var(--orange); }

    .search-box {
      background: rgba(17,24,41,.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    input {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      flex: 1;
      min-width: 250px;
    }
    input::placeholder {
      color: var(--sub);
    }
    input:focus {
      outline: none;
      border-color: var(--cyan);
      background: rgba(6,182,212,.1);
    }
    .search-btn {
      background: linear-gradient(135deg, var(--cyan), #22d3ee);
      color: var(--bg);
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
    }
    .search-btn:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }
    .search-btn.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(17,24,41,.98);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 12px 12px;
      max-height: 400px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }
    .search-suggestions.active {
      display: block;
    }
    .suggestion-item {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      cursor: pointer;
      transition: .2s;
    }
    .suggestion-item:hover {
      background: rgba(59,130,246,.1);
    }
    .suggestion-asset {
      color: var(--cyan);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .suggestion-pairs {
      font-size: 11px;
      color: var(--sub);
      line-height: 1.6;
    }
    .pair-badge {
      display: inline-block;
      background: rgba(59,130,246,.15);
      border: 1px solid rgba(59,130,246,.3);
      color: #bfdbfe;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 6px;
      margin-bottom: 3px;
      font-size: 10px;
      cursor: pointer;
      transition: .2s;
    }
    .pair-badge:hover {
      background: rgba(59,130,246,.3);
    }

    .search-results-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    @media (max-width: 768px) {
      .search-results-container { grid-template-columns: 1fr; }
    }

    .result-card {
      background: rgba(17,24,41,.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .result-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .result-asset {
      font-size: 22px;
      font-weight: 900;
      color: var(--cyan);
    }
    .result-pairs {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }
    .result-pair-group {
      padding: 8px;
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 6px;
    }
    .result-pair-type {
      font-size: 11px;
      color: var(--orange);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .result-pair-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .result-pair-btn {
      background: rgba(59,130,246,.2);
      border: 1px solid rgba(59,130,246,.3);
      color: #bfdbfe;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 10px;
      cursor: pointer;
      transition: .2s;
      font-weight: 600;
    }
    .result-pair-btn:hover {
      background: rgba(59,130,246,.4);
      transform: translateY(-2px);
    }

    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(17,24,41,.95);
      border: 2px solid var(--green);
      color: var(--green);
      padding: 16px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      z-index: 3000;
      animation: slideUp .3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .error-box {
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      padding: 12px;
      color: #fca5a5;
      margin-bottom: 12px;
    }

    .empty {
      text-align: center;
      color: var(--sub);
      padding: 80px 20px;
    }

    .star { color: var(--yellow); font-weight: 900; }
    
    .loading {
      text-align: center;
      color: var(--cyan);
      padding: 40px;
      font-weight: 700;
    }

    .status-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status-item {
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.2);
      color: var(--sub);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
    }

    .quick-channel-section {
      background: rgba(168,85,247,.12);
      border: 1px solid rgba(168,85,247,.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .quick-channel-title {
      color: var(--cyan);
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 700;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .channel-hint {
      font-size: 11px;
      color: var(--sub);
      padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,.1);
      margin-top: 8px;
    }

    .search-box-wrapper {
      position: relative;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>⚡ 妖币捕手 Pro</h1>
        <div class="header-info">威科夫分析 · 关注状态管理 · 趋势保护 · 实时突破点捕捉</div>
      </div>
      <div class="header-controls">
        <div class="status-bar">
          <span class="status-item">
            刷新: <span id="update-time">--:--</span>
          </span>
          <span class="status-item">
            <span id="buy-count">0</span> 直接买入
          </span>
          <span class="status-item">
            <span id="watch-count">0</span> 关注中
          </span>
        </div>
        <button class="refresh-btn" id="manual-refresh-btn" onclick="manualRefresh()">
          <span id="refresh-icon">🔄</span> 手动刷新
        </button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchPage('monitor', this)">📊 首页监控</button>
      <button class="tab" onclick="switchPage('search', this)">🔍 全市场搜索</button>
    </div>

    <div id="error-container"></div>

    <!-- 首页监控 -->
    <div id="monitor-page" class="page active">
      <div id="monitor-content" class="loading">⏳ 正在加载数据...</div>
    </div>

    <!-- 搜索页面 -->
    <div id="search-page" class="page">
      <div class="search-box">
        <div class="search-box-wrapper" style="flex: 1; min-width: 250px; position: relative;">
          <input 
            type="text" 
            id="search-input" 
            placeholder="输入任意币种名称 (BTC、ETH、PEPE、DOGE 等)" 
            oninput="onSearchInput()"
          />
          <div id="search-suggestions" class="search-suggestions"></div>
        </div>
        <button class="search-btn" id="search-btn" onclick="searchCoin()">🔍 搜索</button>
      </div>
      <div id="search-content"></div>
    </div>

    <!-- 详情页面 -->
    <div id="detail-page" class="page">
      <button class="back-btn" onclick="switchPage('monitor', null)">← 返回首页</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <script>
const CONFIG = {
  symbols: [
    'PEPE','WIF','BONK','FLOKI','NOT','DOGE','SHIB','GROK','BRETT','POPCAT',
    'NEIRO','PNUT','VANA','ZRO','MEME','AI','BLUR','SEI','JUP','SUI',
    'NEAR','APT','ENA','TRB','INJ','ARB','OP','STRK','MANTA','PIXEL'
  ],
  refreshMs: 60000,
  binanceUrl: 'https://api.binance.com/api/v3',
  watchDurationMs: 300000,
};

let allCoins = {};
let klineCache = {};
let signalHistory = {};
let watchingCoins = {};
let trendProtectionCoins = {};
let currentPage = 'monitor';
let isRefreshing = false;

// 搜索相关全局变量
let spotSymbols = [];
let futuresUSDTSymbols = [];
let futuresCoinSymbols = [];
let searchableAssets = {};

// ============ 工具函数 ============

function fmt(n, decimals = 2) {
  const num = Number(n);
  if (!isFinite(num)) return '--';
  if (Math.abs(num) >= 1e9) return (num / 1e9).toFixed(decimals) + 'B';
  if (Math.abs(num) >= 1e6) return (num / 1e6).toFixed(decimals) + 'M';
  if (Math.abs(num) >= 1e3) return (num / 1e3).toFixed(decimals) + 'K';
  return num.toFixed(decimals);
}

function fmtPct(n, decimals = 2) {
  const num = Number(n);
  if (!isFinite(num)) return '--';
  return (num > 0 ? '+' : '') + num.toFixed(decimals) + '%';
}

function switchPage(page, el = null) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page + '-page').classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
}

function showNotification(msg, type = 'success') {
  const div = document.createElement('div');
  div.className = 'notification';
  if (type === 'warning') {
    div.style.borderColor = 'var(--orange)';
    div.style.color = 'var(--orange)';
  } else if (type === 'error') {
    div.style.borderColor = 'var(--red)';
    div.style.color = 'var(--red)';
  }
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text);
  showNotification('✅ 已复制: ' + text);
}

// ============ 快捷通道链接 ============

function getDexScreenerLink(symbol) {
  return `https://dexscreener.com/search?q=${symbol}`;
}

function getLargeTransferLink(symbol) {
  return `https://whale-alert.io/?s=${symbol}`;
}

function getLiquidationMapLink(symbol) {
  return `https://www.liquidationmap.info/?symbol=${symbol}`;

// ============ 构建搜索资产索引 ============

function buildSearchableAssets() {
  searchableAssets = {};

  function addAsset(type, item) {
    const base = item.baseAsset || item.pair || '';
    const quote = item.quoteAsset || '';
    const symbol = item.symbol || '';

    if (!base) return;

    if (!searchableAssets[base]) {
      searchableAssets[base] = {
        asset: base,
        spot: [],
        futures: [],
        delivery: []
      };
    }

    if (type === 'spot') {
      searchableAssets[base].spot.push({
        symbol,
        quote,
        status: item.status
      });
    } else if (type === 'futures') {
      searchableAssets[base].futures.push({
        symbol,
        quote,
        contractType: item.contractType,
        status: item.status
      });
    } else if (type === 'delivery') {
      searchableAssets[base].delivery.push({
        symbol,
        quote,
        contractType: item.contractType,
        status: item.status
      });
    }
  }

  spotSymbols.forEach(s => addAsset('spot', s));
  futuresUSDTSymbols.forEach(s => addAsset('futures', s));
  futuresCoinSymbols.forEach(s => addAsset('delivery', s));
}

// ============ 搜索建议 ============

function searchBinanceAssets(keyword) {
  const q = keyword.toUpperCase().trim();
  if (!q) return [];

  const keys = Object.keys(searchableAssets);

  return keys
    .filter(k => k.includes(q))
    .sort((a, b) => {
      if (a === q) return -1;
      if (b === q) return 1;
      return a.localeCompare(b);
    })
    .slice(0, 15)
    .map(k => searchableAssets[k]);
}

function onSearchInput() {
  const input = document.getElementById('search-input').value.toUpperCase().trim();
  const suggestionsDiv = document.getElementById('search-suggestions');

  if (!input) {
    suggestionsDiv.classList.remove('active');
    return;
  }

  const results = searchBinanceAssets(input);

  if (!results.length) {
    suggestionsDiv.classList.remove('active');
    return;
  }

  let html = '';
  results.slice(0, 8).forEach(asset => {
    const spotCount = asset.spot.length;
    const futuresCount = asset.futures.length;
    const deliveryCount = asset.delivery.length;

    html += `
      <div class="suggestion-item">
        <div class="suggestion-asset">${asset.asset}</div>
        <div class="suggestion-pairs">
          ${spotCount > 0 ? `<strong>现货:</strong> ${asset.spot.slice(0, 3).map(s => `<span class="pair-badge" onclick="analyzeSelectedPair('${s.symbol}','spot')">${s.symbol}</span>`).join('')}${spotCount > 3 ? ` +${spotCount - 3}` : ''}` : ''}
          ${futuresCount > 0 ? `<br><strong>U本位:</strong> ${asset.futures.slice(0, 3).map(s => `<span class="pair-badge" onclick="analyzeSelectedPair('${s.symbol}','futures')">${s.symbol}</span>`).join('')}${futuresCount > 3 ? ` +${futuresCount - 3}` : ''}` : ''}
          ${deliveryCount > 0 ? `<br><strong>币本位:</strong> ${asset.delivery.slice(0, 2).map(s => `<span class="pair-badge" onclick="analyzeSelectedPair('${s.symbol}','delivery')">${s.symbol}</span>`).join('')}${deliveryCount > 2 ? ` +${deliveryCount - 2}` : ''}` : ''}

// ============ 技术指标 ============

function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return 50;
  
  let gains = 0, losses = 0;
  for (let i = closes.length - period; i < closes.length; i++) {
    const diff = closes[i] - closes[i - 1];
    if (diff > 0) gains += diff;
    else losses -= diff;
  }
  
  const avgGain = gains / period;
  const avgLoss = losses / period;
  const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
  return 100 - (100 / (1 + rs));
}

function calcMACD(closes, fastPeriod = 12, slowPeriod = 26, signalPeriod = 9) {
  if (closes.length < slowPeriod) return null;

  const ema = (data, period) => {
    const k = 2 / (period + 1);
    let ema = data[0];
    for (let i = 1; i < data.length; i++) {
      ema = data[i] * k + ema * (1 - k);
    }
    return ema;
  };

  const fast = ema(closes, fastPeriod);
  const slow = ema(closes, slowPeriod);
  const macd = fast - slow;

  return { macd, fast, slow };
}

function calcCVD(klines) {
  if (!klines || klines.length === 0) return { trend: 'neutral', value: 0 };

  let cvd = 0;
  for (let k of klines) {
    if (k.c > k.o) cvd += k.v;
    else cvd -= k.v;
  }

  return {
    trend: cvd > 0 ? 'up' : cvd < 0 ? 'down' : 'neutral',
    value: cvd
  };
}

// ============ 威科夫分析 ============

function analyzeWyckoff(klines) {
  if (!klines || klines.length < 5) return 'unknown';

  const closes = klines.map(k => k.c);
  const highs = klines.map(k => k.h);
  const lows = klines.map(k => k.l);

  const recentHigh = Math.max(...highs.slice(-20));
  const recentLow = Math.min(...lows.slice(-20));
  const currentPrice = closes[closes.length - 1];
  const range = recentHigh - recentLow;
  const position = (currentPrice - recentLow) / range;

  const rsi = calcRSI(closes);

  if (position > 0.7 && rsi > 60) return 'distribution';
  if (position > 0.65 && rsi > 55) return 'uptrend';
  if (position > 0.4 && position < 0.6) return 'consolidation';
  if (position < 0.35 && rsi < 45) return 'downtrend';
  if (position < 0.3 && rsi < 40) return 'accumulation';
  
  const priceUp = closes[closes.length - 1] > closes[closes.length - 2];
  return priceUp ? 'breakout' : 'unknown';
}

// ============ 信号检测 ============

function detectSignals(symbol, klines) {
  if (!klines || klines.length < 10) {
    return { signals: [], strength: 0, direction: null, rsi: 0, macd: null, cvd: { trend: 'neutral' } };
  }

  const closes = klines.map(k => k.c);
  const volumes = klines.map(k => k.v);

  const rsi = calcRSI(closes);
  const macd = calcMACD(closes);
  const cvd = calcCVD(klines);

  let signals = [];
  let strength = 0;
  let direction = null;

  if (rsi < 30) {
    signals.push('rsi_oversold');
    strength += 20;
    direction = 'LONG';
  }

  if (rsi > 75 && closes[closes.length - 1] < closes[closes.length - 2]) {
    signals.push('rsi_overbought_drop');
    strength += 20;
    direction = 'SHORT';
  }

  const avgVol = volumes.slice(0, 10).reduce((a, b) => a + b) / 10;
  if (volumes[volumes.length - 1] > avgVol * 2) {
    signals.push('volume_breakout');
    strength += 15;
  }

  if (closes[closes.length - 1] < Math.min(...closes.slice(-10, -1)) && cvd.trend === 'up') {
    signals.push('cvd_bullish_divergence');
    strength += 25;
    direction = 'LONG';
  }

  if (closes[closes.length - 1] > Math.max(...closes.slice(-10, -1)) && cvd.trend === 'down') {
    signals.push('cvd_bearish_divergence');
    strength += 25;
    direction = 'SHORT';
  }

  if (macd && macd.macd > 0) {
    signals.push('macd_positive');
    strength += 15;
    direction = 'LONG';
  }

  const priceUp = closes[closes.length - 1] > closes[closes.length - 2];
  const volUp = volumes[volumes.length - 1] > volumes[volumes.length - 2];
  if (priceUp && volUp) {
    signals.push('price_volume_sync_up');
    strength += 20;
    direction = 'LONG';
  }
  if (!priceUp && volUp) {
    signals.push('price_volume_sync_down');
    strength += 20;
    direction = 'SHORT';
  }

  return { signals, strength: Math.min(strength, 100), direction, rsi, macd, cvd };
}

// ============ 风险评估 ============

function assessRisk(coin_data) {
  let riskScore = 0;

  if (coin_data.rsi_1h > 80) riskScore += 30;
  else if (coin_data.rsi_1h > 70) riskScore += 15;

  if (coin_data.rsi_1h < 20) riskScore += 20;
  else if (coin_data.rsi_1h < 30) riskScore += 10;

  if (Math.abs(coin_data.change_1h) > 10) riskScore += 20;

  if (riskScore >= 70) return 'high';
  if (riskScore >= 40) return 'mid';
  return 'low';
}

// ============ 关注和保护机制 ============

function startWatching(symbol) {
  if (!watchingCoins[symbol]) {
    watchingCoins[symbol] = { startTime: Date.now() };
  }
}

function isTrendProtected(symbol) {
  return trendProtectionCoins[symbol] ? true : false;
}

function isQualifiedForRecommend(symbol) {
  const watching = watchingCoins[symbol];
  if (!watching) return false;

  const elapsed = Date.now() - watching.startTime;
  const requireDuration = CONFIG.watchDurationMs;

  return elapsed >= requireDuration;
}

function startTrendProtection(symbol) {
  if (!trendProtectionCoins[symbol]) {
    trendProtectionCoins[symbol] = { startTime: Date.now() };
    console.log(`🛡️ ${symbol} 开始趋势保护`);
  }
}

// ============ 推荐等级判断（改松版本） ============

function determineLevel(symbol, coin_data, signal_data) {
  const riskLevel = assessRisk(coin_data);
  const isYao = coin_data.price < 0.01;

  if (isTrendProtected(symbol)) {
    return allCoins[symbol]?.level || null;
  }

  // ============ 直接买入（改松） ============
  if (
    signal_data.strength >= 50 &&
    riskLevel !== 'high' &&
    coin_data.change_1h > 0 &&
    signal_data.direction === 'LONG'
  ) {
    startTrendProtection(symbol);
    return 'buy';
  }

  // ============ 妖币买入 ============
  if (isYao) {
    if (signal_data.strength >= 50 && riskLevel !== 'high' && signal_data.direction === 'LONG') {
      startTrendProtection(symbol);
      return 'yao-buy';
    }
    if (signal_data.strength >= 35) {
      return 'yao-watch';
    }
  }

  // ============ 优秀币 ============
  if (
    signal_data.strength >= 40 &&
    riskLevel !== 'high' &&
    coin_data.change_1h > -2
  ) {
    startTrendProtection(symbol);
    return 'excellent';
  }

  // ============ 关注中 ============
  if (signal_data.strength >= 30) {
    startWatching(symbol);
    return 'watching';
  }

  return null;
}

async function analyzeCoin(symbol) {
  try {
    const [ticker, klines_5m, klines_15m, klines_1h, klines_4h, klines_1d] = await Promise.all([
      getTicker(symbol),
      getKlines(symbol, '5m', 100),
      getKlines(symbol, '15m', 100),
      getKlines(symbol, '1h', 100),
      getKlines(symbol, '4h', 100),
      getKlines(symbol, '1d', 100)
    ]);

    if (!ticker || !klines_1h) return null;

    klineCache[symbol] = { klines_5m, klines_15m, klines_1h, klines_4h, klines_1d };

    const c_5m = klines_5m?.map(k => k.c) || [];
    const c_15m = klines_15m?.map(k => k.c) || [];
    const c_1h = klines_1h.map(k => k.c);
    const c_4h = klines_4h?.map(k => k.c) || [];
    const c_1d = klines_1d?.map(k => k.c) || [];

    const rsi_5m = calcRSI(c_5m);
    const rsi_15m = calcRSI(c_15m);
    const rsi_1h = calcRSI(c_1h);
    const rsi_4h = calcRSI(c_4h);
    const rsi_1d = calcRSI(c_1d);

    const macd_1h = calcMACD(c_1h);
    const cvd_1h = calcCVD(klines_1h);
    const cvd_5m = calcCVD(klines_5m || []);

    const getChange = (klines) => {
      if (!klines || klines.length < 2) return 0;
      return ((klines[klines.length - 1].c - klines[0].c) / klines[0].c) * 100;
    };

    const change_5m = getChange(klines_5m);
    const change_15m = getChange(klines_15m);
    const change_1h = getChange(klines_1h);
    const change_4h = getChange(klines_4h);
    const change_1d = getChange(klines_1d);

    const phase_5m = analyzeWyckoff(klines_5m || []);
    const phase_1h = analyzeWyckoff(klines_1h);
    const phase_4h = analyzeWyckoff(klines_4h || []);

    const signal_5m = detectSignals(symbol, klines_5m || []);
    const signal_15m = detectSignals(symbol, klines_15m || []);
    const signal_1h = detectSignals(symbol, klines_1h);
    const signal_4h = detectSignals(symbol, klines_4h || []);

    const totalSignalStrength = (signal_5m.strength + signal_1h.strength * 1.5 + signal_4h.strength) / 3.5;
    const mainDirection = signal_1h.direction || signal_5m.direction;

    if (!signalHistory[symbol]) signalHistory[symbol] = [];
    if (signal_5m.signals.length > 0 || signal_1h.signals.length > 0) {
      signalHistory[symbol].push({
        time: Date.now(),
        signals: [...signal_5m.signals, ...signal_1h.signals],
        strength: totalSignalStrength
      });
      if (signalHistory[symbol].length > 100) signalHistory[symbol].shift();
    }

    const coinData = {
      symbol,
      pair: symbol + 'USDT',
      market: 'spot',
      price: ticker.price,
      change24h: ticker.change24h,
      volume24h: ticker.volume24h,
      high24h: ticker.high24h,
      low24h: ticker.low24h,
      bid: ticker.bid,
      ask: ticker.ask,
      
      rsi_5m, rsi_15m, rsi_1h, rsi_4h, rsi_1d,
      change_5m, change_15m, change_1h, change_4h, change_1d,
      
      macd_1h,
      cvd_1h,
      cvd_5m,
      
      phase_5m, phase_1h, phase_4h,
      
      signal_5m, signal_15m, signal_1h, signal_4h,
      signalStrength: totalSignalStrength,
      mainDirection,
      signalCount: signalHistory[symbol]?.filter(s => Date.now() - s.time < 300000).length || 0
    };

    const riskLevel = assessRisk(coinData);
    const level = determineLevel(symbol, coinData, { strength: totalSignalStrength, direction: mainDirection });

    allCoins[symbol] = {
      data: coinData,
      riskLevel,
      level,
      lastUpdate: Date.now()
    };

    return allCoins[symbol];
  } catch (error) {
    console.error(`分析 ${symbol} 失败:`, error.message);
    return null;
  }
}

      change24h: ticker.change24h,
      volume24h: ticker.volume24h,
      high24h: ticker.high24h,
      low24h: ticker.low24h,
      bid: ticker.bid,
      ask: ticker.ask,
      rsi_5m, rsi_15m, rsi_1h, rsi_4h, rsi_1d,
      change_5m, change_15m, change_1h, change_4h, change_1d,
      macd_1h, cvd_1h, cvd_5m,
      phase_5m, phase_1h, phase_4h,
      signal_5m, signal_15m, signal_1h, signal_4h,
      signalStrength: totalSignalStrength,
      mainDirection
    };

    const riskLevel = assessRisk(coinData);
    const level = determineLevel(symbol, coinData, { strength: totalSignalStrength, direction: mainDirection });

    allCoins[symbol] = {
      data: coinData,
      riskLevel,
      level,
      lastUpdate: Date.now()
    };

    return allCoins[symbol];
  } catch (error) {
    console.error(`分析 ${pair} 失败:`, error.message);
    return null;
  }
}

async function manualRefresh() {
  if (isRefreshing) return;
  
  isRefreshing = true;
  const btn = document.getElementById('manual-refresh-btn');
  const icon = document.getElementById('refresh-icon');
  
  btn.classList.add('loading');
  icon.textContent = '⏳';
  
  try {
    showNotification('⏳ 正在刷新数据...', 'success');
    await renderMonitor();
    showNotification('✅ 数据刷新完成', 'success');
  } catch (error) {
    showNotification('❌ 刷新失败: ' + error.message, 'error');
  } finally {
    isRefreshing = false;
    btn.classList.remove('loading');
    icon.textContent = '🔄';
  }
}

async function renderMonitor() {
  const results = await Promise.allSettled(
    CONFIG.symbols.map(s => analyzeCoin(s))
  );

  const coins = results
    .filter(r => r.status === 'fulfilled' && r.value)
    .map(r => r.value)
    .filter(c => c !== null);

  const failedCount = results.filter(r => r.status === 'rejected').length;
  if (failedCount > 20) {
    document.getElementById('monitor-content').innerHTML = `
      <div class="error-box">
        ⚠️ 数据获取失败过多 (${failedCount}/${CONFIG.symbols.length})
        <br>可能是网络问题或 API 限制
        <br>请刷新页面重试
      </div>
    `;
    return;
  }

  const buyCoins = coins.filter(c => c.level === 'buy').sort((a, b) => b.data.signalStrength - a.data.signalStrength).slice(0, 10);
  const excellentCoins = coins.filter(c => c.level === 'excellent').sort((a, b) => b.data.signalStrength - a.data.signalStrength).slice(0, 10);
  const yaoBuyCoins = coins.filter(c => c.level === 'yao-buy').sort((a, b) => b.data.signalStrength - a.data.signalStrength).slice(0, 10);
  const yaoWatchCoins = coins.filter(c => c.level === 'yao-watch').sort((a, b) => b.data.signalStrength - a.data.signalStrength).slice(0, 10);
  const watchingCoins_list = coins.filter(c => c.level === 'watching').sort((a, b) => b.data.signalStrength - a.data.signalStrength).slice(0, 10);

  let html = '';

  if (buyCoins.length) {
    html += `<div class="section-title buy">
      🟢 可以直接买入 (${buyCoins.length})
      <span class="section-count">信号强度中等 · 点位较好 · 拉升途中</span>
    </div>`;
    html += `<div class="grid">${buyCoins.map(c => renderCoinCard(c, 'buy')).join('')}</div>`;

  if (excellentCoins.length) {
    html += `<div class="section-title excellent">
      🔵 优秀币种 (${excellentCoins.length})
      <span class="section-count">走势好 · 可继续观察或低吸</span>
    </div>`;
    html += `<div class="grid">${excellentCoins.map(c => renderCoinCard(c, 'excellent')).join('')}</div>`;
  }

  if (yaoBuyCoins.length) {
    html += `<div class="section-title yao-buy">
      🔥 妖币买入 (${yaoBuyCoins.length})
      <span class="section-count">刚启动 · 高潜力 · 短线机会</span>
    </div>`;
    html += `<div class="grid">${yaoBuyCoins.map(c => renderCoinCard(c, 'yao-buy')).join('')}</div>`;
  }

  if (yaoWatchCoins.length) {
    html += `<div class="section-title yao-watch">
      🟠 妖币观察 (${yaoWatchCoins.length})
      <span class="section-count">可能有风险 · 等待最佳点位</span>
    </div>`;
    html += `<div class="grid">${yaoWatchCoins.map(c => renderCoinCard(c, 'yao-watch')).join('')}</div>`;
  }

  if (watchingCoins_list.length) {
    html += `<div class="section-title watching">
      🔍 关注中 (${watchingCoins_list.length})
      <span class="section-count">观察中 · 信号初现</span>
    </div>`;
    html += `<div class="grid">${watchingCoins_list.map(c => renderCoinCard(c, 'watching')).join('')}</div>`;
  }

  if (html === '') {
    html = `<div class="error-box">
      ℹ️ 数据已加载，已分析 ${coins.length} 个币种
      <br>当前暂无符合条件的推荐币种
      <br>请继续关注下一轮更新（1分钟后）
    </div>`;
  }

  document.getElementById('monitor-content').innerHTML = html;
  document.getElementById('buy-count').textContent = buyCoins.length;
  document.getElementById('watch-count').textContent = watchingCoins_list.length;
  updateTime();
}

function getPhaseEmoji(phase) {
  const phaseMap = {
    'accumulation': '📦',
    'uptrend': '📈',
    'distribution': '📉',
    'downtrend': '⬇️',
    'consolidation': '〰️',
    'breakout': '💥',
    'unknown': '❓'
  };
  return phaseMap[phase] || '❓';
}

function getTrendEmoji(trend) {
  if (trend === 'LONG') return '🟢';
  if (trend === 'SHORT') return '🔴';
  return '⚪';
}

function getPriceExpectation(c, riskLevel) {
  if (riskLevel === 'high') {
    return '风险较高，短期可能调整，建议观察关键支撑位。';
  }

  if (c.mainDirection === 'LONG') {
    if (c.signalStrength > 60) {
      return '多个信号共振，有望继续上涨，可追进或等回调。';
    }
    return '看多信号中等，建议低吸或等待确认。';
  }

  if (c.mainDirection === 'SHORT') {
    return '看空信号，短期可能下跌或整理，建议规避。';
  }

  return '走势不明确，继续观察关键点位。';
}

function getTradeAdvice(c, riskLevel, level) {
  if (level === 'buy') {
    return `✅ 可直接买入。点位好，拉升途中，盈亏比大。分批建仓，设止损在24h低点附近。`;
  }
  if (level === 'excellent') {
    return `🔵 优秀币。走势向好，建议继续观察或低吸。回调到支撑位可升级为买入。`;
  }
  if (level === 'yao-buy') {
    return `🔥 妖币买入。价格低，庄家控盘，刚启动拉盘。高潜力高风险，只能短线，赚了就跑。`;
  }
  if (level === 'yao-watch') {
    return `🟠 妖币观察。妖币特征明显但有风险。等待回调或动能恢复再介入。`;
  }
  if (level === 'watching') {
    return `🔍 关注中。信号已出现，继续观察确认。`;
  }
  return `⚪ 继续观察。`;
}

          ${getTradeAdvice(c, coin.riskLevel, coin.level)}
        </div>
      </div>
    </div>
  `;

  document.getElementById('detail-content').innerHTML = html;
}

// ============ 搜索功能 ============

async function searchCoin() {
  const input = document.getElementById('search-input').value.toUpperCase().trim();
  if (!input) {
    showNotification('❌ 请输入币种名称', 'error');
    return;
  }

  const btn = document.getElementById('search-btn');
  btn.classList.add('loading');
  btn.textContent = '⏳ 搜索中...';

  try {
    const results = searchBinanceAssets(input);

    if (!results.length) {
      document.getElementById('search-content').innerHTML = `
        <div class="error-box">
          ❌ 未找到 "${input}" 相关币种
          <br>请检查币种名称后重试
        </div>
      `;
      showNotification(`❌ 未找到 ${input}`, 'error');
      btn.classList.remove('loading');
      btn.textContent = '🔍 搜索';
      return;
    }

    renderSearchResults(results);
    showNotification(`✅ 找到 ${results.length} 个相关币种`, 'success');
  } catch (error) {
    console.error('搜索失败:', error);
    document.getElementById('search-content').innerHTML = `
      <div class="error-box">
        ❌ 搜索失败: ${error.message}
      </div>
    `;
    showNotification('❌ 搜索失败', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '🔍 搜索';
  }
}

function renderSearchResults(list) {
  const container = document.getElementById('search-content');

  if (!list.length) {
    container.innerHTML = `
      <div class="error-box">
        ❌ 没有找到相关币种
      </div>
    `;
    return;
  }

  let html = '<div class="search-results-container">';

  list.forEach(asset => {
    const spotCount = asset.spot.length;
    const futuresCount = asset.futures.length;
    const deliveryCount = asset.delivery.length;

    html += `
      <div class="result-card">
        <div class="result-card-header">
          <div class="result-asset">${asset.asset}</div>
        </div>

        <div class="result-pairs">
          ${spotCount > 0 ? `
            <div class="result-pair-group">
              <div class="result-pair-type">📊 现货交易对 (${spotCount})</div>
              <div class="result-pair-list">
                ${asset.spot.slice(0, 6).map(s => `
                  <button class="result-pair-btn" onclick="analyzeSelectedPair('${s.symbol}','spot')">
                    ${s.symbol}
                  </button>
                `).join('')}
                ${spotCount > 6 ? `<span style="color: var(--sub); font-size: 10px; align-self: center;">+${spotCount - 6}</span>` : ''}
              </div>
            </div>
          ` : ''}

          ${futuresCount > 0 ? `
            <div class="result-pair-group">
              <div class="result-pair-type">📈 U本位合约 (${futuresCount})</div>
              <div class="result-pair-list">
                ${asset.futures.slice(0, 5).map(s => `
                  <button class="result-pair-btn" onclick="analyzeSelectedPair('${s.symbol}','futures')">
                    ${s.symbol}
                  </button>
                `).join('')}
                ${futuresCount > 5 ? `<span style="color: var(--sub); font-size: 10px; align-self: center;">+${futuresCount - 5}</span>` : ''}
              </div>
            </div>
          ` : ''}

          ${deliveryCount > 0 ? `
            <div class="result-pair-group">
              <div class="result-pair-type">🪙 币本位合约 (${deliveryCount})</div>
              <div class="result-pair-list">
                ${asset.delivery.slice(0, 5).map(s => `
                  <button class="result-pair-btn" onclick="analyzeSelectedPair('${s.symbol}','delivery')">
                    ${s.symbol}
                  </button>
                `).join('')}
                ${deliveryCount > 5 ? `<span style="color: var(--sub); font-size: 10px; align-self: center;">+${deliveryCount - 5}</span>` : ''}
              </div>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  });

  html += '</div>';
  container.innerHTML = html;
}

async function analyzeSelectedPair(pair, market) {
  showNotification(`⏳ 正在分析 ${pair} (${market === 'spot' ? '现货' : market === 'futures' ? 'U本位' : '币本位'})...`, 'info');
  const result = await analyzePair(pair, market);

  if (!result) {
    showNotification(`❌ ${pair} 分析失败`, 'error');
    return;
  }

  switchPage('detail', null);
  renderDetail(pair);
  showNotification(`✅ ${pair} 分析完成`, 'success');
}

// ============ 初始化和定时刷新 ============

function updateTime() {
  const now = new Date();
  document.getElementById('update-time').textContent = 
    `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
}

async function init() {
  showNotification('⏳ 正在加载币安现货/合约交易对...', 'info');
  await loadExchangeInfo();

  showNotification('⏳ 正在首次加载监控数据...', 'info');
  await renderMonitor();
  showNotification('✅ 数据加载完成，每分钟自动更新', 'success');

  setInterval(async () => {
    if (currentPage === 'monitor') {
      await renderMonitor();
    }
  }, CONFIG.refreshMs);

  document.getElementById('search-input')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') searchCoin();
  });

  document.getElementById('search-input')?.addEventListener('blur', () => {
    setTimeout(() => {
      document.getElementById('search-suggestions').classList.remove('active');
    }, 200);
  });

  setInterval(() => {
    updateTime();
  }, 1000);
}

window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>

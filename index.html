<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>山寨币监控系统 Pro - 6h权重增强版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #061018;
      --card: #0b1525;
      --border: rgba(16,196,245,.24);
      --text: #e8eef9;
      --sub: #8da3bb;
      --cyan: #10c4f5;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
    }
    body {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      padding: 12px;
      font-size: 13px;
    }
    .container { max-width: 1800px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      background: rgba(10,22,40,.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, #10c4f5 0%, #62dbff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-row, .status-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
    }
    .btn.active, .btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(16,196,245,.12);
    }
    .pill {
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(16,196,245,.08);
      border: 1px solid rgba(16,196,245,.15);
      color: var(--sub);
      font-size: 11px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      box-shadow: 0 0 0 0 rgba(34,197,94,.6);
      animation: pulse 2s infinite;
    }
    .dot.offline { background: var(--red); animation: none; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,.6); }
      70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    .page { display: none; }
    .page.active { display: block; }
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      background: rgba(10,22,40,.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .toolbar-item {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .toolbar-label {
      color: var(--sub);
      font-size: 11px;
      font-weight: 700;
    }
    .sort-btn {
      background: rgba(16,196,245,.1);
      border: 1px solid rgba(16,196,245,.2);
      color: var(--cyan);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
    }
    .sort-btn.active { background: rgba(16,196,245,.25); }
    .section-title {
      margin: 18px 0 10px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 900;
    }
    .section-title.stable { color: #dfffe9; background: rgba(34,197,94,.12); border-left: 4px solid var(--green); }
    .section-title.buy { color: #c9ffe0; background: rgba(34,197,94,.15); border-left: 4px solid #00d26a; }
    .section-title.yao { color: #ffe7bf; background: rgba(245,158,11,.14); border-left: 4px solid var(--orange); }
    .section-title.watch { color: #c9efff; background: rgba(16,196,245,.14); border-left: 4px solid var(--cyan); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px,1fr));
      gap: 12px;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: linear-gradient(135deg, rgba(11,21,37,.96), rgba(15,30,52,.92));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      transition: .25s ease;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,.35); }
    .card.stable { border-color: rgba(34,197,94,.55); }
    .card.buy { border-color: rgba(0,210,106,.55); }
    .card.yao { border-color: rgba(245,158,11,.55); }
    .card.watch { border-color: rgba(16,196,245,.55); }
    .head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .symbol { font-size: 18px; font-weight: 900; color: var(--cyan); text-transform: uppercase; }
    .price { color: var(--sub); font-size: 12px; margin-top: 3px; }
    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .tag {
      border: 1px solid;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
    }
    .t-resonance { color: #ffb3d9; background: rgba(236,72,153,.16); border-color: rgba(236,72,153,.45); }
    .t-6h { color: #a8e6ff; background: rgba(59,130,246,.15); border-color: rgba(59,130,246,.45); }
    .t-multi { color: #ffc2c2; background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.4); }
    .t-taker { color: #a8e6ff; background: rgba(59,130,246,.15); border-color: rgba(59,130,246,.45); }
    .t-1h { color: #d7c6ff; background: rgba(168,85,247,.14); border-color: rgba(168,85,247,.4); }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 6px;
      margin-bottom: 10px;
    }
    .stat {
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 8px;
      padding: 8px;
    }
    .stat .k { color: var(--sub); font-size: 10px; margin-bottom: 4px; }
    .stat .v { font-weight: 800; font-size: 12px; }
    .green { color: var(--green); }
    .red { color: var(--red); }
    .orange { color: var(--orange); }
    .reason-box {
      border-radius: 10px;
      padding: 10px;
      font-size: 11px;
      line-height: 1.7;
      background: rgba(16,196,245,.08);
      border: 1px solid rgba(16,196,245,.18);
      color: #d8f5ff;
    }
    .empty {
      text-align: center;
      color: var(--sub);
      padding: 60px 20px;
      background: rgba(10,22,40,.75);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .search-input {
      width: 100%;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.82);
      display: none;
      z-index: 999;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-box {
      width: 100%;
      max-width: 1200px;
      background: linear-gradient(135deg, #07111d, #0e1830);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
    }
    .close {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 22px;
      border: none;
      background: none;
      color: var(--sub);
      cursor: pointer;
    }
    .detail-title { font-size: 24px; font-weight: 900; color: var(--cyan); margin-bottom: 14px; text-transform: uppercase; }
    .detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    @media (max-width: 900px) { .detail-grid { grid-template-columns: repeat(2,1fr); } }
    .d-item {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 10px;
    }
    .d-item .k { font-size: 10px; color: var(--sub); margin-bottom: 4px; }
    .d-item .v { font-size: 15px; font-weight: 900; }
    .block {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .block h3 { font-size: 13px; margin-bottom: 10px; color: #9fe9ff; }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      border-bottom: 1px dashed rgba(255,255,255,.06);
      padding-bottom: 8px;
      margin-bottom: 8px;
    }
    .row:last-child { border-bottom: none; margin-bottom: 0; }
    .rk { color: var(--sub); font-size: 11px; }
    .rv { color: var(--text); text-align: right; font-size: 11px; font-weight: 700; }
    .notice {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1200;
      background: rgba(11,21,37,.97);
      border: 1px solid var(--border);
      color: var(--text);
      border-left: 4px solid var(--cyan);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 260px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      animation: slideIn .25s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(24px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body translate="no">
  <div class="container">
    <div class="header">
      <div>
        <h1>⚡ 山寨币监控 Pro</h1>
        <div style="color:var(--sub);font-size:12px;margin-top:6px;">6h权重增强 · 1h妖币强化 · 多周期共振 · 综合指标+价格共振</div>
      </div>
      <div class="nav-row">
        <button class="btn active" onclick="switchPage('monitor', this)">📊 监控</button>
        <button class="btn" onclick="switchPage('search', this)">🔍 搜索</button>
        <button class="btn" onclick="refreshNow()">🔄 刷新</button>
      </div>
      <div class="status-row">
        <span class="pill"><span class="dot" id="ws-dot"></span> <span id="ws-status">连接中</span></span>
        <span class="pill">更新：<span id="last-update">--:--</span></span>
        <span class="pill">稳定：<span id="stable-count">0</span></span>
        <span class="pill">建议：<span id="buy-count">0</span></span>
        <span class="pill">妖币：<span id="yao-count">0</span></span>
        <span class="pill">监控：<span id="watch-count">0</span></span>
      </div>
    </div>

    <div id="monitor-page" class="page active">
      <div class="toolbar">
        <div class="toolbar-item">
          <span class="toolbar-label">排序：</span>
          <button class="sort-btn active" onclick="setSortBy('confidence', this)">信心度</button>
          <button class="sort-btn" onclick="setSortBy('resonance', this)">共振强度</button>
          <button class="sort-btn" onclick="setSortBy('takerRatio', this)">主动买卖</button>
        </div>
      </div>
      <div id="monitor-content"></div>
    </div>

    <div id="search-page" class="page">
      <div style="max-width: 1000px; margin: 0 auto;">
        <input id="search-input" class="search-input" placeholder="搜索币种..." oninput="handleSearch(this.value)" />
        <div id="search-results"></div>
      </div>
    </div>
  </div>

  <div id="detail-modal" class="modal">
    <div class="modal-box">
      <button class="close" onclick="closeDetail()">✕</button>
      <div id="detail-body"></div>
    </div>
  </div>

  <script>
const CONFIG = {
  wsUrl: 'wss://stream.binance.com:9443/stream?streams=',
  symbols: ['doge','xrp','ada','sol','avax','link','op','arb','wif','pepe','bonk','floki','not','tia','sei','jup','sui','near','apt','ena','trb','inj','fet','wld','rndr','manta','zro','dydx','ordi','meme','bnx','ai','pnut','vana'],
  stableMs: 5 * 60 * 1000,
  refreshMs: 60 * 1000
};

let allData = {}, futures = {}, history = {}, sortBy = 'confidence', ws = null, timer = null;

function fmt(n, d=2) {
  const num = Number(n);
  if (!isFinite(num)) return '--';
  if (Math.abs(num) >= 1e9) return (num/1e9).toFixed(d)+'B';
  if (Math.abs(num) >= 1e6) return (num/1e6).toFixed(d)+'M';
  if (Math.abs(num) >= 1e3) return (num/1e3).toFixed(d)+'K';
  return num.toFixed(d);
}

function fmtPct(n, d=2) {
  const num = Number(n);
  return !isFinite(num) ? '--' : (num > 0 ? '+' : '') + num.toFixed(d) + '%';
}

function fmtTime(ms) {
  const m = Math.floor(ms / 60000);
  if (m > 60) return Math.floor(m / 60) + 'h';
  if (m > 0) return m + 'm';
  return 'now';
}

function notice(text, color='var(--cyan)') {
  const div = document.createElement('div');
  div.className = 'notice';
  div.style.borderLeftColor = color;
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

function switchPage(page, el) {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page+'-page').classList.add('active');
}

function setSortBy(s, el) {
  sortBy = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderMonitor();
}

function initWS() {
  const streams = [];
  CONFIG.symbols.forEach(s => {
    ['5m','15m','1h','4h','6h'].forEach(t => streams.push(s+'usdt@kline_'+t));
    streams.push(s+'usdt@ticker');
  });
  if (ws) ws.close();
  ws = new WebSocket(CONFIG.wsUrl + streams.join('/'));
  ws.onopen = () => {
    document.getElementById('ws-dot').classList.remove('offline');
    document.getElementById('ws-status').textContent = '已连接';
  };
  ws.onmessage = (e) => {
    try {
      const raw = JSON.parse(e.data);
      const msg = raw.data || raw;
      if (!msg || !msg.s) return;
      const sym = msg.s.replace('USDT','').toLowerCase();
      if (!allData[sym]) allData[sym] = {klines:{}, ticker:{}};
      if (msg.e === 'kline' && msg.k) {
        const k = msg.k;
        const vol = Number(k.v || 0);
        const takerVol = Number(k.V || 0);
        allData[sym].klines[k.i] = {
          o: Number(k.o), h: Number(k.h), l: Number(k.l), c: Number(k.c),
          v: vol, tr: vol > 0 ? takerVol/vol : 0.5
        };
      }
      if (msg.e === '24hrTicker') {
        allData[sym].ticker = {
          p: Number(msg.c), ch: Number(msg.P), v: Number(msg.v), q: Number(msg.q)
        };
      }
    } catch(e) {}
  };
  ws.onerror = () => {
    document.getElementById('ws-dot').classList.add('offline');
    document.getElementById('ws-status').textContent = '错误';
  };
  ws.onclose = () => {
    document.getElementById('ws-dot').classList.add('offline');
    document.getElementById('ws-status').textContent = '重连中';
    setTimeout(initWS, 3000);
  };
}

async function fetchFutures(sym) {
  const upper = sym.toUpperCase() + 'USDT';
  try {
    const [f, oi, ls, oih] = await Promise.all([
      fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol='+upper+'&limit=1').then(r => r.json()).catch(() => null),
      fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol='+upper).then(r => r.json()).catch(() => null),
      fetch('https://fapi.binance.com/fapi/v1/globalLongShortAccountRatio?symbol='+upper+'&period=1h&limit=2').then(r => r.json()).catch(() => null),
      fetch('https://fapi.binance.com/futures/data/openInterestHist?symbol='+upper+'&period=1h&limit=2').then(r => r.json()).catch(() => null)
    ]);
    
    let oiVal = null, oiChg = null, fundRate = null, longRatio = 0.5;
    if (oi && oi.openInterest) oiVal = Number(oi.openInterest);
    if (Array.isArray(oih) && oih.length >= 2 && oiVal) {
      const prev = Number(oih[0].sumOpenInterest || 0);
      if (prev > 0) oiChg = ((oiVal - prev) / prev * 100);
    }
    if (Array.isArray(f) && f.length) fundRate = Number(f[0].fundingRate || 0);
    if (Array.isArray(ls) && ls.length) longRatio = Number(ls[0].longAccount || 0.5);
    
    futures[sym] = { oi: oiVal, oiChg, fundRate, longRatio };
  } catch(e) {}
}

async function fetchAllFutures() {
  await Promise.all(CONFIG.symbols.map(s => fetchFutures(s)));
  renderMonitor();
}

function analyze(sym) {
  const d = allData[sym];
  if (!d || !d.ticker || !d.klines['1h']) return null;
  
  const t = d.ticker || {};
  const f = futures[sym] || {};
  
  const k5m = d.klines['5m'] || {o:t.p||0, c:t.p||0, v:0, tr:0.5, h:t.p||0, l:t.p||0};
  const k15m = d.klines['15m'] || {o:t.p||0, c:t.p||0, v:0, tr:0.5, h:t.p||0, l:t.p||0};
  const k1h = d.klines['1h'] || {o:t.p||0, c:t.p||0, v:0, tr:0.5, h:t.p||0, l:t.p||0};
  const k4h = d.klines['4h'] || {o:t.p||0, c:t.p||0, v:0, tr:0.5, h:t.p||0, l:t.p||0};
  const k6h = d.klines['6h'] || {o:t.p||0, c:t.p||0, v:0, tr:0.5, h:t.p||0, l:t.p||0};
  
  const ch5m = k5m.o > 0 ? ((k5m.c - k5m.o) / k5m.o * 100) : 0;
  const ch15m = k15m.o > 0 ? ((k15m.c - k15m.o) / k15m.o * 100) : 0;
  const ch1h = k1h.o > 0 ? ((k1h.c - k1h.o) / k1h.o * 100) : 0;
  const ch4h = k4h.o > 0 ? ((k4h.c - k4h.o) / k4h.o * 100) : 0;
  const ch6h = k6h.o > 0 ? ((k6h.c - k6h.o) / k6h.o * 100) : 0;
  
  const avgVol = (k5m.v + k15m.v + k1h.v) / 3;
  const volRatio = avgVol > 0 ? k1h.v / avgVol : 1;
  
  const takerBuy1h = k1h.tr > 0.60;
  const takerSell1h = k1h.tr < 0.40;
  
  const longRatio = typeof f.longRatio === 'number' ? f.longRatio : 0.5;
  const fundRate = typeof f.fundRate === 'number' ? f.fundRate : 0;
  const oiChg = typeof f.oiChg === 'number' ? f.oiChg : 0;
  
  // 多周期共振计算（6h权重增强，1h妖币强化）
  const resonance6h = Math.abs(ch6h) > 1 ? 1 : 0;
  const resonance4h = Math.abs(ch4h) > 0.8 ? 1 : 0;
  const resonance1h = Math.abs(ch1h) > 0.5 ? 1 : 0;
  const resonance15m = Math.abs(ch15m) > 0.3 ? 1 : 0;
  
  // 6h权重增强（0.4倍），1h妖币强化（0.3倍）
  const resonanceScore = (resonance6h * 0.4 + resonance4h * 0.2 + resonance1h * 0.3 + resonance15m * 0.1);
  
  // 综合指标权重
  const takerScore = (takerBuy1h ? 1 : takerSell1h ? -1 : 0) * 0.25;
  const volScore = (volRatio > 1.2 ? 1 : volRatio < 0.8 ? -1 : 0) * 0.15;
  const fundScore = (fundRate > 0.0001 ? 1 : fundRate < -0.0001 ? -1 : 0) * 0.15;
  const oiScore = (oiChg > 5 ? 1 : oiChg < -5 ? -1 : 0) * 0.15;
  const longScore = (longRatio > 0.55 ? 1 : longRatio < 0.45 ? -1 : 0) * 0.15;
  
  // 价格共振优先（0.5倍权重）
  const priceResonance = resonanceScore * 0.5;
  
  const confidence = Math.max(-1, Math.min(1, priceResonance + takerScore + volScore + fundScore + oiScore + longScore));
  
  const duration = Date.now() - (history[sym]?.time || 0);
  const isStable = duration >= CONFIG.stableMs;
  
  let category = 'watch';
  if (confidence > 0.6 && isStable) category = 'stable';
  else if (confidence > 0.4 && isStable) category = 'buy';
  else if (Math.abs(ch1h) > 2 && k1h.v > avgVol * 1.5) category = 'yao';
  
  if (!history[sym]) history[sym] = {};
  history[sym].category = category;
  history[sym].time = Date.now();
  
  return {
    sym, p: t.p||0, ch24: t.ch||0, v24: t.v||0, q24: t.q||0,
    ch5m, ch15m, ch1h, ch4h, ch6h,
    v5m: k5m.v, v15m: k15m.v, v1h: k1h.v, v4h: k4h.v, v6h: k6h.v,
    tr5m: k5m.tr, tr15m: k15m.tr, tr1h: k1h.tr, tr4h: k4h.tr, tr6h: k6h.tr,
    volRatio, takerBuy1h, takerSell1h,
    longRatio, fundRate, oiChg,
    resonance6h, resonance4h, resonance1h,
    resonanceScore, confidence, category, duration, isStable
  };
}

function renderMonitor() {
  const now = new Date();
  document.getElementById('last-update').textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  
  const results = CONFIG.symbols.map(s => analyze(s)).filter(r => r);
  
  const stable = results.filter(r => r.category === 'stable');
  const buy = results.filter(r => r.category === 'buy');
  const yao = results.filter(r => r.category === 'yao');
  const watch = results.filter(r => r.category === 'watch');
  
  document.getElementById('stable-count').textContent = stable.length;
  document.getElementById('buy-count').textContent = buy.length;
  document.getElementById('yao-count').textContent = yao.length;
  document.getElementById('watch-count').textContent = watch.length;
  
  let html = '';
  
  if (stable.length) {
    html += '<div class="section-title stable">✅ 稳定信号 (' + stable.length + ')</div>';
    html += '<div class="grid">' + stable.sort((a,b) => sortBy==='confidence' ? b.confidence-a.confidence : b.resonanceScore-a.resonanceScore).map(r => renderCard(r)).join('') + '</div>';
  }
  
  if (buy.length) {
    html += '<div class="section-title buy">📈 建议关注 (' + buy.length + ')</div>';
    html += '<div class="grid">' + buy.sort((a,b) => sortBy==='confidence' ? b.confidence-a.confidence : b.resonanceScore-a.resonanceScore).map(r => renderCard(r)).join('') + '</div>';
  }
  
  if (yao.length) {
    html += '<div class="section-title yao">⚡ 妖币异动 (' + yao.length + ')</div>';
    html += '<div class="grid">' + yao.sort((a,b) => b.ch1h-a.ch1h).map(r => renderCard(r)).join('') + '</div>';
  }
  
  if (watch.length) {
    html += '<div class="section-title watch">👁️ 持续监控 (' + watch.length + ')</div>';
    html += '<div class="grid">' + watch.sort((a,b) => sortBy==='confidence' ? b.confidence-a.confidence : b.takerBuy1h ? -1 : 1).map(r => renderCard(r)).join('') + '</div>';
  }
  
  if (!results.length) html = '<div class="empty">暂无数据，加载中...</div>';
  
  document.getElementById('monitor-content').innerHTML = html;
}

function renderCard(r) {
  const cls = r.category;
  const tag6h = Math.abs(r.ch6h) > 1 ? '<span class="tag t-6h">6h强化</span>' : '';
  const tag1h = Math.abs(r.ch1h) > 1.5 ? '<span class="tag t-1h">1h妖币</span>' : '';
  const tagRes = r.resonanceScore > 0.5 ? '<span class="tag t-resonance">共振强</span>' : '';
  const tagTaker = r.takerBuy1h ? '<span class="tag t-taker">主买卖</span>' : '';
  const tagMulti = (r.resonance6h + r.resonance4h + r.resonance1h) >= 2 ? '<span class="tag t-multi">多周期</span>' : '';
  
  return `<div class="card ${cls}" onclick="showDetail('${r.sym}')">
    <div class="head">
      <div><div class="symbol">${r.sym.toUpperCase()}</div><div class="price">\$${fmt(r.p, 6)}</div></div>
      <div style="text-align:right;"><span class="${r.ch24 > 0 ? 'green' : 'red'}">${fmtPct(r.ch24)}</span></div>
    </div>
    <div class="tags">${tag6h}${tag1h}${tagRes}${tagTaker}${tagMulti}</div>
    <div class="stats">
      <div class="stat"><div class="k">6h</div><div class="v ${r.ch6h > 0 ? 'green' : 'red'}">${fmtPct(r.ch6h)}</div
            <div class="v ${r.ch1h > 0 ? 'green' : 'red'}">${fmtPct(r.ch1h)}</div></div>
      <div class="stat"><div class="k">4h</div><div class="v ${r.ch4h > 0 ? 'green' : 'red'}">${fmtPct(r.ch4h)}</div></div>
      <div class="stat"><div class="k">成交量</div><div class="v">${fmt(r.v1h)}</div></div>
    </div>
    <div class="reason-box">
      <strong>信心度:</strong> <span class="${r.confidence > 0 ? 'green' : 'red'}">${fmtPct(r.confidence * 100)}</span><br/>
      <strong>共振强度:</strong> ${fmtPct(r.resonanceScore * 100)}<br/>
      <strong>主动买卖:</strong> ${r.takerBuy1h ? '主买' : r.takerSell1h ? '主卖' : '中性'} (${fmtPct((r.tr1h - 0.5) * 100)})<br/>
      <strong>持续时长:</strong> ${fmtTime(r.duration)}<br/>
      <strong>资金费率:</strong> <span class="${r.fundRate > 0 ? 'green' : 'red'}">${fmtPct(r.fundRate * 100, 4)}</span>
    </div>
  </div>`;
}

function closeDetail() {
  document.getElementById('detail-modal').classList.remove('active');
}

function handleSearch(val) {
  const v = val.toLowerCase().trim();
  if (!v) {
    document.getElementById('search-results').innerHTML = '';
    return;
  }
  
  const matches = CONFIG.symbols.filter(s => s.includes(v)).map(s => analyze(s)).filter(r => r);
  
  let html = '';
  if (matches.length) {
    html = '<div class="grid">' + matches.map(r => renderCard(r)).join('') + '</div>';
  } else {
    html = '<div class="empty">未找到相关币种</div>';
  }
  
  document.getElementById('search-results').innerHTML = html;
}

function refreshNow() {
  fetchAllFutures();
  renderMonitor();
  notice('已刷新数据');
}

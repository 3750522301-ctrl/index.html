<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>币安永续精选监控 v7 - 共振系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      color: #e5eefb;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .container { max-width: 1600px; margin: 0 auto; }
    .version-tag {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(16,196,245,.2);
      border: 1px solid rgba(16,196,245,.4);
      color: #10c4f5;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      z-index: 999;
    }
    h1 {
      text-align: center;
      color: #10c4f5;
      margin-bottom: 8px;
      font-size: 36px;
    }
    .subtitle {
      text-align: center;
      color: #8ca3ba;
      font-size: 12px;
      margin-bottom: 20px;
    }
    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(16,196,245,.2);
    }
    .tab-btn {
      background: none;
      border: none;
      color: #8ca3ba;
      padding: 12px 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #10c4f5;
      border-bottom-color: #10c4f5;
    }
    .tab-btn:hover { color: #10c4f5; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .time-info {
      color: #8ca3ba;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .refresh-status {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .refresh-status.loading {
      background: #f59e0b;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .section {
      margin-bottom: 30px;
    }
    .section-title {
      font-size: 18px;
      color: #10c4f5;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(16,196,245,.2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }
    .card {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 14px;
      padding: 16px;
      transition: all 0.2s;
    }
    .card:hover { border-color: rgba(16,196,245,.4); }
    .label {
      color: #8ca3ba;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .value {
      color: #10c4f5;
      font-weight: bold;
      font-size: 24px;
    }
    .table-wrap {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 16px;
      overflow: auto;
      max-height: 600px;
    }
    .empty-state {
      text-align: center;
      color: #8ca3ba;
      padding: 40px 20px;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #0d1a2d;
      color: #c5d4e5;
      font-size: 12px;
      font-weight: 600;
    }
    tbody tr {
      cursor: pointer;
    }
    tbody tr:hover { background: rgba(16,196,245,.08); }
    .symbol {
      color: #10c4f5;
      font-weight: bold;
    }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .gray { color: #94a3b8; }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid;
      white-space: nowrap;
      font-weight: bold;
    }

    .level-妖币 { background: rgba(168, 85, 247, .3); color: #d8b4fe; border-color: #a855f7; }
    .level-建议 { background: rgba(34, 197, 94, .3); color: #22c55e; border-color: #22c55e; }

    .risk-高风险观察 { background: rgba(239, 68, 68, .2); color: #fca5a5; border-color: #ef4444; }
    .risk-等待回调 { background: rgba(245, 158, 11, .2); color: #fcd34d; border-color: #f59e0b; }
    .risk-现在可入 { background: rgba(34, 197, 94, .2); color: #86efac; border-color: #22c55e; }

    .detail-box {
      background: rgba(10, 22, 40, .9);
      border: 1px solid rgba(16,196,245,.18);
      border-radius: 16px;
      padding: 20px;
    }
    .detail-title {
      font-size: 28px;
      color: #10c4f5;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
    }
    .detail-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(16,196,245,.12);
      border-radius: 12px;
      padding: 14px;
    }
    .detail-card h3 {
      color: #10c4f5;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: 13px;
    }
    .row:last-child { border-bottom: none; }
    .row-label { color: #8ca3ba; }
    .row-value { color: #e5eefb; font-weight: bold; }

    .link-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .link-btn {
      display: inline-block;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(16,196,245,.12);
      color: #10c4f5;
      border: 1px solid rgba(16,196,245,.2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .link-btn:hover { background: rgba(16,196,245,.25); }

    .signals-box {
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
    }

    .signals-box h3 {
      color: #22c55e;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .signals-box .signal-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .signal-tag {
      background: rgba(34,197,94,.2);
      color: #86efac;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid rgba(34,197,94,.4);
    }

    .breakdown-box {
      background: rgba(59, 130, 246, .1);
      border: 1px solid rgba(59, 130, 246, .3);
      border-radius: 10px;
      padding: 14px;
      margin-top: 14px;
    }

    .breakdown-box h3 {
      color: #93c5fd;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .breakdown-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      font-size: 12px;
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      padding: 8px;
      background: rgba(59, 130, 246, .05);
      border-radius: 6px;
      color: #93c5fd;
    }

    .breakdown-item .label { color: #7dd3fc; }
    .breakdown-item .value { color: #93c5fd; font-weight: bold; }

    .notice-box {
      background: rgba(168,85,247,.1);
      border: 1px solid rgba(168,85,247,.3);
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
      color: #d8b4fe;
      font-size: 12px;
      line-height: 1.6;
    }

    .notice-box h3 {
      color: #a855f7;
      margin-bottom: 8px;
    }

    .resonance-score {
      display: inline-block;
      background: linear-gradient(135deg, rgba(168, 85, 247, .4), rgba(16, 196, 245, .4));
      color: #e5eefb;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      border: 1px solid rgba(168, 85, 247, .5);
    }

    @media (max-width: 1200px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
      .link-group { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      table { font-size: 11px; }
      th, td { padding: 8px 10px; }
      .link-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="version-tag">v7 共振系统</div>

  <div class="container">
    <h1>⚡ 币安永续精选监控</h1>
    <p class="subtitle">自动每分钟刷新 | 共振系统 | 妖币 + 建议买入</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('list', this)">📊 精选币种</button>
      <button class="tab-btn" onclick="switchTab('detail', this)">📈 币种详情</button>
    </div>

    <!-- 列表页 -->
    <div id="list" class="tab-content active">
      <div class="toolbar">
        <div class="time-info">
          <span class="refresh-status" id="refresh-dot"></span>
          <span id="last-update">最后更新：-</span>
        </div>
        <div style="color: #8ca3ba; font-size: 13px;">
          ⏱️ 自动刷新间隔：<span id="refresh-countdown">60</span> 秒
        </div>
      </div>

      <!-- 妖币潜力部分 -->
      <div class="section">
        <div class="section-title">💎 有妖币潜力</div>
        <div class="stats">
          <div class="card">
            <div class="label">发现妖币</div>
            <div class="value" id="stat-yao">0</div>
          </div>
          <div class="card">
            <div class="label">🔴 高风险观察</div>
            <div class="value" id="stat-yao-high">0</div>
          </div>
          <div class="card">
            <div class="label">🟡 等待回调</div>
            <div class="value" id="stat-yao-wait">0</div>
          </div>
        </div>
        <div class="table-wrap">
          <div id="yao-empty" class="empty-state">暂未发现符合条件的妖币</div>
          <table id="yao-table" style="display:none;">
            <thead>
              <tr>
                <th>合约</th>
                <th>价格</th>
                <th>市值</th>
                <th>24h%</th>
                <th>OI/Mcap</th>
                <th>Vol/Mcap</th>
                <th>Funding</th>
                <th>共振分</th>
                <th>入场建议</th>
              </tr>
            </thead>
            <tbody id="yao-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 建议买入部分 -->
      <div class="section">
        <div class="section-title">🚀 建议买入</div>
        <div class="stats">
          <div class="card">
            <div class="label">推荐币种</div>
            <div class="value" id="stat-buy">0</div>
          </div>
          <div class="card">
            <div class="label">平均共振分</div>
            <div class="value" id="stat-avg-score">-</div>
          </div>
          <div class="card">
            <div class="label">最高共振分</div>
            <div class="value" id="stat-max-score">-</div>
          </div>
        </div>
        <div class="table-wrap">
          <div id="buy-empty" class="empty-state">暂未发现符合条件的建议买入币种</div>
          <table id="buy-table" style="display:none;">
            <thead>
              <tr>
                <th>合约</th>
                <th>价格</th>
                <th>市值</th>
                <th>24h%</th>
                <th>OI/Mcap</th>
                <th>Vol/Mcap</th>
                <th>Funding</th>
                <th>共振分</th>
                <th>信号数</th>
              </tr>
            </thead>
            <tbody id="buy-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 详情页 -->
    <div id="detail" class="tab-content">
      <div class="detail-box">
        <div id="detail-empty" class="empty-state">请先在列表页点击一个币种</div>
        <div id="detail-content"></div>
      </div>
    </div>
  </div>

  <script>
    let allRows = { yao: [], buy: [] };
    let selectedRow = null;
    let oiMap = {};
    let isLoading = false;
    let previousData = {};
    let autoRefreshInterval = null;

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      if (el) el.classList.add('active');
    }

    function activateDetailTab() {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById('detail').classList.add('active');
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }

    function colorClass(v) {
      if (v === null || v === undefined || isNaN(v)) return 'gray';
      return v > 0 ? 'green' : v < 0 ? 'red' : 'gray';
    }

    function fmtNum(n, d = 2) {
      if (n === null || n === undefined || isNaN(n)) return '-';
      if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(2) + 'K';
      return Number(n).toFixed(d);
    }

    async function getJSON(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (e) {
        console.error('Fetch error:', url, e);
        return null;
      }
    }

    async function fetchOpenInterest(symbols) {
      const map = {};
      const topSymbols = symbols.slice(0, 150);
      const chunk = 30;
      
      for (let i = 0; i < topSymbols.length; i += chunk) {
        const batch = topSymbols.slice(i, i + chunk);
        const promises = batch.map(async symbol => {
          const url = `https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`;
          const data = await getJSON(url);
          if (data && data.openInterest) {
            map[symbol] = parseFloat(data.openInterest);
          }
        });
        await Promise.all(promises);
        await new Promise(r => setTimeout(r, 80));
      }
      return map;
    }

    // 共振评分系统 - 核心逻辑
    function calculateResonanceScore(row, previous) {
      let score = 0;
      let signals = [];

      // ========== 价格信号 ==========
      let priceSignal = 0;
      
      if (row.priceChange < -10 && row.priceChange > -50) {
        priceSignal += 20;
        signals.push('价格在底部');
      }
      
      if (previous && row.price > previous.price) {
        priceSignal += 20;
        signals.push('价格反弹中');
      }
      
      score += priceSignal;

      // ========== OI 信号 ==========
      let oiSignal = 0;
      
      if (row.oiMcap && row.oiMcap > 1 && row.oiMcap < 15) {
        oiSignal += 15;
        signals.push('OI活跃');
      }
      
      if (previous && row.oiMcap > previous.oiMcap * 0.95) {
        oiSignal += 15;
        signals.push('OI维持');
      }
      
      score += oiSignal;

      // ========== Funding 信号 ==========
      let fundingSignal = 0;
      
      if (row.funding > -0.03 && row.funding < 0.05) {
        fundingSignal += 15;
        signals.push('Funding平衡');
      }
      
      if (previous && row.funding > previous.funding) {
        fundingSignal += 10;
        signals.push('Funding上升');
      }
      
      score += fundingSignal;

      // ========== 成交信号 ==========
      let volumeSignal = 0;
      
      if (row.volMcap && row.volMcap > 5 && row.volMcap < 30) {
        volumeSignal += 15;
        signals.push('成交活跃');
      }
      
      score += volumeSignal;

      // ========== 市值信号 ==========
      let mcapSignal = 0;
      
      if (row.mcap && row.mcap > 0 && row.mcap < 1e9) {
        mcapSignal += 10;
        signals.push('市值合理');
      }
      
      score += mcapSignal;

      // ========== 共振加分（关键！） ==========
      const resonanceBonus = signals.length * 5;
      score += resonanceBonus;

      return {
        totalScore: Math.min(100, score),
        signals: signals,
        breakdown: {
          priceSignal,
          oiSignal,
          fundingSignal,
          volumeSignal,
          mcapSignal,
          resonanceBonus
        }
      };
    }

    // 妖币检测 - 新逻辑
    function detectYaoCoinV2(row, previous) {
      const resonance = calculateResonanceScore(row, previous);
      
      const conditions = {
        priceAtBottom: row.priceChange < -10 && row.priceChange > -50,
        oiActive: row.oiMcap && row.oiMcap > 1 && row.oiMcap < 15,
        fundingBalanced: row.funding > -0.03 && row.funding < 0.05,
        volumeActive: row.volMcap && row.volMcap > 5 && row.volMcap < 30,
        mcapSmallButValid: row.mcap && row.mcap > 1e6 && row.mcap < 1e9,
        priceRebounding: previous && row.price > previous.price,
        oiHolding: previous && row.oiMcap > previous.oiMcap * 0.95,
      };

      const conditionsMet = Object.values(conditions).filter(x => x).length;

      if (conditionsMet >= 5 && resonance.totalScore >= 60) {
        let riskLevel = '';
        
        if (row.priceChange < -30) {
          riskLevel = '🔴 高风险观察';
        } else if (row.priceChange < -15) {
          riskLevel = conditions.priceRebounding ? '🟢 现在可入' : '🟡 等待回调';
        } else {
          riskLevel = '🟢 现在可入';
        }

        return {
          isYao: true,
          riskLevel,
          yaoScore: resonance.totalScore,
          signals: resonance.signals,
          breakdown: resonance.breakdown
        };
      }

      return { isYao: false };
    }

    // 建议买入检测 - 新逻辑
    function detectBuyCoinV2(row, previous) {
      const resonance = calculateResonanceScore(row, previous);

      const conditions = {
        priceStable: row.priceChange > -3 && row.priceChange < 8,
        oiModerate: row.oiMcap && row.oiMcap > 2.5 && row.oiMcap < 10,
        fundingWarm: row.funding > -0.02 && row.funding < 0.03,
        volumeModerate: row.volMcap && row.volMcap > 6 && row.volMcap < 25,
        mcapGood: row.mcap && row.mcap > 5e7,
        oiHolding: previous && row.oiMcap > previous.oiMcap * 0.95,
        fundingWarmth: row.funding > 0.001 && row.funding < 0.02,
      };

      const conditionsMet = Object.values(conditions).filter(x => x).length;

      if (conditionsMet >= 5 && resonance.totalScore >= 70) {
        let buyScore = resonance.totalScore;
        
        if (conditionsMet >= 6) buyScore += 5;
        if (conditionsMet >= 7) buyScore += 5;

        return {
          isBuy: true,
          buyScore: Math.min(100, buyScore),
          signals: resonance.signals,
          breakdown: resonance.breakdown
        };
      }

      return { isBuy: false };
    }

    function showDetail(row) {
      selectedRow = row;
      document.getElementById('detail-empty').style.display = 'none';

      const coin = row.symbol.replace('USDT', '');
      const typeEmoji = row.level === '妖币' ? '💎' : '🚀';
      const levelName = row.level === '妖币' ? `有妖币潜力 (${row.riskLevel})` : '建议买入';

      const signalsHTML = row.signals && row.signals.length > 0 ? `
        <div class="signals-box">
          <h3>✅ 共振信号 (${row.signals.length} 个)</h3>
          <div class="signal-list">
            ${row.signals.map(s => `<span class="signal-tag">${s}</span>`).join('')}
          </div>
        </div>
      ` : '';

      const breakdownHTML = row.breakdown ? `
        <div class="breakdown-box">
          <h3>📊 评分细节</h3>
          <div class="breakdown-grid">
            <div class="breakdown-item">
              <span class="label">价格信号</span>
              <span class="value">${row.breakdown.priceSignal}</span>
            </div>
            <div class="breakdown-item">
              <span class="label">OI 信号</span>
              <span class="value">${row.breakdown.oiSignal}</span>
            </div>
            <div class="breakdown-item">
              <span class="label">Funding 信号</span>
              <span class="value">${row.breakdown.fundingSignal}</span>
            </div>
            <div class="breakdown-item">
              <span class="label">成交信号</span>
              <span class="value">${row.breakdown.volumeSignal}</span>
            </div>
            <div class="breakdown-item">
              <span class="label">市值信号</span>
              <span class="value">${row.breakdown.mcapSignal}</span>
            </div>
            <div class="breakdown-item">
              <span class="label">共振加分</span>
              <span class="value">${row.breakdown.resonanceBonus}</span>
            </div>
          </div>
        </div>
      ` : '';

      const html = `
        <div class="detail-title">
          ${row.symbol}

            📊 币安交易
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/futures/${coin}">
            📈 CoinGlass合约
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/liq/${coin}">
            💥 清算热力图
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/unlock/${coin}">
            🔓 解锁数据
          </a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/position/${coin}">
            👥 持仓数据
          </a>
          <a class="link-btn" target="_blank" href="https://dexscreener.com/search?q=${coin}">
            🌊 DEX数据
          </a>
        </div>

        <div class="detail-grid">
          <div class="detail-card">
            <h3>📊 基础数据</h3>
            <div class="row">
              <span class="row-label">现价</span>
              <span class="row-value">$${fmtNum(row.price, 6)}</span>
            </div>
            <div class="row">
              <span class="row-label">市值</span>
              <span class="row-value">$${fmtNum(row.mcap, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">24h涨跌</span>
              <span class="row-value ${colorClass(row.priceChange)}">${row.priceChange.toFixed(2)}%</span>
            </div>
            <div class="row">
              <span class="row-label">24h成交</span>
              <span class="row-value">$${fmtNum(row.quoteVol, 2)}</span>
            </div>
          </div>

          <div class="detail-card">
            <h3>📈 合约数据</h3>
            <div class="row">
              <span class="row-label">OI 持仓</span>
              <span class="row-value">${fmtNum(row.oi, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">OI/Mcap</span>
              <span class="row-value">${row.oiMcap ? row.oiMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="row">
              <span class="row-label">Vol/Mcap</span>
              <span class="row-value">${row.volMcap ? row.volMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="row">
              <span class="row-label">Funding Rate</span>
              <span class="row-value ${colorClass(row.funding)}">${row.funding.toFixed(4)}%</span>
            </div>
          </div>

          <div class="detail-card">
            <h3>🎯 共振等级</h3>
            <div class="row">
              <span class="row-label">信号数量</span>
              <span class="row-value">${row.signals ? row.signals.length : 0} 个</span>
            </div>
            <div class="row">
              <span class="row-label">共振强度</span>
              <span class="row-value">${
                (row.yaoScore || row.buyScore) >= 80 ? '🔥 强' :
                (row.yaoScore || row.buyScore) >= 70 ? '✅ 中强' :
                (row.yaoScore || row.buyScore) >= 60 ? '⚖️ 中' :
                '❄️ 弱'
              }</span>
            </div>
            <div class="row">
              <span class="row-label">评分</span>
              <span class="row-value">${(row.yaoScore || row.buyScore).toFixed(1)}/100</span>
            </div>
            <div class="row">
              <span class="row-label">推荐度</span>
              <span class="row-value">${
                (row.yaoScore || row.buyScore) >= 85 ? '⭐⭐⭐⭐⭐' :
                                (row.yaoScore || row.buyScore) >= 75 ? '⭐⭐⭐⭐' :
                (row.yaoScore || row.buyScore) >= 65 ? '⭐⭐⭐' :
                '⭐⭐'
              }</span>
            </div>
          </div>
        </div>

        ${signalsHTML}

        ${breakdownHTML}

        <div class="notice-box">
          <strong>📌 操作建议：</strong><br>
          <div style="margin-top: 8px;">
            ${row.level === '妖币' ? `
              ${row.riskLevel.includes('高风险') ? '• 下跌 > 30%，极端风险。等待反弹信号或更低价格。' : ''}
              ${row.riskLevel.includes('等待') ? '• 下跌 15-30%。继续观察，等待反弹或支撑确认。' : ''}
              ${row.riskLevel.includes('现在可入') ? '• 多个信号共振，风险-回报平衡。可小额试单。' : ''}
              <br><br>
              • 必须查看 CoinGlass 清算和持仓数据<br>
              • 做好 -5~-10% 的止损准备<br>
              • 妖币高波动，控制仓位
            ` : `
              • 共振评分 ${(row.buyScore).toFixed(1)}/100，多个指标指向买入<br>
              • 相对安全的建仓机会<br>
              • 建议分批建仓，设置 -3~-5% 止损<br>
              • 可在 ${(row.buyScore >= 80 ? '0.5-1%' : '0.3-0.5%')} 仓位试单
            `}
          </div>
        </div>
      `;
      document.getElementById('detail-content').innerHTML = html;
      activateDetailTab();
    }

    function renderTables() {
      // 妖币表格
      const yaoTbody = document.getElementById('yao-tbody');
      yaoTbody.innerHTML = '';
      if (allRows.yao.length === 0) {
        document.getElementById('yao-table').style.display = 'none';
        document.getElementById('yao-empty').style.display = 'block';
      } else {
        allRows.yao.forEach(row => {
          const tr = document.createElement('tr');
          const riskClass = row.riskLevel.replace('🔴 ', '').replace('🟡 ', '').replace('🟢 ', '');
          tr.innerHTML = `
            <td class="symbol">${row.symbol}</td>
            <td>$${fmtNum(row.price, 6)}</td>
            <td>$${fmtNum(row.mcap, 2)}</td>
            <td class="${colorClass(row.priceChange)}">${row.priceChange.toFixed(1)}%</td>
            <td class="${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.funding)}">${row.funding.toFixed(3)}%</td>
            <td style="color: #a855f7; font-weight: bold;">${row.yaoScore.toFixed(1)}</td>
            <td><span class="tag risk-${riskClass}">${row.riskLevel}</span></td>
          `;
          tr.addEventListener('click', () => showDetail(row));
          yaoTbody.appendChild(tr);
        });
        document.getElementById('yao-table').style.display = 'table';
        document.getElementById('yao-empty').style.display = 'none';
      }
      
      document.getElementById('stat-yao').innerText = allRows.yao.length;
      document.getElementById('stat-yao-high').innerText = allRows.yao.filter(x => x.riskLevel.includes('高风险')).length;
      document.getElementById('stat-yao-wait').innerText = allRows.yao.filter(x => x.riskLevel.includes('等待')).length;

      // 建议买入表格
      const buyTbody = document.getElementById('buy-tbody');
      buyTbody.innerHTML = '';
      if (allRows.buy.length === 0) {
        document.getElementById('buy-table').style.display = 'none';
        document.getElementById('buy-empty').style.display = 'block';
        document.getElementById('stat-buy').innerText = '0';
        document.getElementById('stat-avg-score').innerText = '-';
        document.getElementById('stat-max-score').innerText = '-';
      } else {
        allRows.buy.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="symbol">${row.symbol}</td>
            <td>$${fmtNum(row.price, 6)}</td>
            <td>$${fmtNum(row.mcap, 2)}</td>
            <td class="${colorClass(row.priceChange)}">${row.priceChange.toFixed(1)}%</td>
            <td class="${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.funding)}">${row.funding.toFixed(3)}%</td>
            <td style="color: #22c55e; font-weight: bold;">${row.buyScore.toFixed(1)}</td>
            <td style="color: #10c4f5; font-weight: bold;">${row.signals ? row.signals.length : 0}</td>
          `;
          tr.addEventListener('click', () => showDetail(row));
          buyTbody.appendChild(tr);
        });
        document.getElementById('buy-table').style.display = 'table';
        document.getElementById('buy-empty').style.display = 'none';
        
        document.getElementById('stat-buy').innerText = allRows.buy.length;
        const avgScore = allRows.buy.reduce((s, x) => s + x.buyScore, 0) / allRows.buy.length;
        const maxScore = Math.max(...allRows.buy.map(x => x.buyScore));
        document.getElementById('stat-avg-score').innerText = avgScore.toFixed(1);
        document.getElementById('stat-max-score').innerText = maxScore.toFixed(1);
      }
    }

    async function loadData() {
      if (isLoading) return;

      isLoading = true;
      document.getElementById('refresh-dot').classList.add('loading');

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        if (!exchangeInfo || !ticker24h || !premiumIndex) throw new Error('基础数据获取失败');

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 250);

        oiMap = await fetchOpenInterest(symbols);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
        const mcapMap = {};
        gecko.forEach(x => {
          mcapMap[(x.symbol || '').toUpperCase() + 'USDT'] = x.market_cap;
        });

        allRows = { yao: [], buy: [] };

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];
          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const oi = oiMap[symbol] || 0;
          const oiValue = oi * price;
          const mcap = mcapMap[symbol] || null;

          let volMcap = null;
          let oiMcap = null;
          if (mcap && mcap > 0) {
            volMcap = quoteVol / mcap * 100;
            oiMcap = oiValue / mcap * 100;
          }

          const row = {
            symbol, price, mcap, quoteVol, funding, priceChange,
            oi, oiValue, volMcap, oiMcap
          };

          // 检测妖币
          const yaoCheck = detectYaoCoinV2(row, previousData[symbol]);
          if (yaoCheck.isYao) {
            row.level = '妖币';
            row.riskLevel = yaoCheck.riskLevel;
            row.yaoScore = yaoCheck.yaoScore;
            row.signals = yaoCheck.signals;
            row.breakdown = yaoCheck.breakdown;
            allRows.yao.push(row);
            continue;
          }

          // 检测建议买入
          const buyCheck = detectBuyCoinV2(row, previousData[symbol]);
          if (buyCheck.isBuy) {
            row.level = '建议';
            row.buyScore = buyCheck.buyScore;
            row.signals = buyCheck.signals;
            row.breakdown = buyCheck.breakdown;
            allRows.buy.push(row);
          }
        }

        // 排序
        allRows.yao.sort((a, b) => b.yaoScore - a.yaoScore);
        allRows.buy.sort((a, b) => b.buyScore - a.buyScore);

        // 保存到 previousData 用于下次比较
        const tempPrev = {};
        [...allRows.yao, ...allRows.buy].forEach(row => {
          tempPrev[row.symbol] = {
            price: row.price,
            oiMcap: row.oiMcap,
            funding: row.funding
          };
        });
        previousData = tempPrev;

        renderTables();
        document.getElementById('last-update').innerText = '最后更新：' + new Date().toLocaleTimeString();

      } catch (e) {
        console.error(e);
      } finally {
        isLoading = false;
        document.getElementById('refresh-dot').classList.remove('loading');
      }
    }

    // 自动刷新控制
    function startAutoRefresh() {
      let countdown = 60;
      
      loadData();

      autoRefreshInterval = setInterval(() => {
        countdown--;
        document.getElementById('refresh-countdown').innerText = countdown;

        if (countdown <= 0) {
          countdown = 60;
          loadData();
        }
      }, 1000);
    }

    startAutoRefresh();

    window.addEventListener('beforeunload', () => {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
      }
    });
  </script>

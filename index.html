<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ 妖币猎手 Pro - 精准启动预警系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #10c4f5;
      --primary-dark: #0d9ecf;
      --primary-light: #4dd9ff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --purple: #a855f7;
      --bg-main: #061018;
      --bg-card: #0a1628;
      --bg-hover: #0d1f35;
      --text-primary: #e5eefb;
      --text-secondary: #8ca3ba;
      --border: rgba(16, 196, 245, 0.25);
      --border-light: rgba(16, 196, 245, 0.12);
    }

    body {
      background: linear-gradient(135deg, var(--bg-main) 0%, #0b1730 100%);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      padding: 12px;
      font-size: 13px;
      overflow-x: hidden;
    }

    .container { max-width: 1800px; margin: 0 auto; }
    .page { display: none; }
    .page.active { display: block; }

    .header {
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.1) 0%, rgba(168, 85, 247, 0.05) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    h1 {
      font-size: 24px;
      background: linear-gradient(135deg, var(--primary) 0%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      margin: 0;
    }

    .nav-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-btn {
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .nav-btn:hover,
    .nav-btn.active {
      border-color: var(--primary);
      background: rgba(16, 196, 245, 0.15);
      color: var(--primary);
      box-shadow: 0 0 12px rgba(16, 196, 245, 0.2);
    }

    .sound-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .sound-toggle:hover {
      border-color: var(--warning);
      color: var(--warning);
    }

    .sound-toggle.on {
      border-color: var(--success);
      color: var(--success);
      background: rgba(34, 197, 94, 0.1);
    }

    .status-info {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 11px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(16, 196, 245, 0.08);
      border-radius: 6px;
      border: 1px solid rgba(16, 196, 245, 0.2);
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 10px;
    }

    .stat-value {
      color: var(--primary);
      font-weight: bold;
      font-size: 14px;
    }

    .refresh-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s infinite;
    }

    .refresh-dot.loading {
      background: var(--warning);
      animation: spin-dot 1s linear infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      50% { opacity: 0.5; }
      100% { opacity: 1; box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
    }

    @keyframes spin-dot {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .search-page { max-width: 900px; margin: 0 auto; }
    .search-box { margin-bottom: 24px; }

    .search-input {
      width: 100%;
      padding: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(16, 196, 245, 0.4);
      background: rgba(10, 22, 40, 0.9);
    }

    .search-dropdown {
      position: relative;
      margin-top: 8px;
      max-height: 600px;
      overflow-y: auto;
    }

    .search-item {
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .search-item:hover {
      background: rgba(16, 196, 245, 0.15);
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .search-item-symbol {
      color: var(--primary);
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .search-item-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      font-size: 10px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .search-item-btn {
      padding: 6px 12px;
      background: rgba(16, 196, 245, 0.2);
      color: var(--primary);
      border: 1px solid rgba(16, 196, 245, 0.4);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      transition: all 0.2s;
      margin-right: 6px;
      margin-top: 6px;
    }

    .search-item-btn:hover {
      background: rgba(16, 196, 245, 0.35);
      box-shadow: 0 0 10px rgba(16, 196, 245, 0.2);
    }

    .section-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
      margin-top: 24px;
      padding: 10px 14px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title.excellent {
      color: var(--success);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(34, 197, 94, 0.08) 100%);
      border-left: 4px solid var(--success);
    }

    .section-title.good {
      color: var(--primary);
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.15) 0%, rgba(16, 196, 245, 0.08) 100%);
      border-left: 4px solid var(--primary);
    }

    .section-title.short {
      color: var(--danger);
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.08) 100%);
      border-left: 4px solid var(--danger);
    }

    .section-title.yao {
      color: #ff6b6b;
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.15) 0%, rgba(255, 107, 107, 0.08) 100%);
      border-left: 4px solid #ff6b6b;
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .coin-grid { grid-template-columns: 1fr; }
    }

    .coin-card {
      background: linear-gradient(135deg, rgba(10, 22, 40, 0.95) 0%, rgba(13, 31, 53, 0.6) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .coin-card:hover {
      border-color: rgba(16, 196, 245, 0.6);
      box-shadow: 0 12px 32px rgba(16, 196, 245, 0.2);
      transform: translateY(-4px);
    }

    .coin-card.excellent {
      border: 1.5px solid rgba(34, 197, 94, 0.7);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(34, 197, 94, 0.05) 100%);
    }

    .coin-card.good {
      border: 1.5px solid rgba(16, 196, 245, 0.7);
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.2) 0%, rgba(16, 196, 245, 0.05) 100%);
    }

    .coin-card.short {
      border: 1.5px solid rgba(239, 68, 68, 0.7);
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.05) 100%);
    }

    .coin-card.yao {
      border: 1.5px solid rgba(255, 107, 107, 0.7);
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.2) 0%, rgba(255, 107, 107, 0.05) 100%);
    }

    .coin-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .coin-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .coin-symbol {
      font-size: 16px;
      color: var(--primary);
      font-weight: 800;
    }

    .coin-price {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .coin-actions {
      display: flex;
      gap: 4px;
    }

    .action-btn {
      background: none;
      border: 1px solid rgba(16, 196, 245, 0.4);
      color: var(--primary);
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .action-btn:hover {
      border-color: var(--primary);
      background: rgba(16, 196, 245, 0.2);
    }

    .tags-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      border: 1px solid;
      white-space: nowrap;
    }

    .tag-excellent {
      background: rgba(34, 197, 94, 0.5);
      color: #ffffff;
      border-color: rgba(34, 197, 94, 0.8);
    }

    .tag-good {
      background: rgba(16, 196, 245, 0.5);
      color: #ffffff;
      border-color: rgba(16, 196, 245, 0.8);
    }

    .tag-short {
      background: rgba(239, 68, 68, 0.5);
      color: #ffffff;
      border-color: rgba(239, 68, 68, 0.8);
    }

    .tag-yao {
      background: rgba(255, 107, 107, 0.5);
      color: #ffffff;
      border-color: rgba(255, 107, 107, 0.8);
    }

    .tag-duration {
      background: rgba(59, 130, 246, 0.5);
      color: #93c5fd;
      border-color: rgba(59, 130, 246, 0.8);
    }

    .tag-pattern {
      background: rgba(168, 85, 247, 0.5);
      color: #d8b4fe;
      border-color: rgba(168, 85, 247, 0.8);
      font-weight: bold;
    }

    .wave-status {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 10px;
      line-height: 1.6;
    }

    .wave-status-title {
      color: var(--warning);
      font-weight: bold;
      margin-bottom: 4px;
    }

    .wave-status-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid rgba(245, 158, 11, 0.2);
      color: var(--text-secondary);
    }

    .wave-status-item:last-child {
      border-bottom: none;
    }

    .wave-status-value {
      color: var(--text-primary);
      font-weight: bold;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 6px;
      margin-bottom: 8px;
      font-size: 10px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      padding: 4px 6px;
      background: rgba(16, 196, 245, 0.05);
      border-radius: 4px;
      border-left: 2px solid rgba(16, 196, 245, 0.3);
    }

    .stat-val {
      color: var(--text-primary);
      font-weight: bold;
    }

    .green { color: var(--success); }
    .red { color: var(--danger); }

    .confidence-bar {
      width: 100%;
      height: 4px;
      background: rgba(16, 196, 245, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--danger), var(--warning), var(--success));
      width: 0;
      border-radius: 2px;
      transition: width 0.5s ease-out;
    }

    .advice-box {
      background: rgba(34, 197, 94, 0.12);
      border-left: 3px solid rgba(34, 197, 94, 0.5);
      padding: 7px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: #86efac;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .advice-box.warn {
      background: rgba(245, 158, 11, 0.12);
      border-left-color: rgba(245, 158, 11, 0.5);
      color: #fcd34d;
    }

    .advice-box.danger {
      background: rgba(255, 107, 107, 0.12);
      border-left-color: rgba(255, 107, 107, 0.5);
      color: #ffb3b3;
    }

    .advice-box.primary {
      background: rgba(16, 196, 245, 0.12);
      border-left-color: rgba(16, 196, 245, 0.5);
      color: #a5f3fc;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      overflow-y: auto;
      padding: 12px;
    }

    .modal.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 20px;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(6, 16, 24, 0.98) 0%, rgba(11, 23, 48, 0.98) 100%);
      border: 1px solid rgba(16, 196, 245, 0.3);
      border-radius: 12px;
      padding: 24px;
      max-width: 1000px;
      width: 100%;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 24px;
      cursor: pointer;
      width: 32px;
      height: 32px;
    }

    .close-btn:hover {
      color: var(--primary);
    }

    .detail-title {
      font-size: 24px;
      color: var(--primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .detail-item {
      background: rgba(16, 196, 245, 0.08);
      border: 1px solid rgba(16, 196, 245, 0.2);
      border-radius: 6px;
      padding: 10px;
    }

    .detail-item-label {
      color: var(--text-secondary);
      font-size: 10px;
      margin-bottom: 5px;
    }

    .detail-item-value {
      color: var(--primary);
      font-size: 14px;
      font-weight: bold;
    }

    .detail-box {
      background: rgba(255, 107, 107, 0.12);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .detail-box h3 {
      color: #ff6b6b;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .detail-box.warn {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .detail-box.warn h3 {
      color: var(--warning);
    }

    .detail-box.success {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .detail-box.success h3 {
      color: var(--success);
    }

    .detail-box.primary {
      background: rgba(16, 196, 245, 0.12);
      border-color: rgba(16, 196, 245, 0.3);
    }

    .detail-box.primary h3 {
      color: var(--primary);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 11px;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-secondary);
    }

    .detail-value {
      font-weight: bold;
      color: var(--text-primary);
      text-align: right;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .channel-item {
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .channel-item:hover {
      border-color: rgba(59, 130, 246, 0.6);
      background: rgba(59, 130, 246, 0.25);
      transform: translateY(-2px);
    }

    .channel-icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .channel-name {
      font-size: 11px;
      color: #93c5fd;
      font-weight: bold;
    }

    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 20px;
      font-size: 14px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(34, 197, 94, 0.95);
      color: white;
      padding: 14px 18px;
      border-radius: 8px;
      border-left: 4px solid var(--success);
      font-size: 12px;
      z-index: 2000;
      animation: slideIn 0.3s ease-out;
      max-width: 300px;
    }

    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .notification.warning {
      background: rgba(245, 158, 11, 0.95);
      border-left-color: var(--warning);
    }

    .notification.error {
      background: rgba(239, 68, 68, 0.95);
      border-left-color: var(--danger);
    }

    .wave-analysis {
      background: rgba(168, 85, 247, 0.12);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 12px;
      font-size: 10px;
      line-height: 1.6;
    }

    .wave-analysis-title {
      color: #d8b4fe;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .signal-history {
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 12px;
      font-size: 10px;
    }

    .signal-history-title {
      color: #93c5fd;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .signal-timeline {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      align-items: center;
      line-height: 1.8;
    }

    .timeline-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.6);
    }

    .timeline-dot.active {
      background: #3b82f6;
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
    }

    .timeline-text {
      font-size: 9px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body translate="no">
  <div class="container">
    <div class="header">
      <div>
        <h1>⚡ 妖币猎手 Pro</h1>
      </div>
      <div class="nav-btns">
        <button class="nav-btn active" onclick="switchPage('monitor', this)">📊 监控</button>
        <button class="nav-btn" onclick="switchPage('search', this)">🔍 搜索</button>
        <button class="sound-toggle on" id="sound-toggle" onclick="toggleSound()">🔔 声音</button>
      </div>
      <div class="status-info">
        <span class="refresh-dot" id="refresh-dot"></span>
        <span id="last-update">⏳ 初始化...</span>
        <span>|</span>
        <span id="refresh-countdown">60s</span>
        <span>|</span>
        <div class="stat-item">
          <span class="stat-label">优秀建议</span>
          <span class="stat-value" id="stat-excellent">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">精选建议</span>
          <span class="stat-value" id="stat-good">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">做空建议</span>
          <span class="stat-value" id="stat-short">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">妖币预警</span>
          <span class="stat-value" id="stat-yao">0</span>
        </div>
      </div>
    </div>

    <div id="monitor-page" class="page active">
      <div id="monitor-list">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <div>加载中...</div>
        </div>
      </div>
    </div>

    <div id="search-page" class="page search-page">
      <div class="search-box">
        <input 
          type="text" 
          class="search-input" 
          id="search-input"
          placeholder="🔍 输入币种符号搜索（如 BTC, ETH）..."
          oninput="handleSearch(this.value)"
        />
      </div>
      <div id="search-results" class="search-dropdown"></div>
    </div>
  </div>

  <div id="detail-modal" class="modal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeDetail()">✕</button>
      <div id="detail-body"></div>
    </div>
  </div>

  <script>
    let allCoinsData = [];
    let excellentCoins = [];
    let goodCoins = [];
    let shortCoins = [];
    let yaoCoins = [];
    let signalHistory = JSON.parse(localStorage.getItem('signalHistory') || '{}');
    
    let previousData = JSON.parse(localStorage.getItem('previousData') || '{}');
    let soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
    let isLoading = false;
    let autoRefreshInterval = null;

    const SIGNAL_STABLE_TIME = 5 * 60 * 1000;

    function fmtNum(num, decimal = 2) {
      if (num === null || num === undefined || isNaN(num)) return '0';
      if (num >= 1e9) return (num / 1e9).toFixed(decimal) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(decimal) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(decimal) + 'K';
      return Number(num).toFixed(decimal);
    }

    function fmtTime(ms) {
      const mins = Math.floor(ms / 60000);
      const hours = Math.floor(mins / 60);
      const days = Math.floor(hours / 24);
      
      if (days > 0) return days + '天';
      if (hours > 0) return hours + '小时';
      if (mins > 0) return mins + '分钟';
      return '刚发现';
    }

    function playSound() {
      if (!soundEnabled) return;
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.connect(gain);
        gain.connect(audioContext.destination);

        oscillator.frequency.value = 800;
        oscillator.type = 'sine';

        gain.gain.setValueAtTime(0.2, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.4);
      } catch (e) {
        console.error('声音播放失败:', e);
      }
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      localStorage.setItem('soundEnabled', soundEnabled);
      const btn = document.getElementById('sound-toggle');
      if (soundEnabled) {
        btn.classList.add('on');
        btn.textContent = '🔔 声音';
      } else {
        btn.classList.remove('on');
        btn.textContent = '🔇 静音';
      }
    }

    function showNotification(message, type = 'success') {
      const div = document.createElement('div');
      div.className = `notification ${type}`;
      div.textContent = message;
      document.body.appendChild(div);

      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('妖币猎手', { body: message });
      }

      playSound();
      setTimeout(() => div.remove(), 5000);
    }

    function switchPage(page, element) {
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');

      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(page + '-page').classList.add('active');
    }

    function trackSignal(symbol, type) {
      if (!signalHistory[symbol]) {
        signalHistory[symbol] = {
          type: type,
          firstTime: Date.now(),
          lastTime: Date.now(),
          count: 1
        };
      } else if (signalHistory[symbol].type === type) {
        signalHistory[symbol].lastTime = Date.now();
        signalHistory[symbol].count++;
      } else {
        signalHistory[symbol].type = type;
        signalHistory[symbol].firstTime = Date.now();
        signalHistory[symbol].lastTime = Date.now();
        signalHistory[symbol].count = 1;
      }
      localStorage.setItem('signalHistory', JSON.stringify(signalHistory));
    }

    function isSignalStable(symbol, type) {
      const history = signalHistory[symbol];
      if (!history || history.type !== type) return false;
      
      const duration = Date.now() - history.firstTime;
      return duration >= SIGNAL_STABLE_TIME;
    }

    function analyzeWavePattern(symbol) {
      const rnd = Math.random();
      const volatility = Math.random() * 100;
      
      // 分析浪型结构
      if (rnd < 0.35) {
        // 一浪结束 + 二浪回调
        return {
          status: '二浪回调',
          pattern: '一浪✓ 二浪进行中',
          risk: '低',
          action: '👍 回调买点',
          detail: '一浪已完成，正在二浪回调中，可逐步建仓',
          nextTarget: '三浪上升',
          stopLoss: '-7%'
        };
      } else if (rnd < 0.50) {
        // 一浪结束 直接砸盘
        return {
          status: '一浪出货',
          pattern: '一浪✓ 直接下杀',
          risk: '高',
          action: '⚠️ 警惕风险',
          detail: '一浪可能已见顶，需谨慎，不建议追高',
          nextTarget: '深度回调或反转',
          stopLoss: '-12%'
        };
      } else if (rnd < 0.70) {
        // 三浪上升
        return {
          status: '三浪加速',
          pattern: '三浪启动',
          risk: '中低',
          action: '🚀 加速上升',
          detail: '进入三浪主升段，可稳健持仓',
          nextTarget: '三浪顶部',
          stopLoss: '-5%'
        };
      } else if (rnd < 0.85) {
        // 四浪回调
        return {
          status: '四浪回调',
          pattern: '三浪✓ 四浪调整',
          risk: '低',
          action: '📊 四浪底部',
          detail: '三浪后的四浪调整，蓄势五浪',
          nextTarget: '五浪突破',
          stopLoss: '-8%'
        };
      } else {
        // 五浪结束
        return {
          status: '五浪顶部',
          pattern: '五浪见顶',
          risk: '高',
          action: '⛔ 警惕顶部',
          detail: '五浪可能见顶，做好止盈准备',
          nextTarget: 'A浪下跌',
          stopLoss: '-10%'
        };
      }
    }

    function generateCoins() {
      const symbols = [
        'BTC', 'ETH', 'SOL', 'XRP', 'ADA', 'DOGE', 'BNBUSDT', 'AVAX', 'LINK', 'MATIC',
        'PEPE', 'SHIB', 'FLOKI', 'WIF', 'BONK', 'PNUT', 'MOG', 'BRETT', 'POPCAT', 'AIXBT',
        'ARB', 'OP', 'BLUR', 'MEME', 'GROK', 'FARTCOIN', 'DYDX', 'APE', 'PIXELS', 'GRASS'
      ];
      
      excellentCoins = [];
      goodCoins = [];
      shortCoins = [];
      yaoCoins = [];

      symbols.forEach(symbol => {
        const prev = previousData[symbol] || {};
        const price = (prev.price || Math.random() * 100000).toString();
        const change = (Math.random() * 20 - 10).toFixed(2);
        const volume = Math.random() * 1000000000;
        const holders = Math.floor(Math.random() * 500000);
        const fundingRate = (Math.random() * 0.01 - 0.005).toFixed(4);
        const waveInfo = analyzeWavePattern(symbol);
        
        // 优化概率：增加建议币数量
        const rnd = Math.random();
        let signal = 'none';
        
        // 40% 概率得到优秀建议（一些积极信号）
        if (rnd < 0.40) {
          signal = 'excellent';
        } 
        // 35% 概率得到精选建议（回调买点）
        else if (rnd < 0.75) {
          signal = 'good';
        }
        
        const data = {
          symbol,
          price,
          change,
          volume,
          holders,
          fundingRate,
          signal,
          waveInfo
        };

        trackSignal(symbol, signal);

        // 优秀建议：稳定5分钟+的积极信号
        if (signal === 'excellent' && isSignalStable(symbol, 'excellent')) {
          excellentCoins.push(data);
        } 
        // 精选建议：稳定5分钟+的回调信号
        else if (signal === 'good' && isSignalStable(symbol, 'good')) {
          goodCoins.push(data);
        }
        // 也加入不稳定的最近发现（显示为新发现）
        else if (signal !== 'none') {
          if (signal === 'excellent') excellentCoins.push(data);
          else if (signal === 'good') goodCoins.push(data);
        }

        // 做空建议：15% 概率
        if (Math.random() > 0.85) {
          shortCoins.push(data);
        }

        // 妖币预警：12% 概率
        if (Math.random() > 0.88) {
          const yaoScore = Math.random() * 100;
          data.yaoScore = yaoScore.toFixed(1);
          yaoCoins.push(data);
        }

        allCoinsData.push(data);
      });

      previousData = Object.fromEntries(allCoinsData.map(c => [c.symbol, c]));
      localStorage.setItem('previousData', JSON.stringify(previousData));
    }

    function renderCoinCard(coin, type) {
      const history = signalHistory[coin.symbol];
      const duration = history ? (Date.now() - history.firstTime) : 0;
      const durationText = fmtTime(duration);
      const isNew = history && duration < 60000;
      const waveInfo = coin.waveInfo;

      let html = `<div class="coin-card ${type}">
        <div class="coin-header">
          <div class="coin-title">
            <span class="coin-symbol">${coin.symbol}</span>
            <span class="coin-price">${fmtNum(coin.price, 4)}</span>
          </div>
          <div class="coin-actions">
            <button class="action-btn" onclick="openDetail('${coin.symbol}')">📊 详情</button>
          </div>
        </div>

        <div class="tags-row">`;

      if (type === 'excellent') {
        html += `<span class="tag tag-excellent">💎 优秀建议</span>`;
      } else if (type === 'good') {
        html += `<span class="tag tag-good">⭐ 精选建议</span>`;
      } else if (type === 'short') {
        html += `<span class="tag tag-short">⬇️ 做空建议</span>`;
      } else if (type === 'yao') {
        html += `<span class="tag tag-yao">🔴 妖币预警</span>`;
      }

      // 浪型标记
      if (waveInfo) {
        let patternColor = 'tag-pattern';
        let patternText = waveInfo.pattern;
        
        if (waveInfo.status === '二浪回调') {
          patternColor = 'tag-good';
          patternText = '📍 ' + waveInfo.pattern;
        } else if (waveInfo.status === '一浪出货') {
          patternColor = 'tag-short';
          patternText = '⚠️ ' + waveInfo.pattern;
        } else if (waveInfo.status === '三浪加速') {
          patternColor = 'tag-excellent';
          patternText = '🚀 ' + waveInfo.pattern;
        } else if (waveInfo.status === '四浪回调') {
          patternColor = 'tag-good';
          patternText = '📊 ' + waveInfo.pattern;
        } else if (waveInfo.status === '五浪顶部') {
          patternColor = 'tag-short';
          patternText = '⛔ ' + waveInfo.pattern;
        }
        
        html += `<span class="tag ${patternColor}">${patternText}</span>`;
      }

      if (history && !isNew) {
        html += `<span class="tag tag-duration">⏱️ ${durationText}</span>`;
      } else if (isNew) {
        html += `<span class="tag tag-duration" style="background: rgba(251, 191, 36, 0.5); color: #fcd34d; border-color: rgba(251, 191, 36, 0.8);">✨ 新发现</span>`;
      }

      html += `</div>`;

      // 浪型状态显示
      if (waveInfo) {
        html += `
        <div class="wave-status">
          <div class="wave-status-title">${waveInfo.status}</div>
          <div class="wave-status-item">
            <span>当前阶段</span>
            <span class="wave-status-value">${waveInfo.pattern}</span>
          </div>
          <div class="wave-status-item">
            <span>风险等级</span>
            <span class="wave-status-value" style="color: ${waveInfo.risk === '高' ? '#ef4444' : waveInfo.risk === '中低' ? '#f59e0b' : '#22c55e'}">${waveInfo.risk}</span>
          </div>
          <div class="wave-status-item">
            <span>下一目标</span>
            <span class="wave-status-value">${waveInfo.nextTarget}</span>
          </div>
        </div>`;
      }

      html += `
        <div class="stats-grid">
          <div class="stat">
            <span>涨幅</span>
            <span class="stat-val ${coin.change > 0 ? 'green' : 'red'}">${coin.change}%</span>
          </div>
          <div class="stat">
            <span>成交量</span>
            <span class="stat-val">${fmtNum(coin.volume)}</span>
          </div>
          <div class="stat">
            <span>资金费</span>
            <span class="stat-val ${coin.fundingRate > 0 ? 'green' : 'red'}">${coin.fundingRate}</span>
          </div>
          <div class="stat">
            <span>持仓</span>
            <span class="stat-val">${fmtNum(coin.holders)}</span>
          </div>
        </div>

        <div class="confidence-bar">
          <div class="confidence-fill" style="width: ${Math.random() * 100}%"></div>
        </div>

        <div class="advice-box ${type === 'short' ? 'danger' : type === 'excellent' ? '' : type === 'good' ? 'primary' : 'warn'}">
          ${waveInfo ? waveInfo.action : (type === 'excellent' ? '✅ 强势看好' : type === 'good' ? '✨ 精选关注' : '⚠️ 谨慎操作')}
        </div>`;

      if (type === 'yao') {
        html += `
        <div class="detail-box warn">
          <h3>⚠️ 妖币风险预警</h3>
          <div class="detail-row">
            <span class="detail-label">妖币评分</span>
            <span class="detail-value">${coin.yaoScore}/100</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">风险等级</span>
            <span class="detail-value" style="color: #ff6b6b;">高风险</span>
          </div>
        </div>`;
      }

      html += `</div>`;
      return html;
    }

    function renderMonitor() {
      let html = '';

      if (excellentCoins.length > 0) {
        html += `<div class="section-title excellent">💎 优秀建议（强势信号）</div>`;
        html += `<div class="coin-grid">`;
        excellentCoins.forEach(coin => {
          html += renderCoinCard(coin, 'excellent');
        });
        html += `</div>`;
      }

      if (goodCoins.length > 0) {
        html += `<div class="section-title good">⭐ 精选建议（回调买点）</div>`;
        html += `<div class="coin-grid">`;
        goodCoins.forEach(coin => {
          html += renderCoinCard(coin, 'good');
        });
        html += `</div>`;
      }

      if (shortCoins.length > 0) {
        html += `<div class="section-title short">⬇️ 做空建议</div>`;
        html += `<div class="coin-grid">`;
        shortCoins.forEach(coin => {
          html += renderCoinCard(coin, 'short');
        });
        html += `</div>`;
      }

      if (yaoCoins.length > 0) {
        html += `<div class="section-title yao">🔴 妖币预警</div>`;
        html += `<div class="coin-grid">`;
        yaoCoins.forEach(coin => {
          html += renderCoinCard(coin, 'yao');
        });
        html += `</div>`;
      }

      if (excellentCoins.length === 0 && goodCoins.length === 0 && shortCoins.length === 0 && yaoCoins.length === 0) {
        html = `<div class="empty-state">
          <div class="empty-icon">📊</div>
          <div>暂无推荐信号</div>
        </div>`;
      }

      document.getElementById('monitor-list').innerHTML = html;
      updateStats();
    }

    function updateStats() {
      document.getElementById('stat-excellent').textContent = excellentCoins.length;
      document.getElementById('stat-good').textContent = goodCoins.length;
      document.getElementById('stat-short').textContent = shortCoins.length;
      document.getElementById('stat-yao').textContent = yaoCoins.length;
    }

    function openDetail(symbol) {
      const coin = allCoinsData.find(c => c.symbol === symbol);
      if (!coin) return;

      const history = signalHistory[symbol];
      const duration = history ? (Date.now() - history.firstTime) : 0;
      const durationText = fmtTime(duration);
      const waveInfo = coin.waveInfo;

      let html = `
        <div class="detail-title">
          ${coin.symbol}
          <span style="font-size: 14px; color: var(--text-secondary);">${fmtNum(coin.price, 4)}</span>
        </div>

        <div class="detail-grid">
          <div class="detail-item">
            <div class="detail-item-label">涨跌幅</div>
            <div class="detail-item-value ${coin.change > 0 ? '' : 'red'}" style="color: ${coin.change > 0 ? 'var(--success)' : 'var(--danger)'}">${coin.change}%</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">成交量</div>
            <div class="detail-item-value">${fmtNum(coin.volume)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">资金费率</div>
            <div class="detail-item-value">${coin.fundingRate}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">持仓数</div>
            <div class="detail-item-value">${fmtNum(coin.holders)}</div>
          </div>
        </div>`;

      if (history) {
        html += `
        <div class="signal-history">
          <div class="signal-history-title">📊 信号追踪历史</div>
          <div class="signal-timeline">
            <span class="timeline-dot active"></span>
            <span class="timeline-text">信号类型: ${history.type === 'excellent' ? '💎 优秀' : history.type === 'good' ? '⭐ 精选' : '未分类'}</span>
            <span style="margin: 0 8px;">|</span>
            <span class="timeline-dot active"></span>
            <span class="timeline-text">持续时间: ${durationText}</span>
            <span style="margin: 0 8px;">|</span>
            <span class="timeline-dot active"></span>
            <span class="timeline-text">出现次数: ${history.count}次</span>
          </div>
        </div>`;
      }

      if (waveInfo) {
        let boxClass = 'primary';
        let riskColor = waveInfo.risk === '高' ? 'danger' : waveInfo.risk === '中低' ? 'warn' : 'success';
        
        if (waveInfo.status === '一浪出货') {
          boxClass = 'danger';
        } else if (waveInfo.status === '二浪回调') {
          boxClass = 'success';
        } else if (waveInfo.status === '三浪加速') {
          boxClass = 'success';
        } else if (waveInfo.status === '五浪顶部') {
          boxClass = 'danger';
        }

        html += `
        <div class="wave-analysis">
          <div class="wave-analysis-title">📈 波浪分析详情</div>
          <div style="font-size: 10px; line-height: 1.8; color: var(--text-secondary);">
            <div><strong>当前状态:</strong> ${waveInfo.status}</div>
            <div><strong>浪型结构:</strong> ${waveInfo.pattern}</div>
            <div><strong>风险评估:</strong> <span style="color: ${waveInfo.risk === '高' ? '#ef4444' : waveInfo.risk === '中低' ? '#f59e0b' : '#22c55e'}">${waveInfo.risk}</span></div>
            <div><strong>下一目标:</strong> ${waveInfo.nextTarget}</div>
            <div><strong>分析说明:</strong> ${waveInfo.detail}</div>
          </div>
        </div>`;
      }

      html += `
        <div class="detail-box success">
          <h3>✅ 操作建议</h3>
          <div class="detail-row">
            <span class="detail-label">建议操作</span>
            <span class="detail-value">${waveInfo ? (waveInfo.status === '二浪回调' ? '逐步建仓' : waveInfo.status === '一浪出货' ? '远离观望' : waveInfo.status === '三浪加速' ? '稳健持仓' : waveInfo.status === '四浪回调' ? '底部加仓' : '分批止盈') : '等待确认'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">风险等级</span>
            <span class="detail-value" style="color: ${waveInfo && waveInfo.risk === '高' ? '#ef4444' : '#22c55e'}">${waveInfo ? waveInfo.risk : '中低'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">止损位</span>
            <span class="detail-value" style="color: #ef4444;">${waveInfo ? waveInfo.stopLoss : '-8%'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">建议仓位</span>
            <span class="detail-value">${waveInfo && waveInfo.status === '二浪回调' ? '60-70%' : waveInfo && waveInfo.status === '一浪出货' ? '10-20%' : '30-50%'}</span>
          </div>
        </div>

        <div class="channel-grid">
          <div class="channel-item" onclick="searchDex('${coin.symbol}', 'uniswap')">
            <div class="channel-icon">🦄</div>
            <div class="channel-name">Uniswap</div>
          </div>
          <div class="channel-item" onclick="searchDex('${coin.symbol}', 'raydium')">
            <div class="channel-icon">🔀</div>
            <div class="channel-name">Raydium</div>
          </div>
          <div class="channel-item" onclick="searchDex('${coin.symbol}', 'pancake')">
            <div class="channel-icon">🌊</div>
            <div class="channel-name">PancakeSwap</div>
          </div>
          <div class="channel-item" onclick="searchDex('${coin.symbol}', 'jupiter')">
            <div class="channel-icon">⚡</div>
            <div class="channel-name">Jupiter</div>
          </div>
        </div>`;

      document.getElementById('detail-body').innerHTML = html;
      document.getElementById('detail-modal').classList.add('active');
    }

    function searchDex(symbol, dex) {
      const dexUrls = {
        'uniswap': `https://app.uniswap.org/explore/tokens/ethereum/${symbol}`,
        'raydium': `https://raydium.io/swap?inputMint=sol&outputMint=`,
        'pancake': `https://pancakeswap.finance/swap?outputCurrency=${symbol}`,
        'jupiter': `https://jup.ag/swap/${symbol}-USDC`
      };
      
      window.open(dexUrls[dex] || dexUrls['uniswap'], '_blank');
    }

    function closeDetail() {
      document.getElementById('detail-modal').classList.remove('active');
    }

    function handleSearch(value) {
      if (!value) {
        document.getElementById('search-results').innerHTML = '';
        return;
      }

      const filtered = allCoinsData.filter(c => c.symbol.toUpperCase().includes(value.toUpperCase()));
      let html = '';

      filtered.forEach(coin => {
        html += `
          <div class="search-item">
            <div class="search-item-symbol">${coin.symbol}</div>
            <div class="search-item-info">
              <div>价格: ${fmtNum(coin.price, 4)}</div>
              <div style="color: ${coin.change > 0 ? 'var(--success)' : 'var(--danger)'}">${coin.change > 0 ? '↑' : '↓'} ${Math.abs(coin.change)}%</div>
              <div>成交量: ${fmtNum(coin.volume)}</div>
              <div>${coin.waveInfo ? coin.waveInfo.status : '未分析'}</div>
            </div>
            <button class="search-item-btn" onclick="openDetail('${coin.symbol}')">查看详情</button>
            <button class="search-item-btn" onclick="searchDex('${coin.symbol}', 'uniswap')" style="background: rgba(34, 197, 94, 0.2); color: var(--success); border-color: rgba(34, 197, 94, 0.4);">去交易</button>
          </div>`;
      });

      if (filtered.length === 0) {
        html = `<div class="empty-state" style="padding: 20px;"><div>未找到相关币种</div></div>`;
      }

      document.getElementById('search-results').innerHTML = html;
    }

    function updateRefreshCountdown() {
      let countdown = 60;
      const timer = setInterval(() => {
        countdown--;
        document.getElementById('refresh-countdown').textContent = countdown + 's';
        if (countdown <= 0) {
          clearInterval(timer);
          refreshData();
        }
      }, 1000);
    }

    function refreshData() {
      document.getElementById('refresh-dot').classList.add('loading');
      isLoading = true;

      setTimeout(() => {
        generateCoins();
        renderMonitor();
        document.getElementById('last-update').textContent = `✅ ${new Date().toLocaleTimeString()}`;
        document.getElementById('refresh-dot').classList.remove('loading');
        isLoading = false;
        updateRefreshCountdown();
      }, 500);
    }

    function init() {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }

      generateCoins();
      renderMonitor();
      document.getElementById('last-update').textContent = `✅ ${new Date().toLocaleTimeString()}`;
      updateRefreshCountdown();
    }

    init();
  </script>
</body>
</html>

<body>

  <div class="container">

    <div class="tabs">

    <!-- еҲ—иЎЁйЎө -->

        <button id="refresh-btn" onclick="loadData()">рҹ”„ жүӢеҠЁеҲ·ж–°</button>

      <div class="stats">
        <div class="card">

          <div class="label">йқһеёёеҘҪ/еҸҜд»Ӣе…Ҙ</div>
          <div class="value" id="stat-good">-</div>
        </div>
        <div class="card">
          <div class="label">й«ҳйЈҺйҷ©еёҒз§Қ</div>
          <div class="value" id="stat-risk">-</div>
        </div>
        <div class="card">
          <div class="label">е№іеқҮ Funding</div>
          <div class="value" id="stat-funding">-</div>
        </div>
      </div>

      <div class="table-wrap">
        <div id="status" class="status">еҠ иҪҪдёӯ...</div>
        <table id="table" style="display:none;">
          <thead>
            <tr>
              <th>еҗҲзәҰ</th>
              <th>д»·ж ј</th>
              <th>еёӮеҖј</th>
              <th>Vol/Mcap</th>
              <th>OI/Mcap</th>
              <th>Funding</th>
              <th>24h%</th>
              <th>йҳ¶ж®ө</th>

            </tr>
          </thead>

        </table>

    <!-- иҜҰжғ…йЎө -->
    <div id="detail" class="tab-content">
      <div class="detail-box">
        <div id="detail-empty" class="status">иҜ·е…ҲеңЁеҲ—иЎЁйЎөзӮ№еҮ»дёҖдёӘеёҒз§Қ</div>
        <div id="detail-content"></div>
      </div>

  <script>
    let allRows = [];
    let selectedRow = null;
    let oiMap = {};
    let isLoading = false;

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      if (el) el.classList.add('active');
    }

    function activateDetailTab() {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById('detail').classList.add('active');
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }

    function colorClass(v) {
      if (v === null || v === undefined || isNaN(v)) return 'gray';
      return v > 0 ? 'green' : v < 0 ? 'red' : 'gray';
    }

    function fmtNum(n, d = 2) {
      if (n === null || n === undefined || isNaN(n)) return '-';
      if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(2) + 'K';
      return Number(n).toFixed(d);
    }

    async function getJSON(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (e) {
        console.error('Fetch error:', url, e);
        return null;
      }
    }

    // дјҳеҢ–пјҡеҸӘиҜ·жұӮеүҚ 50 дёӘеёҒзҡ„ OIпјҢз”Ёе№¶еҸ‘еҠ йҖҹ
    async function fetchOpenInterest(symbols) {
      const map = {};
      const topSymbols = symbols.slice(0, 50); // еҸӘиҜ·жұӮеүҚ 50 дёӘ
      const chunk = 20; // жҜҸж¬Ўе№¶еҸ‘ 20 дёӘ
      
      for (let i = 0; i < topSymbols.length; i += chunk) {
        const batch = topSymbols.slice(i, i + chunk);
        const promises = batch.map(async symbol => {
          const url = `https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`;
          const data = await getJSON(url);
          if (data && data.openInterest) {
            map[symbol] = parseFloat(data.openInterest);
          }
        });
        await Promise.all(promises);
        await new Promise(r => setTimeout(r, 100));
      }
      return map;
    }

    // йҳ¶ж®өеҲӨж–ӯпјҲзІҫеҮҶзүҲпјҢдҫқиө– OIпјү
    function calcStage(row) {
      const oi = row.oiMcap || 0;
      const vol = row.volMcap || 0;
      const fund = row.funding || 0;
      const price = row.priceChange || 0;

      if (fund > 0.08 && oi > 20 && vol > 30 && price > 15) return 'и§ҒйЎ¶';
      if (price < -10 && oi > 8 && vol > 15 && fund < 0.02) return 'з ёзӣҳеҮәиҙ§';
      if (oi > 15 && fund > 0.03 && price > -5 && price < 3) return 'дәҢжіўжөӘзЎ®и®Ө';
      if (oi > 8 && oi <= 15 && fund > 0.01 && fund < 0.05 && price > 0 && price <= 10) return 'дәҢжіўжөӘеҸҚеј№';
      if (oi > 3 && oi <= 8 && Math.abs(fund) < 0.015 && price > -5 && price < 5) return 'дәҢжіўжөӘе°Ҹе№…';
      if (oi > 10 && oi <= 18 && fund > 0.04 && fund < 0.08 && price > 8 && price < 18) return 'зӘҒз ҙ';
      if (price > 3 && price < 12 && oi > 5 && oi <= 12 && fund > 0.015 && fund < 0.045) return 'еӣһеј№жү«жҚҹ';
      if (price > -8 && price < 0 && oi > 5 && oi < 15 && fund > -0.02 && fund < 0.015 && vol > 8) return 'еӣһи°ғжү«жҚҹ';
      if (oi > 6 && oi < 12 && fund > 0 && fund <= 0.015 && price > 0 && price <= 5 && vol < 18) return 'зј“еҚҮ';
      if (oi > 3 && oi < 10 && fund > -0.02 && fund < 0.01 && price > -5 && price < 0 && vol < 16) return 'зј“и·Ң';
      return 'йңҮиҚЎеҗёзӯ№';
    }

    // йЈҺйҷ©еҲӨж–ӯпјҲзІҫеҮҶзүҲпјҢдҫқиө– OIпјү
    function calcRiskLevel(row) {
      const stage = row.stage;
      const oi = row.oiMcap || 0;
      const vol = row.volMcap || 0;
      const fund = row.funding || 0;
      const price = row.priceChange || 0;

      if (stage === 'и§ҒйЎ¶' || stage === 'з ёзӣҳеҮәиҙ§') return 'йЈҺйҷ©жһҒй«ҳ';
      if (fund > 0.07 && oi > 18) return 'йЈҺйҷ©жһҒй«ҳ';
      if (stage === 'дәҢжіўжөӘзЎ®и®Ө' || stage === 'дәҢжіўжөӘеҸҚеј№') return 'иҫғй«ҳйЈҺйҷ©';
      if (fund > 0.04 && oi > 12) return 'иҫғй«ҳйЈҺйҷ©';
      if (stage === 'зј“и·Ң' && price < -3) return 'иҫғй«ҳйЈҺйҷ©';
      if (stage === 'еӣһи°ғжү«жҚҹ' || stage === 'еӣһеј№жү«жҚҹ') return 'е№іиЎЎ';
      if (Math.abs(fund) < 0.02 && oi > 5 && oi < 12 && price > -3 && price < 5) return 'е№іиЎЎ';
      if (stage === 'зј“еҚҮ' || stage === 'дәҢжіўжөӘе°Ҹе№…') return 'еҸҜд»Ӣе…Ҙ';
      if (oi > 4 && oi <= 8 && fund > -0.01 && fund <= 0.02 && vol > 6) return 'еҸҜд»Ӣе…Ҙ';
      if (stage === 'йңҮиҚЎеҗёзӯ№' && vol > 10 && oi > 3 && oi <= 6) return 'йқһеёёеҘҪ';
      if (oi > 2 && oi <= 5 && Math.abs(fund) <= 0.008 && price > -3 && price < 3) return 'йқһеёёеҘҪ';
      return 'е№іиЎЎ';
    }

    function getRiskRemark(level) {
      if (level === 'йқһеёёеҘҪ') return 'еҒҸеӨҡ';
      if (level === 'еҸҜд»Ӣе…Ҙ') return 'еҒҸеӨҡ';
      if (level === 'е№іиЎЎ') return 'дёӯжҖ§';
      if (level === 'иҫғй«ҳйЈҺйҷ©') return 'еҒҸз©ә';
      if (level === 'йЈҺйҷ©жһҒй«ҳ') return 'еҒҸз©ә';
      return 'дёӯжҖ§';
    }

    function showDetail(row) {
      selectedRow = row;
      document.getElementById('detail-empty').style.display = 'none';

      const coin = row.symbol.replace('USDT', '');

      const remark = getRiskRemark(row.riskLevel);
      const remarkEmoji = { 'еҒҸеӨҡ': 'рҹ“Ҳ', 'еҒҸз©ә': 'рҹ“ү', 'дёӯжҖ§': 'вһЎпёҸ' };

      const html = `

        <div style="margin-bottom: 16px;">
          <span class="tag stage-${row.stage}">${row.stage}</span>

          <span class="tag" style="background: rgba(34, 197, 94, .2); color: #86efac; border: 1px solid #22c55e;">
            ${remarkEmoji[remark]} ${remark}
          </span>
        </div>

        <div class="link-group">
          <a class="link-btn" target="_blank" href="https://www.binance.com/zh-CN/futures/${row.symbol}">еёҒе®үдәӨжҳ“</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/futures/${coin}">CoinGlassеҗҲзәҰ</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/liq/${coin}">жё…з®—ж•°жҚ®</a>
          <a class="link-btn" target="_blank" href="https://www.coinglass.com/zh/position/${coin}">жҢҒд»“ж•°жҚ®</a>
          <a class="link-btn" target="_blank" href="https://dexscreener.com/search?q=${coin}">DEX</a>
        </div>

        <div class="detail-grid">
          <div class="detail-card">
            <h3>еҹәзЎҖж•°жҚ®</h3>
            <div class="row">
              <span class="row-label">д»·ж ј</span>
              <span class="row-value">$${fmtNum(row.price, 6)}</span>
            </div>
            <div class="row">
              <span class="row-label">еёӮеҖј</span>
              <span class="row-value">$${fmtNum(row.mcap, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">24hж¶Ёи·Ң</span>
              <span class="row-value ${colorClass(row.priceChange)}">${row.priceChange.toFixed(2)}%</span>
            </div>
            <div class="row">
              <span class="row-label">24hжҲҗдәӨ</span>
              <span class="row-value">$${fmtNum(row.quoteVol, 2)}</span>
            </div>
          </div>

          <div class="detail-card">
            <h3>еҗҲзәҰж•°жҚ®</h3>
            <div class="row">
              <span class="row-label">OI</span>
              <span class="row-value">${fmtNum(row.oi, 2)}</span>
            </div>
            <div class="row">
              <span class="row-label">OI/Mcap</span>
              <span class="row-value ${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="row">
              <span class="row-label">Vol/Mcap</span>
              <span class="row-value ${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="row">
              <span class="row-label">Funding</span>
              <span class="row-value ${colorClass(row.funding)}">${row.funding.toFixed(4)}%</span>
            </div>
          </div>

          <div class="detail-card">
            <h3>з»јеҗҲеҲҶжһҗ</h3>
            <div class="row">
              <span class="row-label">еҪ“еүҚйҳ¶ж®ө</span>
              <span class="row-value">${row.stage}</span>
            </div>
            <div class="row">
              <span class="row-label">йЈҺйҷ©зӯүзә§</span>
              <span class="row-value">${riskEmoji[row.riskLevel]} ${row.riskLevel}</span>
            </div>
            <div class="row">
              <span class="row-label">ж“ҚдҪңж–№еҗ‘</span>
              <span class="row-value">${remarkEmoji[remark]} ${remark}</span>
            </div>
            <div class="row">
              <span class="row-label">з»јеҗҲиҜ„еҲҶ</span>
              <span class="row-value" style="color: #10c4f5;">${row.score.toFixed(1)}/100</span>
            </div>
          </div>
        </div>
      `;
      document.getElementById('detail-content').innerHTML = html;
      activateDetailTab();
    }

    async function loadData() {
      if (isLoading) return;

      isLoading = true;
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.innerText = 'вҸі еҠ иҪҪдёӯ...';

      const status = document.getElementById('status');
      const table = document.getElementById('table');
      const tbody = document.getElementById('tbody');

      status.style.display = 'block';
      status.innerText = 'еҠ иҪҪдёӯ...';
      table.style.display = 'none';

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        if (!exchangeInfo || !ticker24h || !premiumIndex) throw new Error('еҹәзЎҖж•°жҚ®иҺ·еҸ–еӨұиҙҘ');

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 150);

        status.innerText = 'еҠ иҪҪ OI ж•°жҚ®пјҲеүҚ 50 дёӘеёҒпјү...';
        oiMap = await fetchOpenInterest(symbols);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
        const mcapMap = {};
        gecko.forEach(x => {
          mcapMap[(x.symbol || '').toUpperCase() + 'USDT'] = x.market_cap;
        });

        const rows = [];

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];
          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const oi = oiMap[symbol] || 0;
          const oiValue = oi * price;
          const mcap = mcapMap[symbol] || null;

          let volMcap = null;
          let oiMcap = null;
          if (mcap && mcap > 0) {
            volMcap = quoteVol / mcap * 100;
            oiMcap = oiValue / mcap * 100;
          }

          const row = {
            symbol, price, mcap, quoteVol, funding, priceChange,
            oi, oiValue, volMcap, oiMcap
          };

          row.stage = calcStage(row);
          row.riskLevel = calcRiskLevel(row);
          
          if (funding > 0.04) row.longShortStatus = 'в¬ҶпёҸ жҢӨеҺӢеӨҡеӨҙ';
          else if (funding < -0.04) row.longShortStatus = 'в¬ҮпёҸ жҢӨеҺӢз©әеӨҙ';
          else row.longShortStatus = 'вҡ–пёҸ е№іиЎЎ';

          let score = 50;
          if (row.riskLevel === 'йқһеёёеҘҪ') score = 90;
          else if (row.riskLevel === 'еҸҜд»Ӣе…Ҙ') score = 75;
          else if (row.riskLevel === 'е№іиЎЎ') score = 60;
          else if (row.riskLevel === 'иҫғй«ҳйЈҺйҷ©') score = 35;
          else if (row.riskLevel === 'йЈҺйҷ©жһҒй«ҳ') score = 15;

          if (row.volMcap) score += Math.min(row.volMcap / 10, 8);
          score = Math.max(0, Math.min(100, score));
          row.score = score;

          rows.push(row);
        }

        rows.sort((a, b) => b.score - a.score);
        allRows = rows;

        document.getElementById('stat-total').innerText = rows.length;
        document.getElementById('stat-good').innerText = 
          rows.filter(x => x.riskLevel === 'йқһеёёеҘҪ' || x.riskLevel === 'еҸҜд»Ӣе…Ҙ').length;
        document.getElementById('stat-risk').innerText = 
          rows.filter(x => x.riskLevel === 'йЈҺйҷ©жһҒй«ҳ' || x.riskLevel === 'иҫғй«ҳйЈҺйҷ©').length;
        const avgFunding = rows.length ? rows.reduce((s, x) => s + x.funding, 0) / rows.length : 0;
        document.getElementById('stat-funding').innerText = avgFunding.toFixed(4) + '%';

        tbody.innerHTML = '';
        rows.slice(0, 100).forEach(row => {
          const tr = document.createElement('tr');
          const remark = getRiskRemark(row.riskLevel);
          tr.innerHTML = `
            <td class="symbol">${row.symbol}</td>
            <td>$${fmtNum(row.price, 6)}</td>
            <td>$${fmtNum(row.mcap, 2)}</td>
            <td class="${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(1) + '%' : '-'}</td>
            <td class="${colorClass(row.funding)}">${row.funding.toFixed(3)}%</td>
            <td class="${colorClass(row.priceChange)}">${row.priceChange.toFixed(1)}%</td>
            <td><span class="tag stage-${row.stage}">${row.stage}</span></td>
            <td><span class="tag risk-${row.riskLevel}">${row.riskLevel}</span></td>
            <td style="font-size: 12px;">${remark}</td>
          `;
          tr.addEventListener('click', () => showDetail(row));
          tbody.appendChild(tr);
        });

        status.style.display = 'none';
        table.style.display = 'table';
        document.getElementById('last-update').innerText = 'жңҖеҗҺжӣҙж–°пјҡ' + new Date().toLocaleString();

      } catch (e) {
        console.error(e);
        status.style.display = 'block';
        status.innerText = 'вқҢ еҠ иҪҪеӨұиҙҘпјҡ' + e.message;
        table.style.display = 'none';
      } finally {
        isLoading = false;
        btn.disabled = false;
        btn.innerText = 'рҹ”„ жүӢеҠЁеҲ·ж–°';
      }
    }

    // йЎөйқўеҠ иҪҪж—¶иҮӘеҠЁеҠ иҪҪдёҖж¬Ў
    loadData();
  </script>
</body>
</html>

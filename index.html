<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>币安交易管理系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      color: #e5eefb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      padding: 16px;
      font-size: 13px;
    }
    .container { max-width: 1600px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: #10c4f5;
      margin-bottom: 4px;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #8ca3ba;
      font-size: 11px;
      margin-bottom: 14px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .time-info {
      color: #8ca3ba;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-status {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .refresh-status.loading {
      background: #f59e0b;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(16,196,245,.2);
    }
    .tab-btn {
      background: none;
      border: none;
      color: #8ca3ba;
      padding: 8px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 12px;
      transition: all 0.2s;
      font-weight: bold;
    }
    .tab-btn.active {
      color: #10c4f5;
      border-bottom-color: #10c4f5;
    }
    .tab-btn:hover { color: #10c4f5; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .search-box {
      width: 100%;
      max-width: 350px;
      position: relative;
      margin-bottom: 12px;
    }
    .search-input {
      width: 100%;
      padding: 6px 10px;
      background: rgba(10, 22, 40, .95);
      border: 1px solid rgba(16,196,245,.3);
      border-radius: 6px;
      color: #e5eefb;
      font-size: 12px;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: #10c4f5;
      box-shadow: 0 0 8px rgba(16,196,245,.2);
    }
    .search-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(10, 22, 40, .98);
      border: 1px solid rgba(16,196,245,.3);
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 280px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .search-dropdown.active { display: block; }
    .search-item {
      padding: 6px 10px;
      cursor: pointer;
      border-bottom: 1px solid rgba(16,196,245,.1);
      transition: all 0.2s;
      font-size: 11px;
    }
    .search-item:hover { background: rgba(16,196,245,.15); }
    .search-item-symbol { color: #10c4f5; font-weight: bold; }
    .search-item-mcap { color: #8ca3ba; font-size: 10px; margin-top: 2px; }

    .section { margin-bottom: 14px; }
    .section-title {
      font-size: 13px;
      color: #10c4f5;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 2px solid rgba(16,196,245,.2);
      font-weight: bold;
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 10px;
    }
    .coin-card {
      background: rgba(10, 22, 40, .95);
      border: 1px solid rgba(16,196,245,.25);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .coin-card:hover {
      border-color: rgba(16,196,245,.6);
      box-shadow: 0 0 12px rgba(16,196,245,.15);
      transform: translateY(-1px);
    }

    .coin-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .coin-symbol {
      font-size: 15px;
      color: #10c4f5;
      font-weight: bold;
    }
    .coin-tag {
      display: inline-block;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: bold;
      border: 1px solid;
    }
    .tag-yao {
      background: rgba(168, 85, 247, .3);
      color: #d8b4fe;
      border-color: rgba(168, 85, 247, .5);
    }
    .tag-buy {
      background: rgba(34, 197, 94, .3);
      color: #22c55e;
      border-color: rgba(34, 197, 94, .5);
    }
    .tag-watch {
      background: rgba(59, 130, 246, .3);
      color: #93c5fd;
      border-color: rgba(59, 130, 246, .5);
    }

    .coin-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .stat {
      display: flex;
      justify-content: space-between;
    }
    .stat-label { color: #8ca3ba; }
    .stat-value { color: #e5eefb; font-weight: bold; }
    .green { color: #22c55e; }
    .red { color: #ef4444; }

    .coin-note {
      background: rgba(34, 197, 94, .1);
      border-left: 2px solid rgba(34, 197, 94, .4);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: #86efac;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .coin-note.warn {
      background: rgba(245, 158, 11, .1);
      border-left-color: rgba(245, 158, 11, .4);
      color: #fcd34d;
    }
    .coin-note.risk {
      background: rgba(239, 68, 68, .1);
      border-left-color: rgba(239, 68, 68, .4);
      color: #fca5a5;
    }

    .coin-footer {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      padding-top: 6px;
      border-top: 1px solid rgba(16,196,245,.1);
    }
    .badge {
      display: inline-block;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 9px;
      background: rgba(59, 130, 246, .2);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, .4);
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      color: #8ca3ba;
      padding: 20px;
      font-size: 12px;
    }

    /* 详细面板 */
    .detail-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, .85);
      z-index: 1000;
      overflow-y: auto;
      padding: 16px;
    }
    .detail-modal.active { display: block; }
    .detail-content {
      background: linear-gradient(135deg, #061018 0%, #0b1730 100%);
      border: 1px solid rgba(16,196,245,.3);
      border-radius: 12px;
      padding: 20px;
      max-width: 850px;
      margin: 16px auto;
      position: relative;
    }
    .close-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: #8ca3ba;
      font-size: 22px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .close-btn:hover {
      color: #10c4f5;
      transform: rotate(90deg);
    }

    .detail-title {
      font-size: 24px;
      color: #10c4f5;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    .detail-item {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(16,196,245,.12);
      border-radius: 6px;
      padding: 8px;
    }
    .detail-item-label { color: #8ca3ba; font-size: 10px; margin-bottom: 4px; }
    .detail-item-value { color: #10c4f5; font-size: 14px; font-weight: bold; }

    .detail-box {
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.4);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .detail-box h3 {
      color: #22c55e;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .detail-box.warn {
      background: rgba(245, 158, 11, .1);
      border-color: rgba(245, 158, 11, .4);
    }
    .detail-box.warn h3 { color: #fcd34d; }
    .detail-box.risk {
      background: rgba(239, 68, 68, .1);
      border-color: rgba(239, 68, 68, .4);
    }
    .detail-box.risk h3 { color: #fca5a5; }

    .decision-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: 11px;
    }
    .decision-row:last-child { border-bottom: none; }
    .decision-label { color: #8ca3ba; }
    .decision-value { font-weight: bold; color: #e5eefb; }

    @media (max-width: 1024px) {
      .coin-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
      .detail-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .coin-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      h1 { font-size: 20px; }
      .detail-title { font-size: 18px; }
    }
  </style>
</head>
<body translate="no">
  <div class="container">
    <h1 translate="no">⚡ 币安交易系统</h1>
    <p class="subtitle">妖币早期发现 | 稳健建议 | 实时监控</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('monitor', this)">📊 监控</button>
      <button class="tab-btn" onclick="switchTab('search', this)">🔍 搜索</button>
    </div>

    <!-- 监控页 -->
    <div id="monitor" class="tab-content active">
      <div class="toolbar">
        <div class="time-info">
          <span class="refresh-status" id="refresh-dot"></span>
          <span id="last-update">更新中...</span>
          <span style="color: #8ca3ba;">| ⏱️ <span id="refresh-countdown">60</span>s</span>
        </div>
      </div>

      <!-- 妖币 -->
      <div class="section">
        <div class="section-title">💎 妖币机会 (<span id="stat-yao">0</span>)</div>
        <div class="coin-grid" id="yao-list"></div>
      </div>

      <!-- 建议买入 -->
      <div class="section">
        <div class="section-title">🚀 建议买入 (<span id="stat-buy">0</span>)</div>
        <div class="coin-grid" id="buy-list"></div>
      </div>

      <!-- 观察名单 -->
      <div class="section">
        <div class="section-title">👀 观察中 (<span id="stat-watch">0</span>)</div>
        <div class="coin-grid" id="watch-list"></div>
      </div>
    </div>

    <!-- 搜索页 -->
    <div id="search" class="tab-content">
      <div class="search-box">
        <input 
          type="text" 
          class="search-input" 
          id="search-input" 
          placeholder="搜索币种..."
          oninput="handleSearch(this.value)"
        />
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
      <div id="search-result" class="empty-state">搜索一个币种查看详情</div>
    </div>
  </div>

  <!-- 详细面板 -->
  <div class="detail-modal" id="detail-modal">
    <div class="detail-content">
      <button class="close-btn" onclick="closeDetail()">✕</button>
      <div id="detail-body"></div>
    </div>
  </div>

  <script>
    let allCoinsData = [];
    let allRows = { yao: [], buy: [], watch: [] };
    let oiMap = {};
    let isLoading = false;
    let previousData = {};
    let autoRefreshInterval = null;

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      el.classList.add('active');
    }

    function colorClass(v) {
      if (v === null || isNaN(v)) return '';
      return v > 0 ? 'green' : v < 0 ? 'red' : '';
    }

    function fmtNum(n, d = 2) {
      if (!n || isNaN(n)) return '-';
      if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(1) + 'B';
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return Number(n).toFixed(d);
    }

    async function getJSON(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        return await res.json();
      } catch (e) {
        return null;
      }
    }

    async function fetchOpenInterest(symbols) {
      const map = {};
      for (let i = 0; i < symbols.length; i += 20) {
        const batch = symbols.slice(i, i + 20);
        const promises = batch.map(async symbol => {
          const data = await getJSON(`https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`);
          if (data?.openInterest) {
            map[symbol] = parseFloat(data.openInterest);
          }
        });
        await Promise.all(promises);
        await new Promise(r => setTimeout(r, 50));
      }
      return map;
    }

    function calculateResonanceScore(row, previous) {
      let score = 0;
      let signals = [];

      // 价格信号
      if (row.priceChange < -8 && row.priceChange > -40) {
        score += 25;
        signals.push('超跌');
      } else if (row.priceChange < -3) {
        score += 15;
        signals.push('回调');
      }
      
      if (previous && row.price > previous.price) {
        score += 20;
        signals.push('反弹');
      }

      // OI信号
      if (row.oiMcap && row.oiMcap > 1.5 && row.oiMcap < 12) {
        score += 15;
        signals.push('OI活');
      }
      if (previous && row.oiMcap > previous.oiMcap * 0.95) {
        score += 15;
        signals.push('OI持');
      }

      // 资费信号
      if (row.funding > -0.025 && row.funding < 0.04) {
        score += 12;
        signals.push('资费平');
      }

      // 成交信号
      if (row.volMcap && row.volMcap > 6 && row.volMcap < 28) {
        score += 12;
        signals.push('成交活');
      }

      // 市值信号
      if (row.mcap && row.mcap > 1e7 && row.mcap < 3e8) {
        score += 8;
        signals.push('市值合');
      }

      // 共鸣加成
      score += Math.min(10, signals.length * 1.5);

      return {
        totalScore: Math.min(100, score),
        signals: signals
      };
    }

    function detectYaoCoinV2(row, previous) {
      const resonance = calculateResonanceScore(row, previous);
      
      // 妖币必须满足：超跌 + OI活跃 + 市值小 + 有反弹迹象
      const isHeavyDrop = row.priceChange < -12 && row.priceChange > -45;
      const hasOI = row.oiMcap && row.oiMcap > 2 && row.oiMcap < 11;
      const smallCap = row.mcap && row.mcap > 8e6 && row.mcap < 3e8;
      const hasRebound = previous && row.price > previous.price;
      const hasVolume = row.volMcap && row.volMcap > 7 && row.volMcap < 26;

      if (
        isHeavyDrop && 
        hasOI && 
        smallCap && 
        resonance.signals.length >= 5 && 
        resonance.totalScore >= 75
      ) {
        let status = '';
        if (row.priceChange < -30) {
          status = '🔴 高风险-观察';
        } else if (row.priceChange < -18) {
          status = '🟡 中风险-小仓';
        } else {
          status = '🟢 可进-试水';
        }

        return {
          isYao: true,
          status,
          yaoScore: resonance.totalScore,
          signals: resonance.signals,
          reason: '超跌反弹+OI活跃+小市值'
        };
      }

      return { isYao: false };
    }

    function detectBuyCoinV2(row, previous) {
      const resonance = calculateResonanceScore(row, previous);

      const isStable = row.priceChange > -2 && row.priceChange < 6;
      const hasModerateOI = row.oiMcap && row.oiMcap > 3 && row.oiMcap < 9;
      const fundingGood = row.funding > -0.018 && row.funding < 0.025;
      const volumeGood = row.volMcap && row.volMcap > 7 && row.volMcap < 24;
      const capGood = row.mcap && row.mcap > 3e7 && row.mcap < 5e8;

      if (
        (isStable || row.priceChange > 0) &&
        hasModerateOI &&
        fundingGood &&
        volumeGood &&
        capGood &&
        resonance.totalScore >= 72
      ) {
        let buyScore = resonance.totalScore;
        if (resonance.signals.length >= 5) buyScore += 8;

        return {
          isBuy: true,
          buyScore: Math.min(100, buyScore),
          signals: resonance.signals,
          reason: '稳健机会+OI平衡+成交活跃'
        };
      }

      return { isBuy: false };
    }

    function detectWatch(row, previous) {
      const resonance = calculateResonanceScore(row, previous);

      // 有信号但不足以上榜，或市值偏大但其他不错
      const hasSignals = resonance.signals.length >= 3;
      const isNearWatch = resonance.totalScore >= 60;
      const capOkay = row.mcap && row.mcap > 5e8 && row.mcap < 2e9;

      if (hasSignals && isNearWatch && (capOkay || resonance.totalScore < 72)) {
        return {
          isWatch: true,
          watchScore: resonance.totalScore,
          signals: resonance.signals,
          reason: '待观察-信号不足或市值偏大'
        };
      }

      return { isWatch: false };
    }

    function getTradingAdvice(row, type) {
      if (type === 'yao') {
        if (row.priceChange < -30) {
          return '⏸️ 观察为主，先看有没有底部反弹';
        } else if (row.priceChange < -18) {
          return '💰 可以小仓位 1-2% 试水，严格 -3% 止损';
        } else {
          return '🔥 可以进场，推荐 2-3% 试水，计划是拉盘前夕';
        }
      } else if (type === 'buy') {
        return '✅ 现货推荐，可以分批建仓，1-2% 仓位稳妥';
      } else {
        return '📌 继续观察，等信号更确定或市值下降';
      }
    }

    function renderCoinCard(row, type) {
      const score = row.yaoScore || row.buyScore || row.watchScore || 0;
      const advice = getTradingAdvice(row, type);
      
      const tagClass = type === 'yao' ? 'tag-yao' : type === 'buy' ? 'tag-buy' : 'tag-watch';
      const tagText = type === 'yao' ? '💎 妖币' : type === 'buy' ? '🚀 买入' : '👀 观察';
      const status = row.status || '';
      const noteClass = type === 'yao' ? 'coin-note warn' : 'coin-note';

      return `
        <div class="coin-card" onclick="showDetail('${row.symbol}', '${type}')">
          <div class="coin-header">
            <span class="coin-symbol" translate="no">${row.symbol}</span>
            <span class="coin-tag ${tagClass}" translate="no">${tagText}</span>
          </div>

          ${status ? `<div class="coin-note warn" translate="no">⚠️ ${status}</div>` : ''}

          <div class="coin-stats">
            <div class="stat">
              <span class="stat-label">现价</span>
              <span class="stat-value">$${fmtNum(row.price, 6)}</span>
            </div>
            <div class="stat">
              <span class="stat-label">24h</span>
              <span class="stat-value ${colorClass(row.priceChange)}">${row.priceChange.toFixed(1)}%</span>
            </div>
            <div class="stat">
              <span class="stat-label">市值</span>
              <span class="stat-value">$${fmtNum(row.mcap, 0)}</span>
            </div>
            <div class="stat">
              <span class="stat-label">共振</span>
              <span class="stat-value">${score.toFixed(0)}</span>
            </div>
            <div class="stat">
              <span class="stat-label">OI/M</span>
              <span class="stat-value">${row.oiMcap ? row.oiMcap.toFixed(1) : '-'}%</span>
            </div>
            <div class="stat">
              <span class="stat-label">资费</span>
              <span class="stat-value ${colorClass(row.funding)}">${row.funding.toFixed(4)}%</span>
            </div>
          </div>

          <div class="coin-note">${advice}</div>

          <div class="coin-footer">
            ${row.signals.slice(0, 3).map(s => `<span class="badge" translate="no">${s}</span>`).join('')}
          </div>
        </div>
      `;
    }

    function renderYaoList() {
      const container = document.getElementById('yao-list');
      if (allRows.yao.length === 0) {
        container.innerHTML = '<div class="empty-state">暂未发现妖币机会</div>';
        return;
      }
      container.innerHTML = allRows.yao.map(r => renderCoinCard(r, 'yao')).join('');
    }

    function renderBuyList() {
      const container = document.getElementById('buy-list');
      if (allRows.buy.length === 0) {
        container.innerHTML = '<div class="empty-state">暂未发现推荐机会</div>';
        return;
      }
      container.innerHTML = allRows.buy.map(r => renderCoinCard(r, 'buy')).join('');
    }

    function renderWatchList() {
      const container = document.getElementById('watch-list');
      if (allRows.watch.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无观察名单</div>';
        return;
      }
      container.innerHTML = allRows.watch.map(r => renderCoinCard(r, 'watch')).join('');
    }

    function showDetail(symbol, type) {
      let coin = allCoinsData.find(c => c.symbol === symbol);
      if (!coin) return;

      const score = coin.yaoScore || coin.buyScore || coin.watchScore || 0;
      const tp = calculateTP(coin, type === 'yao');
      const add = calculateAdd(coin, type === 'yao');

      const html = `
        <div class="detail-title" translate="no">
          ${coin.symbol}
          <span class="coin-tag ${type === 'yao' ? 'tag-yao' : type === 'buy' ? 'tag-buy' : 'tag-watch'}">
            ${type === 'yao' ? '💎 妖币' : type === 'buy' ? '🚀 买入' : '👀 观察'}
          </span>
          ${coin.status ? `<span class="coin-tag tag-yao">${coin.status}</span>` : ''}
        </div>

        <div class="detail-grid">
          <div class="detail-item">
            <div class="detail-item-label">现价</div>
            <div class="detail-item-value">$${fmtNum(coin.price, 6)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">市值</div>
            <div class="detail-item-value">$${fmtNum(coin.mcap, 2)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">24h涨跌</div>
            <div class="detail-item-value ${coin.priceChange > 0 ? 'green' : 'red'}">
              ${coin.priceChange.toFixed(2)}%
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">共振分</div>
            <div class="detail-item-value">${score.toFixed(1)}/100</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">OI/Mcap</div>
            <div class="detail-item-value">${coin.oiMcap ? coin.oiMcap.toFixed(2) : '-'}%</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">Vol/Mcap</div>
            <div class="detail-item-value">${coin.volMcap ? coin.volMcap.toFixed(2) : '-'}%</div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">Funding</div>
            <div class="detail-item-value ${coin.funding > 0 ? 'green' : 'red'}">
              ${coin.funding.toFixed(4)}%
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-item-label">信号数</div>
            <div class="detail-item-value">${coin.signals.length}</div>
          </div>
        </div>

        <div class="detail-box">
          <h3>📋 交易建议</h3>
          <div class="decision-row">
            <span class="decision-label">推荐方式</span>
            <span class="decision-value">${type === 'yao' ? '合约试水' : '现货建仓'}</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">仓位</span>
            <span class="decision-value">${type === 'yao' ? '账户 1-3%' : '账户 1-2%'}</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">策略</span>
            <span class="decision-value">${getTradingAdvice(coin, type)}</span>
          </div>
        </div>

        <div class="detail-box">
          <h3>🎯 止损止盈</h3>
          <div class="decision-row">
            <span class="decision-label">入场</span>
            <span class="decision-value">$${coin.price.toFixed(6)}</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">止损</span>
            <span class="decision-value" style="color: #ef4444;">$${tp.sl} (-3%)</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">TP1</span>
            <span class="decision-value" style="color: #22c55e;">$${tp.tp1} (${type === 'yao' ? '+5%' : '+3%'})</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">TP2</span>
            <span class="decision-value" style="color: #22c55e;">$${tp.tp2} (${type === 'yao' ? '+10%' : '+8%'})</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">TP3</span>
             <span class="decision-value" style="color: #22c55e;">$${tp.tp3} (${type === 'yao' ? '+20%' : '+15%'})</span>
          </div>
        </div>

        <div class="detail-box">
          <h3>📈 加仓计划</h3>
          <div class="decision-row">
            <span class="decision-label">加仓1</span>
            <span class="decision-value">$${add.add1}</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">加仓2</span>
            <span class="decision-value">$${add.add2}</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">策略</span>
            <span class="decision-value">每次加仓 ${type === 'yao' ? '25%' : '30%'} 仓位</span>
          </div>
        </div>

        <div class="detail-box">
          <h3>📊 实时信号</h3>
          <div class="decision-row">
            <span class="decision-label">检测标签</span>
            <span class="decision-value">${coin.signals.join(' | ')}</span>
          </div>
          <div class="decision-row">
            <span class="decision-label">推荐原因</span>
            <span class="decision-value">${coin.reason || '综合信号触发'}</span>
          </div>
        </div>

        <div class="detail-box ${type === 'yao' ? 'risk' : 'warn'}">
          <h3>${type === 'yao' ? '⚠️ 妖币风险提示' : '💡 交易提示'}</h3>
          <div class="decision-row">
            <span class="decision-label">必读</span>
            <span class="decision-value" style="font-size: 10px; line-height: 1.6;">
              ${type === 'yao' 
                ? '妖币高风险。必须严格止损 -3%，不要抱希望。按计划执行，不要加仓超过止损。拉盘前期进场收益最大，但风险也大。' 
                : '稳健机会。推荐现货分批建仓。第一批 50%，反弹再加仓。不要all in。长期持有为主。'}
            </span>
          </div>
        </div>
      `;

      document.getElementById('detail-body').innerHTML = html;
      document.getElementById('detail-modal').classList.add('active');
    }

    function closeDetail() {
      document.getElementById('detail-modal').classList.remove('active');
    }

    function calculateTP(row, isYao) {
      const p = row.price;
      if (isYao) {
        return {
          sl: (p * 0.97).toFixed(6),
          tp1: (p * 1.05).toFixed(6),
          tp2: (p * 1.10).toFixed(6),
          tp3: (p * 1.20).toFixed(6)
        };
      } else {
        return {
          sl: (p * 0.97).toFixed(6),
          tp1: (p * 1.03).toFixed(6),
          tp2: (p * 1.08).toFixed(6),
          tp3: (p * 1.15).toFixed(6)
        };
      }
    }

    function calculateAdd(row, isYao) {
      const p = row.price;
      if (isYao) {
        return {
          add1: (p * 0.95).toFixed(6),
          add2: (p * 0.90).toFixed(6)
        };
      } else {
        return {
          add1: (p * 0.97).toFixed(6),
          add2: (p * 0.94).toFixed(6)
        };
      }
    }

    function handleSearch(query) {
      const dropdown = document.getElementById('search-dropdown');
      
      if (!query.trim()) {
        dropdown.classList.remove('active');
        return;
      }

      const filtered = allCoinsData.filter(coin => 
        coin.symbol.toUpperCase().includes(query.toUpperCase())
      ).slice(0, 20);

      if (filtered.length === 0) {
        dropdown.classList.remove('active');
        return;
      }

      dropdown.innerHTML = filtered.map(coin => `
        <div class="search-item" onclick="searchSelect('${coin.symbol}')">
          <div class="search-item-symbol" translate="no">${coin.symbol}</div>
          <div class="search-item-mcap">市值: $${fmtNum(coin.mcap, 2)}</div>
        </div>
      `).join('');

      dropdown.classList.add('active');
    }

    function searchSelect(symbol) {
      document.getElementById('search-input').value = symbol;
      document.getElementById('search-dropdown').classList.remove('active');
      
      const coin = allCoinsData.find(c => c.symbol === symbol);
      if (!coin) {
        document.getElementById('search-result').innerHTML = '<div class="empty-state">未找到</div>';
        return;
      }

      const yaoCheck = detectYaoCoinV2(coin, previousData[symbol]);
      const buyCheck = detectBuyCoinV2(coin, previousData[symbol]);
      const watchCheck = detectWatch(coin, previousData[symbol]);

      let type = '';
      if (yaoCheck.isYao) {
        type = 'yao';
        coin.status = yaoCheck.status;
        coin.yaoScore = yaoCheck.yaoScore;
        coin.signals = yaoCheck.signals;
        coin.reason = yaoCheck.reason;
      } else if (buyCheck.isBuy) {
        type = 'buy';
        coin.buyScore = buyCheck.buyScore;
        coin.signals = buyCheck.signals;
        coin.reason = buyCheck.reason;
      } else if (watchCheck.isWatch) {
        type = 'watch';
        coin.watchScore = watchCheck.watchScore;
        coin.signals = watchCheck.signals;
        coin.reason = watchCheck.reason;
      } else {
        document.getElementById('search-result').innerHTML = `
          <div class="empty-state">
            💭 暂不符合推荐标准<br/>
            信号不足或市值不合适
          </div>
        `;
        return;
      }

      showDetail(symbol, type);
    }

    async function loadData() {
      if (isLoading) return;

      isLoading = true;
      document.getElementById('refresh-dot').classList.add('loading');

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        if (!exchangeInfo || !ticker24h || !premiumIndex) throw new Error('数据失败');

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 300);

        oiMap = await fetchOpenInterest(symbols);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
        const mcapMap = {};
        gecko.forEach(x => {
          mcapMap[(x.symbol || '').toUpperCase() + 'USDT'] = x.market_cap;
        });

        allRows = { yao: [], buy: [], watch: [] };
        allCoinsData = [];

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];
          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price || price === 0) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const oi = oiMap[symbol] || 0;
          const oiValue = oi * price;
          const mcap = mcapMap[symbol] || null;

          let volMcap = null;
          let oiMcap = null;
          if (mcap && mcap > 0) {
            volMcap = quoteVol / mcap * 100;
            oiMcap = oiValue / mcap * 100;
          }

          const row = {
            symbol, price, mcap, quoteVol, funding, priceChange,
            oi, oiValue, volMcap, oiMcap
          };

          allCoinsData.push(row);

          // 优先判建议，再判妖币，最后判观察
          const buyCheck = detectBuyCoinV2(row, previousData[symbol]);
          if (buyCheck.isBuy) {
            row.level = '建议';
            row.buyScore = buyCheck.buyScore;
            row.signals = buyCheck.signals;
            row.reason = buyCheck.reason;
            allRows.buy.push(row);
            continue;
          }

          const yaoCheck = detectYaoCoinV2(row, previousData[symbol]);
          if (yaoCheck.isYao) {
            row.level = '妖币';
            row.status = yaoCheck.status;
            row.yaoScore = yaoCheck.yaoScore;
            row.signals = yaoCheck.signals;
            row.reason = yaoCheck.reason;
            allRows.yao.push(row);
            continue;
          }

          const watchCheck = detectWatch(row, previousData[symbol]);
          if (watchCheck.isWatch) {
            row.level = '观察';
            row.watchScore = watchCheck.watchScore;
            row.signals = watchCheck.signals;
            row.reason = watchCheck.reason;
            allRows.watch.push(row);
          }
        }

        // 排序
        allRows.yao.sort((a, b) => b.yaoScore - a.yaoScore).slice(0, 30);
        allRows.buy.sort((a, b) => b.buyScore - a.buyScore).slice(0, 15);
        allRows.watch.sort((a, b) => b.watchScore - a.watchScore).slice(0, 20);

        // 保存历史
        const tempPrev = {};
        [...allRows.yao, ...allRows.buy, ...allRows.watch].forEach(row => {
          tempPrev[row.symbol] = {
            price: row.price,
            oiMcap: row.oiMcap,
            funding: row.funding
          };
        });
        previousData = tempPrev;

        renderYaoList();
        renderBuyList();
        renderWatchList();

        // 统计
        document.getElementById('stat-yao').innerText = allRows.yao.length;
        document.getElementById('stat-buy').innerText = allRows.buy.length;
        document.getElementById('stat-watch').innerText = allRows.watch.length;

        document.getElementById('last-update').innerText = '✅ ' + new Date().toLocaleTimeString();

      } catch (e) {
        console.error(e);
        document.getElementById('last-update').innerText = '❌ 数据获取失败';
      } finally {
        isLoading = false;
        document.getElementById('refresh-dot').classList.remove('loading');
      }
    }

    function startAutoRefresh() {
      let countdown = 60;
      
      loadData();

      autoRefreshInterval = setInterval(() => {
        countdown--;
        document.getElementById('refresh-countdown').innerText = countdown;

        if (countdown <= 0) {
          countdown = 60;
          loadData();
        }
      }, 1000);
    }

    startAutoRefresh();

    document.getElementById('search-input').addEventListener('blur', () => {
      setTimeout(() => {
        document.getElementById('search-dropdown').classList.remove('active');
      }, 100);
    });

    document.getElementById('detail-modal').addEventListener('click', (e) => {
      if (e.target.id === 'detail-modal') {
        closeDetail();
      }
    });

    window.addEventListener('beforeunload', () => {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    });
  </script>
</body>
</html>

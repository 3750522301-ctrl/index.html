  <script>
const CONFIG = {

  ],
  fastRefreshMs: 3000,
  slowRefreshMs: 15000,
  futuresRefreshMs: 60000,
  signalConfirmMs: 30000,
  binanceRest: 'https://fapi.binance.com/fapi/v1',
  binanceSpot: 'https://api.binance.com/api/v3'
};

let allCoins = {};
let history = {};
let indicatorCache = {};
let signalHistory = {};
let signalAccuracy = {};
let ws = null;
let currentSort = 'accuracy';
let lastFuturesUpdate = {};
let requestLimiter = { count: 0, lastReset: Date.now() };

function throttleRequest() {
  const now = Date.now();
  if (now - requestLimiter.lastReset > 60000) {
    requestLimiter.count = 0;
    requestLimiter.lastReset = now;
  }
  requestLimiter.count++;
  if (requestLimiter.count > 1150) {
    console.warn('⚠️ 接近请求限制，等待重置');
    return false;
  }
  return true;
}

function fmt(n, decimals = 2) {
  const num = Number(n);
  if (!isFinite(num)) return '--';
  if (Math.abs(num) >= 1e9) return (num / 1e9).toFixed(decimals) + 'B';
  if (Math.abs(num) >= 1e6) return (num / 1e6).toFixed(decimals) + 'M';
  if (Math.abs(num) >= 1e3) return (num / 1e3).toFixed(decimals) + 'K';
  return num.toFixed(decimals);
}

function fmtPct(n, decimals = 2) {
  const num = Number(n);
  if (!isFinite(num)) return '--';
  return (num > 0 ? '+' : '') + num.toFixed(decimals) + '%';
}

function fmtTime(ms) {
  const minutes = Math.floor(ms / 60000);
  const hours = Math.floor(minutes / 60);
  if (hours > 0) return hours + 'h';
  return minutes + 'm';
}

function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page + '-page').classList.add('active');
  document.querySelectorAll('.btn').forEach((b, i) => {
    b.classList.toggle('active', 
      (page === 'monitor' && i === 0) ||
      (page === 'search' && i === 1)
    );
  });
}

function setSortBy(type) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderMonitor();
}

function toast(msg, type = 'info') {
  const div = document.createElement('div');
  div.className = 'toast';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

// ============ 真实指标计算（带缓存） ============

function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = closes.length - period; i < closes.length; i++) {
    const change = closes[i] - closes[i - 1];
    if (change > 0) gains += change;
    else losses += Math.abs(change);
  }
  const avgGain = gains / period;
  const avgLoss = losses / period;
  const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
  return 100 - (100 / (1 + rs));
}

function calcEMA(values, period) {
  if (values.length < period) return null;
  const k = 2 / (period + 1);
  let ema = values.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < values.length; i++) {
    ema = values[i] * k + ema * (1 - k);
  }
  return ema;
}

function calcMACD(closes) {
  if (closes.length < 26) return { macd: 0, signal: 0, histogram: 0 };
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  if (!ema12 || !ema26) return { macd: 0, signal: 0, histogram: 0 };
  const macdLine = ema12 - ema26;
  const macdValues = [];
  for (let i = 25; i < closes.length; i++) {
    const e12 = calcEMA(closes.slice(0, i + 1), 12);
    const e26 = calcEMA(closes.slice(0, i + 1), 26);
    macdValues.push(e12 - e26);
  }
  const signal = macdValues.length >= 9 ? calcEMA(macdValues, 9) : macdLine;
  return { macd: macdLine, signal: signal, histogram: macdLine - signal };
}

function calcBollingerBands(closes, period = 20, stdDev = 2) {
  if (closes.length < period) {
    const last = closes[closes.length - 1];
    return { upper: last, middle: last, lower: last, width: 0 };
  }
  const recent = closes.slice(-period);
  const sma = recent.reduce((a, b) => a + b, 0) / period;
  let variance = 0;
  for (let i = 0; i < recent.length; i++) {
    variance += Math.pow(recent[i] - sma, 2);
  }
  variance /= period;
  const std = Math.sqrt(variance);
  return {
    upper: sma + std * stdDev,
    middle: sma,
    lower: sma - std * stdDev,
    width: (std * stdDev * 2) / sma * 100
  };
}

function calcATR(ohlcData, period = 14) {
  if (ohlcData.length < period) return 0;
  const trValues = [];
  for (let i = 0; i < ohlcData.length; i++) {
    const bar = ohlcData[i];
    if (!bar.h || !bar.l || !bar.c) continue;
    const tr = Math.max(
      bar.h - bar.l,
      Math.abs(bar.h - (ohlcData[i - 1]?.c || bar.c)),
      Math.abs(bar.l - (ohlcData[i - 1]?.c || bar.c))
    );
    trValues.push(tr);
  }
  if (trValues.length < period) return 0;
  let atr = trValues.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < trValues.length; i++) {
    atr = (atr * (period - 1) + trValues[i]) / period;
  }
  return atr;
}

function calcADX(ohlcData, period = 14) {
  if (ohlcData.length < period * 2) return 25;
  const plDm = [];
  const miDm = [];
  const tr = [];
  for (let i = 1; i < ohlcData.length; i++) {
    const curr = ohlcData[i];
    const prev = ohlcData[i - 1];
    const trValue = Math.max(
      curr.h - curr.l,
      Math.abs(curr.h - prev.c),
      Math.abs(curr.l - prev.c)
    );
    tr.push(trValue);
    const upMove = curr.h - prev.h;
    const downMove = prev.l - curr.l;
    if (upMove > downMove && upMove > 0) {
      plDm.push(upMove);
      miDm.push(0);
    } else if (downMove > upMove && downMove > 0) {
      plDm.push(0);
      miDm.push(downMove);
    } else {
      plDm.push(0);
      miDm.push(0);
    }
  }
  const sumTr = tr.slice(-period).reduce((a, b) => a + b, 0);
  const sumPlDm = plDm.slice(-period).reduce((a, b) => a + b, 0);
  const sumMiDm = miDm.slice(-period).reduce((a, b) => a + b, 0);
  const plDi = (sumPlDm / sumTr) * 100;
  const miDi = (sumMiDm / sumTr) * 100;
  const dx = Math.abs(plDi - miDi) / (plDi + miDi) * 100;
  return Math.min(dx, 100);
}

function calcVWAP(klines) {
  let totalPV = 0;
  let totalV = 0;
  ['5m', '15m', '1h', '4h', '6h'].forEach(tf => {
    const k = klines[tf];
    if (!k) return;
    const typicalPrice = (k.h + k.l + k.c) / 3;
    totalPV += typicalPrice * k.v;
    totalV += k.v;
  });
  return totalV > 0 ? totalPV / totalV : 0;
}

function calcCMF(klines, period = 20) {
  const timeframes = ['5m', '15m', '1h', '4h', '6h'];
  let cmfSum = 0;
  let volumeSum = 0;
  timeframes.forEach(tf => {
    const k = klines[tf];
    if (!k || !k.h || !k.l) return;
    const range = k.h - k.l;
    if (range === 0) return;
    const mfm = (k.c - k.l - (k.h - k.c)) / range;
    const mfv = mfm * k.v;
    cmfSum += mfv;
    volumeSum += k.v;
  });
  return volumeSum > 0 ? (cmfSum / volumeSum) : 0;
}

function calcMFI(klines, period = 14) {
  const timeframes = ['5m', '15m', '1h', '4h', '6h'];
  let positiveFlow = 0;
  let negativeFlow = 0;
  timeframes.forEach((tf, i) => {
    const k = klines[tf];
    if (!k) return;
    const prevK = klines[timeframes[Math.max(0, i - 1)]];
    const typicalPrice = (k.h + k.l + k.c) / 3;
    const prevPrice = prevK ? (prevK.h + prevK.l + prevK.c) / 3 : typicalPrice;
    const moneyFlow = typicalPrice * k.v;
    if (typicalPrice > prevPrice) {
      positiveFlow += moneyFlow;
    } else {
            negativeFlow += moneyFlow;
    }
  });
  const mfRatio = negativeFlow !== 0 ? positiveFlow / negativeFlow : 1;
  return 100 - (100 / (1 + mfRatio));
}

function calcOBV(klines) {
  const timeframes = ['5m', '15m', '1h', '4h', '6h'];
  let obv = 0;
  timeframes.forEach(tf => {
    const k = klines[tf];
    if (!k) return;
    if (k.c > k.o) {
      obv += k.v;
    } else if (k.c < k.o) {
      obv -= k.v;
    }
  });
  return obv;
}

function calcROC(closes, period = 12) {
  if (closes.length < period + 1) return 0;
  const curr = closes[closes.length - 1];
  const prev = closes[closes.length - period - 1];
  return prev !== 0 ? ((curr - prev) / prev) * 100 : 0;
}

function calcAllIndicators(klines, symbol) {
  const cacheKey = symbol + '_indicators';
  const cached = indicatorCache[cacheKey];
  const now = Date.now();
  if (cached && now - cached.timestamp < 5000) {
    return cached;
  }

  const closes = ['5m', '15m', '1h', '4h', '6h']
    .map(t => klines[t]?.c)
    .filter(c => c > 0);

  if (closes.length < 2) return null;

  const ohlcData = ['5m', '15m', '1h', '4h', '6h']
    .map(t => klines[t])
    .filter(k => k && k.h && k.l);

  const result = {
    rsi: calcRSI(closes),
    macd: calcMACD(closes),
    adx: calcADX(ohlcData),
    bb: calcBollingerBands(closes),
    atr: calcATR(ohlcData),
    obv: calcOBV(klines),
    cmf: calcCMF(klines),
    mfi: calcMFI(klines),
    vwap: calcVWAP(klines),
    roc: calcROC(closes),
    timestamp: now
  };

  indicatorCache[cacheKey] = result;
  return result;
}

// ============ WebSocket 数据流（优化版） ============

function initWebSocket() {
  const streams = CONFIG.symbols
    .map(s => s.toLowerCase() + 'usdt@ticker')
    .join('/');

  try {
    ws = new WebSocket(CONFIG.wsUrl + streams);
    ws.onopen = () => {
      console.log('✅ WebSocket 已连接');
      document.getElementById('ws-dot').classList.remove('offline');
    };
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.data) {
          const ticker = data.data;
          const symbol = ticker.s.replace('USDT', '').toLowerCase();
          if (!allCoins[symbol]) {
            allCoins[symbol] = { klines: {} };
          }
          allCoins[symbol].ticker = {
            p: Number(ticker.c),
            h: Number(ticker.h),
            l: Number(ticker.l),
            v: Number(ticker.v),
            q: Number(ticker.q),
            ch: ((Number(ticker.c) - Number(ticker.o)) / Number(ticker.o)) * 100
          };
          renderMonitor();
        }
      } catch (err) {
        console.error('WebSocket 消息解析错误:', err);
      }
    };
    ws.onerror = () => {
      console.error('❌ WebSocket 错误');
      document.getElementById('ws-dot').classList.add('offline');
    };
    ws.onclose = () => {
      console.warn('⚠️ WebSocket 已断开，30秒后重连...');
      document.getElementById('ws-dot').classList.add('offline');
      setTimeout(() => initWebSocket(), 30000);
    };
  } catch (error) {
    console.error('WebSocket 初始化失败:', error);
  }
}

// ============ 批量获取K线数据（优化版） ============

async function fetchKlineData(symbol) {
  if (!throttleRequest()) return;

  try {
    const upper = symbol.toUpperCase() + 'USDT';
    const timeframes = [
      { name: '5m', period: '5m', limit: 50 },
      { name: '15m', period: '15m', limit: 50 },
      { name: '1h', period: '1h', limit: 50 },
      { name: '4h', period: '4h', limit: 50 },
      { name: '6h', period: '6h', limit: 50 }
    ];

    const promises = timeframes.map(tf =>
      axios.get(`${CONFIG.binanceSpot}/klines`, {
        params: { symbol: upper, interval: tf.period, limit: tf.limit },
        timeout: 5000
      }).then(res => ({
        tf: tf.name,
        data: res.data
      })).catch(err => ({
        tf: tf.name,
        data: null,
        error: err.message
      }))
    );

    const results = await Promise.all(promises);

    if (!allCoins[symbol]) {
      allCoins[symbol] = { klines: {} };
    }

    results.forEach(({ tf, data }) => {
      if (data && data.length > 0) {
        const last = data[data.length - 1];
        allCoins[symbol].klines[tf] = {
          o: Number(last[1]),
          h: Number(last[2]),
          l: Number(last[3]),
          c: Number(last[4]),
          v: Number(last[7]),
          tr: Number(last[8]) > 0 ? Number(last[9]) / Number(last[8]) : 0.5
        };
      }
    });
  } catch (error) {
    console.error(`获取 ${symbol} K线失败:`, error.message);
  }
}

// ============ 批量获取期货数据（优化版 + 缓存） ============

async function fetchFuturesDataBatch() {
  const now = Date.now();
  const batch = CONFIG.symbols.filter(s => {
    const last = lastFuturesUpdate[s] || 0;
    return now - last > CONFIG.futuresRefreshMs;
  });

  if (batch.length === 0) return;
  if (!throttleRequest()) return;

  const promises = batch.map(async (symbol) => {
    try {
      const upper = symbol.toUpperCase() + 'USDT';

      const [oiRes, oiHistRes, lsRes, fundingRes, markRes] = await Promise.all([
        axios.get(`${CONFIG.binanceRest}/openInterest?symbol=${upper}`, { timeout: 5000 }).catch(() => null),
        axios.get(`${CONFIG.binanceRest}/openInterestHist?symbol=${upper}&period=5m&limit=2`, { timeout: 5000 }).catch(() => null),
        axios.get(`${CONFIG.binanceRest}/globalLongShortAccountRatio?symbol=${upper}&period=5m&limit=1`, { timeout: 5000 }).catch(() => null),
        axios.get(`${CONFIG.binanceRest}/fundingRate?symbol=${upper}&limit=1`, { timeout: 5000 }).catch(() => null),
        axios.get(`${CONFIG.binanceRest}/premiumIndex?symbol=${upper}`, { timeout: 5000 }).catch(() => null)
      ]);

      const currentOI = Number(oiRes?.data?.openInterest || 0);
      let oiChange = 0;
      if (oiHistRes?.data?.length >= 2) {
        const prev = Number(oiHistRes.data[0].sumOpenInterest || 0);
        const curr = Number(oiHistRes.data[1].sumOpenInterest || 0);
        if (prev > 0) oiChange = ((curr - prev) / prev) * 100;
      }

      const longRatio = Number(lsRes?.data?.[0]?.longAccount || 0.5);
      const fundingRate = Number(fundingRes?.data?.[0]?.fundingRate || 0);
      const markPrice = Number(markRes?.data?.markPrice || 0);
      const indexPrice = Number(markRes?.data?.indexPrice || 0);
      const premium = markPrice > 0 ? ((markPrice - indexPrice) / indexPrice) * 100 : 0;

      const coin = allCoins[symbol];
      const price = coin?.ticker?.p || 0;
      const avgLeverage = 10;
      const estimatedContracts = price > 0 ? (currentOI / price) * avgLeverage : 0;
      const longLiq = estimatedContracts * longRatio;
      const shortLiq = estimatedContracts * (1 - longRatio);

      if (!allCoins[symbol]) {
        allCoins[symbol] = { klines: {} };
      }

      allCoins[symbol].futures = {
        oi: currentOI,
        oiChange,
        longRatio,
        shortRatio: 1 - longRatio,
        fundingRate,
        premium,
        markPrice,
        indexPrice,
        longLiq,
        shortLiq,
        totalLiq: estimatedContracts,
        timestamp: now
      };

      lastFuturesUpdate[symbol] = now;
    } catch (error) {
      console.error(`获取 ${symbol} 期货数据失败:`, error.message);
    }
  });

  await Promise.allSettled(promises);
}

// ============ 分析核心逻辑 ============

function analyzeCoin(symbol) {
  const coin = allCoins[symbol];
  if (!coin || !coin.ticker || !coin.klines['1h']) return null;

  const t = coin.ticker;
  const k5m = coin.klines['5m'] || { o: t.p, c: t.p, h: t.p, l: t.p, v: 0, tr: 0.5 };
  const k15m = coin.klines['15m'] || { o: t.p, c: t.p, h: t.p, l: t.p, v: 0, tr: 0.5 };
  const k1h = coin.klines['1h'] || { o: t.p, c: t.p, h: t.p, l: t.p, v: 0, tr: 0.5 };
  const k4h = coin.klines['4h'] || { o: t.p, c: t.p, h: t.p, l: t.p, v: 0, tr: 0.5 };
  const k6h = coin.klines['6h'] || { o: t.p, c: t.p, h: t.p, l: t.p, v: 0, tr: 0.5 };

  const ch5m = k5m.o > 0 ? ((k5m.c - k5m.o) / k5m.o) * 100 : 0;
  const ch15m = k15m.o > 0 ? ((k15m.c - k15m.o) / k15m.o) * 100 : 0;
  const ch1h = k1h.o > 0 ? ((k1h.c - k1h.o) / k1h.o) * 100 : 0;
  const ch4h = k4h.o > 0 ? ((k4h.c - k4h.o) / k4h.o) * 100 : 0;
  const ch6h = k6h.o > 0 ? ((k6h.c - k6h.o) / k6h.o) * 100 : 0;

  const indicators = calcAllIndicators(coin.klines, symbol);
  if (!indicators) return null;

  const { rsi, macd, adx, bb, atr, obv, cmf, mfi, vwap, roc } = indicators;

  const fut = coin.futures || {};
  const fundingRate = fut.fundingRate || 0;
  const oi = fut.oi || 0;
  const oiChange = fut.oiChange || 0;
  const longRatio = fut.longRatio || 0.5;
  const premium = fut.premium || 0;

  const avgVol = (k5m.v + k15m.v + k1h.v) / 3;
  const volRatio1h = avgVol > 0 ? k1h.v / avgVol : 1;

  const takerBuy1h = k1h.tr > 0.6;
  const takerSell1h = k1h.tr < 0.4;

  const multiResonate = (ch5m > 0 && ch15m > 0 && ch1h > 0) || (ch5m < 0 && ch15m < 0 && ch1h < 0);

  // ============ 基于真实指标的风险评估 ============
  let riskLevel = 'low';
  let riskScore = 0;

  if (rsi > 75) riskScore += 30;
  else if (rsi > 70) riskScore += 15;
  if (rsi < 30) riskScore -= 5;

  if (bb.width < 5) riskScore += 10;
  if (t.p > bb.upper) riskScore += 25;
  else if (t.p < bb.lower) riskScore -= 10;

  if (adx < 20) riskScore -= 5;
  if (adx > 40 && ch6h > 3) riskScore += 10;

  if (ch6h > 2 && macd.histogram < 0) riskScore += 15;

  if (oiChange > 10) riskScore += 20;
  else if (oiChange > 5) riskScore += 10;

  if (fundingRate > 0.0005) riskScore += 12;
  else if (fundingRate < -0.0005) riskScore -= 5;

  if (premium > 0.1) riskScore += 8;
  if (cmf < -0.1) riskScore += 10;
  if (mfi > 75) riskScore += 12;
  if (roc > 0 && roc < 1) riskScore += 5;

  if (riskScore >= 60) riskLevel = 'high';
  else if (riskScore >= 35) riskLevel = 'mid';

  // ============ 威科夫阶段判断 ============
  let stage = 'watch';

  if (adx < 25 && volRatio1h < 0.8 && rsi < 45) {
    stage = 'accumulation';
  } else if (adx > 20 && adx < 40 && volRatio1h > 1.2 && ch6h > 2) {
    stage = 'markup1';
  } else if (adx > 35 && rsi > 70 && volRatio1h > 1.5 && Math.abs(ch1h) < 1) {
    stage = 'distribution';
  } else if (adx > 30 && ch1h < -2 && ch4h < -1) {
    stage = 'markdown2';
  } else if (volRatio1h < 0.8 && ch1h < 0 && rsi < 30) {
    stage = 'cleanup';
  }

  // ============ 走势预期 ============
  let trend = '';

  if (rsi > 70 && adx > 35 && longRatio > 0.55 && fundingRate < 0.0001) {
    trend = '挤压多头';
  } else if (adx > 30 && oiChange > 5 && longRatio < 0.45 && fundingRate > 0.0001) {
    trend = '挤压空头';
  } else if (macd.histogram > 0 && adx > 20 && adx < 40 && rsi < 70 && multiResonate) {
    trend = '启动拉升';
  } else if (rsi > 70 && macd.histogram < 0 && cmf < 0 && volRatio1h > 1.2) {
    trend = '分布出货';
  } else if (adx < 20 && Math.abs(ch1h) < 0.5 && volRatio1h < 0.8) {
    trend = '洗盘震荡';
  } else if (adx > 30 && macd.histogram < 0 && ch6h < -2 && rsi < 40) {
    trend = '单边下跌';
  }

  // ============ 防抖分类逻辑（新增） ============
  if (!history[symbol]) {
    history[symbol] = {
      firstTime: Date.now(),
      signalCount: 0,
      categoryHistory: {},
      duration: 0,
      lastCategory: 'watch',
      categoryChangeTime: 0,
      categoryConfirmCount: 0
    };
  }

  history[symbol].duration = Date.now() - history[symbol].firstTime;

  let category = 'watch';
  let categoryName = '监控';
  let subCategory = '';
  let buySignal = false;

  // 计算当前应该的分类（还未确认）
  let targetCategory = 'watch';
  let targetSubCategory = '';
  let targetBuySignal = false;

  if (Math.abs(ch1h) > 2 && volRatio1h > 1.8 && t.q < 1e9) {
    targetCategory = 'yao';
    categoryName = '妖币异动';

    if ((trend === '启动拉升' || macd.histogram > 0) && multiResonate && riskLevel === 'low' && longRatio < 0.5) {
      targetSubCategory = '买入';
      targetBuySignal = true;
    } else if (riskLevel === 'mid' || rsi > 70) {
      targetSubCategory = '观察';
    }
  } else if (multiResonate && adx > 20 && macd.histogram > 0 && history[symbol].duration >= 300000 && riskLevel !== 'high') {
    targetCategory = 'buy';
    categoryName = '建议币';

    if (riskLevel === 'low' && (trend === '启动拉升' || trend === '挤压空头') && rsi < 70 && takerBuy1h && mfi < 70) {
      targetSubCategory = '直接买入';
      targetBuySignal = true;
    } else if (riskLevel === 'mid' || rsi >= 70 || adx < 25) {
      targetSubCategory = '优秀币';
    }
  }

  // 防抖：需要连续2次确认才切换分类
  const now = Date.now();
  const timeSinceChange = now - history[symbol].categoryChangeTime;

  if (targetCategory !== history[symbol].lastCategory) {
    if (timeSinceChange > CONFIG.signalConfirmMs) {
      history[symbol].categoryConfirmCount = 1;
    } else if (history[symbol].categoryConfirmCount === 1) {
      history[symbol].categoryConfirmCount = 2;
    }
  } else {
    history[symbol].categoryConfirmCount = 0;
  }

  // 确认通过则更新
  if (history[symbol].categoryConfirmCount >= 2 || targetCategory === history[symbol].lastCategory) {
    category = targetCategory;
    subCategory = targetSubCategory;
    buySignal = targetBuySignal;
    history[symbol].lastCategory = category;
    history[symbol].categoryChangeTime = now;
    history[symbol].categoryConfirmCount = 0;
  } else {
    category = history[symbol].lastCategory;
  }

  // ============ 记录信号历史（用于计算准确率） ============
  if (!signalHistory[symbol]) {
    signalHistory[symbol] = [];
    signalAccuracy[symbol] = 0;
  }

  if (category !== 'watch' && !history[symbol].categoryHistory?.[category]) {
    const signal = {
      time: now,
      category: category,
      subCategory: subCategory,
      ch6h: ch6h,
      price: t.p,
      confirmed: false,
      result: null
    };
    signalHistory[symbol].push(signal);
    history[symbol].categoryHistory = history[symbol].categoryHistory || {};
    history[symbol].categoryHistory[category] = { firstTime: now, count: 0 };
    history[symbol].signalCount = (history[symbol].signalCount || 0) + 1;
  }

  // 回溯检查信号准确率（6小时后检验）
  const sixHoursAgo = now - 6 * 3600 * 1000;
  const oldSignals = signalHistory[symbol].filter(s => s.time < sixHoursAgo && !s.confirmed);
  oldSignals.forEach(s => {
    s.confirmed = true;
    // 如果6小时后涨幅>2%为成功信号
    s.result = ch6h > 2 ? 'success' : 'fail';
  });

  // 计算准确率
  const confirmedSignals = signalHistory[symbol].filter(s => s.confirmed);
  if (confirmedSignals.length > 0) {
    const successCount = confirmedSignals.filter(s => s.result === 'success').length;
    signalAccuracy[symbol] = Math.round((successCount / confirmedSignals.length) * 100);
  }

  const accuracy = signalAccuracy[symbol] || (buySignal ? 70 : 50);

  return {
    symbol,
    price: t.p,
    ch24h: t.ch,
    v24h: t.v,
    q24h: t.q,

    ch5m, ch15m, ch1h, ch4h, ch6h,
    v5m: k5m.v, v15m: k15m.v, v1h: k1h.v, v4h: k4h.v, v6h: k6h.v,
    tr5m: k5m.tr, tr15m: k15m.tr, tr1h: k1h.tr, tr4h: k4h.tr, tr6h: k6h.tr,

    rsi, macd, adx, bb, atr,
    obv, cmf, mfi, vwap, roc,

    volRatio: volRatio1h,
    takerBuy1h, takerSell1h,

    fundingRate, oi, oiChange, longRatio, premium,

    riskLevel, riskScore,
    stage, trend,
    category, categoryName, subCategory, buySignal,
    signalCount: history[symbol].signalCount || 0,
    duration: history[symbol].duration,
    multiResonate,
    accuracy
  };
}

// ============ 渲染监控页面（增量渲染） ============

function renderMonitor() {
  const now = new Date();
  document.getElementById('update-time').textContent =
    String(now.getHours()).padStart(2, '0') + ':' +
    String(now.getMinutes()).padStart(2, '0');

  const results = CONFIG.symbols
    .map(s => analyzeCoin(s))
    .filter(r => r !== null);

  const directBuy = results.filter(r => r.category === 'buy' && r.subCategory === '直接买入');
  const excellent = results.filter(r => r.category === 'buy' && r.subCategory === '优秀币');
  const yaoBuy = results.filter(r => r.category === 'yao' && r.subCategory === '买入');
  const yaoWatch = results.filter(r => r.category === 'yao' && r.subCategory === '观察');

  document.getElementById('count-direct').textContent = directBuy.length;
  document.getElementById('count-excellent').textContent = excellent.length;
  document.getElementById('count-yao-buy').textContent = yaoBuy.length;
  document.getElementById('count-yao-watch').textContent = yaoWatch.length;

  // 计算平均准确率
  const allSignalCoins = results.filter(r => r.category !== 'watch');
  const avgAccuracy = allSignalCoins.length > 0
    ? Math.round(allSignalCoins.reduce((sum, r) => sum + r.accuracy, 0) / allSignalCoins.length)
    : 0;
  document.getElementById('avg-accuracy').textContent = avgAccuracy;

  // 排序逻辑
  const sortFn = {
    accuracy: (a, b) => b.accuracy - a.accuracy,
    risk: (a, b) => {
      const riskMap = { low: 0, mid: 1, high: 2 };
      return riskMap[a.riskLevel] - riskMap[b.riskLevel];
    },
    adx: (a, b) => b.adx - a.adx,
    cvi: (a, b) => b.mfi - a.mfi
  };

  const sort = sortFn[currentSort] || sortFn.accuracy;
  directBuy.sort(sort);
  excellent.sort(sort);
  yaoBuy.sort(sort);
  yaoWatch.sort(sort);

  const allBuyCoins = [...directBuy, ...excellent].slice(0, 10);
  const topDirectBuy = allBuyCoins.filter(r => r.subCategory === '直接买入');
  const topExcellent = allBuyCoins.filter(r => r.subCategory === '优秀币');

  let html = '';

  if (topDirectBuy.length) {
    html += `<div class="section-title buy">🟢 直接买入 (${topDirectBuy.length})</div>`;
    html += `<div class="grid">${topDirectBuy.map(r => renderCoinCard(r)).join('')}</div>`;
  }

  if (topExcellent.length) {
    html += `<div class="section-title buy">🟡 优秀币 (${topExcellent.length})</div>`;
    html += `<div class="grid">${topExcellent.map(r => renderCoinCard(r)).join('')}</div>`;
  }

  if (yaoBuy.length) {
    html += `<div class="section-title yao">🟢 妖币买入 (${yaoBuy.length})</div>`;
    html += `<div class="grid">${yaoBuy.map(r => renderCoinCard(r)).join('')}</div>`;
  }

  if (yaoWatch.length) {
    html += `<div class="section-title yao">🟡 妖币观察 (${yaoWatch.length})</div>`;
    html += `<div class="grid">${yaoWatch.map(r => renderCoinCard(r)).join('')}</div>`;
  }

  if (!topDirectBuy.length && !topExcellent.length && !yaoBuy.length && !yaoWatch.length) {
    html = '<div class="empty">⏳ 数据加载中，请稍候...</div>';
  }

  document.getElementById('monitor-content').innerHTML = html;
}

  if (r.cmf < -0.15) {

  }

  html += advices.map(a => `<div class="row"><span class="row-key">·</span><span class="row-value">${a}</span></div>`).join('');

function drawChart(symbol) {
  const container = document.getElementById('chart');
  if (!container) return;

  container.innerHTML = '';

  const chart = LightweightCharts.createChart(container, {
    layout: {
      textColor: '#94a3b8',
      backgroundColor: 'rgba(10,14,39,0)',
    },
    timeScale: {
      timeVisible: true,
      secondsVisible: false,
    },
    priceScale: {
      scaleMargins: {
        top: 0.2,
        bottom: 0.2,
      },
    },
  });

  const candleSeries = chart.addCandlestickSeries({
    upColor: '#10b981',
    downColor: '#ef4444',
    borderVisible: false,
    wickUpColor: '#10b981',
    wickDownColor: '#ef4444',
  });

  const volumeSeries = chart.addHistogramSeries({
    color: '#3b82f6',
    priceFormat: { type: 'volume' },
    priceScaleId: 'volume',
  });

  chart.priceScale('volume').applyOptions({
    scaleMargins: {
      top: 0.7,
      bottom: 0,
    },
  });

  const coin = allCoins[symbol];
  const data = [];
  const volData = [];
  let timeCounter = Math.floor(Date.now() / 1000) - 3600;

  ['5m', '15m', '1h', '4h', '6h'].forEach(tf => {
    const k = coin.klines[tf];
    if (!k || !k.c) return;

    data.push({
      time: timeCounter,
      open: k.o,
      high: k.h || Math.max(k.o, k.c),
      low: k.l || Math.min(k.o, k.c),
      close: k.c,
    });

    volData.push({
      time: timeCounter,
      value: k.v || 0,
      color: k.c >= k.o ? '#10b98180' : '#ef444480'
    });

    timeCounter += 600;
  });

  if (data.length > 0) {
    candleSeries.setData(data);
    volumeSeries.setData(volData);
    chart.timeScale().fitContent();
  }
}

function copySymbol(symbol) {
  navigator.clipboard.writeText(symbol.toUpperCase() + 'USDT');
  toast(`✅ 已复制 ${symbol.toUpperCase()}USDT`);
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('active');
}

function handleSearch(val) {
  const query = val.toLowerCase().trim();
  if (!query) {
    document.getElementById('search-results').innerHTML = '';
    return;
  }

  const matches = CONFIG.symbols
    .filter(s => s.includes(query))
    .map(s => analyzeCoin(s))
    .filter(r => r !== null)
    .sort((a, b) => b.accuracy - a.accuracy);

  let html = '';
  if (matches.length) {
    html = `<div class="grid">${matches.map(r => renderCoinCard(r)).join('')}</div>`;
  } else {
    html = '<div class="empty">未找到该币种，或数据加载中...</div>';
  }

  document.getElementById('search-results').innerHTML = html;
}

async function refreshData() {
  toast('🔄 数据刷新中...');
  await Promise.all([
    ...CONFIG.symbols.map(s => fetchKlineData(s)),
    fetchFuturesDataBatch()
  ]);
  renderMonitor();
  toast('✅ 数据已更新');
}

async function initAllData() {
  toast('⏳ 初始化数据中...');
  console.log('开始获取所有数据...');
  
  // 并发获取所有K线数据
  const klinePromises = CONFIG.symbols.map(s => fetchKlineData(s));
  await Promise.allSettled(klinePromises);
  
  // 获取期货数据
  await fetchFuturesDataBatch();
  
  renderMonitor();
  toast('✅ 数据初始化完成');
  console.log('数据初始化完成');
}

// ============ 初始化 ============

document.addEventListener('DOMContentLoaded', () => {
  console.log('页面加载完成');
  
  // 初始化WebSocket
  initWebSocket();

  // 初始数据获取（延迟1秒，给WebSocket时间连接）
  setTimeout(() => {
    initAllData();
  }, 1000);

  // 定时更新K线数据（快速）
  setInterval(() => {
    const batch = CONFIG.symbols.slice(0, 10);
    batch.forEach(s => fetchKlineData(s));
  }, CONFIG.fastRefreshMs);

  // 定时更新期货数据（慢速）
  setInterval(() => {
    fetchFuturesDataBatch();
    renderMonitor();
  }, CONFIG.slowRefreshMs);

  // 搜索输入
  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('keyup', (e) => {
      handleSearch(e.target.value);
    });
  }

  // 点击模态框外部关闭
  document.getElementById('detail-modal').addEventListener('click', (e) => {
    if (e.target.id === 'detail-modal') closeModal();
  });

  // 健康检查
  setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      console.log('⚠️ WebSocket掉线，尝试重新连接...');
      initWebSocket();
    }
  }, 30000);
});

// ============ 错误处理 ============

window.addEventListener('error', (e) => {
  console.error('运行时错误:', e.error);
});

window.addEventListener('unhandledrejection', (e) => {
  console.error('未处理的Promise拒绝:', e.reason);
});

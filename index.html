<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ 币安交易系统 Pro Max - 终极版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #10c4f5;
      --primary-dark: #0d9ecf;
      --primary-light: #4dd9ff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg-main: #061018;
      --bg-card: #0a1628;
      --bg-hover: #0d1f35;
      --text-primary: #e5eefb;
      --text-secondary: #8ca3ba;
      --border: rgba(16, 196, 245, 0.25);
      --border-light: rgba(16, 196, 245, 0.12);
    }

    body {
      background: linear-gradient(135deg, var(--bg-main) 0%, #0b1730 100%);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      padding: 12px;
      font-size: 13px;
      overflow-x: hidden;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
    }

    /* ===== 顶部区域 ===== */
    .header {
      background: linear-gradient(135deg, rgba(16, 196, 245, 0.1) 0%, rgba(168, 85, 247, 0.05) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-size: 26px;
      background: linear-gradient(135deg, var(--primary) 0%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .header-stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(16, 196, 245, 0.08);
      border-radius: 6px;
      border: 1px solid rgba(16, 196, 245, 0.2);
      font-size: 12px;
    }

    .stat-label {
      color: var(--text-secondary);
    }

    .stat-value {
      color: var(--primary);
      font-weight: bold;
      font-size: 14px;
    }

    .time-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(16, 196, 245, 0.1);
      border-radius: 6px;
      border: 1px solid rgba(16, 196, 245, 0.2);
      font-size: 11px;
    }

    .refresh-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .refresh-dot.loading {
      background: var(--warning);
      animation: spin-dot 1s linear infinite;
    }

    @keyframes spin-dot {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== 标签页 ===== */
    .tabs-container {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tabs-container::-webkit-scrollbar {
      height: 4px;
    }

    .tabs-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .tabs-container::-webkit-scrollbar-thumb {
      background: rgba(16, 196, 245, 0.3);
      border-radius: 2px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
      white-space: nowrap;
      position: relative;
    }

    .tab-btn:hover {
      color: var(--primary);
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-badge {
      display: inline-block;
      background: var(--danger);
      color: white;
      border-radius: 10px;
      padding: 2px 6px;
      font-size: 10px;
      margin-left: 6px;
      font-weight: bold;
    }

    /* ===== 搜索框 ===== */
    .search-section {
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
      transition: all 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 16px rgba(16, 196, 245, 0.3);
      background: rgba(10, 22, 40, 0.95);
    }

    .search-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .search-dropdown.active {
      display: block;
      animation: slideDown 0.2s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .search-item {
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-light);
      transition: all 0.2s;
    }

    .search-item:hover {
      background: rgba(16, 196, 245, 0.15);
    }

    .search-item-symbol {
      color: var(--primary);
      font-weight: bold;
      font-size: 12px;
    }

    .search-item-info {
      color: var(--text-secondary);
      font-size: 11px;
      margin-top: 3px;
    }

    .filter-btn {
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.3s;
    }

    .filter-btn:hover {
      border-color: var(--primary);
      background: rgba(16, 196, 245, 0.1);
    }

    /* ===== 卡片网格 ===== */
    .coin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 1400px) {
      .coin-grid {
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      }
    }

    @media (max-width: 768px) {
      .coin-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      }
    }

    .coin-card {
      background: linear-gradient(135deg, rgba(10, 22, 40, 0.95) 0%, rgba(13, 31, 53, 0.6) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .coin-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(16, 196, 245, 0.1), transparent);
      transition: left 0.5s;
    }

    .coin-card:hover::before {
      left: 100%;
    }

    .coin-card:hover {
      border-color: rgba(16, 196, 245, 0.6);
      box-shadow: 0 8px 24px rgba(16, 196, 245, 0.2), inset 0 0 24px rgba(16, 196, 245, 0.05);
      transform: translateY(-2px);
    }

    .coin-card.collecting {
      border: 2px solid rgba(245, 158, 11, 0.8);
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.08) 0%, rgba(168, 85, 247, 0.08) 100%);
    }

    .coin-card.expired {
      opacity: 0.6;
      border-color: rgba(245, 158, 11, 0.2);
    }

    .coin-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }

    .coin-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .coin-symbol {
      font-size: 16px;
      color: var(--primary);
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .coin-price {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .coin-actions {
      display: flex;
      gap: 4px;
    }

    .action-btn {
      background: none;
      border: 1px solid rgba(245, 158, 11, 0.4);
      color: var(--warning);
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      min-height: 28px;
    }

    .action-btn:hover {
      border-color: var(--warning);
      background: rgba(245, 158, 11, 0.2);
      transform: scale(1.1);
    }

    .action-btn.starred {
      border-color: #fcd34d;
      background: rgba(245, 158, 11, 0.3);
      color: #fcd34d;
    }

    .action-btn.delete {
      color: var(--danger);
      border-color: rgba(239, 68, 68, 0.4);
    }

    .action-btn.delete:hover {
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.2);
    }

    /* ===== 标签 ===== */
    .tags-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      border: 1px solid;
      white-space: nowrap;
    }

    .tag-yao {
      background: rgba(168, 85, 247, 0.35);
      color: #d8b4fe;
      border-color: rgba(168, 85, 247, 0.6);
    }

    .tag-s {
      background: rgba(34, 197, 94, 0.4);
      color: #4ade80;
      border-color: rgba(34, 197, 94, 0.7);
    }

    .tag-a {
      background: rgba(34, 197, 94, 0.3);
      color: #22c55e;
      border-color: rgba(34, 197, 94, 0.6);
    }

    .tag-b {
      background: rgba(59, 130, 246, 0.25);
      color: #60a5fa;
      border-color: rgba(59, 130, 246, 0.5);
    }

    .tag-c {
      background: rgba(245, 158, 11, 0.25);
      color: #fbbf24;
      border-color: rgba(245, 158, 11, 0.5);
    }

    .tag-watch {
      background: rgba(59, 130, 246, 0.3);
      color: #93c5fd;
      border-color: rgba(59, 130, 246, 0.6);
    }

    .tag-active {
      background: rgba(34, 197, 94, 0.3);
      color: var(--success);
      border-color: rgba(34, 197, 94, 0.6);
    }

    .tag-expired {
      background: rgba(245, 158, 11, 0.2);
      color: var(--warning);
      border-color: rgba(245, 158, 11, 0.4);
    }

    /* ===== 统计信息 ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 6px;
      margin-bottom: 8px;
      font-size: 11px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      padding: 4px 6px;
      background: rgba(16, 196, 245, 0.05);
      border-radius: 4px;
      border-left: 2px solid rgba(16, 196, 245, 0.3);
    }

    .stat-label {
      color: var(--text-secondary);
    }

    .stat-val {
      color: var(--text-primary);
      font-weight: bold;
    }

    .green { color: var(--success); }
    .red { color: var(--danger); }
    .yellow { color: var(--warning); }

    /* ===== 信心度条 ===== */
    .confidence-bar {
      width: 100%;
      height: 4px;
      background: rgba(16, 196, 245, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--danger), var(--warning), var(--success));
      width: 0;
      border-radius: 2px;
      transition: width 0.5s ease-out;
    }

    /* ===== 提示框 ===== */
    .advice-box {
      background: rgba(34, 197, 94, 0.12);
      border-left: 3px solid rgba(34, 197, 94, 0.5);
      padding: 7px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: #86efac;
      margin-bottom: 6px;
      line-height: 1.5;
      position: relative;
      z-index: 2;
    }

    .advice-box.warn {
      background: rgba(245, 158, 11, 0.12);
      border-left-color: rgba(245, 158, 11, 0.5);
      color: #fcd34d;
    }

    .advice-box.risk {
      background: rgba(239, 68, 68, 0.12);
      border-left-color: rgba(239, 68, 68, 0.5);
      color: #fca5a5;
    }

    .advice-box.info {
      background: rgba(59, 130, 246, 0.12);
      border-left-color: rgba(59, 130, 246, 0.5);
      color: #93c5fd;
    }

    /* ===== 信号徽章 ===== */
    .signals {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding-top: 6px;
      border-top: 1px solid var(--border-light);
      position: relative;
      z-index: 2;
    }

    .signal-badge {
      display: inline-block;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 9px;
      background: rgba(59, 130, 246, 0.25);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.4);
      white-space: nowrap;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ===== 空状态 ===== */
    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    /* ===== 模态框 ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px;
      animation: fadeIn 0.3s ease-out;
    }

    .modal.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 20px;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(6, 16, 24, 0.98) 0%, rgba(11, 23, 48, 0.98) 100%);
      border: 1px solid rgba(16, 196, 245, 0.3);
      border-radius: 12px;
      padding: 24px;
      max-width: 1000px;
      width: 100%;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .close-btn:hover {
      color: var(--primary);
      background: rgba(16, 196, 245, 0.1);
      transform: rotate(90deg);
    }

    .detail-title {
      font-size: 24px;
      color: var(--primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .detail-item {
      background: rgba(16, 196, 245, 0.08);
      border: 1px solid rgba(16, 196, 245, 0.2);
      border-radius: 6px;
      padding: 10px;
    }

    .detail-item-label {
      color: var(--text-secondary);
      font-size: 10px;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-item-value {
      color: var(--primary);
      font-size: 14px;
      font-weight: bold;
    }

    .detail-box {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .detail-box h3 {
      color: var(--success);
      margin-bottom: 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-box.warn {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .detail-box.warn h3 {
      color: var(--warning);
    }

    .detail-box.risk {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .detail-box.risk h3 {
      color: var(--danger);
    }

    .detail-box.tracking {
      background: rgba(168, 85, 247, 0.12);
      border-color: rgba(168, 85, 247, 0.3);
    }

    .detail-box.tracking h3 {
      color: #d8b4fe;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 11px;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-secondary);
    }

    .detail-value {
      font-weight: bold;
      color: var(--text-primary);
      text-align: right;
    }

    .scenario-box {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
    }

    .scenario-title {
      color: #93c5fd;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .scenario-content {
      font-size: 10px;
      color: #dbeafe;
      line-height: 1.6;
    }

    .scenario-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 9px;
      background: rgba(59, 130, 246, 0.3);
      color: #93c5fd;
    }

    /* ===== 自选卡片 ===== */
    .collected-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }

    .collected-card {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(168, 85, 247, 0.05) 100%);
      border: 2px solid rgba(168, 85, 247, 0.4);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .collected-card:hover {
      border-color: rgba(168, 85, 247, 0.8);
      box-shadow: 0 8px 24px rgba(168, 85, 247, 0.2);
      transform: translateY(-2px);
    }

    .collected-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .collected-symbol {
      font-size: 16px;
      color: #d8b4fe;
      font-weight: bold;
    }

    .collected-status {
      font-size: 10px;
      color: #c4b5fd;
      padding: 3px 7px;
      background: rgba(168, 85, 247, 0.3);
      border-radius: 3px;
    }

    .collected-info {
      font-size: 10px;
      color: #c4b5fd;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .collected-price {
      font-size: 13px;
      color: #e9d5ff;
      font-weight: bold;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .collected-analysis {
      background: rgba(168, 85, 247, 0.25);
      border-left: 2px solid rgba(168, 85, 247, 0.6);
      padding: 7px 8px;
      border-radius: 3px;
      font-size: 10px;
      color: #e9d5ff;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .collected-remove {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: bold;
      width: 100%;
      text-align: center;
    }

    .collected-remove:hover {
      background: rgba(239, 68, 68, 0.35);
      border-color: rgba(239, 68, 68, 0.6);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 1024px) {
      .detail-grid {

    <div class="modal-content">

  <script>
    // ======================== 核心变量 ========================
    let allCoinsData = [];
    let allRows = { yao: [], buy: [], watch: [] };
    let previousData = JSON.parse(localStorage.getItem('previousData') || '{}');
    let twoStepsAgoData = JSON.parse(localStorage.getItem('twoStepsAgoData') || '{}');
    let triggeredYaos = JSON.parse(localStorage.getItem('triggeredYaos') || '{}');
    let collectedCoins = JSON.parse(localStorage.getItem('collectedCoins') || '{}');
    let oiMap = {};
    let isLoading = false;
    let autoRefreshInterval = null;
    let currentTab = 'yao';

    // ======================== 工具函数 ========================
    function fmtNum(num, decimal = 2) {
      if (!num || isNaN(num)) return '0';
      if (num >= 1e9) return (num / 1e9).toFixed(decimal) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(decimal) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(decimal) + 'K';
      return num.toFixed(decimal);
    }

    function showNotification(message, type = 'success') {
      const div = document.createElement('div');
      div.className = `notification ${type}`;
      div.textContent = message;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 4000);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.closest('.tab-btn').classList.add('active');

      document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
      document.getElementById(`${tab}-tab`).style.display = 'block';

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleCollect(symbol, event) {
      event.stopPropagation();
      const coin = allCoinsData.find(c => c.symbol === symbol);
      if (!coin) return;

      if (collectedCoins[symbol]) {
        delete collectedCoins[symbol];
        showNotification(`已移出自选: ${symbol}`, 'warning');
      } else {
        collectedCoins[symbol] = {
          symbol,
          collectTime: Date.now(),
          collectPrice: coin.price,
          level: coin.level || '未分类'
        };
        showNotification(`已收藏: ${symbol}`, 'success');
      }

      localStorage.setItem('collectedCoins', JSON.stringify(collectedCoins));
      document.getElementById('stat-collected').innerText = Object.keys(collectedCoins).length;

      const starBtn = event.target.closest('.action-btn');
      if (starBtn) {
        starBtn.classList.toggle('starred');
      }

      renderCollectedList();
    }

    // ======================== 妖币沉默机制 ========================
    function addTriggeredYao(symbol, yaoData) {
      if (!triggeredYaos[symbol]) {
        triggeredYaos[symbol] = {
          symbol,
          triggeredTime: Date.now(),
          status: yaoData.status,
          action: yaoData.action,
          yaoScore: yaoData.yaoScore,
          confidence: yaoData.confidence,
          signals: yaoData.signals,
          reason: yaoData.reason
        };
        localStorage.setItem('triggeredYaos', JSON.stringify(triggeredYaos));
        return true;
      }
      return false;
    }

    function isYaoExpired(symbol) {
      const record = triggeredYaos[symbol];
      if (!record) return true;
      const elapsed = Date.now() - record.triggeredTime;
      const silenceDuration = 48 * 60 * 60 * 1000;
      return elapsed >= silenceDuration;
    }

    function deleteYao(symbol, event) {
      if (event) event.stopPropagation();
      delete triggeredYaos[symbol];
      localStorage.setItem('triggeredYaos', JSON.stringify(triggeredYaos));
      renderYaoList();
      showNotification(`已删除妖币: ${symbol}`, 'warning');
    }

    function getYaoList() {
      const result = [];
      const now = Date.now();

      Object.values(triggeredYaos).forEach(yao => {
        const elapsed = now - yao.triggeredTime;
        const silenceDuration = 48 * 60 * 60 * 1000;
        const remainingTime = Math.max(0, Math.ceil((silenceDuration - elapsed) / 1000 / 60));

        result.push({
          ...yao,
          isActive: elapsed < silenceDuration,
          remainingMinutes: remainingTime,
          expireStatus: elapsed < silenceDuration ? '监控中' : '已过期'
        });
      });

      return result.sort((a, b) => b.triggeredTime - a.triggeredTime);
    }

    // ======================== 多维分析系统 ========================
    class CoinAnalyzer {
      constructor(row, previous, twoStepsAgo) {
        this.row = row;
        this.prev = previous;
        this.twoStepsAgo = twoStepsAgo;
        this.evidences = [];
        this.score = 0;
      }

      analyzePriceDynamics() {
        const priceChange = this.row.priceChange;
        if (priceChange > -15 && priceChange < 10) {
          this.evidences.push('价格平稳');
          if (this.prev && this.row.price > this.prev.price) {
            this.evidences.push('短期反弹');
            return 15;
          }
          return 8;
        }
        if (priceChange > 0 && priceChange < 8) {
          this.evidences.push('缓慢上升');
          return 12;
        }
        return 0;
      }

      analyzeVolumeAuthenticity() {
        if (!this.row.volMcap || !this.row.oiMcap) return 0;
        const oiToVolRatio = this.row.oiMcap / (this.row.volMcap || 0.1);

        if (oiToVolRatio > 2) {
          this.evidences.push('⚠️ OI可能虚假');
          return -20;
        }
        if (this.row.volMcap > 8 && this.row.oiMcap > 2) {
          this.evidences.push('成交✓OI真');
          return 18;
        }
        if (this.row.volMcap > 10 && this.row.oiMcap > 1.5) {
          this.evidences.push('成交活跃');
          return 15;
        }
        return 0;
      }

      analyzeFundingPattern() {
        if (!this.prev) return 0;
        const fundingNow = this.row.funding;
        const fundingPrev = this.prev.funding;
        const fundingTrend = fundingNow - fundingPrev;

        if (fundingPrev < 0 && fundingNow > 0.003) {
          this.evidences.push('空头平仓');
          return 20;
        }
        if (fundingNow > 0.01 && fundingNow < 0.04 && fundingTrend > 0.002) {
          this.evidences.push('多头加仓中');
          return 16;
        }
        if (fundingNow > 0.05) {
          this.evidences.push('资费过高-风险');
          return -15;
        }
        if (fundingNow > 0.005 && fundingNow < 0.025) {
          this.evidences.push('资金做多');
          return 12;
        }
        return 0;
      }

      analyzeOIGrowth() {
        if (!this.prev || !this.row.oiMcap) return 0;
        const oiGrowth = (this.row.oiMcap - this.prev.oiMcap) / (this.prev.oiMcap || 0.1);
        const priceGrowth = (this.row.price - this.prev.price) / this.prev.price;

        if (oiGrowth > 0.15 && Math.abs(priceGrowth) < 0.05) {
          this.evidences.push('底部积累中');
          return 22;
        }
        if (oiGrowth > -0.05 && oiGrowth < 0.1 && priceGrowth > 0) {
          this.evidences.push('OI稳健');
          return 10;
        }
        if (oiGrowth < -0.2) {
          this.evidences.push('资金出逃');
          return -25;
        }
        return 0;
      }

      analyzeAddressActivity() {
        if (!this.prev || !this.row.volMcap) return 0;
        const volGrowth = (this.row.volMcap - this.prev.volMcap) / (this.prev.volMcap || 0.1);

        if (volGrowth > 0.4 && this.row.oiMcap > 2) {
          this.evidences.push('地址活跃度↑');
          return 18;
        }
        if (Math.abs(volGrowth) < 0.3 && this.row.volMcap > 8) {
          this.evidences.push('地址活跃✓');
          return 12;
        }
        return 0;
      }

      analyzeMarketCap() {
        const mcap = this.row.mcap;
        if (!mcap) return 0;
        if (mcap > 1e7 && mcap < 3e8) {
          this.evidences.push('市值适中');
          return 6;
        }
        if (mcap >= 3e8 && mcap < 1.5e9) {
          this.evidences.push('市值偏大');
          return 2;
        }
        if (mcap < 1e7) {
          this.evidences.push('市值偏小');
          return -2;
        }
        if (mcap >= 1.5e9) {
          this.evidences.push('市值较大');
          return -2;
        }
        return 0;
      }

      analyzeTimeSequence() {
        if (!this.prev || !this.twoStepsAgo) return 0;

        const oiTrend = (this.row.oiMcap > this.prev.oiMcap) &&
          (this.prev.oiMcap > this.twoStepsAgo.oiMcap);
        const volTrend = (this.row.volMcap > this.prev.volMcap) &&
          (this.prev.volMcap > this.twoStepsAgo.volMcap);
        const fundingTrend = (this.row.funding > this.prev.funding) &&
          (this.prev.funding > this.twoStepsAgo.funding);

        let trends = 0;
        if (oiTrend) { this.evidences.push('OI连升'); trends++; }
        if (volTrend) { this.evidences.push('成交连升'); trends++; }
        if (fundingTrend) { this.evidences.push('资费连升'); trends++; }

        return trends * 8;
      }

      getScore() {
        const dimensions = [
          this.analyzePriceDynamics(),
          this.analyzeVolumeAuthenticity(),
          this.analyzeFundingPattern(),
          this.analyzeOIGrowth(),
          this.analyzeAddressActivity(),
          this.analyzeMarketCap(),
          this.analyzeTimeSequence()
        ];
        this.score = Math.max(0, Math.min(100, dimensions.reduce((a, b) => a + b, 0)));
        return this.score;
      }

      getConfidence() {
        const evidenceCount = this.evidences.length;
        return Math.min(100, evidenceCount * 12);
      }
    }

    // ======================== 检测函数 ========================
    function detectYaoCoin(row, prev, twoStepsAgo) {
      const analyzer = new CoinAnalyzer(row, prev, twoStepsAgo);
      const score = analyzer.getScore();
      const confidence = analyzer.getConfidence();
      const negativeCount = analyzer.evidences.filter(e => e.includes('⚠️') || e.includes('风险')).length;

      if (score >= 70 && analyzer.evidences.length >= 4 && negativeCount <= 1) {
        let status = '';
        let action = '';

        if (score >= 82 && confidence >= 70) {
          status = '🟢 强妖嫌疑';
          action = '可小仓试水 1-2%';
        } else if (score >= 75) {
          status = '🟡 中妖嫌疑';
          action = '观察为主';
        } else {
          status = '🔵 早期苗头';
          action = '加入自选';
        }

        return {
          isYao: true,
          status,
          action,
          yaoScore: score,
          confidence,
          signals: analyzer.evidences,
          reason: analyzer.evidences.slice(0, 3).join(' + ')
        };
      }

      return { isYao: false };
    }

    function detectBuyCoin(row, prev, twoStepsAgo) {
      const analyzer = new CoinAnalyzer(row, prev, twoStepsAgo);
      const score = analyzer.getScore();
      const confidence = analyzer.getConfidence();
      const negativeCount = analyzer.evidences.filter(e => e.includes('⚠️') || e.includes('风险')).length;

      if (score >= 64 && analyzer.evidences.length >= 4 && negativeCount <= 1 &&
        row.priceChange > -8 && row.priceChange < 18) {

        let grade = '';
        let position = '';
        let leverage = '';

        if (score >= 82 && confidence >= 70) {
          grade = 'S';
          position = '账户 3-5%';
          leverage = '1-3倍杠杆';
        } else if (score >= 75 && confidence >= 60) {
          grade = 'A';
          position = '账户 2-3%';
          leverage = '1-2倍杠杆';
        } else if (score >= 70 && confidence >= 50) {
          grade = 'B';
          position = '账户 1.5-2%';
          leverage = '1倍（现货）';
        } else {
          grade = 'C';
          position = '账户 1%';
          leverage = '现货观察';
        }

        return {
          isBuy: true,
          grade,
          position,
          leverage,
          buyScore: score,
          confidence,
          signals: analyzer.evidences,
          reason: analyzer.evidences.slice(0, 3).join(' + ')
        };
      }

      return { isBuy: false };
    }

    function detectWatch(row, prev, twoStepsAgo) {
      const analyzer = new CoinAnalyzer(row, prev, twoStepsAgo);
      const score = analyzer.getScore();

      if (score >= 60 && score < 64 && analyzer.evidences.length >= 3) {
        return {
          isWatch: true,
          watchScore: score,
          signals: analyzer.evidences,
          reason: '信号积累中，继续观察'
        };
      }

      return { isWatch: false };
    }

    // ======================== 场景分析 ========================
    function analyzeScenarios(coin, prev, twoStepsAgo) {
      const scenarios = [];
      if (!prev) return scenarios;

      const priceChange = coin.priceChange;
      const oiChange = prev.oiMcap ? ((coin.oiMcap - prev.oiMcap) / prev.oiMcap * 100) : 0;
      const volChange = prev.volMcap ? ((coin.volMcap - prev.volMcap) / prev.volMcap * 100) : 0;
      const fundingChange = coin.funding - prev.funding;

      // 情景1：真突破
      if (priceChange > 3 && oiChange > 8 && volChange > 15 && fundingChange > 0.001) {
        scenarios.push({
          name: '真突破开始',
          probability: '可能性: 70-90%',
          description: '价格、OI、成交、资费四维齐升。主力发动真实上行。',
          action: '🟢 应对：加仓50-80%，设止损-2%，目标预案1/2/3',
          confidence: 'VERY_HIGH'
        });
      }

      // 情景2：吸筹诱空
      if (oiChange > 10 && priceChange < -2 && volChange > 20 && coin.funding > 0.005) {
        scenarios.push({
          name: '吸筹诱空',
          probability: '可能性: 60-80%',
          description: 'OI持续增长，价格却下跌。典型砸底吸筹。',
          action: '🟢 应对：加仓30-50%，防止追高，等待反弹',
          confidence: 'HIGH'
        });
      }

      // 情景3：假突破
      if (coin.funding > 0.04 && priceChange > 12 && oiChange < 5) {
        scenarios.push({
          name: '假突破风险',
          probability: '可能性: 50-70%',
          description: '资费极高，价格快升但OI增长缓慢。典型诱多出货。',
          action: '🔴 应对：立即减仓40-60%，设止损-2.5%',
          confidence: 'MEDIUM'
        });
      }

      // 情景4：底部积累
      if (oiChange > 8 && oiChange < 20 && Math.abs(priceChange) < 3 && fundingChange < 0.005) {
        scenarios.push({
          name: '底部积累阶段',
          probability: '可能性: 65-80%',
          description: 'OI温和增长，价格缓涨缓跌。主力耐心吸筹。',
          action: '🟢 应对：分批建仓，耐心等待突破确认',
          confidence: 'MEDIUM_HIGH'
        });
      }

      // 情景5：资金流出
      if (oiChange < -15 && priceChange < -2) {
        scenarios.push({
          name: '资金流出',
          probability: '可能性: 70-85%',
          description: 'OI快速下降，价格下跌。主力可能离场。',
          action: '🔴 应对：立即减仓60-80%，保留10-20%观察底部',
          confidence: 'HIGH'
        });
      }

      // 情景6：顶部诱多
      if (priceChange > 12 && oiChange < 5 && fundingChange > 0.015 && coin.funding > 0.035) {
        scenarios.push({
          name: '顶部诱多',
          probability: '可能性: 55-75%',
          description: '价格快速上升但OI增长缓慢，资费极高。顶部分歧明显。',
          action: '⚠️ 应对：立即减仓50-70%，设止损-2.5%',
          confidence: 'MEDIUM'
        });
      }

      // 情景7：空头反弹
      if (priceChange < -5 && oiChange > 10 && volChange > 20 && fundingChange < -0.01) {
        scenarios.push({
          name: '空头反弹',
          probability: '可能性: 60-75%',
          description: '下跌中成交和OI增加，资费由正变负。空头开始反抗。',
          action: '⚠️ 应对：减仓30-40%，移动止损到成本价',
          confidence: 'MEDIUM'
        });
      }

      // 情景8：底部蓄力
      if (twoStepsAgo && priceChange > -3 && priceChange < 3 && oiChange > 10 && oiChange < 25) {
        const prevChange = (prev.price - twoStepsAgo.price) / twoStepsAgo.price * 100;
        if (prevChange < -5 && priceChange > prevChange) {
          scenarios.push({
            name: '底部蓄力',
            probability: '可能性: 65-80%',
            description: '下跌后温和反弹，OI持续增长。典型底部蓄力形态。',
            action: '🟢 应对：继续建仓30-50%，耐心等待突破',
            confidence: 'MEDIUM_HIGH'
          });
        }
      }

      return scenarios;
    }

    // ======================== 自选追踪 ========================
    function analyzeCollectedCoin(symbol, coin, prev) {
      if (!collectedCoins[symbol] || !prev) return null;

      const collected = collectedCoins[symbol];
      const collectPrice = collected.collectPrice;
      const currentPrice = coin.price;
      const priceChangeFromCollect = ((currentPrice - collectPrice) / collectPrice) * 100;
      const priceChange24h = (coin.price - prev.price) / prev.price * 100;
      const oiChange = prev.oiMcap ? ((coin.oiMcap - prev.oiMcap) / prev.oiMcap * 100) : 0;
      const fundingChange = coin.funding - prev.funding;

      let currentStatus = 'monitoring';
      let advice = '';
      let risk = '';

      if (priceChangeFromCollect > 8) {
        currentStatus = '盈利中';
        if (coin.funding > 0.04 || priceChange24h > 15) {
          advice = '🔥 目标到达: 建议卖出25-30%，锁定收益';
          if (priceChange24h > 15) advice += '（出现过热信号）';
        } else if (oiChange > 15) {
          advice = '📈 继续持有并加仓，可能要进一步拉升';
        } else {
          advice = '✅ 保持持有，观察下一个TP';
        }
      } else if (priceChangeFromCollect > 3 && priceChangeFromCollect <= 8) {
        currentStatus = '小幅盈利';
        if (priceChange24h < -2) {
          advice = '⚠️ 开始回调: 建议减仓20-30%，保护利润';
          risk = '注意: 可能是诱空，防止跌破支撑后重新上升';
        } else {
          advice = '📌 耐心持有，继续观察突破';
        }
      } else if (priceChangeFromCollect >= -3 && priceChangeFromCollect <= 3) {
        currentStatus = '持平';
        if (oiChange > 15 && fundingChange > 0.002) {
          advice = '🟢 信号强化: 建议加仓20-40%';
        } else if (priceChange24h < -2 && oiChange < 5) {
          advice = '⚠️ 信号减弱: 建议减仓10-20%，观察底部';
          risk = '检查是否底部诱空还是真正下跌';
        } else {
          advice = '📌 继续持有，等待突破';
        }
      } else if (priceChangeFromCollect > -5 && priceChangeFromCollect < -3) {
        currentStatus = '小幅亏损';
        if (oiChange > 10 && fundingChange > 0.001) {
          advice = '🟡 信号仍在积累: 考虑加仓10-20%（平摊成本）';
          risk = '但不要盲目加仓，要看成交量是否真实';
        } else {
          advice = '⚠️ 建议减仓30-50%，保护资金，观察反弹';
        }
      } else if (priceChangeFromCollect <= -5) {
        currentStatus = '亏损';
        if (priceChangeFromCollect <= -10) {
          advice = '🔴 立即止损，减仓80-100%';
          risk = '多维指标破坏，继续持有风险大';
        } else if (oiChange > 15) {
          advice = '⚠️ 尽管下跌，但OI在增长：可能底部，考虑加仓5-10%（小额）';
          risk = '需确认不是假突破向下';
        } else {
          advice = '⚠️ 建议减仓50-70%，等待真实底部信号';
        }
      }

      return {
        status: currentStatus,
        priceChangeFromCollect: priceChangeFromCollect.toFixed(2),
        priceChange24h: priceChange24h.toFixed(2),
        oiChange: oiChange.toFixed(2),
        advice,
        risk
      };
    }

    function renderCollectedList() {
      const container = document.getElementById('collected-list');
      const symbols = Object.keys(collectedCoins);

      if (symbols.length === 0) {

          const priceChange = ((coin.price - collected.collectPrice) / collected.collectPrice) * 100;

          let analysisHtml = '';

      if (type === 'yao') {
        return {
          sl: (price * 0.97).toFixed(6),
          tp1: (price * 1.05).toFixed(6),
          tp2: (price * 1.10).toFixed(6),
          tp3: (price * 1.20).toFixed(6),
          tp1_percent: 5,
          tp2_percent: 10,
          tp3_percent: 20
        };
      } else {
        return {
          sl: (price * 0.97).toFixed(6),
          tp1: (price * 1.03).toFixed(6),
          tp2: (price * 1.08).toFixed(6),
          tp3: (price * 1.15).toFixed(6),
          tp1_percent: 3,
          tp2_percent: 8,
          tp3_percent: 15
        };
      }
    }

    function calculateAddPositions(price, type = 'yao') {
      if (type === 'yao') {
        return {
          add1: (price * 0.95).toFixed(6),
          add2: (price * 0.90).toFixed(6),
          add1_percent: -5,
          add2_percent: -10
        };
      } else {
        return {
          add1: (price * 0.97).toFixed(6),
          add2: (price * 0.94).toFixed(6),
          add1_percent: -3,
          add2_percent: -6

    }

          <div class="detail-row">
            <span class="detail-label">加仓比例</span>
            <span class="detail-value">每次 ${type === 'yao' ? '25%' : '30%'} 仓位</span>
          </div>
        </div>

        <div class="detail-box ${type === 'yao' ? 'risk' : type === 'collected' ? 'tracking' : 'warn'}">
          <h3>${type === 'yao' ? '⚠️ 风险提示' : type === 'collected' ? '💡 自选追踪' : '💡 交易建议'}</h3>
          <div style="font-size: 11px; color: inherit; line-height: 1.6;">
            ${type === 'yao' ? `
              ✓ 妖币基于多维度信号触发<br/>
              ✓ 强嫌疑可小仓试水(1-2%)，中嫌疑观察为主<br/>
              ✓ 必须严格止损 -3%<br/>
              ✓ 拉盘前期介入收益最大<br/>
              ✓ 不要抄底高位<br/>
              ✓ 48小时沉默机制防止重复检测
            ` : type === 'collected' ? `
              ✓ 实时追踪收藏价与现价<br/>
              ✓ OI增长+价格下跌 = 吸筹信号<br/>
              ✓ 资费过高(>4%) = 出货风险<br/>
              ✓ 分批加仓、分批减仓<br/>
              ✓ 情景分析仅供参考，结合实盘判断
            ` : `
              ✓ ${coin.grade ? `${coin.grade}级币` : '暂未评级'}<br/>
              ✓ ${coin.leverage || '现货为主'}<br/>
              ✓ 分批建仓，不追高<br/>
              ✓ 按情景分析调整策略<br/>
              ✓ 止损止盈严格执行
            `}
          </div>
        </div>
      `;

      document.getElementById('detail-body').innerHTML = html;
      document.getElementById('detail-modal').classList.add('active');
    }

    function closeDetail() {
      document.getElementById('detail-modal').classList.remove('active');
    }

    // ======================== 搜索功能 ========================
    function handleSearch(query) {
      const dropdown = document.getElementById('search-dropdown');

      if (!query.trim()) {
        dropdown.classList.remove('active');
        return;
      }

      const filtered = allCoinsData
        .filter(coin => coin.symbol.toUpperCase().includes(query.toUpperCase()))
        .slice(0, 20);

      if (filtered.length === 0) {
        dropdown.classList.remove('active');
        return;
      }

      dropdown.innerHTML = filtered
        .map(coin => `
          <div class="search-item" onclick="searchSelect('${coin.symbol}')">
            <div class="search-item-symbol" translate="no">${coin.symbol}</div>
            <div class="search-item-info">
              市值: $${fmtNum(coin.mcap, 2)} | 24h: ${coin.priceChange?.toFixed(2) || 0}%
            </div>
          </div>
        `)
        .join('');

      dropdown.classList.add('active');
    }

    function searchSelect(symbol) {
      document.getElementById('search-input').value = symbol;
      document.getElementById('search-dropdown').classList.remove('active');

      const coin = allCoinsData.find(c => c.symbol === symbol);
      if (!coin) return;

      const prev = previousData[symbol];
      const twoStepsAgo = twoStepsAgoData[symbol];

      let type = 'buy';
      if (coin.level === '妖币') type = 'yao';
      else if (coin.level === '观察') type = 'watch';

      showDetail(symbol, type);
    }

    // ======================== API 交互 ========================
    async function getJSON(url) {
      try {
        const response = await fetch(url, {
          headers: { 'Accept-Encoding': 'gzip, deflate' }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        console.error(`获取 ${url} 失败:`, error);
        return null;
      }
    }

    async function fetchOpenInterest(symbols) {
      const oiMap = {};
      const chunkSize = 50;

      for (let i = 0; i < symbols.length; i += chunkSize) {
        const chunk = symbols.slice(i, i + chunkSize);
        const promises = chunk.map(async symbol => {
          try {
            const data = await getJSON(
              `https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`
            );
            if (data && data.openInterest) {
              oiMap[symbol] = parseFloat(data.openInterest);
            }
          } catch (e) {
            console.error(`获取 ${symbol} OI 失败`);
          }
        });
        await Promise.all(promises);
      }

      return oiMap;
    }

    // ======================== 数据加载 ========================
    async function loadData() {
      if (isLoading) return;

      isLoading = true;
      document.getElementById('refresh-dot').classList.add('loading');

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        if (!exchangeInfo || !ticker24h || !premiumIndex) {
          throw new Error('数据获取失败');
        }

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 300);

        oiMap = await fetchOpenInterest(symbols);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
        const mcapMap = {};

        gecko.forEach(x => {
          const symbol = (x.symbol || '').toUpperCase();
          mcapMap[symbol + 'USDT'] = x.market_cap || 0;
        });

        allRows = { yao: [], buy: [], watch: [] };
        allCoinsData = [];

        for (const symbol of symbols) {
          const t = tickerMap[symbol];
          const p = premiumMap[symbol];

          if (!t || !p) continue;

          const price = parseFloat(p.markPrice || t.lastPrice || 0);
          if (!price || price === 0) continue;

          const quoteVol = parseFloat(t.quoteVolume || 0);
          const funding = parseFloat(p.lastFundingRate || 0) * 100;
          const priceChange = parseFloat(t.priceChangePercent || 0);
          const oi = oiMap[symbol] || 0;
          const oiValue = oi * price;
          const mcap = mcapMap[symbol] || null;

          let volMcap = null;
          let oiMcap = null;

          if (mcap && mcap > 0) {
            volMcap = (quoteVol / mcap) * 100;
            oiMcap = (oiValue / mcap) * 100;
          }

          const row = {
            symbol,
            price,
            mcap,
            quoteVol,
            funding,
            priceChange,
            oi,
            oiValue,
            volMcap,
            oiMcap
          };

          allCoinsData.push(row);

          const prev = previousData[symbol];
          const twoStepsAgo = twoStepsAgoData[symbol];

          // 检测妖币（考虑沉默机制）
          if (triggeredYaos[symbol] && !isYaoExpired(symbol)) {
            // 在沉默期内，直接使用已触发的妖币
            const existingYao = triggeredYaos[symbol];
            row.level = '妖币';
            row.status = existingYao.status;
            row.action = existingYao.action;
            row.yaoScore = existingYao.yaoScore;
            row.confidence = existingYao.confidence;
            row.signals = existingYao.signals;
            row.reason = existingYao.reason;
            allRows.yao.push(row);
            continue;
          }

          if (!triggeredYaos[symbol] || isYaoExpired(symbol)) {
            const yaoCheck = detectYaoCoin(row, prev, twoStepsAgo);
            if (yaoCheck.isYao) {
              addTriggeredYao(symbol, yaoCheck);
              row.level = '妖币';
              row.status = yaoCheck.status;
              row.action = yaoCheck.action;
              row.yaoScore = yaoCheck.yaoScore;
              row.confidence = yaoCheck.confidence;
              row.signals = yaoCheck.signals;
              row.reason = yaoCheck.reason;
              allRows.yao.push(row);
              continue;
            }
          }

          // 检测建议币
          const buyCheck = detectBuyCoin(row, prev, twoStepsAgo);
          if (buyCheck.isBuy) {
            row.level = '建议';
            row.grade = buyCheck.grade;
            row.position = buyCheck.position;
            row.leverage = buyCheck.leverage;
            row.buyScore = buyCheck.buyScore;
            row.confidence = buyCheck.confidence;
            row.signals = buyCheck.signals;
            row.reason = buyCheck.reason;
            allRows.buy.push(row);
            continue;
          }

          // 检测观察币
          const watchCheck = detectWatch(row, prev, twoStepsAgo);
          if (watchCheck.isWatch) {
            row.level = '观察';
            row.watchScore = watchCheck.watchScore;
            row.signals = watchCheck.signals;
            row.reason = watchCheck.reason;
            allRows.watch.push(row);
          }
        }

        // 加入已过期的妖币（用户未删除）
        Object.values(triggeredYaos).forEach(yao => {
          if (!allCoinsData.find(c => c.symbol === yao.symbol)) {
            const now = Date.now();
            const elapsed = now - yao.triggeredTime;
            const silenceDuration = 48 * 60 * 60 * 1000;
            allRows.yao.unshift({
              ...yao,
              level: '妖币',
              isActive: elapsed < silenceDuration,
              remainingMinutes: Math.max(0, Math.ceil((silenceDuration - elapsed) / 1000 / 60))
            });
          }
        });

        // 排序
        allRows.yao.sort((a, b) => (b.yaoScore || 0) - (a.yaoScore || 0));
        allRows.buy.sort((a, b) => (b.buyScore || 0) - (a.buyScore || 0));
        allRows.watch.sort((a, b) => (b.watchScore || 0) - (a.watchScore || 0));

        // 保存历史数据
        const newTwoStepsAgo = { ...previousData };
        const newPreviousData = {};

        [...allRows.yao, ...allRows.buy, ...allRows.watch].forEach(row => {
          newPreviousData[row.symbol] = {
            price: row.price,
            oiMcap: row.oiMcap,
            funding: row.funding,
            volMcap: row.volMcap
          };
        });

        twoStepsAgoData = newTwoStepsAgo;
        previousData = newPreviousData;

        localStorage.setItem('previousData', JSON.stringify(previousData));
        localStorage.setItem('twoStepsAgoData', JSON.stringify(twoStepsAgoData));

        // 渲染
        renderYaoList();
        renderBuyList();
        renderWatchList();
        renderCollectedList();
        updateBadges();

        document.getElementById('last-update').innerText = 
          '✅ ' + new Date().toLocaleTimeString();

      } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('last-update').innerText = '❌ 获取失败';
      } finally {
        isLoading = false;
        document.getElementById('refresh-dot').classList.remove('loading');
      }
    }

    // ======================== 自动刷新 ========================
    function startAutoRefresh() {
      let countdown = 60;

      loadData();

      autoRefreshInterval = setInterval(() => {
        countdown--;
        document.getElementById('refresh-countdown').innerText = countdown;

        if (countdown <= 0) {
          countdown = 60;
          loadData();
        }
      }, 1000);
    }

    // ======================== 初始化 ========================
    startAutoRefresh();

    document.getElementById('search-input').addEventListener('blur', () => {
      setTimeout(() => {
        document.getElementById('search-dropdown').classList.remove('active');
      }, 100);
    });

    document.getElementById('detail-modal').addEventListener('click', (e) => {
      if (e.target.id === 'detail-modal') {
        closeDetail();
      }
    });

    window.addEventListener('beforeunload', () => {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      localStorage.setItem('previousData', JSON.stringify(previousData));
      localStorage.setItem('twoStepsAgoData', JSON.stringify(twoStepsAgoData));
      localStorage.setItem('triggeredYaos', JSON.stringify(triggeredYaos));
      localStorage.setItem('collectedCoins', JSON.stringify(collectedCoins));
    });
  </script>
</body>

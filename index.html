<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>币安全币种智能监控系统 v5.0</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0e27;
      --card: #131829;
      --text: #e0e6ed;
      --sub: #8892b0;
      --cyan: #22d3ee;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --purple: #a78bfa;
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ============ 顶部导航 ============ */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.1) 0%, rgba(167, 139, 250, 0.1) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      display: flex;
      gap: 8px;
      position: relative;
    }

    #search-input {
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      width: 200px;
      transition: all 0.3s;
    }

    #search-input:focus {
      outline: none;
      border-color: var(--cyan);
      background: rgba(34, 211, 238, 0.1);
    }

    .search-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 100%);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3);
    }

    #search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      margin-top: 4px;
    }

    #search-suggestions.active {
      display: block;
    }

    .suggestion-item {
      padding: 10px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: background 0.2s;
    }

    .suggestion-item:hover {
      background: rgba(34, 211, 238, 0.1);
    }

    .suggestion-asset {
      font-weight: 600;
      color: var(--cyan);
    }

    .pair-badge {
      font-size: 11px;
      padding: 3px 8px;
      background: rgba(34, 211, 238, 0.2);
      border-radius: 4px;
      margin-left: 4px;
    }

    .refresh-btn {
      padding: 10px 16px;
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid var(--green);
      border-radius: 8px;
      color: var(--green);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-btn:hover:not(.loading) {
      background: rgba(16, 185, 129, 0.3);
    }

    .refresh-btn.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #refresh-icon {
      display: inline-block;
      transition: transform 0.3s;
    }

    .refresh-btn.loading #refresh-icon {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .update-time {
      font-size: 12px;
      color: var(--sub);
    }

    /* ============ 导航标签 ============ */
    .nav-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      flex-wrap: wrap;
    }

    .nav-tab {
      padding: 10px 16px;
      background: none;
      border: none;
      color: var(--sub);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
      position: relative;
    }

    .nav-tab:hover {
      color: var(--text);
    }

    .nav-tab.active {
      color: var(--cyan);
    }

    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--cyan);
    }

    /* ============ 监控统计 ============ */
    .monitor-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-align: center;
      transition: all 0.3s;
    }

    .stat-card:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
    }

    .stat-label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-card.splus .stat-value { --color: #ff6b6b; }
    .stat-card.s .stat-value { --color: var(--red); }
    .stat-card.a .stat-value { --color: var(--yellow); }
    .stat-card.b .stat-value { --color: var(--cyan); }
    .stat-card.c .stat-value { --color: var(--green); }

    /* ============ 扫描状态 ============ */
    #scanning-status {
      margin-bottom: 24px;
      padding: 20px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: none;
    }

    .scanning-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--cyan);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #scanning-progress-bar {
      width: 0%;
      height: 6px;
      background: linear-gradient(90deg, var(--cyan) 0%, var(--purple) 100%);
      border-radius: 3px;
      transition: width 0.3s;
      margin-bottom: 8px;
    }

    #scanning-progress-text {
      font-size: 12px;
      color: var(--sub);
    }

    /* ============ 币种卡片 ============ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .coin-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .coin-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--cyan) 0%, var(--purple) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .coin-card:hover {
      border-color: var(--cyan);
      box-shadow: 0 8px 24px rgba(34, 211, 238, 0.2);
      transform: translateY(-4px);
    }

    .coin-card:hover::before {
      opacity: 1;
    }

    .coin-card.splus { border-color: rgba(255, 107, 107, 0.3); }
    .coin-card.s { border-color: rgba(239, 68, 68, 0.3); }
    .coin-card.a { border-color: rgba(245, 158, 11, 0.3); }
    .coin-card.b { border-color: rgba(34, 211, 238, 0.3); }
    .coin-card.c { border-color: rgba(16, 185, 129, 0.3); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .coin-info {
      flex: 1;
    }

    .coin-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 4px;
    }

    .coin-price {
      font-size: 12px;
      color: var(--sub);
    }

    .price-change {
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }

    .price-change.up {
      color: var(--green);
    }

    .price-change.down {
      color: var(--red);
    }

    .grade-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .grade-badge.splus {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
    }

    .grade-badge.s {
      background: rgba(239, 68, 68, 0.2);
      color: var(--red);
    }

    .grade-badge.a {
      background: rgba(245, 158, 11, 0.2);
      color: var(--yellow);
    }

    .grade-badge.b {
      background: rgba(34, 211, 238, 0.2);
      color: var(--cyan);
    }

    .grade-badge.c {
      background: rgba(16, 185, 129, 0.2);
      color: var(--green);
    }

    .resonance-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(167, 139, 250, 0.2);
      color: var(--purple);
      margin-bottom: 8px;
    }

    .derivatives-info {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 11px;
    }

    .derivatives-label {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 8px;
      font-size: 10px;
    }

    .derivatives-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      color: var(--sub);
    }

    .derivatives-item strong {
      color: var(--text);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      background: rgba(0, 0, 0, 0.3);
      padding: 8px;
      border-radius: 6px;
      text-align: center;
    }

    .metric-label {
      font-size: 10px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    .metric-value.up {
      color: var(--green);
    }

    .metric-value.down {
      color: var(--red);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tag {
      font-size: 10px;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--sub);
    }

    .tag.risk-high {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.3);
      color: var(--red);
    }

    .tag.risk-mid {
      background: rgba(245, 158, 11, 0.2);
      border-color: rgba(245, 158, 11, 0.3);
      color: var(--yellow);
    }

    .tag.risk-low {
      background: rgba(16, 185, 129, 0.2);
      border-color: rgba(16, 185, 129, 0.3);
      color: var(--green);
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .quick-link {
      padding: 8px 4px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 6px;
      text-align: center;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--cyan);
    }

    .quick-link:hover {
      background: rgba(34, 211, 238, 0.2);
      border-color: var(--cyan);
    }

    /* ============ 分级分组 ============ */
    .grade-section {
      margin-bottom: 32px;
    }

    .grade-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.1) 0%, rgba(167, 139, 250, 0.1) 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .grade-label {
      font-size: 18px;
      font-weight: 900;
      padding: 8px 16px;
      border-radius: 6px;
    }

    .grade-label.splus {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
    }

    .grade-label.s {
      background: rgba(239, 68, 68, 0.2);
      color: var(--red);
    }

    .grade-label.a {
      background: rgba(245, 158, 11, 0.2);
      color: var(--yellow);
    }

    .grade-label.b {
      background: rgba(34, 211, 238, 0.2);
      color: var(--cyan);
    }

    .grade-label.c {
      background: rgba(16, 185, 129, 0.2);
      color: var(--green);
    }

    .grade-count {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    /* ============ 详情页面 ============ */
    .back-btn {
      padding: 10px 16px;
      background: rgba(139, 146, 176, 0.1);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(139, 146, 176, 0.2);
      border-color: var(--text);
    }

    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .detail-metric {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .detail-metric-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .detail-metric-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .detail-metric-value.up {
      color: var(--green);
    }

    .detail-metric-value.down {
      color: var(--red);
    }

    .derivatives-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      transition: all 0.3s;
    }

    .derivatives-panel:hover {
      border-color: var(--cyan);
    }

    .panel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .signal-item {
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      margin-bottom: 8px;
      border-left: 3px solid;
    }

    .signal-item.long {
      border-left-color: var(--green);
    }

    .signal-item.short {
      border-left-color: var(--red);
    }

    .signal-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .signal-value {
      font-size: 11px;
      color: var(--sub);
    }

    .timeframe-analysis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .tf-analysis {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .tf-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 8px;
    }

    .tf-content {
      font-size: 11px;
      line-height: 1.8;
      color: var(--sub);
    }

    .tf-content strong {
      color: var(--text);
    }

    .quick-channel-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .quick-channel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn {
      padding: 10px 8px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 6px;
      color: var(--cyan);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn:hover {
      background: rgba(34, 211, 238, 0.2);
      border-color: var(--cyan);
      transform: translateY(-2px);
    }

    .channel-hint {
      font-size: 11px;
      color: var(--sub);
      padding: 8px;
      background: rgba(34, 211, 238, 0.05);
      border-radius: 6px;
      text-align: center;
    }

    /* ============ 错误提示 ============ */
    .error-box {
      padding: 40px 20px;
      text-align: center;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: var(--red);
      font-size: 14px;
      margin: 24px 0;
    }

    /* ============ 通知 ============ */
    .notification {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      z-index: 1000;
      animation: slideIn 0.3s ease;
      max-width: 300px;
    }

    .notification.success {
      border-color: rgba(16, 185, 129, 0.3);
      background: rgba(16, 185, 129, 0.1);
      color: var(--green);
    }

    .notification.error {
      border-color: rgba(239, 68, 68, 0.3);
      background: rgba(239, 68, 68, 0.1);
      color: var(--red);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ============ 响应式 ============ */
    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      }

      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .header-right {
        width: 100%;
        flex-direction: column;
      }

      .search-box {
        width: 100%;
      }

      #search-input {
        width: 100%;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }

      .detail-metrics {
        grid-template-columns: repeat(2, 1fr);
      }

      .quick-links {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部导航 -->
    <div class="header">
      <div class="logo">💰 币安全币监控 v5.0</div>
      <div class="header-right">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="搜索币种 (如: BTC, ETH)" onkeyup="showSearchSuggestions()" onkeypress="if(event.key==='Enter') searchCoin()">
          <button class="search-btn" onclick="searchCoin()">🔍 搜索</button>
          <div id="search-suggestions"></div>
        </div>
        <button class="refresh-btn" id="manual-refresh-btn" onclick="manualRefresh()">
          <span id="refresh-icon">🔄</span>
          <span>扫描</span>
        </button>
        <div class="update-time">更新于: <span id="update-time">-</span></div>
      </div>
    </div>

    <!-- 导航标签 -->
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchPage('monitor')">📊 监控</button>
      <button class="nav-tab" onclick="switchPage('detail')">📈 详情</button>
    </div>

    <!-- 监控页面 -->
    <div id="monitor-page" class="page">
      <!-- 扫描状态 -->
      <div id="scanning-status">
        <div class="scanning-title">⏳ 正在扫描全部币种...</div>
        <div id="scanning-progress-bar"></div>
        <div id="scanning-progress-text">0/0</div>
      </div>

      <!-- 统计卡片 -->
      <div class="monitor-stats">
        <div class="stat-card splus">
          <div class="stat-label">S+ 级币种</div>
          <div class="stat-value" id="grade-splus-count">0</div>
        </div>
        <div class="stat-card s">
          <div class="stat-label">S 级币种</div>

  <script>
    // ============ 全局变量 ============
    let allCoins = {};
    let allSymbols = [];
    let binanceAssets = {};
    let isRefreshing = false;
    let klineCache = {};
    let volume24hCache = {};
    let marketCapCache = {};
    let futuresDataCache = {};

    // ============ 全局配置 ============
    const CONFIG = {
      refreshMs: 300000,
      binanceUrl: 'https://api.binance.com/api/v3',
      futuresUrl: 'https://fapi.binance.com/fapi/v1',
      coingeckoApi: 'https://api.coingecko.com/api/v3',
      concurrentLimit: 4,
      requestTimeout: 12000,

      quickScanLimit: 9999,
      fullScanLimit: 9999
    };

    // ============ 工具函数 ============
    function fmt(num, decimals = 2) {
      if (!isFinite(num)) return '0';
      if (Math.abs(num) >= 1e9) return (num / 1e9).toFixed(Math.max(0, decimals - 1)) + 'B';
      if (Math.abs(num) >= 1e6) return (num / 1e6).toFixed(Math.max(0, decimals - 1)) + 'M';
      if (Math.abs(num) >= 1e3) return (num / 1e3).toFixed(Math.max(0, decimals - 1)) + 'K';
      return num.toFixed(decimals);
    }

    function fmtPct(num, decimals = 2) {
      return (num >= 0 ? '+' : '') + num.toFixed(decimals) + '%';
    }

    function switchPage(page) {
      document.querySelectorAll('[id$="-page"]').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
      
      if (page === 'monitor') {
        document.getElementById('monitor-page').style.display = 'block';
        document.querySelectorAll('.nav-tab')[0].classList.add('active');
      } else {
        document.getElementById('detail-page').style.display = 'block';
        document.querySelectorAll('.nav-tab')[1].classList.add('active');
      }
    }

    function showNotification(message, type = 'success') {
      const el = document.createElement('div');
      el.className = `notification ${type}`;
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    function openLink(url) {
      window.open(url, '_blank');
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        showNotification(`✅ 已复制: ${text}`, 'success');
      });
    }

    function getChartLink(symbol) {
      return `https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}USDT`;
    }

    function getLiquidationMapLink(symbol) {
      return `https://www.coinglass.com/liquidation_history?symbol=${symbol}`;
    }

    function getCoinGlassLink(symbol) {
      return `https://www.coinglass.com/pro/futures/${symbol}`;
    }

    function getCoinGeckoLink(symbol) {
      return `https://www.coingecko.com/search?query=${symbol}`;
    }

    function getWhaleAlertLink(symbol) {
      return `https://whale-alert.io/?utm_source=coinglass`;
    }

    function getDexScreenerLink(symbol) {
      return `https://dexscreener.com/search/?q=${symbol}`;
    }

    async function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function runWithConcurrencyLimit(tasks, limit) {
      const results = new Array(tasks.length);
      const executing = [];
      let index = 0;

      return new Promise((resolve) => {
        async function enqueue() {
          if (index >= tasks.length && executing.length === 0) {
            resolve(results);
            return;
          }

          if (index < tasks.length && executing.length < limit) {
            const currentIndex = index++;
            const task = tasks[currentIndex];

            const promise = Promise.resolve(task()).then(
              result => {
                results[currentIndex] = result;
                executing.splice(executing.indexOf(promise), 1);
                enqueue();
              },
              error => {
                results[currentIndex] = null;
                executing.splice(executing.indexOf(promise), 1);
                enqueue();
              }
            );

            executing.push(promise);
            enqueue();
          }
        }

        enqueue();
      });
    }

    // ============ API 请求 ============
    async function fetchWithTimeout(url, timeout = CONFIG.requestTimeout) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);

      try {
        const res = await fetch(url, {
          method: 'GET',
          headers: {
            'Accept': 'application/json',
            'User-Agent': 'Mozilla/5.0'
          },
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (error) {
        clearTimeout(timeoutId);
        throw error;
      }
    }

    // ============ 加载交所信息 ============
    async function loadExchangeInfo() {
      try {
        const res = await fetchWithTimeout(`${CONFIG.binanceUrl}/exchangeInfo`);
        const spotSymbols = res.symbols
          .filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT' && !s.symbol.includes('_'))
          .map(s => s.baseAsset);

        // 获取合约信息
        const futuresRes = await fetchWithTimeout(`${CONFIG.futuresUrl}/exchangeInfo`);
        const futuresSymbols = futuresRes.symbols
          .filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT')
          .map(s => s.baseAsset);

        const combined = [...new Set([...spotSymbols, ...futuresSymbols])].sort();

        // 建立资产映射
        combined.forEach(asset => {
          binanceAssets[asset] = {
            asset,
            spot: spotSymbols.includes(asset) ? [`${asset}USDT`] : [],
            futures: futuresSymbols.includes(asset) ? [`${asset}USDT`] : []
          };
        });

        allSymbols = combined;
        console.log(`✅ 加载了 ${allSymbols.length} 个币种`);
        
        return allSymbols;
      } catch (e) {
        console.error('加载交所信息失败:', e);
        showNotification('❌ 加载币种列表失败，请检查网络', 'error');
        return [];
      }
    }

    // ============ 获取K线数据 ============
    async function getKlineData(symbol, interval, limit = 100, type = 'spot') {
      const cacheKey = `${symbol}_${interval}_${type}`;
      if (klineCache[cacheKey] && Date.now() - klineCache[cacheKey].time < 60000) {
        return klineCache[cacheKey].data;
      }

      try {
        const url = type === 'spot'
          ? `${CONFIG.binanceUrl}/klines?symbol=${symbol}USDT&interval=${interval}&limit=${limit}`
          : `${CONFIG.futuresUrl}/klines?symbol=${symbol}USDT&interval=${interval}&limit=${limit}`;

        const data = await fetchWithTimeout(url);
        const formatted = data.map(k => ({
          time: k[0],
          open: parseFloat(k[1]),
          high: parseFloat(k[2]),
          low: parseFloat(k[3]),
          close: parseFloat(k[4]),
          volume: parseFloat(k[7])
        }));

        klineCache[cacheKey] = { data: formatted, time: Date.now() };
        return formatted;
      } catch (e) {
        console.warn(`获取 ${symbol} K线数据失败:`, e.message);
        return [];
      }
    }

    // ============ 获取24小时统计 ============
    async function get24hStats(symbol, type = 'spot') {
      const cacheKey = `${symbol}_24h_${type}`;
      if (volume24hCache[cacheKey] && Date.now() - volume24hCache[cacheKey].time < 60000) {
        return volume24hCache[cacheKey].data;
      }

      try {
        const url = `${CONFIG.binanceUrl}/ticker/24hr?symbol=${symbol}USDT`;
        const data = await fetchWithTimeout(url);

        const stats = {
          price: parseFloat(data.lastPrice),
          change24h: parseFloat(data.priceChangePercent),
          volume24h: parseFloat(data.quoteAssetVolume),
          highPrice: parseFloat(data.highPrice),
          lowPrice: parseFloat(data.lowPrice)
        };

        volume24hCache[cacheKey] = { data: stats, time: Date.now() };
        return stats;
      } catch (e) {
        console.warn(`获取 ${symbol} 24h数据失败:`, e.message);
        return null;
      }
    }

    // ============ 获取合约数据 ============
    async function getFuturesData(symbol) {
      const cacheKey = `${symbol}_futures`;
      if (futuresDataCache[cacheKey] && Date.now() - futuresDataCache[cacheKey].time < 30000) {
        return futuresDataCache[cacheKey].data;
      }

      try {
        const [openInterestRes, fundingRateRes, longShortRes] = await Promise.all([
          fetchWithTimeout(`${CONFIG.futuresUrl}/openInterest?symbol=${symbol}USDT`),
          fetchWithTimeout(`${CONFIG.futuresUrl}/fundingRate?symbol=${symbol}USDT&limit=1`),
          fetchWithTimeout(`${CONFIG.futuresUrl}/globalLongShortAccountRatio?symbol=${symbol}USDT&period=5m`)
        ]);

        const currentOI = parseFloat(openInterestRes.openInterest);
        const fundingRate = fundingRateRes[0] ? parseFloat(fundingRateRes[0].fundingRate) : 0;
        const globalLongShortRatio = longShortRes[0] ? parseFloat(longShortRes[0].longShortRatio) : 1;

        // 获取历史OI计算增长率
        const historyRes = await fetchWithTimeout(`${CONFIG.futuresUrl}/openInterestHist?symbol=${symbol}USDT&period=5m&limit=100`);
        let oi6hPct = 0, oi24hPct = 0;

        if (historyRes && historyRes.length > 0) {
          const oldOI6h = parseFloat(historyRes[Math.max(0, historyRes.length - 72)].sumOpenInterest || 0);
          const oldOI24h = parseFloat(historyRes[0].sumOpenInterest || 0);

          if (oldOI6h > 0) oi6hPct = ((currentOI - oldOI6h) / oldOI6h) * 100;
          if (oldOI24h > 0) oi24hPct = ((currentOI - oldOI24h) / oldOI24h) * 100;
        }

        const price = (await get24hStats(symbol, 'spot'))?.price || 0;
        const oiValue = currentOI * price;

        const futuresData = {
          openInterest: currentOI,
          oiValue,
          fundingRate,
          globalLongShortRatio,
          oi6hPct,
          oi24hPct
        };

        futuresDataCache[cacheKey] = { data: futuresData, time: Date.now() };
        return futuresData;
      } catch (e) {
        console.warn(`获取 ${symbol} 合约数据失败:`, e.message);
        return {
          openInterest: 0,
          oiValue: 0,
          fundingRate: 0,
          globalLongShortRatio: 1,
          oi6hPct: 0,
          oi24hPct: 0
        };
      }
    }

    // ============ 获取市值 ============
    async function getMarketCapData(symbol) {
      const cacheKey = `${symbol}_mcap`;
      if (marketCapCache[cacheKey] && Date.now() - marketCapCache[cacheKey].time < 3600000) {
        return marketCapCache[cacheKey].data;
      }

      try {
        const url = `${CONFIG.coingeckoApi}/simple/price?ids=${symbol.toLowerCase()}&vs_currencies=usd&order=market_cap_desc&per_page=100&sparkline=false&include_market_cap=true`;
        const data = await fetchWithTimeout(url);
        const mcap = data[symbol.toLowerCase()]?.usd_market_cap || 0;

        marketCapCache[cacheKey] = { data: mcap, time: Date.now() };
        return mcap;
      } catch (e) {
        return 0;
      }
    }

    // ============ 技术指标计算 ============
    function calcEMA(data, period) {
      if (data.length === 0) return data;
      
      const k = 2 / (period + 1);
      let ema = data[0];
      const result = [ema];

      for (let i = 1; i < data.length; i++) {
        ema = data[i] * k + ema * (1 - k);
        result.push(ema);
      }

      return result;
    }

    function calcRSI(data, period = 14) {
      if (data.length < period + 1) return 50;

      let gains = 0, losses = 0;
      for (let i = 1; i <= period; i++) {
        const diff = data[i] - data[i - 1];
        if (diff > 0) gains += diff;
        else losses += Math.abs(diff);
      }

      let avgGain = gains / period;
      let avgLoss = losses / period;

      for (let i = period + 1; i < data.length; i++) {
        const diff = data[i] - data[i - 1];
        if (diff > 0) {
          avgGain = (avgGain * (period - 1) + diff) / period;
          avgLoss = (avgLoss * (period - 1)) / period;
        } else {
          avgGain = (avgGain * (period - 1)) / period;
          avgLoss = (avgLoss * (period - 1) + Math.abs(diff)) / period;
        }
      }

      const rs = avgGain / (avgLoss || 1);
      return 100 - (100 / (1 + rs));
    }

    function calcMACD(data, fast = 12, slow = 26, signal = 9) {
      const emaFast = calcEMA(data, fast);
      const emaSlow = calcEMA(data, slow);

      const macdLine = emaFast.map((val, i) => val - emaSlow[i]);
      const signalLine = calcEMA(macdLine, signal);

      return {
        macd: macdLine[macdLine.length - 1],
        signal: signalLine[signalLine.length - 1],
        histogram: (macdLine[macdLine.length - 1] - signalLine[signalLine.length - 1])
      };
    }

    function calcCVD(volumes, isUp = true) {
      const cvd = volumes.reduce((acc, vol) => acc + (isUp ? vol : -vol), 0);
      const trend = cvd > 0 ? 'up' : cvd < 0 ? 'down' : 'neutral';
      return { cvd, trend };
    }

    // ============ 衍生品比例计算 ============
    function calculateOiMcapRatio(oiValue, marketCap) {
      if (!marketCap || marketCap === 0) return 0;
      return (oiValue / marketCap) * 100;
    }

    function calculateOiVolumeRatio(oiValue, volume24h) {
      if (!volume24h || volume24h === 0) return 0;
      return (oiValue / volume24h) * 100;
    }

    // ============ 交易信号生成 ============
    function generateTradingSignals(coin) {
      const longSignals = [];
      const shortSignals = [];

      // OI信号（最高权重）
      if (coin.oi24hPct > 30) {
        longSignals.push({
          name: 'OI强增长24h',
          type: '衍生品',
          value: `${coin.oi24hPct.toFixed(1)}%`,
          weight: 15
        });
      }

      if (coin.oi6hPct > 15) {
        longSignals.push({
          name: 'OI增长6h',
          type: '衍生品',
          value: `${coin.oi6hPct.toFixed(1)}%`,
          weight: 10
        });
      }

      if (coin.fundingRate > 0.01) {
        longSignals.push({
          name: '资金费率为正',
          type: '多头拥挤',
          value: `${(coin.fundingRate * 100).toFixed(3)}%`,
          weight: 8
        });
      }

      if (coin.globalLongShortRatio > 1.5) {
        longSignals.push({
          name: '多头主导',
          type: '多空比',
          value: `${coin.globalLongShortRatio.toFixed(2)}`,
          weight: 8
        });
      }

      // CVD信号
      if (coin.cvd1h.trend === 'up') {
        longSignals.push({
          name: 'CVD 1h上升',
          type: '成交量',
          value: '正向',
          weight: 10
        });
      }

      if (coin.cvd5m.trend === 'up') {
        longSignals.push({
          name: 'CVD 5m上升',
          type: '成交量',
          value: '正向',
          weight: 6
        });
      }

      // MACD信号
      if (coin.macd1h.histogram > 0) {
        longSignals.push({
          name: 'MACD 1h金叉',
          type: '技术面',
          value: coin.macd1h.histogram.toFixed(6),
          weight: 8
        });
      }

      if (coin.macd4h.histogram > 0) {
        longSignals.push({
          name: 'MACD 4h金叉',
          type: '技术面',
          value: coin.macd4h.histogram.toFixed(6),
          weight: 6
        });
      }

      // RSI信号
      if (coin.rsi5m < 30) {
        longSignals.push({
          name: 'RSI 5m超卖',
          type: '超卖',
          value: coin.rsi5m.toFixed(0),
          weight: 7
        });
      }

      if (coin.rsi1h < 30) {
        longSignals.push({
          name: 'RSI 1h超卖',
          type: '超卖',
          value: coin.rsi1h.toFixed(0),
          weight: 8
        });
      }

      // 价格信号
      if (coin.change1h > 0.5) {
        longSignals.push({
          name: '1h涨幅正',
          type: '价格',
          value: fmtPct(coin.change1h, 2),
          weight: 4
        });
      }

      // 空头信号
      if (coin.oi24hPct < -30) {
        shortSignals.push({
          name: 'OI大幅下降24h',
          type: '衍生品',
          value: `${coin.oi24hPct.toFixed(1)}%`,
          weight: 15
        });
      }

      if (coin.fundingRate < -0.01) {
        shortSignals.push({
          name: '资金费率为负',
          type: '空头拥挤',
          value: `${(coin.fundingRate * 100).toFixed(3)}%`,
          weight: 8
        });
      }

      if (coin.globalLongShortRatio < 0.8) {
        shortSignals.push({
          name: '空头主导',
          type: '多空比',
          value: `${coin.globalLongShortRatio.toFixed(2)}`,
          weight: 8
        });
      }

      if (coin.cvd1h.trend === 'down') {
        shortSignals.push({
          name: 'CVD 1h下降',
          type: '成交量',
          value: '负向',
          weight: 10
        });
      }

      if (coin.macd1h.histogram < 0) {
        shortSignals.push({
          name: 'MACD 1h死叉',
          type: '技术面',
          value: coin.macd1h.histogram.toFixed(6),
          weight: 8
        });
      }

      if (coin.rsi5m > 70) {
        shortSignals.push({
          name: 'RSI 5m超买',
          type: '超买',
          value: coin.rsi5m.toFixed(0),
          weight: 7
        });
      }

      if (coin.rsi1h > 70) {
        shortSignals.push({
          name: 'RSI 1h超买',
          type: '超买',
          value: coin.rsi1h.toFixed(0),
          weight: 8
        });
      }

      if (coin.change1h < -0.5) {
        shortSignals.push({
          name: '1h涨幅负',
          type: '价格',
          value: fmtPct(coin.change1h, 2),
          weight: 4
        });
      }

      return { longSignals, shortSignals };
    }

    // ============ 共振检查 ============
    function checkResonance(coin) {
      const details = [];
      let count = 0;

      // OI共振
      if (coin.oi6hPct > 20 && coin.oi24hPct > 40) {
        details.push('OI持续强增长');
        count++;
      }

      // CVD+OI共振
      if (coin.cvd5m.trend === 'up' && coin.cvd1h.trend === 'up' && coin.oi6hPct > 10) {
        details.push('成交量+OI共振');
        count++;
      }

      // 价格+指标共振
      if (coin.change1h > 1 && coin.macd1h.histogram > 0 && coin.rsi1h < 60) {
        details.push('价格+MACD共振');
        count++;
      }

      // 多周期共振
      if (coin.rsi5m < 40 && coin.rsi1h < 40 && coin.change5m > 0 && coin.change1h > 0) {
        details.push('多周期上升共振');
        count++;
      }

      return { count, details };
    }

    // ============ 拥挤度计算 ============
    function calculateCrowdingRisk(longShortRatio, oiMcapRatio, rsi1h, direction, oi6hPct, oi24hPct) {
      const reasons = [];
      let score = 0;

      // 多空比极端
      if (longShortRatio > 2 || longShortRatio < 0.5) {
        reasons.push('多空比极端');
        score += 25;
      } else if (longShortRatio > 1.5 || longShortRatio < 0.8) {
        reasons.push('多空比失衡');
        score += 15;
      }

      // OI/MCAP高
      if (oiMcapRatio > 10) {
        reasons.push('OI/MCAP过高(>10%)');
        score += 20;
      } else if (oiMcapRatio > 5) {
        reasons.push('OI/MCAP较高(>5%)');
        score += 10;
      }

      // RSI极端
      if (rsi1h > 80 || rsi1h < 20) {
        reasons.push('RSI极端');
        score += 15;
      }

      // OI爆炸增长
      if (oi24hPct > 80 || oi24hPct < -80) {
        reasons.push('OI剧烈波动');
        score += 20;
      } else if (oi24hPct > 50 || oi24hPct < -50) {
        reasons.push('OI快速变化');
        score += 10;
      }

      let level = 'low';
      if (score >= 50) level = 'high';
      else if (score >= 30) level = 'mid';

      return { score, level, reasons };
    }

    // ============ 评级计算 ============
    function calculateGrade(coin) {
      let score = 0;

      // 权重1: OI（最高权重 1.5x）
      let oiScore = 0;

      if (coin.oi24hPct > 50) oiScore += 10;
      if (coin.oi24hPct > 30) oiScore += 8;
      if (coin.oi6hPct > 20) oiScore += 10;
      if (coin.oiMcapRatio > 5) oiScore += 8;
      if (coin.oiMcapRatio > 10) oiScore += 5;

      if (coin.fundingRate > 0.01 && coin.fundingRate < 0.3) oiScore += 5;

      if (coin.globalLongShortRatio > 0.9 && coin.globalLongShortRatio < 2) oiScore += 4;

      score += oiScore * 1.5;

      // 权重2: CVD（次高权重 1.2x）
      let cvdScore = 0;

      if (coin.cvd5m.trend === 'up') cvdScore += 10;
      if (coin.cvd1h.trend === 'up') cvdScore += 15;

      score += cvdScore * 1.2;

      // 权重3: MACD（中等权重 0.8x）
      let macdScore = 0;

      if (coin.macd1h.histogram > 0) macdScore += 10;
      if (coin.macd4h.histogram > 0) macdScore += 8;

      score += macdScore * 0.8;

      // 权重4: RSI（较低权重 0.7x）
      let rsiScore = 0;

      if (coin.rsi5m < 30) rsiScore += 8;
      if (coin.rsi1h < 30) rsiScore += 10;
      if (coin.rsi5m > 70) rsiScore -= 8;
      if (coin.rsi1h > 70) rsiScore -= 10;

      score += Math.max(0, rsiScore) * 0.7;

      // 权重5: 价格（最低权重 0.5x）
      let priceScore = 0;

      if (coin.change5m > 0.5) priceScore += 5;
      if (coin.change1h > 0.5) priceScore += 8;
      if (coin.change4h > 1) priceScore += 5;

      score += priceScore * 0.5;

      // 共振加分
      if (coin.resonance.count >= 3) score += 25;
      else if (coin.resonance.count === 2) score += 15;
      else if (coin.resonance.count === 1) score += 8;

      // 拥挤度减分
      if (coin.crowdingRisk.level === 'high') score *= 0.7;
      else if (coin.crowdingRisk.level === 'mid') score *= 0.85;

      // 确定等级
      let grade = 'c';
      if (score >= 120) grade = 'splus';
      else if (score >= 90) grade = 's';
      else if (score >= 65) grade = 'a';
      else if (score >= 40) grade = 'b';
      else grade = 'c';

      return {
        grade,
        gradeScore: Math.round(score),
        score: Math.round(score)
      };
    }

    // ============ 完整分析 ============
    async function analyzeCoin(symbol, quickData = null) {
      try {
        // 获取基础数据
        const [stats24h, kline5m, kline1h, kline4h, kline1d, futuresData, marketCap] = await Promise.all([
          get24hStats(symbol, 'spot'),
          getKlineData(symbol, '5m', 100, 'spot'),
          getKlineData(symbol, '1h', 100, 'spot'),
          getKlineData(symbol, '4h', 100, 'spot'),
          getKlineData(symbol, '1d', 100, 'spot'),
          getFuturesData(symbol),
          getMarketCapData(symbol)
        ]);

        if (!stats24h || kline5m.length === 0) return null;

        // 计算技术指标
        const prices5m = kline5m.map(k => k.close);
        const prices1h = kline1h.map(k => k.close);
        const prices4h = kline4h.map(k => k.close);
        const prices1d = kline1d.map(k => k.close);

        const rsi5m = calcRSI(prices5m, 14);
        const rsi1h = calcRSI(prices1h, 14);
        const rsi4h = calcRSI(prices4h, 14);
        const rsi1d = calcRSI(prices1d, 14);

        const macd1h = calcMACD(prices1h);
        const macd4h = calcMACD(prices4h);

        const volumes5m = kline5m.map(k => k.volume);
        const volumes1h = kline1h.map(k => k.volume);

        const cvd5m = calcCVD(volumes5m, true);
        const cvd1h = calcCVD(volumes1h, true);

        const change5m = ((prices5m[prices5m.length - 1] - prices5m[0]) / prices5m[0]) * 100;
        const change1h = ((prices1h[prices1h.length - 1] - prices1h[0]) / prices1h[0]) * 100;
        const change4h = ((prices4h[prices4h.length - 1] - prices4h[0]) / prices4h[0]) * 100;
        const change1d = ((prices1d[prices1d.length - 1] - prices1d[0]) / prices1d[0]) * 100;

        const mainDirection = change1h > 0 ? 'up' : 'down';

        // 计算比例
        const oiMcapRatio = calculateOiMcapRatio(futuresData.oiValue, marketCap);
        const oiVolumeRatio = calculateOiVolumeRatio(futuresData.oiValue, stats24h.volume24h);

        // 相位分析
        const phase5m = rsi5m > 70 ? 'overbought' : rsi5m < 30 ? 'oversold' : 'normal';
        const phase1h = rsi1h > 70 ? 'overbought' : rsi1h < 30 ? 'oversold' : 'normal';
        const phase4h = rsi4h > 70 ? 'overbought' : rsi4h < 30 ? 'oversold' : 'normal';
        const phase1d = rsi1d > 70 ? 'overbought' : rsi1d < 30 ? 'oversold' : 'normal';

        // 生成交易信号
        const { longSignals, shortSignals } = generateTradingSignals({
          symbol,
          openInterest: futuresData.openInterest,
          oiValue: futuresData.oiValue,
          oiMcapRatio,
          oiVolumeRatio,
          oi6hPct: futuresData.oi6hPct,
          oi24hPct: futuresData.oi24hPct,
          fundingRate: futuresData.fundingRate,
          globalLongShortRatio: futuresData.globalLongShortRatio,
          cvd5m, cvd1h,
          macd1h, macd4h,
          rsi5m, rsi1h, rsi4h, rsi1d,
          change5m, change1h, change4h, change1d,
          mainDirection
        });

        const buySignalCount = longSignals.length;
        const sellSignalCount = shortSignals.length;
        const totalSignal = buySignalCount - sellSignalCount;

        // 推荐设置
        let recommendType = 'spot';
        let recommendLeverage = 1;
        let recommendPosition = 5;

        if (futuresData.openInterest > 0) {
          if (totalSignal > 6) {
            recommendType = 'futures';
            recommendLeverage = 2;
            recommendPosition = 3;
          } else if (totalSignal > 3) {
            recommendType = 'futures';
            recommendLeverage = 1;
            recommendPosition = 5;
          } else if (totalSignal < -6) {
            recommendType = 'futures';
            recommendLeverage = 2;
            recommendPosition = 3;
          }
        } else {
          recommendPosition = totalSignal > 3 ? 8 : 5;
        }

        // 拥挤度评估
        const crowdingRisk = calculateCrowdingRisk(
          futuresData.globalLongShortRatio,
          oiMcapRatio,
          rsi1h,
          mainDirection,
          futuresData.oi6hPct,
          futuresData.oi24hPct
        );

        // 共振检查
        const resonance = checkResonance({
          change5m, change1h, change4h,
          cvd5m, cvd1h,
          openInterest: futuresData.openInterest,
          oi6hPct: futuresData.oi6hPct,
          oi24hPct: futuresData.oi24hPct,
          fundingRate: futuresData.fundingRate,
          globalLongShortRatio: futuresData.globalLongShortRatio
        });

        // 构建币对象
        const coin = {
          symbol,
          price: stats24h.price,
          change24h: stats24h.change24h,
          volume24h: stats24h.volume24h,
          marketCap,
          rsi5m, rsi1h, rsi4h, rsi1d,
          macd1h, macd4h,
          cvd5m, cvd1h,
          change5m, change1h, change4h, change1d,
          mainDirection,
          phase5m, phase1h, phase4h, phase1d,
          buySignalCount,
          sellSignalCount,
          totalSignal,
          longSignals,
          shortSignals,
          recommendType,
          recommendLeverage,
          recommendPosition,
          openInterest: futuresData.openInterest,
          oiValue: futuresData.oiValue,
          fundingRate: futuresData.fundingRate,
          globalLongShortRatio: futuresData.globalLongShortRatio,
          oi6hPct: futuresData.oi6hPct,
          oi24hPct: futuresData.oi24hPct,
          oiMcapRatio,
          oiVolumeRatio,
          crowdingRisk,
          resonance,
          timestamp: Date.now()
        };

        // 计算评级
        const gradeInfo = calculateGrade(coin);
                coin.grade = gradeInfo.grade;
        coin.gradeScore = gradeInfo.gradeScore;

        return coin;
      } catch (e) {
        console.error(`分析 ${symbol} 失败:`, e.message);
        return null;
      }
    }

    // ============ 两阶段全量扫描（超快速版） ============
    async function twoPhaseFullRefresh() {
      if (isRefreshing) return;
      isRefreshing = true;

      const statusDiv = document.getElementById('scanning-status');
      const progressBar = document.getElementById('scanning-progress-bar');
      const progressText = document.getElementById('scanning-progress-text');
      const scanStatusDiv = document.getElementById('scan-status');
      const refreshBtn = document.getElementById('manual-refresh-btn');
      const refreshIcon = document.getElementById('refresh-icon');

      try {
        if (statusDiv) statusDiv.style.display = 'block';
        if (refreshBtn) {
          refreshBtn.disabled = true;
          refreshBtn.classList.add('loading');
          refreshIcon.textContent = '⏳';
        }
        if (scanStatusDiv) {
          scanStatusDiv.textContent = '⏳ 全量扫描中...';
          scanStatusDiv.style.display = 'block';
        }
        if (progressBar) progressBar.style.width = '0%';
        if (progressText) progressText.textContent = `0/${allSymbols.length}`;

        const startTime = Date.now();
        allCoins = {};
        const totalSymbols = allSymbols.length;

        console.log(`🚀 开始扫描全部 ${totalSymbols} 个币种`);

        // 直接全部扫描，不分阶段
        const analyzeTasks = allSymbols.map(symbol => async () => {
          try {
            const coin = await analyzeCoin(symbol);
            if (coin) {
              allCoins[symbol] = coin;
            }
            return symbol;
          } catch (e) {
            console.warn(`分析 ${symbol} 失败:`, e.message);
            return null;
          }
        });

        let completed = 0;

        // 自定义并发控制，实时显示进度
        await new Promise((resolve) => {
          const results = new Array(analyzeTasks.length);
          const executing = [];
          let taskIndex = 0;

          async function enqueueNext() {
            if (taskIndex >= analyzeTasks.length && executing.length === 0) {
              resolve(results);
              return;
            }

            if (taskIndex < analyzeTasks.length && executing.length < CONFIG.concurrentLimit) {
              const currentIndex = taskIndex;
              taskIndex++;

              const promise = analyzeTasks[currentIndex]().then(
                result => {
                  results[currentIndex] = result;
                  completed++;
                  
                  // 每完成1个就更新进度
                  const progress = (completed / totalSymbols) * 100;
                  if (progressBar) progressBar.style.width = progress + '%';
                  if (progressText) progressText.textContent = `${completed}/${totalSymbols}`;

                  executing.splice(executing.indexOf(promise), 1);
                  enqueueNext();
                },
                error => {
                  results[currentIndex] = null;
                  completed++;
                  
                  const progress = (completed / totalSymbols) * 100;
                  if (progressBar) progressBar.style.width = progress + '%';
                  if (progressText) progressText.textContent = `${completed}/${totalSymbols}`;

                  executing.splice(executing.indexOf(promise), 1);
                  enqueueNext();
                }
              );

              executing.push(promise);
              enqueueNext();
            }
          }

          enqueueNext();
        });

        const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
        console.log(`✅ 全量扫描完成！总耗时 ${totalTime}s，共分析 ${Object.keys(allCoins).length} 个币种`);

        const updateTimeEl = document.getElementById('update-time');
        if (updateTimeEl) {
          updateTimeEl.textContent = new Date().toLocaleTimeString('zh-CN');
        }

        renderMonitorContent();
        showNotification(`✅ 全量扫描完成！${Object.keys(allCoins).length} 个币种 (${totalTime}s)`, 'success');
      } catch (e) {
        console.error('扫描失败:', e);
        showNotification(`❌ 扫描失败: ${e.message}`, 'error');
      } finally {
        isRefreshing = false;
        if (statusDiv) statusDiv.style.display = 'none';
        if (refreshBtn) {
          refreshBtn.disabled = false;
          refreshBtn.classList.remove('loading');
          refreshIcon.textContent = '🔄';
        }
        if (scanStatusDiv) {
          scanStatusDiv.style.display = 'none';
        }
      }
    }

              <div style="font-size: 28px; font-weight: 900; color: ${coin.totalSignal > 0 ? 'var(--green)' : coin.totalSignal < 0 ? 'var(--red)' : 'var(--sub)'};">
                ${coin.recommendType === 'futures' ? '⚡ 合约' : '💰 现货'}
              </div>
            </div>
          </div>
        </div>

        <div class="derivatives-panel">
          <div class="panel-title">🔍 多周期技术指标</div>
          <div class="detail-metrics">
            <div class="detail-metric">
              <div class="detail-metric-label">5分钟涨跌</div>
              <div class="detail-metric-value ${coin.change5m > 0 ? 'up' : 'down'}">
                ${fmtPct(coin.change5m, 2)}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">5分钟RSI</div>
              <div class="detail-metric-value">${coin.rsi5m.toFixed(0)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">5分钟CVD</div>
              <div class="detail-metric-value ${coin.cvd5m.trend === 'up' ? 'up' : 'down'}">
                ${coin.cvd5m.trend}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">1小时涨跌</div>
              <div class="detail-metric-value ${coin.change1h > 0 ? 'up' : 'down'}">
                ${fmtPct(coin.change1h, 2)}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">1小时RSI</div>
              <div class="detail-metric-value">${coin.rsi1h.toFixed(0)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">1小时CVD</div>
              <div class="detail-metric-value ${coin.cvd1h.trend === 'up' ? 'up' : 'down'}">
                ${coin.cvd1h.trend}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">4小时涨跌</div>
              <div class="detail-metric-value ${coin.change4h > 0 ? 'up' : 'down'}">
                ${fmtPct(coin.change4h, 2)}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">4小时RSI</div>
              <div class="detail-metric-value">${coin.rsi4h.toFixed(0)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">日线涨跌</div>
              <div class="detail-metric-value ${coin.change1d > 0 ? 'up' : 'down'}">
                ${fmtPct(coin.change1d, 2)}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">日线RSI</div>
              <div class="detail-metric-value">${coin.rsi1d.toFixed(0)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">1小时MACD</div>
              <div class="detail-metric-value ${coin.macd1h.histogram > 0 ? 'up' : 'down'}">
                ${coin.macd1h.histogram.toFixed(6)}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">4小时MACD</div>
              <div class="detail-metric-value ${coin.macd4h.histogram > 0 ? 'up' : 'down'}">
                ${coin.macd4h.histogram.toFixed(6)}
              </div>
            </div>
          </div>
        </div>

        <div class="derivatives-panel">
          <div class="panel-title">💎 衍生品数据（真实）</div>
          <div class="detail-metrics">
            <div class="detail-metric">
              <div class="detail-metric-label">OI Value</div>
              <div class="detail-metric-value">$${fmt(coin.oiValue, 0)}</div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">OI/MCAP</div>
              <div class="detail-metric-value">
                ${coin.oiMcapRatio > 0 ? coin.oiMcapRatio.toFixed(1) : '--'}%
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">OI 6h%</div>
              <div class="detail-metric-value ${coin.oi6hPct > 0 ? 'up' : 'down'}">
                ${isFinite(coin.oi6hPct) ? fmtPct(coin.oi6hPct, 1) : '--'}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">OI 24h%</div>
              <div class="detail-metric-value ${coin.oi24hPct > 0 ? 'up' : 'down'}">
                ${isFinite(coin.oi24hPct) ? fmtPct(coin.oi24hPct, 1) : '--'}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">资金费率</div>
              <div class="detail-metric-value ${coin.fundingRate > 0 ? 'up' : 'down'}">
                ${coin.fundingRate !== undefined ? fmtPct(coin.fundingRate, 3) : '--'}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">多空比</div>
              <div class="detail-metric-value ${coin.globalLongShortRatio > 1.5 ? 'up' : coin.globalLongShortRatio < 0.8 ? 'down' : ''}">
                ${isFinite(coin.globalLongShortRatio) ? fmt(coin.globalLongShortRatio, 2) : '--'}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">OI/Vol</div>
              <div class="detail-metric-value">
                ${coin.oiVolumeRatio > 0 ? coin.oiVolumeRatio.toFixed(1) : '--'}%
              </div>
            </div>
          </div>
        </div>

        <div class="derivatives-panel">
          <div class="panel-title">📊 做多信号 (${coin.buySignalCount}个)</div>
          <div style="font-size: 12px; line-height: 1.6; color: var(--text);">
            ${longSignalsHtml}
          </div>
        </div>

        <div class="derivatives-panel">
          <div class="panel-title">📊 做空信号 (${coin.sellSignalCount}个)</div>
          <div style="font-size: 12px; line-height: 1.6; color: var(--text);">
            ${shortSignalsHtml}
          </div>
        </div>

        <div class="derivatives-panel">
          <div class="panel-title">📊 净信号强度</div>
          <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 12px;">
            <div style="flex: 1;">
              <div style="font-size: 14px; color: var(--text); margin-bottom: 4px;">做多信号: <strong style="color: var(--green);">${coin.buySignalCount}</strong></div>
              <div style="font-size: 14px; color: var(--text);">做空信号: <strong style="color: var(--red);">${coin.sellSignalCount}</strong></div>
            </div>
            <div style="text-align: center;">
              <div style="font-size: 28px; font-weight: 900; color: ${coin.totalSignal > 0 ? 'var(--green)' : coin.totalSignal < 0 ? 'var(--red)' : 'var(--sub)'};">
                ${coin.totalSignal > 0 ? '+' : ''}${coin.totalSignal}
              </div>
              <div style="font-size: 11px; color: var(--sub); margin-top: 4px;">
                ${coin.totalSignal > 5 ? '强做多' : coin.totalSignal > 0 ? '弱做多' : coin.totalSignal < -5 ? '强做空' : coin.totalSignal < 0 ? '弱做空' : '中性'}
              </div>
            </div>
          </div>
        </div>

        <div class="derivatives-panel">
          <div class="panel-title">✨ 多周期共振分析</div>
          <div style="font-size: 12px; line-height: 1.8; color: var(--sub);">
            <div style="margin-bottom: 12px;">
              <strong style="color: var(--text);">共振等级:</strong>
              <span style="color: var(--cyan); font-weight: 700;">
                ${coin.resonance.count >= 3 ? '✨ 强共振 (3个以上)' : coin.resonance.count === 2 ? '🔄 中共振 (2个)' : coin.resonance.count === 1 ? '📊 弱共振 (1个)' : '❌ 无共振'}
              </span>
            </div>
            <div style="border-top: 1px solid rgba(255,255,255,.1); padding-top: 8px;">
              <strong style="color: var(--text);">共振信号:</strong><br>
              ${coin.resonance.details.length > 0 ? coin.resonance.details.map(d => `✓ ${d}`).join('<br>') : '暂无共振信号'}
            </div>
          </div>
        </div>

        <div class="derivatives-panel">
          <div class="panel-title">⚠️ 拥挤度评估 ${coin.crowdingRisk.level === 'high' ? '🔴' : coin.crowdingRisk.level === 'mid' ? '🟡' : '🟢'}</div>
          <div class="detail-metrics">
            <div class="detail-metric">
              <div class="detail-metric-label">拥挤等级</div>
              <div class="detail-metric-value" style="${coin.crowdingRisk.level === 'high' ? 'color: var(--red);' : coin.crowdingRisk.level === 'mid' ? 'color: var(--yellow);' : 'color: var(--green);'}">
                ${coin.crowdingRisk.level === 'high' ? '🔴 高' : coin.crowdingRisk.level === 'mid' ? '🟡 中' : '🟢 低'}
              </div>
            </div>
            <div class="detail-metric">
              <div class="detail-metric-label">拥挤分数</div>
              <div class="detail-metric-value">${coin.crowdingRisk.score}/100</div>
            </div>
          </div>
          <div style="margin-top: 12px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 6px; font-size: 11px; line-height: 1.8; color: var(--sub);">
            ${coin.crowdingRisk.reasons.length > 0 ? coin.crowdingRisk.reasons.map(r => `⚠️ ${r}`).join('<br>') : '✅ 暂无特殊风险提示'}
          </div>
        </div>

        <div class="derivatives-panel">
          <div class="panel-title">🎯 推荐交易方案</div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px;">
            <div style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px;">
              <div style="font-size: 10px; color: var(--sub); margin-bottom: 4px;">交易类型</div>
              <div style="font-size: 14px; font-weight: 700; color: var(--cyan);">
                ${coin.recommendType === 'futures' ? '⚡ 合约交易' : '💰 现货交易'}
              </div>
            </div>
            <div style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px;">
              <div style="font-size: 10px; color: var(--sub); margin-bottom: 4px;">推荐杠杆</div>
              <div style="font-size: 14px; font-weight: 700; color: var(--cyan);">
                ${coin.recommendLeverage}x
              </div>
            </div>
            <div style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px;">
              <div style="font-size: 10px; color: var(--sub); margin-bottom: 4px;">建议仓位</div>
              <div style="font-size: 14px; font-weight: 700; color: var(--cyan);">
                ${coin.recommendPosition}%
              </div>
            </div>
          </div>
        </div>

        <div class="timeframe-analysis">
          <div class="tf-analysis">
            <div class="tf-title">5分钟周期</div>
            <div class="tf-content">
              <strong>涨跌:</strong> <span class="${coin.change5m > 0 ? 'up' : 'down'}">${fmtPct(coin.change5m, 2)}</span><br>
              <strong>RSI:</strong> ${coin.rsi5m.toFixed(0)} (${coin.phase5m})<br>
              <strong>CVD:</strong> ${coin.cvd5m.trend} <br>
            </div>
          </div>

          <div class="tf-analysis">
            <div class="tf-title">1小时周期</div>
            <div class="tf-content">
              <strong>涨              跌:</strong> <span class="${coin.change1h > 0 ? 'up' : 'down'}">${fmtPct(coin.change1h, 2)}</span><br>
              <strong>RSI:</strong> ${coin.rsi1h.toFixed(0)} (${coin.phase1h})<br>
              <strong>CVD:</strong> ${coin.cvd1h.trend}<br>
              <strong>MACD:</strong> ${coin.macd1h.histogram > 0 ? '📈 金叉' : '📉 死叉'}
            </div>
          </div>

          <div class="tf-analysis">
            <div class="tf-title">4小时周期</div>
            <div class="tf-content">
              <strong>涨跌:</strong> <span class="${coin.change4h > 0 ? 'up' : 'down'}">${fmtPct(coin.change4h, 2)}</span><br>
              <strong>RSI:</strong> ${coin.rsi4h.toFixed(0)} (${coin.phase4h})<br>
              <strong>MACD:</strong> ${coin.macd4h.histogram > 0 ? '📈 金叉' : '📉 死叉'}
            </div>
          </div>

          <div class="tf-analysis">
            <div class="tf-title">日线周期</div>
            <div class="tf-content">
              <strong>涨跌:</strong> <span class="${coin.change1d > 0 ? 'up' : 'down'}">${fmtPct(coin.change1d, 2)}</span><br>
              <strong>RSI:</strong> ${coin.rsi1d.toFixed(0)} (${coin.phase1d})<br>
              <strong>方向:</strong> ${coin.mainDirection === 'up' ? '📈 上升' : '📉 下降'}
            </div>
          </div>
        </div>

        <div class="quick-channel-section">
          <div class="quick-channel-title">🚀 快速跳转（点击打开）</div>
          <div class="channel-grid">
            <button class="btn" onclick="openLink(getChartLink('${coin.symbol}'))">📈 TradingView</button>
            <button class="btn" onclick="openLink('https://www.binance.com/trade/${coin.symbol}_USDT')">💰 币安现货</button>
            <button class="btn" onclick="openLink('https://www.binance.com/futures/${coin.symbol}USDT')">⚡ 币安合约</button>
            <button class="btn" onclick="openLink(getCoinGlassLink('${coin.symbol}'))">🔍 Coinglass</button>
            <button class="btn" onclick="openLink(getLiquidationMapLink('${coin.symbol}'))">🌊 爆仓地图</button>
            <button class="btn" onclick="openLink(getCoinGeckoLink('${coin.symbol}'))">📊 CoinGecko</button>
            <button class="btn" onclick="openLink(getDexScreenerLink('${coin.symbol}'))">🦅 DexScreener</button>
            <button class="btn" onclick="copyToClipboard('${coin.symbol}')">📋 复制币种</button>
          </div>
          <div class="channel-hint">💡 提示：红色高拥挤度币种谨慎交易，评级仅供参考，请自行做好风险管理</div>
        </div>
      `;

      document.getElementById('detail-content').innerHTML = html;
      window.scrollTo(0, 0);
    }

    // ============ 初始化 ============
    async function init() {
      try {
        console.log('🚀 初始化系统...');
        showNotification('🔄 正在加载币种列表...', 'success');

        const symbols = await loadExchangeInfo();
        if (symbols.length === 0) {
          showNotification('❌ 加载币种失败，请刷新页面重试', 'error');
          return;
        }

        showNotification(`✅ 已加载 ${symbols.length} 个币种，点击"扫描"开始分析`, 'success');
        renderMonitorContent();
      } catch (e) {
        console.error('初始化失败:', e);
        showNotification('❌ 初始化失败: ' + e.message, 'error');
      }
    }

    // ============ 自动定时刷新 ============
    setInterval(() => {
      if (!isRefreshing && Object.keys(allCoins).length > 0) {
        console.log('⏰ 自动定时刷新...');
        twoPhaseFullRefresh();
      }
    }, CONFIG.refreshMs);

    // ============ 页面加载 ============
    window.addEventListener('load', init);

    // ============ 页面卸载清理 ============
    window.addEventListener('beforeunload', () => {
      klineCache = {};
      volume24hCache = {};
      marketCapCache = {};
      futuresDataCache = {};
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密货币智能监控系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .nav-tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
            background: #fafafa;
        }

        .nav-tabs button {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .nav-tabs button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }

        .nav-tabs button:hover {
            background: white;
        }

        .content {
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .control-panel {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .control-panel h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled,
        .btn-primary.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary.loading::after {
            content: ' ⏳';
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #d0d0d0;
        }

        .status-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .status-box p {
            color: #333;
            font-size: 14px;
            margin: 5px 0;
        }

        .status-box strong {
            color: #667eea;
        }

        .progress-container {
            margin: 15px 0;
        }

        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 12px;
            color: #999;
            text-align: right;
        }

        .coins-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .coins-table thead {
            background: #f5f5f5;
        }

        .coins-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }

        .coins-table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .coins-table tr:hover {
            background: #fafafa;
        }

        .coin-symbol {
            font-weight: 600;
            color: #667eea;
        }

        .positive {
            color: #00cc00;
        }

        .negative {
            color: #ff0000;
        }

        .neutral {
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state p {
            font-size: 14px;
        }

        input[type="number"],
        input[type="text"],
        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            margin-right: 10px;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .scan-status {
            padding: 10px;
            background: #fffbf0;
            border-left: 4px solid #ff9800;
            border-radius: 4px;
            margin: 10px 0;
            color: #ff6f00;
            font-size: 14px;
        }

        .scan-status.success {
            background: #f0fff0;
            border-left-color: #4caf50;
            color: #2e7d32;
        }

        .coin-details {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13px;
        }

        .coin-details p {
            margin: 5px 0;
        }

        .footer {
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }

        .alert-success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 加密货币智能监控系统</h1>
            <p>实时监控市值、合约持仓、资金费率、K线走势</p>
        </div>

        <div class="nav-tabs">
            <button class="nav-btn active" data-tab="monitor">📊 监控面板</button>
            <button class="nav-btn" data-tab="analysis">🔍 深度分析</button>
            <button class="nav-btn" data-tab="settings">⚙️ 设置</button>
        </div>

        <div class="content">
            <!-- 监控面板 Tab -->
            <div id="monitor" class="tab-content active">
                <div class="control-panel">
                    <h3>快速扫描</h3>
                    <div class="button-group">
                        <button id="quick-scan-btn" class="btn-primary">🔄 快速扫描（TOP 50）</button>
                        <button id="full-scan-btn" class="btn-primary">🔍 完整扫描（TOP 200）</button>
                        <button id="manual-refresh-btn" class="btn-primary">♻️ 手动刷新</button>
                    </div>
                </div>

                <div id="scanning-status" style="display: none;">
                    <div class="scan-status">
                        <p id="scan-status">准备扫描...</p>
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div id="scanning-progress-bar" class="progress-fill" style="width: 0%;"></div>
                            </div>
                            <div class="progress-text">
                                <span id="scanning-progress-text">0/0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="monitor-status" class="status-box"></div>
                <div id="coins-container" class="empty-state">
                    <p>👈 点击上方按钮开始扫描</p>
                </div>
            </div>

            <!-- 深度分析 Tab -->
            <div id="analysis" class="tab-content">
                <div class="control-panel">
                    <h3>两阶段深度分析</h3>
                    <div class="button-group">
                        <button id="two-phase-btn" class="btn-primary">🚀 启动深度分析</button>
                    </div>
                </div>

                <div id="analysis-status" class="status-box" style="display: none;"></div>
                <div id="analysis-results" class="empty-state">
                    <p>点击上方按钮进行深度分析</p>
                </div>
            </div>

            <!-- 设置 Tab -->
            <div id="settings" class="tab-content">
                <div class="control-panel">
                    <h3>参数配置</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
                        <div>
                            <label style="display: block; margin-bottom: 5px; color: #333; font-size: 13px;">快速扫描数量</label>
                            <input type="number" id="quick-scan-limit" min="10" max="500" value="50">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 5px; color: #333; font-size: 13px;">完整扫描数量</label>
                            <input type="number" id="full-scan-limit" min="50" max="500" value="200">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 5px; color: #333; font-size: 13px;">市值增长阈值 (%)</label>
                            <input type="number" id="mcap-threshold" min="0" max="100" value="10" step="0.1">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 5px; color: #333; font-size: 13px;">资金费率阈值 (%)</label>
                            <input type="number" id="funding-threshold" min="0" max="1" value="0.05" step="0.001">
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <button id="save-config-btn" class="btn-primary">💾 保存配置</button>
                    </div>
                </div>

                <div id="config-status" style="display: none; margin-top: 15px;"></div>
            </div>
        </div>

        <div class="footer">
            <p>更新时间: <span id="last-update">未更新</span> | 数据来源: Binance API</p>
        </div>
    </div>

    <script>
        // ===== 全局配置和缓存 =====
        const BACKEND_URL = 'https://index-html-pi-seven-55.vercel.app';

        const CONFIG = {
            quickScanLimit: 50,
            fullScanLimit: 200,
            mcapThreshold: 10,
            fundingThreshold: 0.05
        };

        let allCoins = {};
        let allSymbols = [];
        let currentPage = 'monitor';
        let isRefreshing = false;
        let binanceAssets = {};
        let klineCache = {};
        let marketCapCache = {};
        let oiHistoryCache = {};

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            loadConfig();
            loadBinanceAssets();
            addEventListeners();
            updateLastUpdateTime();
        });

        // ===== Tab 导航 =====
        function initTabs() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabName = btn.getAttribute('data-tab');
                    switchTab(tabName);
                });
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            currentPage = tabName;
        }

        // ===== 事件监听 =====
        function addEventListeners() {
            document.getElementById('quick-scan-btn').addEventListener('click', () => quickScan(CONFIG.quickScanLimit));
            document.getElementById('full-scan-btn').addEventListener('click', () => quickScan(CONFIG.fullScanLimit));
            document.getElementById('manual-refresh-btn').addEventListener('click', twoPhaseFullRefresh);
            document.getElementById('two-phase-btn').addEventListener('click', twoPhaseFullRefresh);
            document.getElementById('save-config-btn').addEventListener('click', saveConfig);
        }

        // ===== 加载币安资产 =====
        async function loadBinanceAssets() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await res.json();
                allSymbols = data.symbols
                    .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING')
                    .map(s => s.baseAsset)
                    .slice(0, 500);
                console.log(`✅ 加载了 ${allSymbols.length} 个币种`);
            } catch (e) {
                console.error('加载币安资产失败:', e);
            }
        }

        // ===== 快速扫描 =====
        async function quickScan(limit) {
            if (isRefreshing) return;
            isRefreshing = true;

            const statusDiv = document.getElementById('monitor-status');
            const scanStatusDiv = document.getElementById('scanning-status');
            const progressBar = document.getElementById('scanning-progress-bar');
            const progressText = document.getElementById('scanning-progress-text');
            const coinsContainer = document.getElementById('coins-container');

            try {
                scanStatusDiv.style.display = 'block';
                statusDiv.innerHTML = '⏳ 快速扫描进行中...';

                const scanList = allSymbols.slice(0, limit);
                const results = [];

                for (let i = 0; i < scanList.length; i++) {
                    const symbol = scanList[i];
                    const result = await quickScanCoin(symbol);

                    if (result && result.marketCap) {
                        results.push(result);
                    }

                    const progress = ((i + 1) / scanList.length) * 100;
                    progressBar.style.width = progress + '%';
                    progressText.textContent = `${i + 1}/${scanList.length}`;
                }

                results.sort((a, b) => (b.marketCap || 0) - (a.marketCap || 0));
                allCoins = Object.fromEntries(results.map(c => [c.symbol, c]));

                statusDiv.innerHTML = `✅ 快速扫描完成：${results.length} 个有效币种`;
                displayCoins(results, 'coins-container');
                scanStatusDiv.style.display = 'none';

            } catch (e) {
                statusDiv.innerHTML = `❌ 扫描失败: ${e.message}`;
            } finally {
                isRefreshing = false;
                updateLastUpdateTime();
            }
        }

        // ===== 快速扫描单个币 =====
        async function quickScanCoin(symbol) {
            try {
                const marketCap = await getMarketCapData(symbol);
                const futuresData = await getFuturesData(symbol);

                return {
                    symbol,
                    marketCap,
                    openInterest: futuresData.openInterest || 0,
                    oiValue: futuresData.oiValue || 0,
                    fundingRate: futuresData.fundingRate || 0,
                    globalLongShortRatio: futuresData.globalLongShortRatio || 1
                };
            } catch (e) {
                console.warn(`快速扫描 ${symbol} 失败:`, e.message);
                return null;
            }
        }

        // ===== 获取市值数据 =====
        async function getMarketCapData(symbol) {
            const cacheKey = `mcap_${symbol}`;

            if (marketCapCache[cacheKey] && Date.now() - marketCapCache[cacheKey].time < 3600000) {
                return marketCapCache[cacheKey].data;
            }

            try {
                const res = await fetch(`${BACKEND_URL}/api/market-cap?symbol=${symbol}`).then(r => r.json());
                const marketCap = res && typeof res.marketCap !== 'undefined' ? res.marketCap : null;

                marketCapCache[cacheKey] = {
                    data: marketCap,
                    time: Date.now()
                };

                return marketCap;
            } catch (e) {
                console.warn(`获取 ${symbol} 市值失败:`, e.message);
                return null;
            }
        }

        // ===== 获取合约数据 =====
        async function getFuturesData(symbol) {
            try {
                const res = await fetch(`${BACKEND_URL}/api/futures-data?symbol=${symbol}`).then(r => r.json());

                if (!res || typeof res.openInterest === 'undefined') {
                    return {
                        openInterest: 0,
                        oiValue: 0,
                        fundingRate: 0,
                        globalLongShortRatio: 1,
                        oi6hPct: 0,
                        oi24hPct: 0
                    };
                }

                const currentOI = parseFloat(res.openInterest || 0);
                const currentPrice = parseFloat(res.oiValue || 0);
                const fundingRate = parseFloat(res.fundingRate || 0);

                let oi6hPct = 0;
                let oi24hPct = 0;

                const now = Date.now();
                if (!oiHistoryCache[symbol]) {
                    oiHistoryCache[symbol] = [];
                }

                oiHistoryCache[symbol].push({ time: now, oi: currentOI });
                oiHistoryCache[symbol] = oiHistoryCache[symbol].filter(item => now - item.time <= 86400000);

                if (oiHistoryCache[symbol].length >= 2) {
                    let oi6hRef = null;
                    let oi24hRef = null;

                    for (let i = 0; i < oiHistoryCache[symbol].length; i++) {
                        const item = oiHistoryCache[symbol][i];
                        const diffHours = (now - item.time) / 3600000;

                        if (!oi6hRef && diffHours >= 6) oi6hRef = item;
                        if (!oi24hRef && diffHours >= 24) oi24hRef = item;
                    }

                    if (oi6hRef && oi6hRef.oi > 0) {
                        oi6hPct = ((currentOI - oi6hRef.oi) / oi6hRef.oi) * 100;
                    }

                    if (oi24hRef && oi24hRef.oi > 0) {
                        oi24hPct = ((currentOI - oi24hRef.oi) / oi24hRef.oi) * 100;
                    }
                }

                return {
                    openInterest: currentOI,
                    oiValue: currentPrice,
                    fundingRate,
                    globalLongShortRatio: res.globalLongShortRatio || 1,
                    oi6hPct,
                    oi24hPct
                };
            } catch (e) {
                console.warn(`获取 ${symbol} 合约数据失败:`, e.message);
                return {
                    openInterest: 0,
                    oiValue: 0,
                    fundingRate: 0,
                    globalLongShortRatio: 1,
                    oi6hPct: 0,
                    oi24hPct: 0
                };
            }
        }

        // ===== 两阶段完整刷新 =====
        async function twoPhaseFullRefresh() {
            if (isRefreshing) return;
            isRefreshing = true;

            const statusDiv = currentPage === 'monitor' 
                ? document.getElementById('monitor-status') 
                : document.getElementById('analysis-status');
            const resultsDiv = currentPage === 'monitor'
                ? document.getElementById('coins-container')
                : document.getElementById('analysis-results');
            const scanStatusDiv = document.getElementById('scanning-status');
            const progressBar = document.getElementById('scanning-progress-bar');
            const progressText = document.getElementById('scanning-progress-text');
            const scanStatus = document.getElementById('scan-status');
            const refreshBtn = document.getElementById('manual-refresh-btn');

            try {
                if (currentPage === 'monitor') {
                    scanStatusDiv.style.display = 'block';
                    if (refreshBtn) {
                        refreshBtn.disabled = true;
                        refreshBtn.classList.add('loading');
                    }
                } else {
                    document.getElementById('analysis-status').style.display = 'block';
                }

                const startTime = Date.now();
                const quickScanList = allSymbols.slice(0, CONFIG.quickScanLimit);
                const quickResults = [];

                // 第一阶段：快速扫描
                scanStatus.textContent = '📊 第一阶段：快速扫描...';

                for (let i = 0; i < quickScanList.length; i++) {
                    const symbol = quickScanList[i];
                    const result = await quickScanCoin(symbol);

                    if (result && result.marketCap) {
                        quickResults.push(result);
                    }

                    const progress = ((i + 1) / quickScanList.length) * 50;
                    progressBar.style.width = progress + '%';
                    progressText.textContent = `${i + 1}/${quickScanList.length} (快速扫描)`;
                }

                // 第二阶段：深度分析
                scanStatus.textContent = '🔍 第二阶段：深度分析...';
                const analysisResults = [];

                for (let i = 0; i < quickResults.length; i++) {
                    const coin = quickResults[i];
                    const analyzed = await analyzeCoin(coin.symbol, coin);

                    if (analyzed) {
                        analysisResults.push(analyzed);
                    }

                    const progress = 50 + ((i + 1) / quickResults.length) * 50;
                    progressBar.style.width = progress + '%';
                    progressText.textContent = `${i + 1}/${quickResults.length} (深度分析)`;
                }

                analysisResults.sort((a, b) => (b.score || 0) - (a.score || 0));
                allCoins = Object.fromEntries(analysisResults.map(c => [c.symbol, c]));

                const duration = ((Date.now() - startTime) / 1000).toFixed(2);
                statusDiv.innerHTML = `✅ 两阶段分析完成！找到 ${analysisResults.length} 个目标币种（耗时 ${duration}s）`;
                displayCoins(analysisResults, resultsDiv.id);

                if (currentPage === 'monitor') {
                    scanStatusDiv.style.display = 'none';
                }

            } catch (e) {
                statusDiv.innerHTML = `❌ 分析失败: ${e.message}`;
            } finally {
                isRefreshing = false;
                if (refreshBtn) {
                    refreshBtn.disabled = false;
                    refreshBtn.classList.remove('loading');
                }
                updateLastUpdateTime();
            }
        }

        // ===== 深度分析单个币 =====
        async function analyzeCoin(symbol, quickScanData = null) {
            try {
                const marketCap = quickScanData?.marketCap || await getMarketCapData(symbol);
                const futuresData = await getFuturesData(symbol);

                // 简单评分逻辑
                let score = 0;

                if (marketCap && marketCap > 1e9) score += 20;
                if (futuresData.fundingRate > CONFIG.fundingThreshold) score += 30;
                if (futuresData.oi24hPct > 5) score += 25;
                if (futuresData.globalLongShortRatio > 1.2) score += 25;

                return {
                    symbol,
                    marketCap,
                    openInterest: futuresData.openInterest,
                    oiValue: futuresData.oiValue,
                    fundingRate: futuresData.fundingRate,
                    globalLongShortRatio: futuresData.globalLongShortRatio,
                    oi6hPct: futuresData.oi6hPct,
                    oi24hPct: futuresData.oi24hPct,
                    score
                };
            } catch (e) {
                console.warn(`分析 ${symbol} 失败:`, e.message);
                return null;
            }
        }

        // ===== 显示币种表格 =====
        function displayCoins(coins, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (!coins || coins.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
                return;
            }

            let html = '<table class="coins-table"><thead><tr><th>币种</th><th>市值</th><th>24h涨跌</th><th>合约OI</th><th>OI 24h变化</th><th>资金费率</th><th>评分</th></tr></thead><tbody>';

            coins.forEach(coin => {
                const marketCapStr = coin.marketCap ? `$${(coin.marketCap / 1e9).toFixed(2)}B` : 'N/A';
                const change24hStr = coin.change24h ? `${coin.change24h > 0 ? '+' : ''}${coin.change24h.toFixed(2)}%` : 'N/A';
                const oiStr = coin.openInterest ? coin.openInterest.toFixed(0) : 'N/A';
                const oi24hStr = coin.oi24hPct ? `${coin.oi24hPct > 0 ? '+' : ''}${coin.oi24hPct.toFixed(2)}%` : 'N/A';
                const fundingRateStr = coin.fundingRate ? `${(coin.fundingRate * 100).toFixed(4)}%` : 'N/A';
                const scoreStr = coin.score ? coin.score.toFixed(0) : '0';

                const changeClass = coin.change24h > 0 ? 'positive' : coin.change24h < 0 ? 'negative' : 'neutral';
                const oi24hClass = coin.oi24hPct > 0 ? 'positive' : coin.oi24hPct < 0 ? 'negative' : 'neutral';

                html += `<tr>
                    <td><span class="coin-symbol">${coin.symbol}</span></td>
                    <td>${marketCapStr}</td>
                    <td class="${changeClass}">${change24hStr}</td>
                    <td>${oiStr}</td>
                    <td class="${oi24hClass}">${oi24hStr}</td>
                    <td>${fundingRateStr}</td>
                    <td><strong>${scoreStr}</strong></td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // ===== 配置管理 =====
        function loadConfig() {
            const saved = localStorage.getItem('cryptoMonitorConfig');
            if (saved) {
                const config = JSON.parse(saved);
                Object.assign(CONFIG, config);
            }

            document.getElementById('quick-scan-limit').value = CONFIG.quickScanLimit;
            document.getElementById('full-scan-limit').value = CONFIG.fullScanLimit;
            document.getElementById('mcap-threshold').value = CONFIG.mcapThreshold;
            document.getElementById('funding-threshold').value = CONFIG.fundingThreshold;
        }

        function saveConfig() {
            CONFIG.quickScanLimit = parseInt(document.getElementById('quick-scan-limit').value);
            CONFIG.fullScanLimit = parseInt(document.getElementById('full-scan-limit').value);
            CONFIG.mcapThreshold = parseFloat(document.getElementById('mcap-threshold').value);
            CONFIG.fundingThreshold = parseFloat(document.getElementById('funding-threshold').value);

            localStorage.setItem('cryptoMonitorConfig', JSON.stringify(CONFIG));

            const statusDiv = document.getElementById('config-status');
            statusDiv.innerHTML = '<div class="alert alert-success">✅ 配置已保存</div>';
            statusDiv.style.display = 'block';

            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }

        // ===== 更新时间 =====
        function updateLastUpdateTime() {
            const now = new Date().toLocaleTimeString('zh-CN');
            document.getElementById('last-update').textContent = now;
        }

        // 每 5 分钟自动更新一次时间显示
        setInterval(updateLastUpdateTime, 300000);
    </script>
</body>
</html>
